body:
  text: 隱居通議卷十六元劉塤撰文章四張侍郎簡牘侍郎張公淵微字孟博建昌新城人父介登進士科仕至湖南運幹公明易工文詞而不利於鄉舉淳祐丙午流寓湖北赴運司試中選貢禮部明年擢進士第一人授承事郎簽書昭慶軍判官㕔公事纍更朝蹟權吏部侍郎忤賈似道免歸以集英殿修撰起知饒州未行以御史疏罷奉宫觀祿又以舒有開疏罷而卒公為文斬截峻刻得左氏文法屢求其稿子孫無在者亡矣適得其簡牘二三俱可觀因録存之且紀其舊聞曰建昌鄉試取士解額三十七名而周易義當其一寶祐乙卯歲公服喪里居是歲貢舉試士時旴城張天民明易其文筆冠一時而同經之能者又五十有二人意其間必有一中選矣及榜出則中者乃余裕新城俗子也大失衆望於是天民等五十三人聨名致書於公言余非才冒舉辱易經負舉選意若以公為本經盟主而赴訴之公因易以答筆力甚偉其書曰某自罹陟岵之憂廬深山莫與往來厭諱氏名不得通於故交時英游鱗何從尺素書抵寓驛中自冢上歸得之亟薰香奉觀視其題條冰之光修史學士其人伸其幅聨璧之輝先覺天民其元某何人何以得斯何以稱哉謹再三讀文采巨麗詞勢縱橫主易經之齊盟立善類之赤幟足張吾軍不勝擊節惟是潔靜精微之學昔嘗從事於斯而不得其師惟天民諸君子發天之祕擴聖之疆精祲六爻之夢度越九師之說競秀於旴名震於京師蓋所願學而未遇者明天子興賢卿大夫薦書此一舉也羣五十三雋鏗鍧乎文鳴楊陸張黃胡涂王鄒此八人者當時考試官也固已蹶動聳遻相顧太息吾旴之有人於此五十三雋復拔其尤以先登猶有二十八宿為雲臺之儲二十四氣當凌烟之選也顧舍是而他有一焉黃鐘棄而瓦缶鳴賢士無聞如來翰之所云云辱經辱旴辱科豈不大駭觀聽耶試為諸君子說筮云是謂暌之歸妹薉甚負塗之豕變為無血之羊始于載鬼終于虛筐暌卦不在三十七數而歸妹又不在五十三數以暌之三十八而厠諸三十七人之列非據也以歸妹之五十四而加諸五十三人之上非人也非據則名必辱非人則身必危既辱且危祗掇禍也是卦也離之震亦震之離晉獻公筮嫁伯姬亦遇之是反覆同一凶也且其繇曰士刲羊無血也女承筐無貺也西鄰責言不可償也彼妄一人以柔乘剛以小人乘君子之器蒺藜之據已甚髙墉之射莫逃無號終有凶耳豈特責言不可償殆有甚焉史蘇不云乎車脫火焚歸妹暌孤六年其逋明年其死於髙梁之虛吁可畏也是豈特終朝之三褫也歟識者竊為彼悲之嘗試為諸君布蓍四營而得艮之漸艮之止時止也物不可以終止故受之以漸漸之進也是蓋易之五十三卦也其在五言有序中正之言終莫之勝吉艮之漸三歲得所願也三年將尋師焉拔茅連茹以其彚征吉矣今日院豎子顧勞悉師邪抑天民有言雖聖人不敢盡其機或因鄧侯從天民願學而得所謂機焉其亦有以折衷乎此不宣答饒蘭坡士堯赴省試書某不材見棄於時桑梓羞之歸省先人之墓而不敢居以是不得侍於下風東上維時濟濟者衆峨峨纓冠其往又是一番新郎君謂吾衰而與吾雪恥鄉之士如吾士堯吾所望是以寓拳拳朝夕引領魁斾於征其道旴城其當慶餞於道周明年其魁蘭宫是吾蘭坡則吾所深期朝夕是贊是祝矣書來遜未遑曰朽蹤而灰心此非子游所望於子綦也且聞夫子之足瘳矣猶曰未果於行也何居我是用勸往哉用所學以昌斯世在此行母懷寶而迷邦人之賴士堯其無斁頃貺水芝澡料一物之寓一理存無塞其心而澡其德敢不承厚意焉不宣按荷為水芝見本草約鄉友㑹飲帖枌社數交朋萍蹤幾聚散小山良集以誠子之還諸賓主皆歸榮途而幾道赴新任伯雨趁新闕惟老我與方塘翁尚一丘一壑可無尊酒論别偕仲華惠卿諸君子聨騎我顧幸甚草草不枝幅二友爭山界為勸和作盟書某側聞某氏某氏各有詞於官各為其先塋皆孝子之爭識者聞而義之義之將助之助之云何助之爭而已彼兩爭此不可兩助兩助之不可惟兩助而兩平之其可竊惟兩墓共一山久為比鄰本自無所爭一山覆兩墓互為掩映本亦在所不必爭得無有傍人鬭諜於其間竊以鬭諜者不過曰某地是某家業今乃為某家封植某木在某山今乃為某家保障由是兩者之言入而兩家之訟興其聞官則又將煩邑糾呼里正集鄰保入山林相畝步視髙下立標表量丈尺如是動衆山靈不寧曾謂兩家子以孝聞而以是動先靈乎是必非所願是以斷之曰甲之墓以乙之山為保障則乙之保是山猶吾保是山也乙之山以甲之墓為屏蔽則甲之保是山猶吾保是山也毋斬一木毋侵軼毋以平常之地起爭端有渝此盟山靈殛之俾墜其家無克祚世於是薦酒結券二子咸舉首曰命之矣復以是載書盟於官以重其信焉龔祥甫墓志銘新城有士曰劉尚父夢桂與張公友善亦工古文景定辛酉歲以詩義魁鄉薦不第而終壬戌之秋豫嘗訪之叙宗盟殊篤有書齊扁曰方塘即前所謂方塘翁者也嘗為里友龔祥甫墓志其文曰天道無親常與善人昔聞其言於師聃而於里中龔祥甫疑焉子不終養而先逝婦勉守志而病狂一老憖遺閔斯鞠孫嗚呼獨也無子視孫孤也無父視祖祖孫二人獨孤相視而祥甫年已七十視䕃不能待矣以景定二年十一月某日卒子聲道去之已十年婦黃今猶寡佛老今承重有妄意室中之藏者持其家事昵親養共觀弗救鏹耗於室粒耗於倉弗考或牽之牛貨之豕弗治誘是藐孤博與游弗迪意將蕩其志而毁其家言念租荼漂搖風雨斯天不與善乎申包胥有言人衆者勝天天定者亦能勝人祥甫受學我先師中奉大夫龍山先生張公介先生之子淵微今為吏部侍郎於祥甫父子若孫世契也里居聞訃為泫然曰善人也而逝其孫疇依既又目擊人衆者之為抱不平曰不可使亡友肉未寒而有此今惟其孤是恤惟祥甫襄事是圖非有司無以杜鄰胥戕者為白於官首黜其僕而警其族之不咸責親房扶持之銖銅勺粟畢登之籍先是祥甫為佛老請婚於豫姪孫委禽矣侍郎謂可以相其孤奉母也屬持柯者有抑塞又白於官移文二家同養焉自是得所翼馮外禦其侮而天者其定矣初侍郎廬母夫人墓登雲䕃山望溪南中坑氣勢鬱鬱以杖叩老龍曰噫將誰之藏也以勸祥甫為自謀至是卜葬向以癸食厝以壬戌八月某日食誅茅開阡見者曰吉天殆興龔氏也夫積善之家必有餘慶而地理書亦云天地惜至寶以賞善人祥甫早歲屬文有聲庠序遭冦亂無仕進意遂罷舉子業而侍郎每稱吾老友必有取矣殆裒雖不言而四時之氣備歟平居於人無忤睦親戚以禮撫臧獲以恩未嘗疾言厲色家量出入嘗值歲凶閉之糶者皆是已獨發廪如常時夫是以鄉里稱善人吾是以必其必有報也祥甫字也名應龍世家新城葬之前五日佛老謀所以志諸幽者侍郎謂余子於祥甫親家也宜銘之銘曰人心之初有善無惡無惡即善勿刻其璞璞也能存宜爾恂恂歸於其真善人之墳鬱鬱千春尚克昌而子孫嗣漢三十六代天師簡齊張真人墓志銘昔廬山江丞相萬里為三十五代天師志墓其文竒偉超卓讀之不厭近廬陵劉太博辰翁亦為三十六代天師志墓雖極刻斫摩厲之工而趣味有不及焉輒録於後自昌意以來號稱神明之胄者既無不歷亂磨滅獨漢天師張氏祖諱良以劍印傳如禹鼎延至魏晉六朝隋唐五季逾久而著其承家至此必亦有尤異取信不惑者然猶未至益人國也入宋祥符冠褐始召崇觀符籙始盛其時有虛靖先生道始顯至穆陵賜號觀妙先生可大甫三十五代其退潮拯旱尤信由是龍虎山宫觀壓東南為福地第一化人之蒙袂四出者致方物修士之贏糧訪道者賈摯幣祈者謝者不寧令者膝行而踵至居如市市如邑兒童下走順風而呼􅎓而售者滋富至莫辨於是用物宏矣乃三十六代天師宗潢起紹陵訖德祐且十年方禁中奉祕祝謹然不召至乙亥丙子間金陵已不守信未下然北使已先傳張天師召召且亟當是時環江南之冰泮者無息壤兹山獨師是恃而師不自保然未幾時而錫冠劍陟師號豫護持免徵發掌教事度諸品若曰神仙子孫而不名由是寵光赫然又前代盛時所未有由是士大夫有不能出者貧無處者阡陌之負耒耜者親者故者莫不挂冠易服庇風雨寒暑由是入其境者若華胥軍行而狼顧者曰天師之賜履也催科而旦適者曰天師之所撫存也物之熙熙然者不惟不知陵谷亦不知誰氏之子如是者十又七年而演道靈應冲和真人死其君子曰是號簡齊真能簡者也其弟子曰吾師度世解厄非死也殆天師復生先是相𫝊其教三十六代厄故一終一攝不以閏居正懼及也至師而遭訖籙之難或謂道盈亦無所逃於數然惟師以愚守智惟師以儉致福惟師以清靜禦外物故能涉乎邊境而不禍摶乎九萬而不中道夭而又能以餘力濟世得名又非特脫於其厄而已乃至是始昌若論其存亡絶續之際有不可勝述者焉其從容若不得已而應其寡默善為上而不爭或曰天師非世人也蓋必有出乎人間耳目之表者獨恨不盡知耳聞其初至北也不敢挾劍以行及其呼劍而劍至又云北有二虎撫之汝吾左汝吾右皆靡然如命凡流俗好怪所𫝊聞皆若此皆如說東方朔者非實也亦非道也道在平易即簡齊者是已吾方以其簡為近道而彼欲以小夫曲說神之以此勝魔非魔道耶然吾聞山中人言其將逝也亦不能無小異最後北行之日所居面里所山崩辛卯得白兔然不死此其可信者其三代見世系其子孫見碑隂生淳祐甲辰死至元辛卯葬里之澥田實已亥九月癸酉嗣天師與棣賜號體元宏通廣教真人是為三十七代前觀妙先生銘吾師廬山相國老筆也今天師能不逺介其徒以屬我曰斯文託再世矣以吾從古心之後為有愧也乃依楚歌為辭以系之辭曰山龍衣兮翠黃英瓊瑶兮五梁儼歸奏兮玉皇我祖兮撫我大荒途迷兮屏翳驂左指窮於薪兮不窮於火陽平兮賜履於謳於謳兮山中之子風枝號兮老龍言死我祖兮在天覽揆錫兮兹萬千重斯文兮以𫝊江公作觀妙真人志筆力跌蕩真如天馬游龍不可羈馽而又淵然其光油然其味誠老筆也須溪此篇頗覺纒繞有窘態滯礙少活意且又辭費或者未足以繼乃師歟豫近作桂舟先生墓志時不曾觀此篇偶信意作招辭以銘之聞有一游士見而評曰墓銘不應作騷體觀其文字考其議論真須溪焉耳或以見告因笑曰謂吾文似須溪固非欺我而謂銘不用騷體亦未可以律我昔惟韓曾不作此體歐陽公銘石守道梅聖俞皆長言之其說曰言之長哀之深也几案偶有汪龍溪文劉後村集在焉取而觀之銘以楚詞者甚多何止須溪乃知吾黨持論不可草草劉公玉淵曾為人銘墓亦用此體時有一名公見之曰銘作招詞甚佳事載集中藥王贊廬陵劉太博辰翁作藥王贊詞甚朴而㫖有在可發一笑贊曰左畔龍樹王望龍右畔孫真人騎虎惟有藥王屹立於其中不龍不虎獨與犬為伍不解何故吳司封上陳丞相書臨川吳司封鎰上陳丞相書有曰天下事非善類之衆不可為也一齊衆楚薛居州不能善其君一暴十寒雖孟子不能智其主今日牛畜侍以仁義明日荀欣侍以選練明日徐越侍以節儉而歌者之田止御史中丞諫議大夫則言翰林學士給事中則言度支使鹽鐵使京兆尹則言而制使之職削蓋衆正進然後羣枉消以上數事相類剴切動人程漢翁詩序近嘗見疊山謝先生枋得為程漢翁詩序曰詩亡而春秋不可續宇宙一大變也程君漢翁出雲棲吟稿一編示豫豫誦懷古四詩涕泗交頤不能禁覽盡卷乃欣喜雀躍知天下尚有英才黍離之悲無衣之壯匪風下泉之思盡在此矣江北多英雄吾有望焉因詩以見志漢翁所藴蓄所樹立所成就豈易量吾於是重有感焉藝祖最重讀書人雖超世拔俗之才不由科舉程文奮身必不得行其志三百年後以學術殺天下者皆科舉程文之士萬世𫝊笑儒亦無辭以自解矣豫從先朝名將相游泛論邊事自端平甲午至景定甲子儒以時文名而捐軀報國不畏鋒鏑能使武夫心服為國家延數十年之命者僅得曺毅節彭文子余義夫徐有功王景宋五人焉至有功貶死吾知國不可以為國矣漢翁勉旃陸宣公有言興王之良佐皆季代之棄材在季而愚當興而智漢翁豈肯終為愚者乎故曰天下英雄必有借漢翁為儒解嘲者喜談樂誦當過於五人矣吾之敬愛漢翁豈特詩道而已也疊山翁信州貴溪人素有文名筆力竒徑此序不盡其所長而忠憤之意見於言外獨其貶駁科舉程文之士誤我國家𫝊笑萬世此則誠為至論有合於先儒之㫖序所謂曺毅節則有聞也與彭文子余義夫皆偉然英傑之士有大功於西陲者景宋名登義夫之幕客殊有才略惟徐有功雖號帥才而狂疏誕謾無顯績庚申臨江之禍公議非之然義夫乃趙信菴識拔入官非由科第故雖貴顯猶以此自歉每稱白鹿諸生序所稱誤也勳名如義夫何必科第按徐有功名敏子劉氏族譜序吾宗之劉其源甚逺逮族兄太史掞嘗為江樓劉氏族譜序所以紀迹流派者具備兹録以示我後之人使無忘其世本云其序曰劉氏堯之後散居江南者漢髙祖封其弟元王交於楚而衍之也唐季有自鄱杖一劍徙居南豐又自南豐分而之廣昌之新城之建寧江樓八居士寶藏初徙時劍劍長三尺許有北斗星文志天漢元年鑄紹定庚寅劫火黃冠得之呪符水云密國曾公致堯銘居士墓載有牛六十頭手鈔古書數百卷居士作江樓密公為賦五言長韻見鳬繹集其叔子與荆公為同門壻荆公之父益之出守韶州居士同游石仙巖和詩有刻石在初慶厯詔州縣立學宫居士一力任其費曽易占作記實子固十八歲少筆居士生四子四子之子生孫孫生子衆而多微波流星散譜系益落缺不能盡詳惟豫大父泰夫府君與從祖光夫諱炎水村大父及定夫諱止象山髙弟二先生三派子孫尚習詩書别刋善譜可得而考其他昔為士而今無後與今有後而不為士者不能具載豫老病日侵自度進不能頌清廟退無可吟梁甫思息景山樊間中巷德恭翁李大年弟兄力學而任運所居先廬猶是南唐時柱石誠之永豐官滿因而塗塈之定夫師象山號子路與里人黃幾先彭明甫相講學豫外舅丹霞翁來南豐訪定夫及沈德中後歎息久之此譜故可考也太史公作古帝王聖哲世系採托四方異聞甚備而卓然可稱述者殊少豫聞盛德必有後蓋不在乎元來雲礽之多而在乎風流文采之不可湮沒也今劉氏之族不繫乎風俗之媺惡不關乎文墨之興衰若不必存而存之仰存吾祖而已後譜綱目成題曰江樓劉氏族譜畀大年今年七十有七喟然而嘆曰有是哉誠之下世而不見矣分三家子弟脫其稿世守之使後之識豫心者有稽焉淳祐庚戌立春日世孫方石掞序方石太史自號也太史此序文氣斷續未得為工然書劉氏原委則略備矣其録而存之為是故也按密國曾公神道碑載公以大中祥符五年五月丁亥卒於官是真宗朝也此序云密國實銘居士之墓則居士之卒當在大中祥符以前矣至云慶厯修學居士一力任其費則慶厯乃仁宗時距祥符已懸隔無乃謬誤乎蓋一力上脫孫字學記所載云縣之士劉德純合同志而請德純則居士之孫也此一節又誤在作江樓之上當在游石仙岩和詩有刻石在之下既叙居士之叔子方及居士之孫次第方妥太史平生為文極詳謹不應此獨疏鹵得非𫝊寫者之僞邪其集所著如奏議碑銘皆卓絶髙古自成一家如餘清堂記朱丹林墓志符進士墓志劉迪功墓志則其尤妙者也獨此序差不逮他作云口銘偶至一禪林見有口銘頗佳因録之其銘曰神以感通心由口宣福生有兆禍來有端情莫多妄口莫多言蟻孔貫河溜流傾山病從口入禍從口出存亡之機開閣之術口與心謀安危之原樞機之發榮辱存焉隱居通議卷十六
