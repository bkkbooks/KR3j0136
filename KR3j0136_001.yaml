body:
  text: 隱居通議卷一元劉塤撰理學一儒者職分儒者職分不在於作文而在於講學講學不在於章句而在於窮理窮理不在於外求而在於存心道統遺論自孟子推明道統見於七篇之末章其後韓文公作原道伊川公序明道皆承其意推明之而皆不能無遺論孟子說見知聞知而武王周公不得與於太公望散宜生之列昌黎論𫝊道而曽子子思不得續孔子之脈伊川則又謂孟子之後一人而已千四百年間漢董生唐韓子以至宋周子俱不與焉非遺論歟當考古人自少力學一日几間見南豐先生文閲視其上歐陽公書乃慶厯元年也時年二十三耳其書有曰明聖人之心於百世之上明聖人之心於百世之下又曰嘗自謂於聖人之道有絲髮之見焉周遊當世斐然有扶衰救缺之心非徒嗜皮膚隨波流搴枝葉而已又曰茍得望執事之門而入則聖人之堂奧室家自知可以少分萬一於其間也執事將推仁義之道橫天地貫古今則宜取竒偉閎通之士使趨理不避榮辱利害以共爭先王之教於衰滅之中謂執事無意焉某不信也觀先生之志如此是其少年所學超卓不凡非若新學小生惟務詞章而已且是時濓洛未興而先生之學専向聖域何可得哉同日又閲延平李先生師友問答集有摯見羅仲素先生書其年亦才二十四耳其書有曰道可以治心猶食之充饑衣之禦寒也人有迫於饑寒之患為衣食之謀造次顛沛未嘗忘也至於心之不治有沒世不知慮者豈愛心不若口體哉弗思甚矣又曰燭理不明而是非無以辨宅心不廣而喜怒易以搖操履不完而悔吝多精神不完而智巧襲擇焉而不詳守焉而不博朝夕恐懼不啻饑寒切身者求充饑禦寒之具也又曰聖學中未有見處在佛子中有絶嗜欲捐念想即無往以生心者時相與遊亦足以澄汰滓薉洗滌垢坌妄情乾慧得所休歇言蹤義路有依倚處日用之中不無益也然謂儒者之道可㑹為一所以窮理盡性治國平天下者舉積諸此非愚則欺衆皆坐某以此而不知某暫引此以為入道之門爾二先生生世不同人品不同然皆以甫踰弱冠之年便已有志於作聖乃知古人力學自少時已下工夫回思吾儕小人當此年紀不過刻意舉業志求榮達日夕汲汲惟黃冊之文是務舉世陷溺相習成風曷嘗有一之志於道哉亦由所師不過如此繆種相承卒誤後學斯時也儻有名師能舉二先生之說開發提警安知不於道有進邪虛老一生晚悔何及熟復二書仰天浩歎要知舍內學而從外務誠不足道朱陸乾道淳熙間晦菴先生以義理之學闡於閩象山先生以義理之學行於江西嶽峻杓明珠輝玉潤一時學士大夫雷動風從如在洙泗天下並稱之曰朱陸朱氏之學則主於下學上達必由灑掃應對而馴至於精義入神以為如登山然由山麓而後能造絶頂也故晦菴多著書以開悟學者然象山每不然之議其為支離其鵝湖之詩曰易簡工夫終久大支離事業竟浮沉又曰六經注我者也陸氏之學則主於見性明心不涉箋注訓詁而直超於髙明光大然晦菴每不然之以為江西之學近於禪晦菴殁其徒大盛其學大明士大夫皆宗其說片言隻字茍合時好則可以掇科取士而象山之學反鬱而不彰然當是時雖好尚一致而英偉魁特之士未嘗不私相語曰時好雖若此要之陸學終非朱所及也蓋二先生之學不同亦由其資稟之異晦菴則宏毅篤實象山則頴悟超卓是以象山之文亦皆徑健斬截不為纒繞至其遊戲翰墨狀物寫景信筆成文往往亦光晶華麗有文人才士所不能工者誠一世之天才也論子在川上章朱文公與門人論子在川上一章曰此是形容道體伊川謂與道為體此一句最妙某嘗為人作觀瀾詞有兩句云觀川流之不息兮悟有本之無窮門人問曰明道謂其要只在謹獨如何先生曰能謹獨則無間斷而其理不窮若不謹獨便有欲來參入裏面便間斷了豈能如川流之意門人又問曰明道云自漢以來諸儒皆不識此如何曰此事除了孔孟猶是佛老見得些形象譬如畫人一般佛老畫得些模樣後來儒者於此全無相著如何不放他兩箇做大門人曰只為佛老從心起工夫其學雖不是然却有本儒者只從言語文字上做間有知此事是合理㑹者亦只做一場話說過了所以輸與佛老先生曰彼所謂心上工夫本未是然却勝似儒者多矣朱門師弟子講明此論可謂極至大綱為學必合從天命性上理㑹起此之謂原頭識得原頭從此下工則如川流之晝夜不息矣禮記論祭河海曰或原也或委也此謂務本亦是見得此意佛老俱是略識原頭然亦未可為真識也工夫熟中出文公曰書所以維持此心若一時放下則一時德性有懈此語甚當又曰工夫自熟中出又曰只是熟便自㑹先生於熟之一字屢言之不一言之水心論朱陸水心文集中稱朱文公或曰新安先生朱公或曰朱公元晦又嘗騰章為文公力辨林黃中之劾其於陳止齊吕東萊亦屢稱之獨不及於象山心嘗疑焉以為此時號為儒宗者有四曰朱張吕陸何獨見遺惟於胡崇禮墓志中一寓其辭曰朱元晦吕伯恭以道學教閩浙士有陸子靜後出號稱徑要簡捷諸生或立語已感動悟入矣以故越人為其學尤衆雨併笠夜續燈聚崇禮之家皆澄坐內觀以上皆水心語然無靳詞似亦有取於陸者特謂之後出則非嘗觀象山與晦菴往來書俱各稱兄及勉東萊勿於喪服中聚徒講授書中言詞峻切止如平交陳止齊専書致幣於象山勤矣而回書亦惟稱止齊曰兄止齊之於水心蓋前輩也象山視如平交則不得謂之後出矣水心輕視竊所未喻朱張吕陸性學之肇興也以周張二程為宗其繼盛也以朱張吕陸為宗然當時水心文字實未嘗合而言之荆溪吳公子良師事水心持節江右日為隆興府學作三賢堂記有曰道公溥不可以専門私學深逺不可以方冊既貫羣聖賢之㫖可以㑹一身心之妙充一身心之妙可以補羣聖賢之遺孰為異孰為同哉合朱張吕陸之說溯而約之於周張二程合周張二程之說溯而約之於顔曾思孟合顔曾思孟之說溯而約之於孔子則孔子之道即堯舜禹湯文武之道孔子之學即臯益伊尹傅箕周召之學百聖而一人萬世而一時尚何彼此户庭之别哉以上皆荆溪公記中語豫初疑水心或有不滿於象山今其髙第弟子一筆貫通即平日師友授受必有確論其為此決定語而刻之金石者殆出於師說也亦可見其心矣魏益之悟入水心公志陳叔向之墓有曰君既與魏益之遊每恨志慮昏而無所明記憶煩而不足賴益之因教以盡棄所懷獨立於物之初未久忽大悟洪纎小大髙下曲直皆倣佛若有見焉自是以斯道歸益之且疑吕伯恭讀書徒多朱元晦修方不療時吕公已下世矣朱公雖論未合然重其讜直無隱士有比君所者必使往從之曰可以寡過也昔孔子稱憤悱啓發舉一反三而孟子亦言充其四端至於能保四海往往近於今之所謂悟者然仁必有方道必有等未有一造而盡獲也一造而盡獲莊佛氏之妄也叔向掊包蒙之梏遊於廣大而常自言用功益難進道逾逺古人今人皆未可輕議其厲志勇猛蓋不以悟自足也而益之不然獨守其悟而百聖之户庭虛矣然則叔向之所以異於其師者益之未暇詳也以上皆志中語豫嘗記乾淳間有魏掞之者嘗以直諫膺主眷而未知益之名諱爵里與夫所學𫝊承也夫以悟為則固未足以盡道然誠妙悟則亦幾於見道矣朗徹澄瑩纎翳不留髙出萬象之表與太初鄰其視薶頭故紙迷溺訓詁而卒無益于自得者不差勝乎水心之論雖有抑揚顧窺其微㫖則亦有取豈非泥於時好艱於顯露亦正言似反者歟不然則讀書徒多修方不療二語正當斥絶豈宜表而出之邪或謂此語蓋有激而云然亦至論論悟前段所載陳叔向受教於魏益之未久大悟而洪纎髙下皆若倣佛有見者此事甚竒不知所謂倣佛有見者何也佛家謂阿那佛具天眼一通能觀大千世界如掌中果舍利佛智慧第一觀人根器至八千大劫仙家亦嘗曰我向大羅觀世界世界猶如指掌大雖二教之說誕幻無實然參究互考亦惟一悟耳儒家所以諱言悟者惡其近禪且謂學有等級不容一蹴而到聖處也故必敬義夾持必知行並進必由知止而進於能得必由下學而造於上達必由善信美大而入於聖神雖髙明而本乎中庸此其序也故不以悟為主然前輩又有謂人患不入悟境耳果能妙悟則一理徹萬理融所謂等級固在其間蓋一通而萬畢也此論未知當否昔嘗聞老儒李伯煥與豫言金溪有傅先生號琴山親承象山先生學問甚髙生徒日衆日夕講論不倦鄰有一染匠常往聽講久之忽大悟曰元來世間道理如此自是聰明開豁遂能詩文不復為匠琴山從而作成之觀此豈亦魏益之之學歟惜豫生晚不及見諸賢而參請也近於九月間客洪城遇北人曰東門老於宋庭賔家蓋學道之士也衣履如道人談論娓娓自言出家從師久而無獲一日師令往某處正雪中既寒且饑因結屨忽有悟則見天地萬物洪纎曲直如清淨琉璃無不洞徹自此了無滯礙其亦魏益之之學歟豫甚欲究詰之顧初見未能驟說欲再叩明日乃聞飄然往臨江矣洪人謂東門老乃大徹大悟者惜不及竟其藴也話間極取程邵二先生之學又曰聖人之道本是渾全朱晦菴先生說得破碎今人不信孔子之說却信朱說安能見道又曰吾道一以貫之只一便了曾子添箇忠信已多後來千言萬語腳下注腳去道逾逺至謂有天之忠恕聖人之忠恕學者之忠恕尤大穿鑿其論如此又謂人當理㑹心學如作詩作文多是說謊論悟二兒童初學蒙昧未開故瞢然無知及既得師啓蒙便能讀書認字馴至長而能文端由此始即悟之謂也然此却止是一重粗皮特悟之小者耳學道之士剝去幾重然後逗徹精深謂之妙悟釋氏所謂慧覺所謂六通儒家所諱言也世之未悟者正如身坐窗內為紙所隔故不睹窗外之竟及其㸃破一竅眼力穿逗便見得窗外山川之髙逺風月之清明天地之廣大人物之錯雜萬象橫成舉無遁形所爭惟一膜之隔是之謂悟而儒家不言者懼其淪於虛寂不合於帝王之大經大法而無以成天下之務也惟禪學以悟為則於是有曰頓宗有曰教門别𫝊不立文字有曰一超直入如來地有曰一棒一喝有曰聞鶯悟道有曰放下屠刀立地成佛既入妙悟謂之本地風光謂之到家謂之敵生死而老莊氏亦有所謂致虛極守靜篤虛室生白宇定光發皆悟之義儒家之學亦有近之者顔之如愚獨樂曾之浴沂詠歸孟子之自得大學之自明以至如濓溪之庭草不除明道之前川花栁橫渠所謂聞悟亦悟之義水心又提出憤悱舉隅與夫四端四海諸說以為近悟是邪非與論悟三前段嘗疑陳叔向因悟有見之為異今觀晦翁作存齊記有曰人所以位天地之中為萬物之靈者心而已矣然心之為體不可以聞見得不可以思慮求謂之有物則不得於言謂之無物則日用之間無適而非是也君子於此將何所用其力哉必有事焉而勿正心勿忘勿助長則存之道也如是而存存而久久而孰為之體必將瞭然有見於參倚之間而無一息之不存矣詳此記則大意與釋氏之說合而所謂瞭然有見者非悟也夫佛學主悟水心作宗記序述永嘉鮑壄刪擇禪宗要語定著百篇有曰豫嘗問壄儒之於佛强者愠弱者眩皆莫之睨子以何道知之壄曰無道也悟而已矣其為是宗者亦曰無道也悟而已矣豫聞而逾悲夫不憤不啓不悱不發故曰亦可以弗畔矣夫今悟而遂畔之庸知非迷之大乎雖然考之於其書則信悟矣觀此序則水心固未嘗以佛家之悟為是也徐侍郎悟學徐侍郎諱誼字子宜乾道進士由池州教授敡歷清要歷事孝光寧三宗入為刑部侍郎出為寶謨閣待制江淮制置使移鎮隆興府而卒中忤韓托胄貶南安軍移袁婺州流落十年而後得釋水心志其墓有曰諸儒雖爭為性命之學然而固滯於語言播流於篇末多茫昧景響而已及公以悟為宗懸解昭徹近取日用之內為學者開示修證所緣至於形廢心死神視氣聽如靜中震霆冥外朗日無不洗然自以為有得也參玩兹語似亦近禪而當時諸儒學術亦因可見徐公卒於嘉定初元時閩浙諸老存者寡矣李牧坡悟入旴江李子原諱漙自號牧坡嘗從克堂包先生學公曰何必逺求子之鄰有利公文伯者即子之師也子原信而就學焉利公舉學習而說克己為仁以叩之未契也忘寢食而反求者數月一日渙然有省自是磊磊落落軒豁呈露無秋毫凝滯吟風弄月撫掌抱膝笑歌自若休休其心欣欣有喜如口之於芻豢常有餘味蓋其所好既得所說益深自命曰牧志其所自養也自養者厚而其證驗有不可掩於外者如此淳祐癸卯歲年七十有七悠然而逝宏齊包文肅公志而銘之曰志道於逺得師於鄰一覺之後一好之神蓋以表其有悟也觀此則牧坡之渙然有省其亦陳叔向之忽然有悟者乎黃仲山言性越之新昌黃仲山名仁靜有子名度登朝顯宦纍封仲山至奉大夫賜服金紫年八十七開禧元年八月卒自言見性命真處如水中鹽味非無如有其說深矣嘗與陳君舉傅良縱論夜分君舉名善辨不能窮詰曰此非師授而得也病中嘗曰除世俗塵事易除心中情想難吾用力於此久矣然葉脫枝生不知其幾今真斷矣故樂也臨絶視度而笑度指其心曰得非能於此洞然乎公應曰然遂殁以上載水心志中詳其為人豈亦融㑹儒釋之學者歟水心論佛學云余在荆州無吏責讀浮屠書盡數千卷於其義類粗若該涉夫西戎僻阻無有忠信禮義之教彼浮屠者直以人身喜怒哀樂之間披析解剝别其真妄究其始終為聖狂賢不肖之分蓋世外竒偉廣博之論也與中國之學較然殊異豈可同哉世儒不知淺深猥欲强為攘斥其於道鮮矣蜀人范東叔自云在學省時晨朝必讀楞嚴陳君舉與鄰省問念佛者誰東叔拱而後對君舉戲曰吾以為老兵所課爾東叔言誦此書三十年矣豫問東叔楞嚴要義安在東叔沉思久之曰如雞倐鳴顧瞻東方已有精色此是逼撲到緊切處也豫聞而歎息夫不讀者固不能知而讀者知之止於如是以上皆水心先生語味其㫖若靳之者又嘗稱天台端信師兼習諸宗性義融徹詞辨蜂起援據今古中其機要咸曰信書厨不可與爭也闔户長年人莫識面惟教其徒令速趨西方空寂以此自終豫每病學佛者徒守一悟而不知悟本或外示超俗而實墮俗紛若師庶幾免矣觀此論則先生所指悟本者未知何在先生以荆州讀佛書有見告之文公文公答之曰此殊可駭不謂正則乃作如此語話中間得君舉書亦深以正則講究辨切為不然此無他只是自家不曽見得親切端的不容有毫釐之差處故作此見耳又曰若見得道理分明便無事煞決不暇讀佛書若偶讀之亦須便見得其亂道誤人處愈親切不至為此言矣隱居通議卷一
