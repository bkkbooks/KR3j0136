body:
  text: 隱居通議卷四元劉壎撰古賦一總評作器能銘登髙能賦蓋文章家之極致然銘固難古賦尤難自班孟堅賦兩都左太冲賦三都皆偉贍鉅麗氣蓋一世往往組織傷氣骨辭華勝義味若涉大水其無津厓是以浩博勝者也六朝諸賦又皆綺靡相勝吾無取焉耳至李泰伯賦長江黄魯直賦江西道院然後風骨蒼勁義理深長駕六朝軼班左足以名百世矣近代工古賦者殊少非少也以其難工故少也其有能是者不過異其音節而已而文意固庸庸也獨吾旴傅幼安自得深明春秋之學而餘事尤工古賦蓋其所習以山谷為宗故不惟音節激揚而風骨義味足追古作愚亦素喜山谷諸賦誦之甚習毎與此先生㑹劇談至意氣傾豁處此先生輒曰相與讀山谷賦可乎因振袂同聲朗誦激發覺沆瀣生齒頬間嗚呼文明之世有此真樂今無是矣蓋吾旴以詩名者黄希聲黄伯厚利履道趙漢宗諸人以古文名者張誠子劉信翁諸人而以古賦名者幼安一人而已今其年八十有三苦末疾多蹇步亂離間阻文㑹闊䟽因思此老疇昔談詞如雲山鳴谷應今則無復此竒士矣景定壬戌歳郡太守錢侯應孫招予與幼安客郡齋同㳺平逺臺幼安雄辨傾坐聴者為竦其後交㳺諸公貴人間與幼安聚㑹之日常多而議論常合乃今思其人而不得見因追尋其所作古賦一二姑載於此以備遺忘且以示諸兒使知吾旴有此前輩又知古賦之精工者不得多云秋花草蟲徽宗皇帝萬幾餘暇戲御毫素間作花草蟲魚以示天縱多能之意李公甫侍郎得而藏之幼安為作秋花草蟲賦曰惟仁風之逺暢兮舉萬物以咸遂彼動植之微類兮悉陶冶於一氣翩翩其飛森森其萃覃百年之雨露兮非期月之能致翹肖形於造化兮固妍醜而不齊跂行喙息與根荄芽甲兮皆不出於範圍天工妙於賦物兮又賦之於毫素抑造化之不遺物兮於筆端而咸覩笑朝披而夕落兮何暫榮而易落哀朝生而莫死兮豈歳寒之可託觀其墜翼争忮螘策勛也壌丸决去螂息轉也膩粉雙舞蜨夢回也細要孤飛蠭衙罷也經緯錯陳蛛能巧也封疆角立蝸方爭也碎金委地楚芳殘也碧玉倚籬甘蕉偃也秋色慘淡秋風蕭騷翳此數物猶能自保彼陽春之載敷宜羣物之並育何金行之凄廪尚鮮鮮其未戮嗟夫沕潏曼衍湛恩汪濊渗漉九有旁魄萬類斯靈臺之昆蟲而太和之行葦也有盛有衰物理則然雖生生之不窮而常慮肅殺之不免也恃其成而不戒其敗者必墮安其樂而不思其悴者終危因物化之若此悟人事之當知恨尘世之不早闕微臣之箴規味書閣泉谷徐尚書鹿卿豐城人也嘗構閣以藏書名之曰味書閣幼安為之賦曰山水明秀邑稱劍江於其中而擇勝建傑閣之巍昻黄簾緑幕之閉牙籖玉軸之藏出則連車入則充梁是書也非有酸醎甘㫖之可啖醷濫滫髄之可嘗也然而古今嗜之者飲則過於醪醴嚼則美於稻粱既咀其華又漱其芳或欣然而廢食雖終日而不忘以其怡神者有黄嬭之目以其㫖美者有雋永之題以其說心者舉芻豢以為比以其用之不竭者至謂五榖不能以庶幾是皆有得於書味而其淺深醇駁則未能一概而周知書之類也百種千名言之立也異軌多岐随吾所取往往而有至其合聖道之與否則如十指之難齊絺章繪句抽黄嫓白味則美矣而不適於用譬之雞肋雖勤抉剔而不足以療飢老氏之清虚釋氏之超詣味則髙矣而不協於極猶蝤蛑瑶柱食之爽口終不免動氣而嚬眉申商刑名之學儀秦縱横之説味則竒矣而用之有害猶河魨野菌纔一下咽而腐腸裂胄之患已随之矣惟中庸之誠魯論之孝弟大學之徳孟子之仁義食之有益而無損咽之有信而無疑可以澤膚可以充腹終朝不食則枵然不知其所為正猶菽粟之甘太牢之肥仁人之所先得而古今之所同嗜君子所以哺其膏液而鮮能知之者所以為凡民之所歸也泉谷先生博極羣書屬饜正味立朝則奏對偉然出守而治行卓爾有大人格君之業得君子愛人之義味書之效蓋已試矣雖然禹臯稽古未有經籍之𫝊良弼典學豈待文章之富而道貫百代功髙千禩蓋㫖不在語言妙多離于章句故黙識者通融心潛者理悟儻専泥於筌蹏亦何得於魚兔泉谷先生義理厭飫之餘掩卷黙坐之次願以此語為僕思之麗譙紹定中建昌朱守憲以嚴刻激營卒周威陳寳之變朱隕於兵里寓公聶善之侍郎子述撫定之未幾而城内火延燎郡𪠘民居幾盡時徐監丞瑑來領郡事更剏郡治而鼔角樓尤壯偉幼安為作麗譙賦以寓頌規辭㫖精妙其序曰旴江以辛卯八月融風告灾越明年伐材鳩工鼎建郡治麗譙雄峙得制度豐約之中竊伏惟念立壺植矢而晝夜分鳴角伐鼓而昏昕定一郡耳目在焉非如登眺逺覽窮賞玩以自適者比昔魯作閟泮史形歌頌盖以其所作上有補於國下有益於民也是以序而賦之環江山之佳麗兮有雄樓之突兀曾日月之幾何兮儷規範之崇崛新斯人之觀瞻兮鎮千里之寜謐𦍑孰紀而頌之兮抽秘思之杪忽於時牛犢帯佩螳蝟斧鏠四野沸騰初息阻訌天跳地踔四起融風祼􅕌不禳樓觀為空盡繁華於一眣莽蕭條於四封幸天恵以仁侯提一郡以摩撫逮政通而人和汔無斁以無惡乃相巨材乃營故址乃命工師乃建定制儉不得陋宏不得侈稱侯國之規宜邦君之治棼橑岋嶪櫺檻堅緻晝滴漏於抗爽夜鳴鉦於虚敞角凌霜以騰音鼓逐風而震響豈非賔餞有法天時於焉正邪聴休有時郡政於焉修邪作止有候民事於焉節邪駕受有式兵籍於焉制邪東望則長川喧豗趨我城郭雲樹参差月波瀺灂南望則巨石峙立偉然下闞狡麑蹲踞髬髵攫啗西望則竒峰插天刻削嶻嶭白露晨縈紅曦夕抹北望則超超九逵直走京畿郊原蒼莽亭驛紛披盖今之麥熟禾秀茫茫布野昔之霜露荆棘而傷心者也今之上棟下宇翬飛鳥革昔之瓦礫糞壌而劌目者也登斯樓者亦有思乎巨杗細桷巍峩穹隆屹若特立非夸其雄斵削磨礱黝堊髹赤舉以法故非侈其飾出入是門必肅必恭氷食葛製爰端汝躬反側隉杌化為春融則増秩賜金可以紀功出入是門俛怍仰愧嚢帛匱金祗為私計四民失業五兵猶試則前車之覆厥鑑亦邇是用斟酌民言式警有位尚聴兹哉以福千里結尾數語辭嚴義正凛然春秋衮斧之意讀之令人𢥠惕訓畬千峯先生陳文定公寓居旴城作一堂名之曰訓畬幼安為之賦其序云提刑寳謨常卿千峯陳公書諗予曰子昔為泉谷徐公賦味書閣吾得其文讀之喜其㫖深而辭暢也今吾治一堂置書數千卷扁曰訓畬子為我暢厥㫖可乎僕乃復於公曰昌黎平生名節偉特如䟽佛骨撫鎮州死生且不計於富貴何有誨子諸篇類皆有羡於榮禄勉符一詩以經訓為菑畬是矣然究其三致意者不過公相皁𨽻之殊居第輿馬瑣細之事識者疑焉今公三登於朝再以直去咫尺禁從抗章固辭豈汲汲富貴歟公曰子弗聞乎賦詩斷章予取所求今夫義理之腴稻粱之甘似之學問之勤耕耨之力似之吾之命名是之取爾豈曰朝種夕穫為榮名利禄計邪僕曰㫖哉乃援筆以賦其辭曰惟鴻濛之肇開兮風氣以異有龜龍之特出兮載籍由起六七聖人随時以制妙造化之機緘兮極上蟠而下際羌人事之萬端兮貫一理而在是易探消長之幾書紀帝王之治樂感其和禮别其劑詩具美刺之章春秋嚴褒貶之㫖仁義道徳之所從出而正脩平治之要皆由此其推也千峯陳公心醉六經學該百氏掇英取華既已發於事業見於議論以震一世矣相彼寓居巋然樓宇據髙靣勝開牖洞户挹旴水於襟懐納軍山於指顧草木之華滋蔥蒨曉山之烟霏呑吐乃建庭階乃飾屏著几席儼若籖度得所熟黄緗素之前陳緑幕黄簾之珍䕶名以百計卷以千數上則庶幾平棘清豐之儲下亦可與荆田亳祁而並騖豈無金匱石室汗青信史亦有炙轂雕龍百家諸子悉不見稱維經是主蓋指南設而東西不迷明鑑照而妍醜無誤合乎經者必盡心焉戾乎經者吾所不取此所以表羣經而摘訓畬以名斯堂也雖然吾嘗聞之矣明經取青紫其志固甚小教子勝贏金其諭亦已卑惟下帷發憤潛心大業正誼不謀利明道不計功乃純儒之所為故義貴於集不可為宋人揠苖以助長仁在乎熟不可使五榖之不如荑稗規規然其守肯播肯穫之戒凛凛乎其畏不稼不穡之譏行無越思當如農夫之有畔播種而耰當識同然于此心之微謹無春耕其邱有何時實栗之歎謹無豚蹄壺酒有穣穣滿家之祈嚅嚌道真涵泳聖厓如是則公相之尊輿馬之盛昌黎之所以望符者有所不暇計而義方之訓端有在此而不在彼者以士希賢以賢希聖居公之堂讀公之書尚其勉旃聖賢同歸以上數賦皆幼安所作見燕石藁盖其所著集也幼安本以箋表見知諸公間然四六殊不及賦筆景定中曽仲實侍郎起家為江西運使兼知隆興府㑹前宰相瀆山謝公方叔寓居隆興謝公居相位時曽公實為宰屬曽公屬予通謝相啟予為之言曰詣丞相府曽聞堂上之都俞佩太守符來問山中之安否曽公既到任大合樂以宴謝公幼安當為樂語有曰我某官今郡太守舊宰府寮入政事堂得與聞於國論送䕫龍集毎親近於元台其後文㑹幼安笑曰吾文正同子意而子之語殊勝予也予笑曰先生古賦獨步當世是謂大手筆而與晚進校小技無乃卑乎幼安復大笑懷皋近世諸老多以文章名而工古賦者絶少惟千峯陳文定公與西園傅公友故亦喜作古賦有懷皋賦一篇獨清峭可愛其序曰次兄自號九臯中夀而殁作懷臯賦哀之有蹁躚兮羽族之僊戛長鳴兮聞於九天恍形景之莫覩兮其去無邊杳雲氣之茫茫兮予衷怛然憶追随於林野兮真意之纒緜何倐忽以暌逺兮悄餘音之弗𫝊眇眇兮遼海戰魚龍兮駢百怪想翺翔兮周觀乎逺大顧山澗之泠泠兮尚舊㳺之如在胡不歸來兮使我心痗倚雲霄兮蓬萊之峯鏘環佩兮羣僊與同顧瞻下土兮厭埃塵之溟濛悵已忘兮前岡之松胡不下㳺兮舊侣之與從蕭颯兮飈鳴乗秋清兮上青㝠中扄耿耿兮夢難成安得反魂之香兮挹氣貌之亭亭皎中夜兮兔景杳何方兮樓處冷弱翎繞於枯柯兮墜寒葉於金井安得故人之與偕兮使頑疴之蘇醒嗚呼噫嘻頭戢戢兮皆兄弟曷不旁交而逺契數竒偶兮異短長焉用泥逺而追亡惻予懷兮軫厥初形氣交值兮樂同涂食息相待兮行止相需二體之爾我兮一氣之斂舒倐風烟之滅没兮逐野馬於中區彼悠悠以忘反兮此悄悄而靡居雖然萬縁聚而必散一氣運而無窮往來離合悲懽華顇雖百千萬億變罔所底止未始離乎一域之中走胡走越何見而異宜兄宜弟匪私而同嗟逝水之洋洋兮逺莫可追扁舟大海兮豈曰無期寂寂之與赫赫兮共乗此化機睨而視之若逺兮焉不知朝莫之與随春與猿吟兮秋鶴與飛無不在兮豈予違滌靈襟兮寄聲詩若疇昔兮光無涯浯谿誠齋先生楊文節公萬里嘗作古賦然其天才宏縱多欲出竒亦問有以文為戲者故不録惟浯谿賦言唐明皇父子事體厥論甚當因録其詞曰予自二妃祠之下故人亭之旁招招漁舟薄㳺三湘風與水其俱順未一瞬而百里歘兩峯之際天儼離立而不倚其一怪怪竒竒蕭然若僊客之鑑清漪也其一蹇蹇諤諤毅然若忠臣之蹈鼎鑊也怪而問焉乃浯谿也蓋唐亭峙其南峿臺巋其北上則危石對立而欲落下則清潭無底而正黑飛鳥過之不敢立迹予初勇於好竒乃疾趨而登之輓寒藤而坐足照衰容而下窺忽然心動毛髪森䜿乃蹟故步還至水滸剥落讀碑忼慨弔古倦而坐於釣磯之上喟然歎曰惟彼中唐國已膏肓匹馬此方僅獲不亡觀其一過不父日殺三庶其人紀有不斁矣乎曲江為箧中之扇雄狐為明堂之柱其邦經有不蠧矣乎水蝗稅民之畆融堅椎民之髄其天人之心有不去矣乎雖微禄兒唐獨不霣厥緒哉觀馬嵬之威挫渙七萃之欲離殪尤物以説焉僅平達於巴西吁不危哉嗟乎齊則失矣而椘亦未為得也靈武之履九五何其亟也宜忠臣之痛心寄春秋之二三策也雖然天下之事不易於處而不難於議也使夫謝奉册於髙邑禀重巽於兩帝違人心以圖功犯衆怒而求濟天下之士果肯欣然為明皇而致死哉蓋天厭不可以復祈人潰不可以復支何哥舒之百萬不如李郭千百之師㩁而論之事可知矣且士大夫之捐軀以從吾君之子者亦欲附龍鳳而攀日月踐台斗而盟帯礪也一復涖以耄荒則夫一呼萬旟者又安知其不掉臂也邪古語有之投機之㑹間不容穟當是之時退則七廟之忽諸進則百世之揚觶嗟肅宗處此其實難嘗為之九思而未得其計也已而舟人告行秋日已宴太息登舟水駛如箭回瞻兩峯蒼茫而不見誠齋此賦出意甚新殆為肅宗分䟽者靈武輕舉貽笑後代其譏議千人一律而此賦獨能推究當時人情國勢宛轉辨之犂然當於人心亦竒矣結語乃步驟後赤壁賦開户視之不見其處亦本唐人湘靈鼔瑟詩曲終人不見江上數峰青中間有曰觀馬嵬之威挫渙七萃之欲離殪尤物以説焉僅平達於巴西此四句形容絶妙毁璧近世騷學殆絶惟韓文公作羅池廟碑歌辭世以為有騷體又李太白詩云日慘慘兮雲㝠㝠猩猩嗁烟兮鬼嘯雨世以為此兩語酷似至宋豫章公用功於騷甚深其所作亦甚似如毁璧一篇則其尤似者也朱文公為之序曰毁璧者豫章黄太史庭堅之所作也太史以能詩致大名而尤以楚辭自喜然以其有意於竒也太甚故論者以為不詩若也獨此篇為其女弟而作蓋歸而失愛於其姑死而猶不免於水火故其詞極悲哀而不暇於作為乃為賢於他語云其詞曰毁璧兮擿珠執手兮問過愛憎兮萬世一軌居物之忌兮故嘗以好而為禍羞桃茢兮飯汝有席兮不嬪汝坐歸來兮消揺采芝英兮禦餓淑善兮清明陽春兮玉氷畸於世兮天脫其纓愛􅀢人兮生㝠㝠棄汝陽侯兮遇汝曽不如生未可以去兮殆其離嬰衆雛羽翼兮故巢傾歸來兮消揺西江波浪何時平山涔涔兮猿鶴同社瀑垂天兮雷霆在下雲月為晝兮風雨為夜得意山川兮不可繪畫寂寥無朋兮去道如咫彼幽坎兮可謝歸來兮消揺増膠兮不聊此暇此詞三章一章言其失愛於姑也二章言其死而不免於水火也三章言其死後山川寂寥也每章以歸來兮消搖句結之卒章疑有誤字公作此詞清陗而意悲愴每讀令人情思黯然山中松醪東坡賦山中松醪有曰遂從此而入海眇翻天之雲濤句語竒健可以見其胷次軒豁筆端浩𣺌也隱居通議卷四
