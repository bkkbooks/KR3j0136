body:
  text: 隱居通議卷二十二元劉塤撰駢儷二旴江總評敏博之學旴江尤盛以愚所見前一輩行則有劉信翁掞南城黃希聲文靁傳幼安自得皆髙自標致客諸侯有名聲信翁於豫為族兄蚤孤而敏前江陵户曺張誠子自明竒之納以為壻誠子學問該貫文辭髙雅交乾淳間巨公偉人多見聞信翁由是得成其學嘗以鄉貢試禮部不偶晚用纍舉恩得官會朝家方修髙孝光寧四朝大典顓建史局命尤端明焴以宿儒提領得自辟屬鄉寓公張孟博淵微以大魁為祕書少監素善信翁薦之尤公得請於朝為國史院校勘時寶祐丙辰信翁年七十餘矣亟供職修數傳將俟書成進御例合得改京官未及而病寒喘以卒有文集數卷其子孫弗克肖竟散失所作記序銘志極髙古有韓曾法度而四六之作蓋不及也希聲則余前所書長歌行者有看雲集絶精於詩而四六亦不及焉幼安早以春秋學得聲場屋後工古賦記序而其四六之文視前二公為勝嘗著春秋證義獻於朝敇免文解今年八十有餘而記問該洽不少衰可敬也已此三賢皆前一輩也繼興者有車震卿東趙次山必岊范去非禮歐聖弼良雖文體各不同然同出一時年事相若互以筆力頡頏後進不及者望之若仙余以晚出幸及交此數公皆意氣相許豫議論相叩擊文字相琢磨幼安嘗品題今世文人推許四公余不敏亦辱幼安進之曰文社得五友矣嗚呼孰謂四賢者俱去余而死乎震卿文尤蒼徑峻潔有風骨年二十有六擢淳祐丁未第仕至瑞州新昌宰甫赴官卒於南浦亭歸葬旴之麻源次山文明贍精切已詳書於前矣去非筆端流麗俊快一塵不染如其人纍試不利年四十三卒樞密𢎞齋先生包公志其墓聖弼三貢於鄉登景定壬戌第仕止江淮坑冶司幹官其文典實莊重而乏正氣與去非俱為包公所知今追記四賢舊作十忘其九謾列於後車震卿諸作李侍郎伯玉為侍講誤犯穆陵嫌名上章自劾有旨免罪震卿為草謝表有曰講學方新聿陳古誼臨文不謹誤觸嫌名凛雷電之震驚荷乾坤之涵育臣若稽虞典舜曰重華載考夏書禹稱文命如揭日月不以山川有耳目者皆知豈齒牙之敢及又曰姓所同名所獨既重犯於嚴威功惟重罪惟輕乃大恢於聖度此表一時為人夸誦寶祐戊午震卿為袁州判官時方巨山嶽為太守自以省闈魁望素負材名又嘗守南康軍因杖湖廣總所綱梢為總領賈師憲勒其具狀巨山不伏聞於朝力詆師憲之非總領所劾上巨山徙知邵武軍聲名頓重由是益自髙既至袁值丁子萬大全當國以袁玠知江州兼江西安撫沿江制置副使網羅諸郡利原無孑遺巨山素嫉其姦令下輒盛氣抗辨震卿適贊郡事巨山竒其人傾心委任於是安撫司劾上巨山與震卿俱降罷明年己未秋九月十有七日滸黃逗渡丁袁俱敗竄朝綱一新布恩宥過越明年震卿援赦恩得洗敘以啓謝檢正趙廣微崇嬓有曰負弩而迎使者嘗隨牛馬走之塵升階而揖侍郎可想烏鵲飛之意敢謂十二樓之薄命忽遇千萬間之歡顔造化無私孤寒有恃某所學甚苦其貧則甘少而沈浸乎詩書直欲飲上池之水壯而轇輵乎事物何異登太行之山客娓娓而嘲雄人寥寥乎説項空自憐其猿臂誓不食於馬肝畢好雨箕好風難調衆口蜀吠日越吠雪自有他腸又曰脫幘投地露香告天所幸社稷靈長天王明聖雖未築鯨鯢而誅六賊然已禦螭魅而去四凶神觀復回殺機頓息李定治東坡之獄而今果安在哉歐陽辨師魯之書必有任其責者末云不圖今日幸復見公卿篤厚之風自誓此生尚可奉郡國孝亷之對其所以報不在斯文又自辨有曰皇天后土張巡無降賊之心白晝通都曾參有殺人之事此語尤凄壯可以感動景定壬戌齊疆來歸公以啓賀當路有曰亦有英雄欲舉涿郡而歸者奈無豪傑恐得荆州而失之未幾山東果復陷人以震卿為知言又曰要使順昌之旗幟見者寒心庶幾渭橋之鼓鐘從此歸命樞密包公謝事歸里張宴招郡太守震卿為作樂語有曰野服見賓客方從北山隱士之招金樽醉使君初上西京循良之最好對一天風露共談千里耕桑末云如此良夜既不辭北海之樽儻有餘情尚冀獲南山之獵旴城南門外有倫魁堂蓋曾文莊公鴻甫漸舊宅基也公赴紹熙庚戌廷對天子擢為第二人官至工部侍郎子仲實頴茂既貴顯移家城內乃即故基創别墅號倫魁堂以表之咸淳癸酉詔諸郡取士鄉友欲振士氣復於通衢建樓曰倫魁與堂相輝震卿為作上梁文曰倫魁通衢武城文孰占千年之旺氣大啓山川建百尺之危樓坐挹星斗庚戌氣數將復癸酉詔書又來風露八窗幻出廣寒清虛之府雲濤四面如坐瀛洲方丈之圖又曰見八萬四千門戶運月斧於雲間遡一千七百河源泛仙槎於天上末云奎文興宋魁宿臨旴重看忠孝狀元遂作太平宰相此數語殊不塵也趙次山諸作景定壬戌曾仲實侍郎為江西轉運使時度宗以忠王立為皇太子四月九日乃其誕辰次山為曾公作賀箋有曰純乾直月祥開初九之潛索震承華德稟涵三之極諸司傳誦交稱精切蓋四月應乾而初九潛龍爻應儲副且協其誕日也周漢國公主增封兩國次山為運司進賀皇帝表有曰王姬下嫁於皇車服之儀帝制坦明復增湯沐之邑及公主薨又進慰箋於東宫有曰太傅之教在前動遵於禮有姊之喪拱右悲發乎情願於晨昏定省之餘勉進哀樂中和之諌其慰皇帝表有曰豈不嬰於皇情願悉歸之天數皆確論也次山初以曾公辟為運使屬官曾公罷洪侍郎燾繼之次山以臺命往吉州督餉餫與吉守麋左司弇有違言次山亟投劾歸里洪愛其才力招之次山不得已再趨幕以啓謝有曰辨幕抗塵歸夢遂歌於彈鋏使軺問俗恩光首出於招旌自敘有曰半生陋巷天與以貧賤肆志之資隻影窮途人知無狂惑喪心之疾頃自紅蓮之依水已慙小草之出山會司存承朝命以拘催俾幕底服官針而往役怒移水中之蟹機驚海上之鷗當吾世而失諸侯不如其已吟小山之招隱盍歸乎來乃特枉於招呼許重陪於畫諾名實笑狙公之朝暮來往類雁臣之春秋後洪公以京狀薦之朝次山啓謝有曰蕭何之追韓信豈云得士之無雙秦穆之用孟明姑示與人之能一皆精切如此南豐以冦燬城隍祠為之重創次山為作上梁文曰封人造都邑之域百乘為家吉禮事邦國之神三靈錫羡又曰穀熟而民人育有德於時精多則魂魄強遂食兹土又曰罹彼不祥豈以其猶物與物與民同患蓋不欲自神其神侯無我違相奪豫享又出疏云城郭千年是司隲相鬼神二氣亦有廢興眷邦邑之克協厥居職幽明而各治其事城隍神者民物繫焉適數墮於劫灰盍謀還於舊觀必明宫齋廬之備與廟貌祭式之嚴先須計錢榖之幾何始可問木石於某所亟揮大手共發肻心揭虔妥靈其永綏於祀事捍災禦患尚無作於神羞李右司義山嘗以山東提刑守池州值鄂渚受圍命池州加浚築言者以其擾劾罷之後經赦敘官主管玉局觀次山賀之有曰舊聞玉局之名良不輕畀兹蓋銀符之信可卜峻遷又曰直指衣繡允藉於威名曲突徙薪竟無於恩澤皆切當而不塵腐李公回啓有曰鑿斯池築斯城類無具甚鍛乃戈峙乃幹尚竊遲之亦足以發其意其後李公納次山之侄為壻大合樂以宴次山次山謝之有曰大齊非偶肯從鄭國之婚小阮羞賢榮附晉林之飲又曰孔雀屏芙蓉褥盛開李監之門闌鸕鷀杓鸚鵡杯爛醉翰林之風月末云行行解纜擬朝飛南浦之雲望望倚樓但夜看豐城之氣蓋次山官於隆興而李公居豐城此其所以為切也范去非諸作周國公主出降去非為趙廣微尚書進賀表有曰乾元御極化爰始於修齊巽索承華恩聿隆於選尚猗歟天合允矣邦榮末云王姬肅雍婦道信內則之咸宜帝壻貴重朝廷喜中興之僅見蓋自南渡後纍朝未有帝姬出降故也穆陵掩攢祔廟去非作表曰辨兆域之圖千巖競秀號顧成之廟萬世不祧馬觀文光祖為沿江制置使移築舒城賜名安慶府既畢役詔馬公升秩以賞其勞去非為作賀啓曰某官負大聲名立實事業經綸社稷為左右汝翼之臣表裏山河識南北必爭之地乃峙版幹盡闢草萊句極尊壯當時震卿亦有作然不及此去非賀曾仲實侍郎三除江西運使有曰某官元豐故家端平諸老甘泉筆槖儼父子之後先緑野園林繫朝廷之輕重穩熟流麗可愛也又賀李提舉與再任廣西有曰綸綍疏榮節麾就熟青絲翠節又煩駰度於周原羅帶碧篸喜見馬諳於舊路亦甚穩熟段深父浚為婺州永康令被劾罷後敘復改正去非為作啓謝廟堂有曰百里出宰不虞美錦之傷一氣轉鈞遄賦緇衣之改又曰歸去來田將蕪自憐飛鳥之倦反乎覆陂當復有同黃鵠之云俾得為元祐之全人所恃有太平之宰相此作殊佳包樞相恢嘗知平江府兼淮浙發運使奉詔行公田事既告成得轉通議大夫去非為作謝表曰百畝畢公田之事詔俾奉行十行賜方國之書恩叨遷轉造語穩熟公田之行也賈師憲實主之雖曰省造楮以重國計然當時行之極擾浙右震動包公以大儒奉風旨大失士望故其轉官也公論惜之去非作文有極俊麗者如正旦賀揚州制帥有曰笑倚闌干對平山之楊桞醉摩盾鼻賦后土之瓊花如賀總領知郡有曰良二千石正奉揚於仁風連一萬艘矧方生於春水如賀沿海制使有曰青陽左個帝始執圭滄海東頭軍無傳箭自天介福與國同休某官筆槖侍臣詩書元帥日升若木曉回豹戟之光雲近蓬萊暖動龍旗之影如宴贛守陳吏部樂語有曰太微積星曰郎位流光八境之間孤雲落日是長安飛詔九天而下如冬至賀揚州帥以跨鶴之州對牽牛之度賀諸王以葭灰對茅土皆的對也又賀郡守有曰杜陵廣厦大庇寒而士歡顔叔度歌襦不禁火而民安作如賀揚州又曰軍士歡呼盡醉瓊花之露文書憗暇笑尋楊栁之春如謝諸士清明節餽有曰三杯藍尾方驚賜火之新一騎紅塵遽辱兼金之寵皆灑然無塵俗氣賈師憲自江上入相去非作賀啓有曰命圭相印瞻騎火之西來羽扇綸巾賦大江之東去兩股各共一脈殊精也賈後辭相位徑渡浙江歸紹興詔遣朝士中使宣押入朝絡繹於道越二日復造闕詔以為平章事待以成王尊事周公之禮去非作賀啓有曰居一二日上喜蕭何之復來以億萬年王敬周公而勿替尤切當歐聖弼所作樞密包公道夫平生最疑周禮以為非聖哲之書遂著書剖其非號曰周禮六官辨景定壬戌公與劉潛夫尚書同侍讀緝熙殿潛夫奏之有詔宣取歐聖弼為作進表雖所辨未當而表則極佳每恨失其藁今年壬辰歲六月留旴因叩其子聲道再求得之道在五經固昭華於軌範書稽六典敢妄肆於管蠡不圖一得之愚仰徹四聰之聽臣竊謂孟子不盡信武成之策宗元猶深疑月令之文矧兹設官分職之辭決非垂世立教之本蓋劉歆作以輔新室莫掩其姦謂周公以之致太平恐乖其實惟唐宗誤以為聖作雖漢儒亦識其隂謀宇文放此而疾顛安石行之而大壞儻果出古者不刋之訓何至為後來取敗之階臣退揆蒙愚未能渙釋耳提面命頗有得於父師口誦心維因默參於義例乃詳訂而為之辨欲深藏以淑其私顧惟積聞見於丁年豈意禆覽觀於乙夜兹蓋恭遇天生神聖日就緝熙格物致知固已循於本末謹思明辨尤欲盡於精微遂令螢爝之末光亦造蟬蜎之邃宇臣夙裒臆説欣際昌期學古訓而求多聞涓埃奚補藏書府以待能者鉛槧為榮故友范去非精工表奏謂余曰此表殊未易作而聖弼作此極有手段馮虛駕空自成一片令人讀之心服去非與聖弼交情不孚而當時公論如此吳允文諸作車趙范歐四賢之後又有吳允文浚最後出以文稱然初年筆端傷於繁德祐危急中陳與權當國與允文有舊引之自沿江制司參議官登朝為祕書丞徙大常丞兼檢詳度支又兼翰林權直有制草一帙視少作加進極有可觀者是時賈時憲以太傅平章都督諸路軍馬捍禦於太平州李尚書珏為都督府參贊軍事實從行師進次於魯港大潰師憲奔揚州上章待罪詔降三官罷為醴泉觀使陳為善合方直玉堂草制其戒詞有曰膺戎狄懲荆舒朕無望周公之事率秦師雪殽恥爾尚蓋孟明之羞蓋譏師憲每以周公自許也珏失勢翺翔江上不敢歸朝詔赴行在奏事上章辭時為善已自禮部侍郎超拜端明殿學士簽書樞密院以卒而允文兼權直適當答詔遂草詞有曰師出以律否臧則為凶衆散而歸進退必以道珏得詔殊不平而措辭精切可愛也初允文由臨安府學教授為國子監書庫官遷宗學諭以言去踰年得監華州西嶽廟以啓謝諫官曾廣微淵子有曰多男富壽請祝聖人之三萬事功名竊誦諫官之四亦輕俊也允文舊所長者作賀體詩及長短句甚精工其後殊諱言之臨安失守後福州建行朝允文奉密詔舉義初建梱屬余作謝表起句曰天臨南面將恢正統之山河地復西江重見中華之日月允文甚喜之其後允文事不成為文丞相所殺余作哀文以弔之曰人懷舊主捐軀興忠義之師天厭中朝縱敵負英雄之志衆競非其晚節我獨諒於初心輒摛朋友之哀以慰幽冥之憤故江西制置招討使侍郎吳公稟資明鋭遭世艱虞當樞密誅范瓊實參計畫適翰林乏陸贄遂掌贊書俄拂衣從田里之歸忽遊騎迫鄉邦之陷社稷實不血食深哀傾覆之何辜宗廟盡為黍離每念播遷而隕涕既出危城之馺馺長懷故國之茫茫會飛龍重建於行朝而繫雁鼎來於密詔慟哭拜命慷慨起兵關中遺民喜見孔明之奮山東羣盜悉歸宗澤之招既雲合而風從宜乾旋而坤轉云云拾遺景定癸亥冬至節次山為運司進皇太子賀箋有曰聖心觀復驗初盡之震庚卦氣守中迓循環之乾甲蓋次年即甲子見得是亥年賀震宫冬至也其賀皇帝表有曰壁中軫中密察乾文之運天大地大益昭王道之尊次山得知撫州實建昌鄰郡且顔魯公補處也德祐乙亥二月到任時風塵震鄰矣次山屬余作謝表及謝廟堂啓極蒙賞音亂離失其藁僅追記數語零落無完篇啓語有曰維撫名城實旴鄰壤鬱山川其信美儼桑梓之相望當承平時尚可吒還鄉之繡今艱難世豈復吟凝寢之香亟馳單車來入危壘烽燧正當於孔道氈裘已迫於郊圻鳴於地舞於樓狡謀頗測鍛乃戈厲乃刃忠力自持緩則蘇民瘼而護本根急則守臣節而死城郭天子命我蓋將謹下國之扞防太守謂誰終恐誤上台之推擇兹蓋恭遇大丞相身繫中華之脈忠格列聖之靈方苻堅傾國而來朝野大震及忠定守京而後宗廟再安云云結語云魯公嘗為刺史緬想遺忠藝祖親戒藩侯恭承大訓制置使加職名因任次山屬余作賀語有曰尊俎折衝呈赤雲之勝氣江山如畫照黃紙之除書次山稱其穩熟又記次山為江西運司判官時丁圭叟應奎以省元為國子録因上書論宦者誤國致冦理宗怒其切直罷之出為江西運司幹官與次山實同幕職也次山屬余通啓曰叩閽言事聳聞蓋世之清名贊幕同僚將挹出塵之雅致試共論於心事殆慰滿於平生某官南省魁儒東都節士忠義耿耿與日月以爭光議論堂堂忤雷霆而不懼頃妖狐之馮社引塞馬之飲江通國震驚在廷喑默公獨憤甚請劍以斷佞臣士皆奮然折箠而笞羌帥使微片言以拔巨蠧則雖百戰而無成功閹豎動容覺朝班之增愧月支奪氣知中國之有人身雖屈於一時名已加於九鼎姑贊皇華驅馳之畫遄歸赤墀供奉之班與天子爭是非恢宏事業為人材别邪正充擴初心其如爵位之光榮是特名教之餘緒某一官塵土十載山林痛飲而讀離騷永慨先人之忠憤研朱而點周易欲窺往聖之精微分終老於田廬誤見知於臺府強加辟置俾佐諏詢亦欣逢於偉人遂獲聨於王事老韓同傳慙俎豆於諸公李杜齊名尚丹青於信史次山覽之嘉歎曰此乃以散文為四六者正是片段議論非若世俗抽黃對白而血脈不貫者也嗚呼知我如此可謂具眼矣豫嘗與次山言不論古文時文詩章四六但凡下筆鑄辭便當以風骨為主若文字有骨氣雖精采差減正亦自佳次山大喜此論隱居通議卷二十二
