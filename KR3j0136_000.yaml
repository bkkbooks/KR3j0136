body:
  text: 隱居通議雜家類三雜説之屬提要臣等謹案隱居通議三十一卷元劉塤撰塤字起潛南豐人書中自稱開慶元年年二十則宋亡之時己年三十六故於宋多內詞然書中又稱至大辛亥為南劍州學官計其年已七十二矣日暮途窮復食元祿而是書乃以隱居為名殊不可解考其水雲村稿中延祐己未重題梅氏海棠詩有花甲重周人八十之句則塤入元四十四年尚存最為老壽是書當其晚嵗退休時所著也凡分十一門理學三卷古賦二卷詩歌七卷文章八卷駢儷三卷經史三卷禮樂造化地理鬼神雜録各一卷其論理學以悟為宗尊陸九淵為正傳而援引朱子以合之至謂朱子後與道士白玉蟾遊好知讀書為徒勞蓋姚江晚年定論之説源出于此皆鄉曲門户之私無庸深辨其經史以下六門考證亦未為精核且多餖飣而鬼神一門尤近于稗官小説惟評詩論文之二十卷則塤生于宋末舊集多存其所稱引之文今多未見其篇帙其所稱引之人亦多莫識其姓名又多備録全篇首尾完具足以補諸家總集之遺如宋璟梅花賦今惟據田藝蘅留青日札傳鮮于樞所書一篇又據李綱忠定集知原賦已亡綱為補作今觀塤所録知宋元間行于世者乃有二本又如陸遊之從韓托胄以牽于愛妾幼子之故為他書之所未言厲鶚宋詩紀事載李義山詩不能舉其仕履觀塤所記乃知其嘗以江東提刑守池州凡此之類頗足以廣聞見至于論詩論文尤多前輩緒餘皆出于諸家説部之外于徴文考獻皆為有禆固談藝者所必録也塤所著水雲村稿世有二本其一本别題曰泯稿卷帙頗少不知何人刪取是書三分之一附諸稿末殊為闕略此為三十一卷之足本固罕覯之祕笈矣書中間有案語蓋其後人所附自署其名曰凝考國初有南豐劉凝字二至嘗撰稽禮辨論韻原表石鼓文定本三書或即其人歟乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書子部十隱居通議目録雜家類三雜説之屬卷一理學卷二理學卷三理學卷四古賦卷五古賦卷六詩歌卷七詩歌卷八詩歌卷九詩歌卷十詩歌卷十一詩歌卷十二詩歌卷十三文章卷十四文章卷十五文章卷十六文章卷十七文章卷十八文章卷十九文章卷二十文章卷二十一駢儷卷二十二駢儷卷二十三駢儷卷二十四經史卷二十五經史卷二十六經史卷二十七禮樂卷二十八造化卷二十九地理卷三十鬼神卷三十一雜録
