body:
  text: 隱居通議卷二十七元劉塤撰禮樂雩祭周制月令建巳月大雩五方上帝其壇名曰雩禜於南郊之傍以太昊青炎帝赤軒帝黃少昊白顓帝黑配五帝左傳龍見而雩乃角亢星見時周之六月陽氣盛恆旱故雩雩之為言逺也逺為百穀以祈膏雨若國大旱則司巫帥巫而舞雩若旱暵則女巫舞雩世人常言舞雩未知其義始此靈星周制仲秋之月祭靈星於國之東南漢髙帝八年令郡國縣邑立靈星祠常以嵗時祠以牛祠后稷以羊彘祠后稷而謂之靈星者以后稷又配食星也舊說星謂天田星也一曰龍左角為天田主穀乃於壬辰位祠之壬為水辰為龍就其義也東晉靈星配饗南郊不置祠唐以立秋後祀靈星於國城東南又詩絲衣序髙子曰靈星之尸則祠靈星亦立尸後世學宫門謂之靈星門者或謂靈星之祭賓尸於此故名然今之靈星門於義實所未喻又淮南子主術訓君人之道其猶靈星之尸也儼然𤣥默而吉祥受福詳見後學宫制封禪義帝王易姓必封泰山所以告成功也禮云因名山升中于天而必于泰山者萬物交代之處封增其髙順其類也升上也中成也刻石紀號以著功績封訖而禪梁父者亦因天以及地也說者謂封禪取髙厚之義封土於山而禪祭於地天以髙為尊地以厚為德也增泰山之髙以報天附梁父之厚以報地梁父者泰山之支山卑下者也能以其成功相禪代故封禪以告太平墓祭世謂三代以前無墓祭而朝陵拜掃起於秦時古宗廟前制廟後制寢秦始出寢起於墓側漢因秦上陵皆有園寢起居衣服象生人之具古寢之意也唐開元二十年四月制曰寒食上墓禮經無文近代相傳浸以成俗士庶有不合廟享何以用展孝思宜許上墓同拜掃禮不得作樂仍編入五禮永為恆制故議者以為墓祭始於唐也學校配享州縣學祀文宣王以兖國公顔子鄒國公孟子配享文廟後宋咸淳中議者以本朝崇尚四書宜并祀曽思配享於是以郕國公曽子沂國公子思子升配文宣王與顔孟為四其意蓋以顔主論語孟主孟子而大學則曽之所述中庸則思之所作是因四書而尊四賢可謂備一代之盛典其後見北人云北方文廟惟以顔孟配而曽思不與焉蓋移蹕東南曽思並配之令不及北方故中原惟守舊制也初制配享之禮顔孟東西相對其後熙豐姦黨以私意追尊王安石因妄比王安石為顔子遂遷孟子位西靣東與顔子對者退處於位東靣西與顔子並既而朝廷更化國論維新乃罷王安石配享亟毁其塑像一時因循不復釐正孟子仍舊位東靣西咸淳增配承襲訛繆亦以曽思並列于顔孟之下俱位東靣西竟成虛右遂謂配位俱當左列其實不然大行古者君亡未有諡皆以大行稱之往而不反之義也始皇崩於沙丘䑚亥曰今大行未發喪禮未終見李斯傳愚謂行字可作去聲蓋諡未定則德未名姑總稱為德行之大者墓旐書例古人題旐及題墓必加國號如曰唐故宋故所以表其為何代之人後將有考也曹孟德自謂願題漢故征西將軍曹侯之墓者亦以漢國號加於故字之上此其凡例也德祐以前題墓俱曰宋故不以為嫌歸附以來皆不書國號惟書故字甚無義理近見北人皆書元故南人乃不然由今思之若不書元故則題旐題墓惟曰某官靈柩曰某人之墓此理為長豫有友人不書國號豫并去其故字識者咸以為當蓋既不書國號則故字之義無所承若必欲書則必加國號乃可鹵簿字義鬼谷子曰車駕行羽儀導從謂之鹵簿自秦漢始有其名後漢胡廣作天子行鹵大楯也所以扞敵部伍之次皆著之簿儀其五兵獨以盾為名者行道之時甲楯居外餘兵在內故但言鹵簿而五經精義亦曰鹵大盾也以大盾領一部之人故名之曰鹵簿其義如此社稷之名豫於前卷嘗紀今世並稱稷契為非蓋稷乃官名契乃臣名也按國語載展禽曰昔烈山氏之有天下也其子曰柱能植百穀百蔬夏之興也周棄繼之故祀以為稷共工氏之伯九有也其子曰后土能平水土故祀以為社注云烈山氏炎帝之號也即神農起於烈山祭法以烈山為厲山是也柱為后稷自夏以上祀之夏禹之興棄能繼柱之功自商以來祀之共工氏伯者在羲農之間其子句龍在黃帝時為土官九土九州之土也后君也使君土官故曰后土社后土之神也又棄勤播百穀死於黑水之山故曰稷勤百穀而山死由是觀之則柱與棄俱號后稷氏共工句龍號后土氏稱后稷后土則各以其官於理甚宜若以稷契並稱則官名臣名雜述矣杜氏通典云顓頊祀共工氏子句龍為社烈山氏子柱為稷髙辛氏唐虞夏皆因之殷湯為旱遷柱而以周棄代之欲遷句龍無可繼者故止又曰凡社皆以句龍配凡稷皆以棄配社者五土之神稷者於五土之中特指原隰之祗援神契云稷者原隰之中能生五穀之祗是也漢酎漢制正月旦作酒八月成三重釀醇酒也味厚故以薦宗廟八月嘗酎㑹諸侯王於廟中出金助祭謂之酎金皇帝齊宿獻金金不如斤兩或色惡王削縣侯免國今南方所謂一宿酒者只一重而已今至三重則其味醇厚可知矣九族九族之說具載禮經見喪服小記然諸家議論不同按夏侯歐陽等則以為父族有四母族有三妻族有二與孔安國尚書注上自髙祖下至𤣥孫之說異然鄭康成孔頴達則謂由一而三由三而五由五而九故列圖于後以俟知者父族四己姊妹適人者及子父五服內親族父姊妹適人者及子己女適人者及子母族三母之姊妹及其女母之父姓舅族母之母姓妻族二妻之父姓妻之母姓三族髙曽祖父己子孫曽𤣥由一而三父子己身由三而五祖子父孫由五而九髙曽曽𤣥學宫靈星門制州縣學宫舊制外門曰靈星未詳其義余叔父秋麓先生博學多能洞究古誼嘗著其說云漢祭祀志曰龍左角為天田天田號靈星見則為農祥故春藉田而祈社稷祭之祠后稷又祭之祭之皆有尸天子諸侯卿大夫名以配先祖食不忍輒忘祭罷不容遽使之出門而就臣位故其退尸必尋繹復祭但天子諸侯祭之明日又祭曰繹卿大夫祭之當日又祭曰賓尸士曰宴尸皆退尸也故於廟門外又一門曰靈星門漢郊祀志或言曰周興而邑立后稷之祠至今血食天下於是髙祖制詔御史其令天下立靈星祠今無存者不可復考良耜詩序秋報社稷也與絲衣篇次相屬亦可考見絲衣詩序又載髙子曰靈星之尸也㫖意甚明近世儒者不知何故刋去此語殆由不知靈星之尸為祈報社稷之尸也夫子釋奠祭之略無其義間嘗深思其制抑昌黎先生謂夫子生民之功與社稷之功固自有次第者歟故作靈星門於廟門外而釋奠皆出揖之歟書此以俟後人博采以上皆叔父所著說叔父嘗以明經兩試天子之廷退而博考經史百家多所論著尤於孔門諸子之學多所發明著聖門言行録若干卷蓋勤苦考訂凡數十年而後成又自類所作曰山雞愛影集近得而讀之筆力超絶雖老師宿儒不敢望其籓也念昔垂髫從叔父學辱承奬掖今叔父八十有一余亦六十有六矣老冉冉將至懷舊淒然豫社門隱處塵土枯槁海內知己貴人零落殆盡非復疇昔故雖勉自造就力昭其苦心使得崢嶸略慰平生而有不能也付之浩歎而已然叔父雖髙年詩筆彌徑而愚乃志氣日惰幾于進寸而退尺嘗自笑曰豈江淹才盡邪友人談伯玉酷嗜叔父之文欲先刋其所作詩果成豫當附數語其後從祀之目按史記及唐㑹要弟子凡七十七人而闕宋宰相王文正公旦嘗言㑹要所録七十七人當從闕所載七十二人於是琴張申棖林放陳亢蘧瑗以其俱見論語取此五人而削去公夏首等十人大觀四年并子思從祀凡七十七人東廡則金鄉侯淡臺滅明其首而西廡則單父侯宓不齊其首也歷數之至考城伯戴聖而止其間如左丘明公羊髙穀梁赤荀况伏勝戴聖俱非聖門弟子除顔曽子思當時聖門弟子固惟止七十而已戴聖諸人并萊蕪伯髙堂生至晉司徒杜預凡十有七人入宋續增唐昌黎伯韓愈至宋華陽伯張栻凡十人今元朝又新增左丞許衡一人通古今為九十八人頃余于閩從邵武詣學瞻敬時郡侯廉公命立塑像裝繪一新像設嚴整絶勝諸郡豫因計其數目與舊載文字相同如右廉公問豫數目是否豫答曰是六藝目六藝者禮樂射御書數也其目或不能詳今載于後五禮吉凶軍賓嘉六樂雲門大咸大韶大夏大濩大武五射白矢參連剡注襄尺井儀五御鳴和鸞逐水曲過君表舞交衢逐禽左六書指事象形諧聲㑹意轉注假借九數方田粟米衰分少廣商功均輸方程嬴不足旁要樂府諸調之始樂府有殷涉調雙調水調之類其來逺矣雖隋鄭譯律有七音音立一調故成七調然不著其名及考唐杜闕訣載唐諸樂名大蔟宫時號娑阤調如萬國歡之類大簇商時號大石調如升平樂破齊陳之類大簇羽時號殷涉調如太和萬壽樂之類林鍾宫時號道調如垂拱樂之類林鍾羽時號平調如舞媚娘之類黃鍾商時號一越調如緑沈杯之類黃鍾羽時號黃鍾調如春楊栁之類中吕商時號雙調如傾杯樂之類南吕宫時號水調如五更轉之類闕時號金風調如蘇幕遮之類律管候氣北齊神武霸府田曹參軍信都芳世號知音能以管候氣仰觀雲色常與人對語則指天曰孟春之氣至矣人往驗管而飛灰已應每月所候言皆無爽又為輪扇二十四靣薶地中測二十四氣每一氣感則一扇自動他扇並住與管灰相應若合符契隋文帝開皇二年遣毛爽及蔡子元于普明等候節氣依古於三重密屋內以木為案十有二具每取律吕之管隨十二辰置案上以土薶之上平於地中實葭莩之灰以輕緹素覆律口每地氣至與律𡨕符則灰飛衝素散出於外而氣應有早晚灰飛有多少或初入月其氣即應或至中下旬間氣始應者或灰飛出三五夜而盡或終一月才飛少許者帝異之問牛𢎞𢎞對曰灰飛半出為和氣灰全出為猛氣吹灰不能出為衰氣和氣應者其政平猛氣應者其臣縱衰氣應者其君暴帝駮之曰臣縱君暴其政不平非月别而有異也今十二月律於一嵗內應不同安得暴君縱臣若斯之甚𢎞不能對夫天地之氣隱微深妙而數子者能以智巧相窺何其神也音樂應驗傳曰聲音之道與政通從古而然殆不可曉隋萬寶常聽太常所奏樂泫然而泣人問其故對曰樂淫厲而哀天下不久相殺當時四海全盛皆謂不然大業末其言卒驗而寶常貧困無人贍遺饑餒將死取所著書焚之曰何用此為見者于火中探得僅數卷行世又煬帝將幸江都有樂工王令言妙達音律令言子當從於戶外彈胡琵琶作翻安公子曲令言卧室中聞而驚起急呼其子曰此曲興自早晚對曰頃來有之令言欷歔流涕謂子曰汝慎無從行帝必不反此曲宫聲往而不反宫君也吾以是知之帝果被弒於江都西域人知音周武帝時有龜兹人曰蘇祗婆從突厥后入中國善胡琵琶聽其所奏一均之中間有七聲問之則曰父在西域稱為知音代相傳習調有七種於是以其七調勘校七聲冥若合符乃知人性聰明無分畦畛詎可謂絶域有遜於中國也况所善胡琵琶者又其國俗所素習者邪塤制篪制世本云塤乃暴辛公所造不知何代人周畿內有暴國豈其時之人乎爾雅注曰燒土為之大如鵝子鋭上平底形如稱錘六孔小者如雞子大者曰嘂音叫毛詩何人斯蘇公何人斯蘇公刺暴公也篪世本云蘇成公所造舊制云一曰管非也雖不知其為何代人然非舜前之人明矣舜時西王母獻琯則是舜時有之成公安得造篪乎爾雅曰大篪謂之沂注云篪以竹為之長尺四寸圍三寸一孔上出寸三分名翹橫吹之小者尺二寸廣雅云八孔今有胡吹非雅器也蔡雍月令章句云篪竹也六孔有距橫吹之詩云仲氏吹篪是也今人常言塤篪而不識其制謾著于此嘗見賓退録言塤篪之篪則竹虎二字之中猶加二撇今寫者多只從竹下繼之以虎即非字矣考之說文信然挽歌之由魯哀公十一年吳子伐齊將戰齊將公孫夏命其徒歌虞殯孔頴達曰虞殯者謂啓殯將虞之歌也今人言挽歌之由止言漢髙帝時齊王田橫自殺其故吏不敢大哭為歌以寄哀而後代相承以為挽歌不知其起於春秋也由來久矣樂歌六朝樂歌有丁督護二章亦曰丁都護宋武帝長女妻徐逵之為彭城內史被魯軌所殺武帝使內直督護丁旿殯殮之逵妻呼旿至閣下自問殯送之事每問輒歎息曰丁都護其聲甚哀後人因其聲廣其曲焉其辭二首一曰督護初征時儂亦惡聞許願作石尤風四靣斷行旅二曰黃河流無極洛陽數千里坎軻戎旅間何由見歡子又有闕隱居通議卷二十七
