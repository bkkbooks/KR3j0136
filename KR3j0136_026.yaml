body:
  text: 隱居通議卷二十六元劉塤撰經史三秦不絶儒學秦始皇焚書坑儒遺臭萬世而莆陽鄭夾漈樵謂秦未嘗廢儒學言有證驗似亦可採其說曰陸賈秦之巨儒酈食其秦之儒生叔孫通秦時以文學召待詔博士數嵗陳勝起二世召博士諸儒生三十餘人問故皆引春秋之義以對是則秦未嘗不用儒生與經儒也况叔孫通降漢時自有弟子百餘人齊魯之風亦未嘗替故項羽既亡而魯為守節禮義之國則知秦未嘗廢儒而始皇所坑蓋一時議論不合者耳夾漈又曰蕭何入咸陽收秦律令圖書是則秦亦未嘗無書籍也其所焚者一時閒事耳世不明經者皆歸之秦火使學者不睹全書未免疑以傳疑然易固全書也何嘗見後世有明易之人哉所謂秦人焚書而書存諸儒窮經而經絶蓋為此發也詩之亡篇有六乃六笙詩本自無詞書有逸篇仲尼之時已無矣皆不因秦火也自漢以來書籍至今百不存一二非秦亡之學者自亡之耳以上二論甚新篁竹篁竹字出漢書嚴助傳淮南王安諫用兵書中天幸陳止齊論有曰昔司馬子長論李將軍為將其言哀痛反覆深悲其無成至論霍去病無他美獨天幸不至乏絶豫按衛青傳云諸宿將所將士馬兵不如驃騎即去病驃騎所將常選然亦敢深入常與壯騎先其大將軍軍亦有天幸未嘗困絶也然而諸宿將常坐留落不遇由是驃騎日以親貴比大將軍今觀此語又似以大將軍衛青為有天幸不然則須以常與壯騎先其大將軍為句絶乃稱驃騎日益貴舉大將軍青日退而驃騎日益貴舉大將軍故人門下多去事驃騎輒得官爵惟任安不肻驃騎將軍為人少言不泄有氣敢任天子嘗欲教之孫吳兵法對曰顧方略何如耳不至學古兵法天子為治第對曰丐奴未滅無以家為也由此上益重愛之貴舉二字當考剽姚字音去病衛青姊少兒之子也初為嫖姚校尉服䖍音飄搖大顔按荀恱漢紀作票鷂蓋徑疾之貌票音頻妙反鷂音弋召反杜詩後出塞借問大將誰恐是霍嫖姚論者以為杜子美平聲讀兩字不知其用服䖍音也大將軍軍出塞元狩四年春大將軍軍出塞云云漢益縱左右翼繞單于軍單于遂乘六裸壯騎可數百直冒漢圍西北馳去張釋之傳秦任刀筆之吏吏以亟疾苛察相髙然其敝徒文具耳無惻隱之實注云謂空具文而無其實文帝倚瑟而歌意慘悽悲懷李廣不擊刁斗一說謂以銅作鐎器受一斗晝炊飯食夜擊持行名曰刁斗一說謂小鈴如宫中傳夜鈴也一說謂形如鋗以銅作之無緣受一斗故云刁斗鋗即鈴也一說云鐎溫器有柄斗似銚而無緣音鐎夫以一刁斗古人猶不能詳其制言之各異其說然其實只是今日搖鈴擊柝之類以警夜備非常耳李廣數竒大將軍青隂受上戒以為李廣老數竒毋令當丐奴如淳曰數為丐奴所敗竒者不偶也服䖍云作事數不偶也愚按數字顔音所具反漢音所角反未知孰是戰國策劉向未曽校定戰國策之先其書號曰中書又曰戰國䇿書或曰國策或曰國事或曰短長或曰事語或曰長書或曰修書其名不一至禸始以為此戰國時遊士策謀定其書宜為戰國䇿上繼春秋下訖楚漢之起二百四十五年之間列國時備載凡三十三篇舊有髙誘注宋紹興間又有縉雲鮑彪注尤詳且多駁正世稱其善向舊本起東周次西周又次秦齊楚趙魏韓燕宋衛而止以中山彪謂西周正統也不得後於東周故首以西周安王威烈王子也而東周次之西周首章曰嚴氏為賊而陽豎與焉嚴氏即韓之嚴遂也遂字仲子時韓傀相韓列侯傀名俠纍列侯重之嚴遂與之不相能求得軹深井里人聶政為刺客殺俠纍于東孟之㑹注殺人不以道曰賊豎小使也互見韓䇿曰聶政陽堅刺相兼君注曰堅政之副猶秦武陽副荆軻又曰名堅見西周注是陽豎即陽堅也殆堅字近豎誤文耳嚴仲子謂聶政曰聞足下義甚髙故直進百金者特以為丈人粗糲之費注曰粟十六斗為一秉舂米一斛曰糲猶之井中而曰我將為爾求火也此韓䇿中語甚佳華他觀魏志華他傳見其醫入神妙與造化通倉扁後才僅見耳然他能洞見世人之五臟而不能密察孟德之心術竟被收録坐死豈其明智有所偏歟限田漢儒限名田之議甚好後世若能行之自可抑兼并豪强誠重本救末之良策也貴賤無常漢武帝衛皇后字子夫平陽公主家謳者武帝袚霸上還因過主家飲武帝起更衣子夫侍尚衣軒中得幸上還坐歡甚賜平陽公主金千斤主因奏子夫奉送入宫子夫上車主拊其背曰行矣强飯勉之即貴毋相忘入宫有寵生三女一男男名據即戾太子及陳皇后廢子夫為后此貴賤之無常一也子夫有弟衛青字仲卿以大將軍封為長平侯其三子皆封侯貴震天下是時帝姊平陽宫主寡居當用列侯尚主主與左右議長安中列侯可為夫者皆言大將軍可主笑曰此出吾家常使令騎從我出入耳奈何用為夫乎左右曰今大將軍姊為皇后三子為侯富貴振動天下主何以易之乎乃許之白武帝乃詔衛將軍尚平陽公主焉此貴賤之無常者二也衛后出於歌謳衛青起於奴僕一旦際遇至於母天下壻帝庭而無非之者褚先生曰丈夫當時富貴百惡滅除出耀榮華貧賤時事何足纍之哉豫閲此傳深有感於此語漢武帝微行自輕漢武故事曰帝即位為微行嘗至柏谷夜投亭長宿亭長不納乃宿逆旅翁邀少年十餘人皆持弓矢刀劍令主人嫗出過客婦謂其翁曰吾觀此丈夫非常人也且有備不可圖也天寒嫗酌酒多與其夫夫醉嫗自縛其夫諸少年皆走嫗出謝客殺雞作食平旦上去還宫乃召逆旅夫妻見之賜嫗金千斤擢其夫為羽林郎愚聞帝王之出入自有鬼神呵護固可安全然萬乘之主所為如此若非遇逆旅之老嫗識人一反覆間立為韲粉貽笑萬世此時噬臍其可及乎漢武開此例至宋徽宗尤而效之抑又甚焉隱居通議卷二十六
