body:
  text: 隱居通議卷三十一元劉塤撰雜録折獄龜鑑髙宗紹興三年降詔恤刑戒飭中外俾務哀矜時有承直郎鄭克明為湖南提刑司幹官因閲和凝疑獄集嘉其用心乃分類其事自釋寃辨誣至嚴明矜謹凡十二門易舊名曰折獄龜鑑所載皆古事亦多有不切可刪者然有數事增人智識爰摘録之釋寃門載唐李勉鎮鳯翔有耕人得馬蹄金一甕送縣為令者慮公藏守不謹收置私室翼日開視皆土塊耳令以狀聞府遣掾按之不能自明誣服換金初云藏之糞壤被人竊去後云投之水中失其所在雖未窮易用之所而皆以為換金無疑時袁滋在幕府獨疑其枉勉乃移獄付滋鞠之滋閲甕間得二百五十餘塊詰其初獲者則二人以巨竹舁至縣滋乃于市肆借金依塊形狀鎔寫校量始稱其半已及三百斤盡計大數非二人以竹擔可舉乃知在路之時金已化土矣令乃獲雪出康駢劇談録辨誣門載唐李靖為岐州刺史有希㫖告靖謀反者髙祖命一御史往按之且曰李靖反狀實便可處分御史知其誣罔請與告事者偕行行數驛御史佯失告狀驚懼異常鞭撻行典乃祈告事者曰李靖反狀分明親奉聖㫖今失告狀罪在我矣幸救其命告事者乃别疏告狀與之御史驗其狀與元狀不同即日還京以聞告事者伏誅又載李德裕鎮浙西有甘露寺主僧訴交割常住物數內被前知事僧沒金若干兩引前數輩為證遞相交付文籍在焉鞠其僧已服盜取之罪未窮破用之所德裕疑其非實僧乃欣寃曰本寺積年止有文書升載分兩交承其實無金衆人以某孤立不狎流俗欲乘此擠之德裕惻然曰此不難知也乃以兜子數乘命干連僧人入對悉坐之兜于中門皆向壁毋得相見各與黃泥令模作前後交付下次金形狀以憑證據而形狀皆不同乃劾其誣一一服罪議罪門載漢景帝時廷尉上囚有防年繼母陳殺防年父防年因殺陳依律殺母以大逆論帝疑之武帝時為太子在帝側遂問之對曰繼母如母明不及母緣父之故得比于母今繼母無狀手殺其父則下手之日母恩已絶宜與殺人同不當以大逆論又載漢宣帝時燕代間有三男子共娶一女而生一子及將分離爭子興訟丞相黃霸斷之曰此非人類當以禽獸處之遂戮三男以子還母又載元帝時王尊守槐里令兼行美陽令事美陽婦人告其假子不孝曰兒嘗以我為妻妬笞我尊遣吏收捕驗問辭服尊曰律無妻母之法聖人所不忍書此經所謂造獄者也顔師古說歐陽尚書有造獄事謂非常刑各造殺戮之法尊于是出坐廷上取不孝子挂磔著木使騎吏五人張弓射殺之又唐徐有功為司刑丞時有韓純孝者受徐敬業僞官前已物故推事使顧仲琰奏稱家口合緣坐詔依斷籍沒有功議曰律謀反者斬身亡即無斬法若情狀難捨或敇遣戮尸餘非此塗理絶言象緣坐元因處斬無斬豈合相緣既所緣之人亡則所因之罪減减止徒坐頻㑹赦恩今日即斷沒官未知據何條例詔依有功議斷放由是免籍沒者數百家又杜鎬侍郎兄仕江南為法官嘗有子毁父畫像訟未能决鎬尚幼輒曰僧道毁天尊佛像可以比也兄甚竒之又邢州有盜殺一家其夫婦即時死有一子明日乃死州司以其家財産依户口絶法給出嫁親女刑曹駁曰父母死時其子尚在即財産乃子物所謂出嫁親女乃係出嫁姊妹不合有分懲惡門載孫沔知杭州有丐者左臂無一手右臂惟兩指盜細民鑊相競至庭丐者舉臂泣曰細民誣我我無手人豈能盜鑊沔即然之叱細民出撫勞丐者因豫以鑊始弗敢受再三安慰丐者不悟也以指撮鑊徐以臂舉戴於首而去沔追還斷其指令於市摘姦門後魏李崇為揚州刺史部民茍泰有子三嵗失之後見在郭奉伯家各稱己子並有鄰證官不能决崇乃令二父與兒各别禁數日忽遣吏謂曰兒已暴死可出舉哀泰聞之悲泣不自勝奉伯嗟嘆而已殊無痛意遂以兒還泰鉤慝門唐張允濟初仕隋為武陽令鄰邑有民以牸牛依妻家數年孳生十餘犢及將異居妻家不與本縣不能决乃詣武陽訴之允濟曰爾自有令長何至此也民垂泣言所以然允濟遂令左右縛牛主蒙其首詣妻家村中云捕盜牛者盡召集村中牛質所從來妻家遽指所訊云此是女壻家牛不知來處允濟發蒙曰此是女壻可以牛歸之妻家驚服又一事相類者王恭戍邊留牸牛六頭於舅李璡家養五年産犢三十頭恭還索牛舅曰牸牛二頭已死當還四頭老牸餘非汝牛所生恭訴于縣縣令裴子雲以恭付獄追盜牛賊李璡璡皇怖而至子雲叱責曰賊引汝同盜牛三十頭藏汝莊內璡不伏喚賊對辭乃以布衫蒙頭立南墻下璡急吐欵云三十頭牛是外甥牸牛所生非盜得也子雲令除恭頭布衫璡驚曰此是外甥子雲曰是即還牛更欲何語璡默然復謂璡曰五年養牛辛苦特與五頭餘並還恭聞者歎服又唐江隂令趙和咸通初以折獄著聲淮隂有二農夫比莊通家東鄰嘗以莊契質于西鄰後當收贖先入八百千自恃密熟不取文證再齎餘鏹至西鄰遂不認東鄰訴于縣于州皆不得直遂越界訴于江隂和曰縣政甚卑何以奉雪東鄰泣曰至此不得理則無處伸訴矣問汝果不妄否曰焉敢誣乃召捕賊人齎牒淮隂云有劫江賊按鞫已具其同惡在某處姓名狀貌悉以西鄰指之請梏付差去人西鄰自恃無迹不懼也至則械于庭和厲聲詰之囚泣訴其枉和曰事蹟甚明尚敢抵諱所劫之物藏汝莊中皆可推驗汝具籍資産以辨之囚不虞東鄰之越訴也乃具折穀若干莊客某人者紬絹若干家機所出者錢若干東鄰贖契者和復審問乃謂曰汝固非劫江賊然何得隱諱東鄰贖契錢八百千遂引其人對證乃慙服梏回本縣牒請檢付契書復置之於法又章舉為句章令有妻殺夫放火焚舍稱火燒夫死夫家訴官妻不服舉乃取猪二口一殺之一活之而積薪焚之活者口中有灰殺者口中無灰因驗尸口果無灰乃服罪又南方有僞裝毆傷痕者以櫸栁涂膚則赤如毆水洗不脫然識者亦能辨之蓋真毆傷者血聚則硬僞者則否又侯臨為東陽令時他邑有民因分財産寄物姻家遂被諱匿屢訴弗得直聞臨治聲越境求伸臨曰吾與汝異封法難以治止令具物之名件而去後半年縣獲强盜因縱令妄亂供通有贓寄某家移文捕至下獄引問其人泣欣盜所供金帛皆親黨所寄者臨即追元告民識認盡以還之人服其神夾漈通志余自少聞閩中有大書一部名曰通志知其為名儒鄭先生所著也先生諱樵字漁仲興化人自號夾漈豫思見其書而無繇近大德嵗間東宫有令下福州刋通志于是益思見終無繇也游宦劍津始獲見通志二十略乃興化舊刋本近三十册或曰此通志之節略者爾或曰此說非也通志凡二百卷為全書而二十略者特傳志中之一所謂略者非節略之謂夾漈序曰總天下之大學術而條其綱目名之曰略凡二十略百代之憲章學者之能事盡於此矣由是而推則二十略自二十略通志全書自全書而略在全之內也今福州所刋通志凡萬幾十板裝背成凡百十册視興化之三十册則福為全志明矣大抵通志之作乃鄭先生欲破班固斷代為史之非而律以司馬遷通歷代為始之法故趙必曅之跋直指為全史而不以為類書其說謂通志以紀傳表志為例大意法司馬子長史記以全書名志故以略名天官等書又曰莆陽刻本二十略然全史未之見則志自志略自略也豫今僅見二十略而其全志未睹未敢輕于論議謹按二十略之次序曰生民之本在姓氏故作氏族略書契之本見於文字故作六書略明七音之本達六合之情使裔夷之俘皆知禮義故作七音略天文在於圖象有義無象莫能知天故作天文略地理之家在封圻封圻之要在山川今凖禹貢之書而理川原本開元十道圖以續今古故作地理略梁汴者四朝舊都足為痛定之戒南陽者中原新宅宜為無疆之基故作都邑略諡法一家國之大典今所纂削去引辭而除其曲說故作諡法略祭器者古人飲食之器今之祭器出于禮圖徒務說義不思適用故作器服略樂以詩為本詩以聲為用齊魯韓毛四家博士各以義言詩遂使笙歌之道日微故作樂略學術茍且由源流之不分書籍散亡由編次之無紀故作藝文略册府之藏不患無書校讐之司未聞其法故作校讐略圖成經書成緯古者左圖右書不可偏廢即圖以求者易即書而求者難故作圖譜略𣢾識者古人之靣貌金石之功寒暑不變今藝文有志而金石無紀故作金石略洪範五行傳者巫瞽之學也天地之間災祥萬種人間禍福冥不可知若之何一蟲之妖一物之戾皆繩之以五行臣故削去而作災祥略五方之名本殊萬物之形不一通鳥獸之情狀察草木之精神故作昆蟲草木略凡十五略出臣胸臆不涉漢唐諸儒議論禮略序五禮職官略秩百官選舉略言掄才之方刑法略言用刑之術食貨略言財貨之源流凡兹五略雖本前人之典亦非諸史之文也先生自序二十略之大㫖如此其編摩之勤意度之新誠為苦心千載獨步然披覽究竟似亦止是類書故庸齊之序以為博不如約特其該洽精審則勝於通典事文類聚翰苑新書之類至於通志全書世以為史尚未及見又不知先生所以用意者何如也姑俟續考卷末有古壽吕君政跋云二十略乃通志內之一書也其說益明先生少不事科舉惟務著書三舉孝廉兩舉遺逸俱辭後以經筵列薦特召賜對稱㫖命以官主管禮兵部架閣文字乞還山詔給筆札修史及繕寫成書二百卷造朝除樞密院編修官兼檢詳諸房文字又命繳進通志通略未及上而卒有子翁歸才八嵗家藏遺稿多散逸云元貞陳言元貞新政有北士吳助教陳定本十六策其言雖若泛濫至其條例時弊處沈著痛快今摘其要以示後今天下以為亂邪而海宇清寧重譯來貢災沴不作年穀頗登未見其亂之迹也以為治邪而官吏姦貪盜賊竊發士鮮知恥民不聊生號令朝出而夕更簿書斗量而車載庠序不立人材無自出之由律令不修官府無常守之法舍真儒用苛吏棄大本而求小功空中國事外夷取虛名而獲實禍漢以火唐以土此德運之重事先儒有相生相勝之評殷尚質周尚文此因革之大綱今代無所損所益之機學校科舉常平義倉平凖物貨之法皆今之急務有益萬世而不為僞金僞銀妄醫謬卜巫覡符水之流皆古之所禁不逺千里而必取金銀有入而無出不在乎鈔之舊新田疇少墾而多荒奚論乎穀之貴賤布帛翔涌而號寒者滋甚米粟漸平而啼饑者愈多邊鄙有數十萬之兵倉廩無五七年之積百司多不才之俗吏諸衛半無用之冗兵服色混有扎撤孫之權官爵濫有别里歌之選郡國苦達魯花赤不遷之虐驛站患脫脫和孫細檢之煩海東進名鷹動有千百騎之擾安南獻馴象嘗遺一萬里之憂鰥寡孤獨之人饑凍不知其廣惠流連荒亡之輩醉酗不問其所由受一貫之錢者有刑撒花銀不在此例爭一壟之田者必訟奪草地莫敢誰何草料有孛歌孫之偏枯頭匹有不蘭奚之乾沒海運糧不能以無擾鹽料草未免乎强科削民力置屯田利於此而害於彼改提刑為肅政舊其弊而新其名秋官乏推讞之人吏部闕銓衡之法散官降職事三等選曹守無謂之規覃恩增品級一階有司敗垂成之典藍緑朱紫巧官有四時之遷省部院臺善進有九階之轉驟用者號稱不次滿考者目為不通權門以之大開公道由是不立出納之吝一生二二生三上下交征萬取千千取百公行賄賂守令無牛犢之留私舉錢糧豪富有羊羔之息米至倉而官不為入耆老辛苦於上都物輸公而價不為酬商旅稱寃于外郡御史言官也經年未見言章翰林論思也終日未聞論狀北門有編修修撰所修者未審何書東觀有祕監監丞所監者未知何事太常乃禮樂之根本孰明五音成均實教化之淵源誰通六藝星芒示異本除舊布新之事司天但務於禱祈日蝕為災蓋扶陽抑隂之徴太史惟陳其躔度河渠峻由地形不便都水失治水之宜印版壞無方略可陳興文有喪文之罪曰清流曰雜職朝儀混文武之班為大夫為將軍官階失左右之寄財穀止有此數十倍入難應橫支官吏既無定員千萬求莫尋見闕豺狼當道幸門如鼠穴之多虎豹守關甲第如蟻封之密士生才弱冠上事君而下臨民親死不奔喪內成婚而外入仕上倍中中倍下田祿無公侯異等之頒窮則變變則通楮幣失母子相權之道江南苦茶鹽之重稅山西患穀粟之逺移逋縣未巳於追徴繇役安在乎蠲免棄産拋家者比比如是質妻賣子者往往皆然賜豫弗加於賢能公私以之而匱乏笞杖無小大之節徒流無逺近之分俸秩應添而不添冗員當減而不減朝士無修己治人之學臺諌盡呈身識靣之徒目刻薄為忠貞殆似指鹿而為馬用奸黠治郡縣何啻驅狼而牧羊大臣持祿而不言小臣畏罪而不敢以朝三暮四之術愚醉生夢死之民方今之勢如是而已雖非大亂亦未可謂之治矣如上所陳多有警語特有時而牽於對偶失之不切則其意惟在作文非言事之體又且毛舉縷數如此是內而朝廷外而郡邑無一事無弊無一處非病尚何足以為國乎此蓋急於吐露而忘其裁制也然其文意到處自是可采所謂定本十六策其目曰修實德則天道定嚴宇廟則人事定重一統則大業定開言路則聞見定近正人則心術定設大學則風俗定杜幸門則奔競定罷逺征則邊鄙定議律令為政之本廣學校為教之本增從祀為道之本復襲封為德之本興勸農為富之本汰監司為治之本褒隱士為勸之本用賢才為化之本以上十六事文詞浩繁且有重復迂緩處兹不盡録或云此人撰成此書不曽投獻而歿其稿流傳果如是殆亦好名之士歟雖然猶勝於喑喑默默與草木俱腐者也前朝封爵宋時封爵有大國次國小國之殊其間亦有臣子所不敢受封者謂如纍朝潛藩曽經封册則俱在不封之例偶見景定條法具載甚詳因録于此雖時異事殊亦可見當日典故云大國趙不封晉不封秦齊魏韓不封燕楚魯梁不封宋不封陳吳越夏商周漢唐升不封冀豫兗荆雍揚徐鎮益鄧邠潭凉鄆蜀不封太宗嘗封晉徽宗嘗封韓故不封餘皆此例若趙與宋則國名與姓故也次國衛鄭蔡曹不封許代瀛慶岐隨密邢壽不封潞不封蘇定不封相廣延不封婺涇福宿華小國江滕向黃紀譙原宏祁鄶取舒不封介道酆蔣蕭郕談霍萊郇鄅塢戴桐遂菅管沈虞應息英不封任崇榮扈濮巢觀不封安申虢邾杞賈鄫䢵巴夷穀頓麋黎葛蓼項眲䢴茅胙庸臯滑不封鄀牟權甘祭尹溫毛樊成單劉鞏邵邶酈宰鬲寧杜呂𤾂留鄘鄠郿焦宛鄼禳葉郢鄢緍勮費郚隴范程鄱鄃潛浯遼嬴絳汲梧軹營翕􅀈藺易鄗洮澤昌翟陸緇卞綸廬翼鄒房康不封沛褎彭竇鄂鄴薊顙不封汧沔沂肅岻郳鄯莘順渝郫蒲酅豐棣光儀懹永盛濟信羲寧襄不封均睦丹思簡欣韶嘉不封端不封循恭不封願雅通䖍資昭欽珍溆集和衡會撫嶽袁桂蘄灃􅀈洋建不封鄜瓊茂衢澶德吉景郴博貿惠潤莒郯䕫芮薛鄖鄣羅郜節鎮北海青髙密密濟南洛南魯郡襲慶彭城徐濟隂興仁東平東平襄陽襄陽南陽鄧漢東隨安康金房陵房滎陽靈河滑汝南蔡淮寧淮寧汝隂順昌澶淵開德景城滄信都冀常山真定鄴郡相博陵中山河東河中陜郡陜馮翊同華隂華華原耀新平邠洛郊鄜扶風鳯翔天水秦安定涇臨汝汝太原太原上黨隆德平陽平陽新秦麟廣陵揚譙郡亳符離宿廬江廬餘杭臨安㑹稽紹興吳郡平江丹陽鎮江吳興安吉東陽婺奉化慶元建康建康宣城寧國豫章隆興南康贑長沙潭江陵江陵江夏鄂安陸德安蜀郡成都梓潼潼州雲安䕫黔中紹慶益川利洋川洋建安建寧清源泉南海廣始安靜江寧容漢中興元閬中閬永寧雍武當灼河澗瀛同安安慶武陵常德弋陽光新定嚴潯陽江巴陵嶽唐安崇慶瀘川江安安隆慶髙安肇慶融水融龍水宜南平重慶犍為嘉定前朝科詔唐設諸科取人而進士科獨貴當時見之贊詠有曰利市襴衫拋白苧風流名字寫紅箋又曰揚州十里小紅樓盡捲上珠簾一半又曰莫羞脫落殘牙齒曽喫紅綾餅餤來皆所以侈其榮也宋沿唐制亦貴進士科然唐猶兼采時望不專詞章宋則糊名考校一决于文字而已故議者有一畨科第諸色人皆備之說雖則云然要之實出于公其得之者蓋天與之而人亦貴之也獨有不可曉者如唐之李衛公卓為一代才相㑹昌之政焜耀史牒袁州讀書遺蹟至今猶存而乃見遺於科目如宋之李旴江該博偉碩范文正公至以師禮待之如程伊川道德學術百世宗師如近世余樵隱才兼文武一代逸材乃衛公輩人俱不中第若以文論則尹少稷陸放翁劉後村皆學富文工豈不足以綴末科而咸被黜落至煩特㫖賜第進列清華甚可笑也考之唐制不見有科詔之類宋至南渡後三載一策士大槩以子午卯酉年鄉貢士以辰戌丑未年試禮部奏名進士而寅申己亥年則修明禋或舉郊祀其試鄉貢舊無定日故奔競者或有一人而試數郡紹興中懲其弊令諸郡同以八月十五日引試當是年則二月一日頒詔㫖示以取士之意而戒飭之凡遇此嵗通謂之詔嵗自德祐丙子正月行都失守是年科廢逮今踰三紀矣往時故跡銷磨澌滅後生小子無復能之前輩凋零鮮有能道者朅來劍津有儒家子賈似之出示咸淳登科記一册黃絹碧標題曰咸淳七年同年小録首載科詔覽之淒然蓋不見此久矣因録以示來者而并述大略如此咸淳六年二月一日詔書敕門下朕聞為國之道得士則重隆周以鄉里舉盛漢以州郡薦莫不由此其選唐衆科之目進士為尤貴本朝因之斯道寖昌名臣輩出蓋其效可覩矣朕自踐祚嘉與海內俊茂臻於斯路永為天地之間惟理最大先皇帝實表章之以幸斯文濟濟多士文王以寧信乎其以寧也前年羣試禮部深詔執事務索諸理以觀其學庶幾成風以章先帝詒謀之仁思昔仁祖嘗下詔書以古道飭天下士天下士皆自濯摩亦翕然丕變一歸於正若時得人號稱最盛至元祐而裕於所用汔至隆平今天下方聞之士素所藴抱有志當世而弗一新美之真材何由見朕今有詔令中外各舉進士勿以具文應諸路轉運使者其為朕精擇有司越庶伯君子尚既乃心以考其藝淵原正大之學忠實剴切之言朕所欲聞也追琢其章金玉其相凡爾選造其為時奮興式丕化于人文稱朕意焉故兹詔示想宜知悉咸淳七年省試戒飭考試官御札我朝取士之途惟進士一科得賓興遺意事莫重焉出為世用者臺萊杞李之材相望也近年士風盛而古意衰習競浮華辭昧體要真材不足以勝謏聞雷同反得以敝帚幸出朕甚非之嘗於秋賦澄其原且令覆引汰其謬能者伸矣比復豫戒春闈以論䇿定去取經賦定髙下此則蘇軾所謂以文章言論策為有用意也兹簡儒彥參典文衡其既乃心其詳乃視毋苟且毋偏執所置先後惟其當不必以不自己出為嫌為國得人益綿豐芑之澤則豫一人以懌付方逢辰以下咸淳七年正月二十五日鎖院敇差知貢舉中奉大夫權尚書吏部侍郎兼侍讀嚴陵方逢辰君錫朝散郎權尚書禮部侍郎兼權中書舍人兼侍讀東嘉陳宜中與權同知貢舉朝散大夫起居郎兼權兵部侍郎括蒼陳存體仁朝散大夫起居舍人兼權直學士院兼國子司業兼侍講古涪文及翁時學監試朝散郎殿中侍御史南豐曽淵子廣微參詳官一十二員㸃檢試卷官三十員主管牒試避親官一員監大門官一員監中門官一員中諸司官二員封彌官六員謄録官三員對讀官二十四員巡鋪官八員彈壓受卷官一員總轄諸司官一員同主管官一員外諸司官一員各有銜位不盡録是年省元吉州劉夢薦貢院排場日分二月初一日初二日初三日引試大學諸州軍正解免解詩賦論策三場二月初六日初七日初八日引試大學諸州軍正解免解經義論策三場二月十二日十三日十四日引試博學宏詞三場并宗子取應二場二月十四日十五日引試大學公試經義詩賦論策二場二月十五日十六日十七日引試武學公試七書義論策三場二月十八日引試三學泛免一場二月十九日引試京學頻申一場二月二十日引試京學零分一場别院試敇差監試官朝散郎監察御史古括張志立澤民癸丑姚榜主文官朝奉郎新除將作監兼崇政殿說書長沙丁應奎圭叟癸丑姚榜承議郎守祕書丞兼權度支郎官兼莊文府教授三山許自資道丙辰文榜考試官二員㸃檢試卷官七員監門官共二員封彌謄録對讀巡鋪等官共八員今不盡録别院排場日分二月初一日初二日初三日引試避親并諸路漕舉監舉進士詩賦論策三場初四日初五日歇二月初六日初七日初八日經義論策三場二月初九日初十日十一日十二日引試大學避闕賦論策二場同日引試武舉內地平等正請正免人七書義兵機第二場又引試大醫局習醫生局生三場又引試兩淮正請正免武舉并絶倫人及安東州江陵府進士七書義兵機策二場二月十二日引試宗學公試經賦論策二場四川類省試舉送大中大夫權兵部尚書四川安撫制置使兼總領四川財賦軍馬錢糧專一報發御前軍馬文字兼提領措置屯田兼䕫州路計度轉運使兼本路勸農使兼知重慶軍府事兼管內勸農使南部縣開國子食邑五百户賜紫金魚袋閬中朱􅑤孫千載甲辰留榜監試官朝議大夫直寶章閣潼川府路提㸃刑獄公事兼本路勸農提舉河渠公事提舉弓手寨兵兼本路轉運判官四川制置使司闕鄧益季謙乙未吳榜主文考試㸃檢監門封彌謄録對讀等官皆不録以上皆省試事咸淳七年五月四日御試集英殿敇差詳定官中順大夫試尚書吏部侍郎兼權吏部尚書兼給事中兼侍讀章鑑朝散大夫權尚書工部侍郎兼中書舍人兼直學士院兼祭酒侍讀盧鉞奉議郎守右正言兼侍講陳伯大編排官朝議大夫新除大府少卿鄧益朝請郎尚書吏部員外郎右司陳緯初考覆考㸃檢對讀封彌巡鋪等官共二十六員皆不録御試策題問厥初皓穹實生兆民孰總其羣乃作之君孰牖其迷乃作之師君治之師教之禮樂刑政之所繇生與其天下國家者一是以元元為命脉凡議論所講明政事所設施罔非為邦本計夷考載籍率與天並言之明威視聽皆自我民其不可輕者固如此歟三聖傳心之要不越執中數語斯蓋萬世君師之大綱領究其指歸則曰非后何戴非衆罔守然則一中妙用固所以為維持固結之道歟道之出有原道之傳有統前聖後聖同一揆歟我國家誕受天命以奄有九有列聖代光紹明大寶人斯無疆我先帝迪畏天顯懷保小民四十一年躋敬履仁用能延洪基緒式克至于今日蓋其精神心術之妙融會于六經之奧要語一書口傳面命其示軌範者在是朕祗遹猷訓行其所知召故老求賢才以尚賢也然召未能至求未盡獲何以致信順之助訓守牧戒貪殘以布治也然訓未必孚戒未必革何以新治象之觀求牧與芻當謹也既不用姻戚每選用賢良宜有厚生之政而未見田里之無愁歎竭澤而漁弗忍也既力郤貢舉且禁獻羡餘宜有益下之說而尚聞郡邑之有征斂義廩之發恃以賑饑而侵牟或不免田租之蠲本以寬賦而苛取或如故至若豁諸州之積負損版曹之故額俾紓急絶之擾深寓省憂之實而民未有愜志勢若中隔澤不下流歷思之汔不得其說意奉憲者導之未明歟豈吏罕廉平則治道衰歟將治生乎積非可速成歟抑習錮於玩未易遽革歟朕寅念先帝詒謀常恐羞之重為之惕然也子大夫博古通今夙抱經濟之藴其據經以對毋有所隱朕將親覽焉此題視草學士不知為誰氣卑文弱黯無晶光甚非王言之體也當是時襄圍正急事所宜問孰大於此恬不之及乃枚舉六七事之泛常者謬矣以上皆殿試事咸淳七年同年小録五月二十一日皇帝御集英殿唱名賜進士張鎮孫以下及第出身同出身五百二人當日赴期集所六月一日准敕依格賜進士期集錢及小録錢一科計一千七百貫文十八界六月初五日朝謝六月十七日謁謝先聖先師七月初十日賜聞喜同日降賜御詩于禮部七月十八日拜黃甲同日叙同年于禮部貢院七月闕日准敇依格賜進士期集錢及小録錢第二次第三次共三千四百貫文十八界立題名碑于禮部貢院期集所職事官糾彈箋表主管題明小録掌儀掌計典客掌酒果掌膳掌器司門諸職並於五百名內選差謁殿職事初獻張鎮孫亞獻杜文甫終獻陳鉞糾彈掌儀贊禮讀祝奉幣酌酒詔禮分獻直樽直盥洗舉鼎直爵諸職依上選第一甲共十七人不能備載姑録三魁可例其餘字鼎卿小名鼎小字金第鼎一具慶下第一名年三十三七月五日寅時生治易一舉張鎮孫外氏何娶蔡兄弟曽祖元貴祖機父南仲本貫廣州南海縣城南廂髙祖朝請大夫為戶字實翁小名文舉小字用之第八十永感下第二名年三十九八月二十二日生治賦鄉請初免舉杜文甫外氏姚娶陸繼郟兄竒縉雲主學曽祖侁祖芑父一桂故通直本貫台州臨海縣字宜之小名方中小字鍾真第正十二具慶下第三名年二十七九月日時生治賦一舉陳鉞外氏戴繼湯娶計兄某貢成均弟某曽祖思濟祖紀父應奎貢成均本貫太平州當塗縣慈湖鄉化龍里第二甲共三十九人第三甲共七十七人第四甲共一百九十八人第五甲共一百七十一人特奏名第一名吳清伯附第五甲建寧府政和縣人登科五百二人不能盡録姑載三魁姓名于前則五百名可以類推蓋亦存古之意云爾革命以來不能存此者多矣賈氏子猶存此録乃其二父曰昌忠曰純孝者俱以辛未登科故有此也其本貫乃蜀之懷安軍金堂縣人兄弟皆治書中選可謂盛事其子今寓南劔城內之紫洲嶺云方今武功既著文治將興吾黨之士其摩厲以須他日賓興將見代有偉人出為吾道重此理之必至者也慎毋廢學自暴自棄云凝于友人家獲見紹興十八年同年小録其年朱元晦先生登科乃科名以人重也但前缺二張未睹科詔耳附録于後以備參考按紹興十八年至咸淳七年歷一百二十四年紹興十八年二月十二日鎖院敇差知貢舉左朝奉郎權尚書吏部侍郎兼權直學士院邉智同知貢舉左朝奉郎權尚書禮部侍郎兼權吏部侍郎周左奉議郎守右正言兼崇政殿說書巫伋參詳官左朝奉大夫鄭鬲左朝散郎行司農寺丞周莊仲左朝散郎行國子監丞兼權尚書吏部員外郎沈虛中左朝散郎周林左承議郎行祕書省正字兼提舉祕書省編定書籍官兼權尚書禮部員外郎葛立方左承奉郎充御史臺主簿陳䕫左奉議郎行太常寺主簿兼權祕書省校勘書籍官林大鼐左承議郎行宗正寺主簿王葆㸃檢試卷官左朝請大夫監尚書六部門兼權尚書兵部員外郎張頡左朝請大夫監登聞檢院余阡左朝奉郎行太常博士蔡宰左從事郎充詳定一司敇令所刪定官丁婁明左承議郎新行國子監丞權監都進奏院李諃左宣教郎諸王宫大小學教授兼權祕書省校勘書籍官葉綝左宣教郎皇太后宅教授秦從周左迪功郎守大理評事蔡塤左朝奉郎行大府寺主簿余賔興左承議郎幹辨諸司審計司湯允恭左承議郎郭彥參左承議郎黃汝能左奉議郎主管官告院章復左宣教郎祝閔左宣教郎錢密左宣教郎元益左宣義郎王悅左迪功郎臨安府府學教授何溥左從事郎知臨安府仁和縣事方升之左迪功郎權臨安府北郭紅亭稅場孫良輔二月十八日十九日二十日引試詩賦論策三場二月二十二日二十三日二十四日引試經義論策三場别試考試官左朝請郎殿中侍御史兼崇政殿說書余堯弼㸃檢試卷官左承奉郎樞密院編修官林機左承議郎幹辨行在諸司糧料院謝邦彥左奉議郎就差監行在左藏東庫鍾世明左從事郎監行在雜賣場鮑同二月二十三日引試御試敇差初考官左朝議大夫權尚書禮部侍郎兼直學士院沈該左朝散大夫尚書右司員外郎兼玉牒所檢討官吳栗左奉議郎守尚書祠部員外郎陳成之覆考官左朝散郎權尚書户部侍郎李朝正左宣教郎守尚書司封員外郎湯思退左奉議郎守尚書司勳員外郎沈介詳定官左朝奉郎試工部尚書詹大方左朝奉郎監察御史張杞左宣教郎大學博士王之望編排官左中大夫新除尚書户部侍郎兼權兵部侍郎李椿年左朝請郎殿中侍御史兼崇政殿說書余堯弼初考㸃檢試卷官左從事郎詳定一司敕令所刪定官吳武陵覆考㸃檢試卷官左文林郎祕書省正字兼提舉祕書省編定書籍官孫仲鰲續承指揮添差到對讀畢充初覆考同共考校左朝散郎通判臨安軍府事黃衮左宣議郎諸王宫大小學教授曹筠左承議郎幹辨行在諸司糧料院謝邦彥左奉議郎監行在左藏東庫鍾世明左從事郎監行在雜賣場鮑同左從政郎主管尚書刑工部架閣文字詹紹興十八年同年小録凝按原刻此九字大書四月十七日皇帝御集英殿唱名賜狀元王佐以下及第出身同出身共三百三十人釋褐當月十八日赴期集所糾彈江賓王鍾離松葛邵箋表俞處約陳豐陸升之俞光疑莫汲主管題名小録何騰何欽承劉安世程千里田興宗葉謙亨柴衛韓彥直張宗元掌儀萬介徐履典客余彥廣朱登掌計蕭肅掌器潘觀國掌膳張頴掌酒果王允功監門方顔袁富文四月二十六日依令賜錢一千七百貫凝按原刻有僞四月二十九日朝謝五月初二日就法慧寺拜黃甲叙同年五月初五日赴國子監謁謝先聖先師鄒國公五月闕日立題名石刻于禮部貢院賜狀元王佐等聞喜宴于禮部貢院第一甲王佐字宣子小名千里小字驥兒年二十九月初一日生外氏葉第一人具慶下第五十八兄弟五人一舉氏娶髙曽祖仁故不仕祖忠故不仕父俊彥現任左迪功郎鎮江府教授本貫紹興府山隂縣禹都鄉廣陸里父為户右迪功郎董德元字體仁小名丙哥小字長壽年五十三十月初五日生外氏曾第二人永感下第七十七兄弟二人六舉氏娶曽曽祖倚故都官員外郎祖蒙休故不仕父奬故不仕本貫吉州永豐縣雲蓋鄉善和里曽祖為户和州助教陳孺字漢卿小名叔頑小字石老年三十一十一月初十日生外氏湯第三人具慶下第四十兄弟二人一舉氏娶饒曽祖德明故不仕祖世京故不仕父策未仕本貫撫州臨川縣西團鄉文公坊父為户凝按三魁俱照原式抄録其餘不能盡載姑存總數于后第一甲十人第二甲十九人第三甲三十七人第四甲一百二十二人第五甲一百四十二人特奏名一人第五甲朱熹字元晦小名沈郎小字季延年十九九月十五日生外氏祝第九十人偏侍下第五一兄弟無人一舉氏娶劉曽祖徇故不仕祖森故贈承事郎父松故任左承議郎本貫建州建陽縣羣玉鄉三桂里父為户凝按是年登科者三百三十一人惟朱晦菴先生卓絶千古傳於後世科名之重人歟抑人之重科名也特附于此以志景仰云隱居通議卷三十
