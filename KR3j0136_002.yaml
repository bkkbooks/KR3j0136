body:
  text: 隱居通議卷二元劉塤撰理學二朱陸一朱陸二先生同出一時俱天地之間氣名世之巨儒也然陸氏不喜著書惟從原頭理㑹嘗曰六經注我者也故罕有𫝊世而道不顯顧有識則服其髙明若朱氏於書極下工夫如四書集注如詩易𫝊如綱目如家禮如小學書如楚辭注如言行録之類非文公疲精竭力更千百年終至漏晦今使學者䝉賴啓迪洗凡破陋則此數書者誠足以補前古之缺也至晚年則亦悔注釋有詩曰書冊薶頭無了日不如拋却去尋春其意可見矣公於象山殊加敬嘗曰安得似陸子靜堂堂自在又曰子靜底是髙只是下面空疏無物事承當伯恭甚低如何似得他又曰江南未有人如子靜八字著腳又曰吾儒頭緒多思量著令人頭痺似陸子靜樣不立文字也是省事又曰陸子靜楊敬仲自是十分好人文公之言如此可見不分同異鵝湖之集易簡支離之詩文公不以為忤後來一等抑揚過當殆不可信蓋亦門人弟子有分朋植黨挾私取勝者其實二先生未嘗立異也善乎象山之言曰建安也無朱元晦青田也無陸子靜偉哉言乎大公至正可以一洗蟲鼠之陋見矣又曰四方上下曰宇往古來今曰宙宇宙便是吾心吾心即是宇宙千萬世之前有聖人出焉同此心同此理也千萬世之後有聖人出焉同此心同此理也東海有聖人出焉同此心同此理也南西北海有聖人出焉同此心同此理也其言恢廓髙明如此或者猶校江閩學術異同豈不大可鄙笑哉朱陸二豫又見文公答南軒書有曰子夀兄弟氣象甚好其病只是廢講學而務踐履却於踐履中要人提撕省察悟得本心此為病者要其操持謹質表裏不二則實有以過人答東萊有曰子靜約秋涼來遊廬阜但恐此時已換却主人耳渠兄弟今日豈易得與劉子澄書有曰子靜一味是禪却無許多功利術數目下收斂得學者身心不為無力答陳膚仲有曰陸學雖有似禪處然婺州朋友却専事聞見而於自已身心全無工夫答滕德章有曰陸文教人於收斂學者散亂身心甚有功然講學趨向亦不可緩要當兩進乃佳答林擇之有曰陸子夀兄弟近却肯向講學上理㑹其門人有相訪者皆好氣象但其間亦有舊病此間學者却是與渠相反初謂如此講學漸涵自能入德不謂末流之弊只成說話與吳茂實有曰陸學却是先於情性持守上用力此意自好答項平父有曰子思以來教人之法以尊德性道問學兩事為用力之要今子靜所說専是尊德性事而某平生所論却是問學上多了所以為陸學者多持守可觀而看得義理不細某自覺義理上不敢亂說却於緊要為人上多不得力今當反身用力去短集長答孫敬父有曰陸學於近年一種浮淺頗僻議論中固自卓然非其儔匹而其徒𫝊習多有能修其身能治其家以施之政事間者觀文公之言平心服善如此何嘗如後來學者抑揚毁譽之過實哉當其議論紛紜本非真有定見往往挾私護局而已文公答諸葛成之有曰來諭有疑於子靜然子靜平日正欲身率學者一於天理而不以一毫人欲雜其間恐決不至如賢者之所疑義理天下之公而人之所見有未盡同正當虛心平氣相與熟講徐究以歸於是而向來講論之際往往皆有立我自是之意厲色忿詞如對仇敵無復長幼之節禮遜之容蓋嘗竊笑以為正使真是仇敵亦何至此然觀諸賢之氣方盛未可遽以片詞取信故默不言是文公無恙時一等狂生已敢如此至煩老先生之諄諄况於世無大宗師則此輩何憚而不縱其狂誕邪豫近在閩中間泉州有一士獨宗陸恨不獲識後識三山張尚友心甚向陸且愛荆公祠堂記謂不可及因言文公筆下泥滯亦可謂不私其鄉者又說潭經界事朱陸三文公嘗謂陸學近禪然其答黃子耕有曰格物致知只是窮理聖賢欲為學者說盡曲折故立此名字今人反為名字所惑生出重重障礙添枝接葉無有了期若能認取本意而於其中看得許多曲折分明便依此實下工夫方見得許多名字虛假並皆脫離而其工夫却無缺缺矣此即釋氏名相之說又答李叔文有曰求放心不須注解只日用十二時中常切照管不令放出即久久自見功效此亦釋氏之說恐不可専指陸學為禪也大槩性命之學不能不與禪相近故伊川謂儒釋深處只爭杪忽晦翁承其說亦謂大亂真而彌近理也其闢之者則大儒衛道職當然耳晦翁又議陸不講學象山云人謂某不令人讀書何嘗不教人讀只是讀得别耳異時晦翁答吕子約則曰程子言心要常在腔子裏今一向耽著文字令此心全體都奔在書冊上更不知有已便是箇無知覺不識痛癢之人雖讀書何益答石子餘又曰學者只就冊子上鑽却不就本原理㑹只成議論文字與自家身心全無交涉詳味此言又似與議陸者相矛盾也永嘉之學初周恭叔首聞程吕氏微言放新經黜舊疏挈其儔倫退而自求是千載之已絶霍然如醉忽醒夢方覺也頗益衰歇而鄭景望出明見天理心暢氣怡篤信固守言與行應而後知今人之心可印於古人之心故永嘉之學必兢省以禦物欲者周作於前鄭承於後也薛士龍奮發昭曠獨究體統帝王逺大之制叔末寡陋之術不隨毁譽必托故實如有用我療復之方安在至陳君舉尤號精密民病某政國厭某法銖稱鎰數各到根穴而後知古人之治可措於今人之治矣故永嘉之學必彌綸以通世變者薛經其始陳緯其終也四人鄉之哲人也此葉氏所著溫州學記之說豫按水心公志止齊墓有云從公四十年似有師弟子之分矣而每字之薛尤前輩止齊所師而亦字之未嘗曰先生也然水心行狀止云少詣吕太史不言止齊豈於止齊為平交歟計其行輩即止齊實先達矣謾托其次第列於後鄭景望伯熊宗正少卿吕伯恭祖謙周恭叔行巳祕書省正鄭景元伯英隆興癸未第四人秀州僉判紹興三年卒薛士龍季宣常州守陳君舉傅良乾道八年進士寶謨閣侍詔葉行之幼學乾道八年進士景元壻葉正則適淳熙廷對第二吏部侍郎合周程歐蘇之裂永嘉有言洛學起而文字壞此語當有為而發聞之雲卧吳先生曰近時水心一家欲合周程歐蘇之裂又言先儒謂歐文粹如金玉又以為有造化在其胸中而未有以道視之者答吳充秀才一書則其知道可見矣南豐說理則精於其師如曰及其心有所得而下二三百言非所詣之至何以發明透徹東坡雄偉固所不逮伊洛微言或未有過也豫詳此言似謂歐曾可以合周程而蘇自成一家未知然否反復紬繹雖以道許六一以說理許南豐終是未曽深入閫域而千載唯以文章許二公也况晦翁詆斥蘇文不遺餘力水心雖欲合之以矯俗然其地位亦只文章家爾終不見其往復講辨如吕陸也晦菴答楊履正有曰世之儒者既大為利祿所決潰於前而文辭組麗之習見聞掇拾之工又日夜有以滲泄之於其後使其心不復自知道之在是雖欲慕其名而勉為之然其所安終在彼而不在此也詳味此語則文章乃學道家之所棄安可得而合哉歐公言道不言性中庸曰率性之謂道是性即道也歐陽公答李詡書曰性非學者之所急而聖人之所罕言六經所載皆人事之切於世者是以言之甚詳至於性也百不一二言之或因言而及焉或専為性而言也故雖言而不究論語載七十二子之問於孔子者問孝問忠問仁義問禮樂問修身問為政問朋友問鬼神者有矣未嘗有問性者孔子之告其弟子者數千言其及於性者一言而已故曰非學者之所急而聖人之所罕言也書曰習與性成語曰性相近習相逺此二者戒人慎所習而言也中庸曰天命謂性率性謂道者明性無常必有以率之也樂記曰感物而動性之欲者明物之感人無不至也然終不言性果善果惡惟戒人慎所習與所感而動及所以率之者爾故曰因言以及之而不究也今之學者於古聖人所皇皇汲汲者學之行之或未至其一二乃好說性以窮聖賢之所罕言而不究者執後儒之偏說事無用之空言此豫之所不暇也故為君子者以修身治人為急而不窮性以為言夫七十二子之不問六經之不主言或言而不究豈略之哉蓋有意也歐公之於性也其論如此答吳充論文則曰聖人之文雖不可及然大抵道勝者文不難而自至也若子雲仲淹方勉焉以模言語此道未足而强言者也若道之充焉雖行乎天地入於淵泉無不之也又與石公操書亦曰相期在於道爾其或有過而不至於道者乃可以為憂也歐公之於道也其論如此蓋公之意以仁義禮樂為道之實而不欲說性者懼其淪於虛亦其生平惡佛而恐其涉於禪也故曰執後儒之偏說事無用之空言當是時道學之說未盛也公固已有憂矣蓋自五代極亂之後而入於宋混一諸國中外太平此時世運猶如天地重開咸平景德以來真元㑹合一畨其人物往往篤實渾厚山立河行竭誠盡心惟務修實德行實政至慶厯嘉祐若少殺而猶未衰一主於實故不為無用之空言也而或者又曰性學不明他復何說夫子之罕言弟子之不問亦由人性上無容言說故耳楊龜山云孟子遇人便道性善永叔却言聖人之教人性非所先永叔論列是非利害文字上儘去得但於性分之內全無見處更說不得人性上不可添一物堯舜以為萬世法亦只是率性而已龜山之論為是參賜一貫之㫖學未至於聖人未有不滯於所先得而以偏受為患者孔子進參與賜而示之道皆曰吾一以貫之豈非無本末之辨而欲合門人同異之趨哉今觀曾子最後之𫝊終以籩豆有司之事為可略是則唯而不悟者自若也子貢平日之愧終以性與天道為不可得聞是則疑而未達者猶在也此水心之新論然二子之言正為學者而發非二子之造詣也龍川功名之士宋乾淳間浙學興推東萊吕氏為宗然前是已有周恭叔鄭景望薛士龍出矣繼是又有陳止齊出有徐子宜葉水心諸公出而龍川陳同父亮則出於其間者也當是時性命之說盛鼓動一世皆為微言髙論而以事功為不足道獨龍川俊豪開擴務建實績其告孝宗有曰今世儒士自以為得正心誠意之學者皆風痺而不知痛癢之人也舉一世安於君父之讐而方低頭拱手以談性命不知何者謂之性命孝宗極喜其說然亦以是不得自附於道學之流而人惟稱其為功名之士至其雄才壯志橫騖絶出健論縱橫氣蓋一世與朱文公往復辨論每書輒傾竭浩蕩河奔海聚而文公亦娓娓焉與之商論蓋一代人物也惜中年後始中科舉為狀元不及仕而死矣豫閲其文集宏偉博辨足以立懦而又惜其於道不純故後之品藻人物者不以厠之鄭薛吕葉之列云龍川學術龍川之學尤深於春秋其於理學則以程氏為本嘗采集其遺言為一書以備日覽目曰伊洛正原又集二程橫渠所論禮樂法度為一書目曰三先生論事録其辨析西銘平易朗徹見者蘇醒其於論語則曰論語一書非下學之事也學者求其上達之說而不得則取其言之若微妙者玩索之意生見長又從而為之辭曰此精也彼特其粗耳此所以終身讀之卒墮榛莽之中而猶自謂其有得也夫道之在天下無本末無內外聖人之言烏有舉其一而遺其一者乎舉其一而遺其一是聖人猶與道為二者也然則論語之書若之何而讀之曰用明於內汲汲於下學而求其心之所同然者功深力到則他日之上達無非今日之下學於是而讀論語之書必知通體而好之矣其說如此則其於理學固用心矣豈徒曰功名之士龍川議論儒釋判然兩途而溺者曰其道有吾儒所未及者曰其精微處吻合無間曰儒釋深處所差杪忽爾舉世溺焉而不自知雖知其非者亦如猩猩知酒之將殺已且罵而且飲之也文以載道也道不在我雖有文直與利口者爭長耳退之原道無愧孟荀終不免以文為本故程氏謂之倒學二十年間道德性命之說一興迭相倡和後生小子拾其說髙自譽誇非議前輩謂不足學髙者得其機而乘之以為聖人之道盡在於我往三十間時豫初有識知猶記為士者必以文章行義自名居官者必以政事書判自顯各務其實而極其所至自道德性命之說一興而尋常爛熟能解之人自託於其間以端慤靜深為本以徐行緩語為用務為不可窮測以蓋其所無一藝一能皆以為不足自通於聖人之道於是天下之士始喪其所有不知適從矣為士者恥言文章行義而曰盡心知性居官者恥言政事書判而曰學道愛人相䝉相欺以盡廢天下之實終於百事不理而已及其徒既衰而昔之熟視不平者合力共攻之無須之禍濫及平人固其所自取而出反之慘乃至此乎大學之道治國平天下必本於正心誠意而子思之論為天下國家其經有九若既多事矣然而卒曰篤恭而天下平又何簡也龍川與朱晦翁書乾淳以來諸賢互相闡究理學大明本領端正矩度修飾渾然端厚作世模楷惟陳同甫豪縱開擴氣蓋一世嘗有書與晦翁其間數語曲盡事理今録於左研窮義理之精微辨析古今之同異原心於杪忽校理於分寸以積纍為功以涵養為正晬面盎背則亮於諸儒誠有愧焉至於堂堂之陳正正之旗風雨雲雷交發而並至龍蛇虎豹變見而出沒推倒一世之智勇開擴萬古之心胸如世俗所謂粗塊大臠飽有餘而文不足者自謂差有一日之長晦菴先生復諡議晦菴先生之得諡也太常初議謂宜諡文忠及下考功覆議時退翁劉侍郎彌正以尚書郎官兼考功謂初諡文忠為非請止諡曰文退翁之子曰夫即後村也年甫十七代其父作覆議識者稱其少年而有老筆其後卒以詞華名世今録其諡議曰諡古也復諡非古也諡法曰諡生於行者也茍當於行字一足矣奚復哉故侍講朱公熹殁於爵未得諡上以公道德可諡下有司議所以諡謹獻議曰六經聖人載道之文也孔子殁獨子思孟軻氏述遺言以持世斯文以是未墜漢諸儒於經始采掇以資文墨鄭司農王輔嗣輩又老死訓詁謂聖人之心真在句讀而已涉隋唐間河汾講學已不造聖賢梱域最後韓愈氏出或謂其文近道爾蓋孔氏之道賴子思孟軻而明子思孟軻之死此道幾熄及本朝而又明濓溪橫渠二程子發其微程氏之徒闡其光至公而聖道粲然矣公持心甚嚴不萌一毫非正之念其於書拾六籍則諸子曲說不得干其思其於道不敢深索也恐入乎幽不敢泛求也恐汩其說讀書初貫穿百氏終也韜以聖人之格言自近而入微由博而歸約原心於杪忽析理於錙銖采衆說之精而遺其粗集諸儒之粹而去其駁曰醇矣哉孟氏以來可槩見矣公中科第時猶少也薄遊徑隱閉門思朝廷每以好官召莫能屈不得已而出惟恐去之不早晚在經筵不能五十日而閒居者四十餘年山林之日長講學之功深也平居與其徒摩切講貫皆道德性命之言忠信孝愛之事由公之學者必行已莊與人信居則安貧而樂道仕則尊君而憂民重名節而審出處合於古而背於時好若此者真公之學也嗚呼師友道喪人各自尊公力扶聖緒本末宏闊而弄筆墨小技者以為迂臞於山澤與世無競而汩沒朝市者以為矯自童至耄動以禮法而跅􅕟捐繩墨者姍笑以為誕世嘗以此病孔孟矣公何恨焉初太常議以文忠諡公按公在朝廷之日無幾正主庇民之學鬱而不施而著書立言之功大暢於後合文與忠諡公似矣而非也有功於斯文而謂之文簡矣而實也本朝歐蘇不得諡文而得之者乃楊大年王介甫介甫經學不得為醇其事業亦有可恨大年政復文士爾文乎文乎豈是之謂乎世評韓愈為文人非也原道曰軻之死不得其𫝊斯言也程子取之公晚為韓文立考異一書豈其心亦有合歟請以韓子之諡諡公謹議前輩多稱其山林之日長講學之功深兩語殊妙足以盡晦翁之平生隱居通議卷二
