body:
  text: 隱居通議卷六元劉塤撰詩歌一黃陳詩序蜀士任子淵嘗注黃陳詩畨陽許尹為之序其略曰六經所以載道傳之後世而詩者止乎禮義道之所存也周詩三百五篇有其義而亡其辭者六篇而已大而天地日星之變小而蟲鳥草木之化嚴而君臣父子别而夫婦男女順而兄弟羣而朋友喜不至黷怨不至亂諌不至訐怒不至絶此詩之大略也古者登歌清廟㑹盟諸侯季子所觀鄭人所賦與夫士大夫交接之際未有舍此而能逹者周衰官失學廢大雅不作久矣由漢以來詩道浸微陵夷至於晉宋齊梁之間哇淫甚矣曹劉沈謝之詩非不工也如刻繪染縠可施之貴介公子而不可用之黎庶陶淵明韋蘇州之詩寂寞枯槀如叢蘭幽桂宜於山林而不可置之朝廷之上李太白王摩詰之詩如亂雲敷空寒月照水雖千變萬化而及物之功亦少孟郊賈島之詩酸寒儉陋如蝦蟹蜆蛤一啖便了雖咀嚼終日而不能飽人惟杜少陵之詩出入古今衣被天下藹然有忠義之氣後之作者未有加焉宋興二百年文章之盛追還三代而以詩名世者豫章黃庭堅魯直其後學黃而不至者后山陳師道無已二公之詩皆本於老杜而不學杜者也云云許公此序斷制古今詩體深合繩尺自三百篇沿漢晉以來下至唐宋數語核之靡不的確而於黃陳所學又窺其奧信名言矣以愚觀許公必力於學深於詩者尚未見其他文可恨耳然由庚詩亡因序而義猶可見則讀是序者端可以知許之學云蒼山序唐絶句蒼山曽子實原一寧都人也有詩名於江湖編唐絶句為序曰作絶句當如顧愷之啖蔗法又當如飲建溪龍焙歀識鼎彛其上也雄馬馳九阪佳人共笑言其次矣燕姬趙娃舞歌春風又其次矣才有不同所得各異局婉媚而薄髙古執偉豪而棄淵深此邇來選詩者之偏也愚不敢以巳局人隨長兼收各標圈以志異體庶可類求若劉禹錫之標韻李商隱之深逺杜牧之之雄偉劉長卿之凄清元白之善叙導人情蓋唐之尤長於絶者也老杜鈞樂天籟不可與諸子並惟山谷絶近之半山清逺韻度獨步輩流昌黎云天街小雨潤如酥草色遙看近却無最是一年春好處絶勝烟栁滿皇都意半山絶句機此其發也變化而神用之此半山所長者選五言中曰幽人將遽眠解帶翻成結又曰打起黃鶯兒莫教枝上啼啼時驚妾夢不得到遼西前輩謂作詩機在此緩視微吟其信矣趙庭玉欲傳余所選唐絶句因題其後庭玉他日或可豫斯言或笑而哀之則可驗庭玉進否矣蔡絛詩評自梁蕭思話作字評具載法帖中宋敖器之陶孫倣效作詩評具載賔退録近又見蔡絛亦有詩評頗佳絛京子也號百納嘗著西清詩話頗有可采豫舊嘗録藏今已失去今載其詩評云栁子厚詩雄深簡淡迥拔流俗致味自髙直揖陶謝然似入武庫但覺森麗王摩詰詩渾厚一段覆蓋古今但如久隱山林之人徒成曠淡杜少陵詩自與造化同流孰可擬議若君子髙處廊廟動成法言恨終缺風韻黃太史詩妙脫嗘徑言侔鬼神惟胸中無一㸃塵故能吐出世問語所恨務髙一似參曹洞下禪尚墮在𤣥妙窟裏東坡公詩天才宏放與日月爭光凡古人所不到處發明殆盡萬斛泉源不是過也然頗恨方朔極諌時雜滑稽故罕逢醖藉韋蘇州詩如渾金璞玉不假雕琢成妍唐人有不能到至其過處大似村寺髙僧時有野態劉夢得詩典則既髙滋味亦厚然正似巧匠矜能不見少拙白樂天詩自擅天然貴在近俗恨如蘇小雖美終帶風塵李太白詩逸態凌雲照映千載然時作齊梁間人體段略不近渾厚韓退之詩山立霆碎自成一法然譬之樊侯冠服微露粗疏栁栁州詩若捕龍蛇搏虎豹急與之角而力不敢暇非輕蕩也薛許昌詩天分有限不逮諸公逺矣至合人意處正若芻豢時復咀嚼自佳王介甫詩雖乏風骨一味清新方似學語小兒酷令人愛歐陽公詩溫麗深穩自是學者所宗然似三館畫手未免多與古人傳神杜牧之詩風調髙華片言不俗有類新及第少年略無少退藏處固難求一唱而三歎也右此十四公皆吾平生宗師追仰所不能及者留心既久故得間以議之至若古今詩人珠聫玉映則又有不可得而知者也絛宰相子宜其沉酣綺羅叢中醉生夢死乃能留意詞章自作議論如此勝騃子弟逺矣惜乎不遇名父同歸敗亡今詳所評雖未必皆當大略亦類有識獨其以唐宋諸賢參錯而論不分前後何也豈又别有意邪厥後敖器之再為之評必以絛所論為未善故更定之當考敖器之詩評敖公福州人有詩名仕至安撫司參議官後村劉尚書志其墓今觀其評的確峻峭殊勝蔡評并載於此識者宜參考其優劣評曰魏武帝如幽燕老將氣概沉雄曹子建如三河少年風流自賞鮑明逺如饑鷹獨出竒矯無前謝康樂如東海揚帆風日流麗陶彭澤如絳雲在霄舒卷自如王右丞如秋水芙蓉倚風自笑韋蘇州如園客獨繭暗合音徽孟浩然如洞庭始波木葉微脫杜牧之如銅丸走阪駿馬注坡白樂天如山東父老課農桑言言皆實元微之如李龜年說天寶遺事貌悴而神不傷劉夢得如鏤氷雕瓊流光自照李太白如劉安雞犬遺響白雲核其歸存恍無定處韓退之如囊沙背水惟韓信獨能李長吉如武帝食露盤無補多欲孟東野如薶泉斷劍卧壑寒松張籍如優行鄉飲酬獻秩如時有恢氣栁子厚如髙秋獨眺霽晚孤吹李義山如百寶流蘇千絲鐵網綺密瑰妍要非適用宋朝蘇東坡如屈注天潢倒流滄海變眩百怪終歸雄渾歐公如四瑚六璉止可施之宗廟荆公如鄧艾縋兵入蜀要以險絶為功山谷如陶宏景祗詔入宫析理談元而松風之夢故在梅聖俞如關河放溜瞬息無聲秦少游如時女步春終傷弱軟后山如九皋獨唳深林孤芳沖寂自妍不求識賞韓子蒼如梨園按樂排比得倫吕居仁如散聖安禪自能竒逸其他作者未易殫陳獨唐杜工部如周公制作後世莫能擬議右敖公此評能近取譬如行雲流水超軼飛動有合於風人比興之㫖至於辭語刻琢精麗殆煆錬而成者歟嘗欲取南渡後諸賢之詩倣此作評而塵事塞膺竟未暇及李杜蘇黃少陵詩似史記太白詩似莊子不似而實似也東坡詩似太白黃陳詩似少陵似而又不似也象山評論江西詩𣲖象山先生有謝程帥惠江西詩𣲖一書論古今詩體甚備其書曰䝉貺江西詩𣲖一部二十家異時所欲尋繹不能致者一旦充屋盈几應接不暇名章傑句焜耀心目詩亦尚矣原於賡歌委於風雅風雅之變擁而溢焉者也湘纍之騷又其流也子虛長楊之賦作而騷幾亡黃初而降日以澌薄惟彭澤一原來自天稷與衆作殊趣而淡泊平夷玩嗜者少隋唐之間否亦極矣杜陵之出憂君悼時追躡騷雅而才力宏厚足鎮浮靡詩家為之中興自此以來作者相望至豫章而益大肆其力包含欲無外搜抉欲無祕體制通古今致思極幽渺貫穿馳騁工力精到一時如陳徐韓吕三洪二謝之流翕然宗之江西遂以詩社名天下雖未極古之原委而其植立不凡斯亦宇宙之竒詭也開闢以來能自表見於世若此者如優曇花時一見耳曽無幾時而篇帙浸逸殘編斷簡往往下同㑹計之籍放棄於鼠壤醬瓿悲哉網羅搜訪出隋珠和璧於草莽泥滓中而登之篋櫝干霄照乘神明煥然執事之功何可勝贊是諸君子當相與舞忭於斗牛之間挹箕翼以為主人壽某亦江西人也敢不重拜寵按漁隱叢話載詩人玉屑云吕居仁近時以詩得名自言傳衣江西嘗作宗𣲖圖自豫章以降列陳師道潘大臨謝逸洪芻饒節僧祖可徐俯洪朋林敏修洪炎汪革季錞韓駒李彭鼂沖之江端本楊符謝薖夏傀林功潘大觀何覬王直方僧善權髙荷合二十五人以為法嗣謂其原流皆出豫章也其宗𣲖圖序數百言大略云唐自李杜之出焜耀一世後之言詩者皆莫能及至韓栁孟郊張籍諸人激昻奮厲終不能與前作者並元和以降至國朝歌詩之作或傳者多依效舊文未盡所趣惟豫章始大出而力振之抑揚反覆盡兼衆體而後學者同作並和雖體制或異要皆所傳者一豫故録其名字以遺來者余竊謂豫章自出機杼别成一家清新竒巧是其所長若言抑揚反覆盡兼衆體則非也元和至今騷翁墨客代不乏人觀其英詞傑句真能發明古人不到處卓然成立者甚衆若言多依效舊文未盡所趣又非也所列二十五人其間知名之士有詩句傳於世為時所稱道者止數人而已其餘無聞焉亦濫登其列居仁此圖之作選擇弗精議論不公豫是以辨之觀漁隱叢話載江西詩𣲖共二十五人并吕居仁為二十有六與陸象山所云二十家者其數不同議論亦異但象山先生以理學巨儒評論風雅正㫖自是學者所宗水村公有云涪翁集厥大成冠冕千古而淵深廣博自成一家合觀之可得其指歸矣附録漁隱叢話一則於此以俟識者論定焉四詩類苑前卷嘗載西園先生傅公幼安碩學雄文風動一時而古賦尤佳蓋已録其數篇矣因記景定中公取二陵坡谷四家之詩分門編類繡梓流傳名之曰四詩類苑自製一序頗為辨博當世有識夸其能言公嘗以寄豫豫每喜誦之亂離奔竄竟失其本近從其子叔敬再求得之時公已病矣叔敬復豫書有曰承索老人所著詩苑序謹用納呈閣下著書立言為世矜式衆方膠擾於利害之場驅馳於禍福之境所謂吉未獲一而凶悔吝居其三閣下乃敖睨一世尚友千古非今人所可跂及老人令拜意當此五官四體無一非病視文章恍如隔世儻因宗工巨儒表而出之以得不朽豈非大幸叔敬此書蓋今年八月也越兩月而聞此老一疾亡矣得年八十有四知已淪沒前輩凋零俯仰昔今為之隕涕此序不忍棄為録於左發於情性之真本乎王道之正古之詩也自風雅變而騷騷而賦賦在西京為盛而詩蓋鮮故當時文士咸以賦名罕以詩著然賦亦古詩之流六義之一也司馬相如賦上林雄深博大典麗俊偉若萬間齊建非不廣袤而上堂下廡具有次序信矣詞賦之祖乎揚子雲學貴天人太𤣥法言與六經相表裏若甘泉諸賦雖步趨長卿而雄渾之氣溢出翰墨外則子雲無之他日自悔少作或出於是至若王荆公謂賦擬相如為未工朱文公又謂雄賦止能填上腔子豈以其文之不工記之不博哉正以其追逐模擬其氣索耳自後作者繼出各有所長然於組織錯綜之中不礙縱橫竒逸之勢則左太冲之賦三都視相如尚庶幾焉當時文士皇甫士安則為之序劉淵林張孟陽則為之注夫文人相輕從古而然而一時巨擘皆左袒斂衽精金良玉自有定價豈待時改世易而後有顧君與談不及見之恨哉建安以來詩復盛行歷宋齊梁陳其流之末束字數十逞豔誇妍體狀於風雲月露之間求工於浮聲切響之末而詩弊矣逮至少陵博極書史歷覽山川以其閎材絶識籠九有獵衆智挫萬物而發之毫端凌厲馳驟與長卿相上下宋朝之詩金陵坡谷三大家或以其精或以其博或以其雅體雖不同而氣壯語渾同出於杜此則詩之正𣲖也昔元微之於子美詩欲條析其文體别相附而未暇僕妄竊此意擷萃英華以門分類合四詩為一名之曰四詩類苑或曰子嘗辨春秋制度疆理以明君臣夷夏之大義亦既上徹乙覽今瑣碎編類之書似非用力於通經學古者之所務也僕曰不然少陵愛君憂國食息不忘金陵清德實行不徇流俗東坡髙風峻節窮逹不移山谷孝友清修行已有恥珠璣咳唾隨處發見皆可為世模範豈可與敲推句字描貌淺易者比哉矧其紀時世之盛衰述政治之􅍇惡評人物之髙下商古今之得失制度興廢於焉而究風俗汚隆於焉而考隨其門目粲然可觀吟哦諷咏浸潤優悠自四詩之𣲖以遡三百篇之正孰謂其無益於世道也哉景定壬戌旴江傅自得序評本之詩豫嘗於故篋斷簡中見有評詩者曰李文叔云出乎江西則未免狂怪傲僻而無櫽括之妙入乎江西則又腐熟竊襲而乏警拔之意今本之之詩以警拔之意而寓之以櫽括之妙蓋已見其能去二者之病矣其於江西之宗殆入而能出者邪此說亦是用功於詩者而後能言之然不知所謂本之者何如人也其詩云一篙春水滑無聲一葉輕舟過短亭飛藹晚樓迷紫翠夕陽孤塔認丹青懷人逺折三花樹何日相攜雙玉瓶欲喚漁郎問風色鳬鷖飛處酒初醒味淺近而句穩熟也桂舟評論桂舟諶先生祐為人作詩序略曰詩云窈渺與兵法同以詩學詩程衛尉之正部曲行伍不以詩學詩霍將軍顧方略何如耳因知亞夫不出淮隂乃竒初不必堂堂正正此為鵝鸛此為魚麗而兵書腹笥自可以當百二山河據髙屋建瓴否則羽棄關險而都彭城雖控弦被甲一怒自可以怯樓煩走赤泉然不知身為降虜久矣屈原宋玉略少和聲尚非聖處彼春草池塘澄江淨練又焉得涉吾地乎義有序略曰詩本於人情關於風教繫於安危理亂此作詩之原委也八音克諧無相奪倫此作詩之音調也秋水芙蓉春城草木此作詩之態度也梅花灞水宫燭驪山此作詩之興致也讀書萬卷下筆有神此作詩之本領也然亦必有為而作有關涉而作若無病而呻吟雖奔濤走石沿葉倡條動可人心於道何補又序律詩有曰詩有律古矣后䕫典樂律和聲是詩之律已見於三代之前漢以黃鍾為律本協音律作詩樂是詩之律又見於三代之後惜漢魏降至陳隋亡國之音著而詩之律已絶響悲夫經幾百年而後風飄律吕律中鬼神始振響於浣花溪上杜牧諸賢又復振遺響於開元天寶之後元和以來詩之律始大備於唐矣嘗謂五十六字乃一篇有韻之文分寸節度有一字位置不安即不純熟此又隂有合五音六律自然之妙也又作自編唐律詩序有曰詩謂之律則必如月令之律氣候不差乂如牧野之六伐七伐如楚子之左廣右廣如養叔之射一矢復命州綽之射兩矢夾脰然後可謂之律又必如淮隂之出井陘亞夫之壁昌邑如大將軍之翼繞丐奴李臨淮之號令一新風雲百倍然後可謂之律故曰師出以律否臧凶茍合乎律則豈獨棘端可以扞矢月寒并州出塞入塞直可以卻胡騎而律其神矣否則街亭之戰而已耳陳濤斜之戰而已耳僕於五七言古間執燧象以奔吳師獨於律有憾未能入壘折馘空負時光於是大合工部而下凡數百家陳觀龍蛇勢决竒正然後知唐世尚律一炬可攻連營强弩不穿魯縞優劣可得而論矣又曰三箭天山長歌漢關律之上也踏雪入蔡夜縛狂吳亦律之上笛裏關山兵前草木律之上也六矢中面軍容若神亦律之上兵事易言出鋭輕搏次之盡燒奚帳分築漢城次之千金馬鞍百金刀頭次之氣凌三軍躍馬奪矟又次之老將一失律清邊生戰場斯乃下矣至若燒蜜調蜂翦花挑蝶是謂蕩人心之甚者宜斬二美人以肅軍隊不然尚可謂之律耶又詩序有曰謂三百五篇之後無詩則甲子書年閏月初吉何尚見於柴桑杜曲謂三百五篇之後有詩則玉樹後庭名花傾國何尚見於結綺沈香蓋詩有關於世道久矣今吾雖不得飽食安步以從容乎江漢美化之域終不容紫色蛙聲得乘間以奪朱亂雅使後世復有尚友千古者出謂此功不在距楊墨下則豫之不合於今世者未必真不合也以上皆桂舟文稿中摘出他記銘可讀者多不能盡録也吁公之於詩其學其識其議論其法度精且嚴如此淺夫俗子乃率然成句而謂之詩蛙蚓雜襲汚我大雅真詩道之厄也哉自知集序桂舟公古學古貌與世少可居常以寢陋期期自恨而修讀述作至老不衰今年八十有五猶時以新作見寄蠅頭楷書不減盛壯斯可敬也已僕嘗嘆公身韋布而家山林無名位聲勢以佐其文章而鄉里淺窄後輩小夫率以窮逹起愛憎故知公者少而議公者反多使二十年後此一輩掃除淨盡有見見公詩文偉麗如此必將想像其為太虛雲氣中人有恨不同時之歎者矣公嘗有自知集序曰昔之詩詩言志昔之序序作者之志顧瞻周道中心怛兮音調敷暢庸或可知彼美人兮西方之人兮雍容和平序者何以知其刺不用賢也豫以是知詩非茍作發乎情止乎禮義序非茍作以意逆志是為得之然獨釣寒江孤舟簔笠或者謂不如大堤女兒清晨理鬢朱弦疏越三歎遺音或者謂不如桑間濮上聽者傾城則詩何詩序何序被髮伊水之祭識者寧不有感於斯韓將軍破趙會食無不竊笑及斬成安君泜水上然後知背水陳合古兵法服耕子無勢可挾無利可求無聲華可獵清霜㸃鬢黃獨無苖世所擯也宜矣然亦强項不屑與舞陽侯伍自名其詩自序其意風松晝寒月鶴夜警時於是間抵掌自詭近來漸喜無人聽琴格髙低祗自知服耕子得矣後五日有能識常山蛇勢於平沙上者服耕子又當語之曰左執鞭弭右屬櫜鞬當與君周旋但不得走生仲達耳讀此序則先生之不求知於人人亦不相知者概可見矣作序時淳祐丁未嵗也是時年才三十有五而學力筆力已如許我輩沈薶場屋時文中卒無片語登峰造極視先生不愧死哉服耕子蓋其别號也方紫陽序詩方紫陽序羅壽可詩曰詩學晚唐不自四靈始宋剗五代舊習詩有白體崑體晚唐體白體如李文靖徐常侍昆仲王元之王漢謀崑體則有楊劉西崑集傳世二宋張乖崖錢僖公丁崖州皆是晚唐體則九僧最迫真寇萊公魯三變林和靖魏仲先父子潘逍搖趙清獻之父凡十家深涵茂育氣勢極盛歐陽公出而一變為李太白韓昌黎之詩蘇子美二難相為頡頏梅聖俞則宋詩之出類者也晚唐於是退舍蘇長公踵歐陽公而起王半山備衆體精絶句古五言或追陶謝黃雙井專尚少陵秦鼂莫窺其籓張文潛自然有唐風别成一家惟吕居仁克肖陳后山棄所學學雙井黃極廣大陳極精微天下之人北面矣立為江西𣲖之說者銓取或不盡然胡致堂詆之陳簡齊曽文清為渡江之巨擘乾淳以來尤范楊陸蕭其尤也道學宗師於書無所不通於文無所不能詩其餘事而髙古清徑又有一朱文公嘉定而降稍厭江西永嘉四靈復為九僧舊晚唐體非始於四靈也後生晚進不知顛末靡然宗之涉其波而不究其原日淺日下然尚有餘杭二趙上饒二泉典刑未泯今學詩者不於三千年間上溯下沿窮探邃索往往追逐近世六七十年間之所偏約非區區所敢知也清江羅君志仁壽可介吾師友自堂陳公書囊詩百篇見教自謂改學四靈後村細讀深味詩律未脫江西有崑體意崖岸骨鯁似與趙紫芝諸人及劉後村不同故豫詳道詩之所以然為序以遺之謂豫不信壽還東湖復以參自堂可也此序剖析明白議論自出有前輩所未曽道者又間有未盡當理者然世之作詩者有此見能為此言蓋亦寡矣紫陽一號虛谷名回追憶似是嚴陵人景定中為别院省元出吕氏門下德祐事急時嘗上書陳十事乞斬賈似道謝天下覺得是一磊落士也自堂亦出吕門故相知如此張藝叟詩評張藝叟舜民嘗評詩云永叔之詩如春服乍成撥醅初熟登山臨水竟日忘歸王介甫之詩如空中之音相中之色人皆聞見難可著摹石延年詩如饑鷹夜歸崖木春拆蘇東坡詩如武庫初開矛㦸森然一一求之不無利鈍梅聖俞詩如深山道人草衣木食王公見之不覺屈膝郭功甫詩如大排筵席二十四味終日揖遜求其適口者少矣藝叟與東坡同時仕宦然不聞盛名亦不見有何偉作今閲此評似非碌碌者也東坡實見東坡晚年在海上不觀他人詩惟以陶栁集自隨豈非世慮盡而實見定歟諸賢挽詞山谷翁作司馬文正公挽詞后山作南豐先生挽詞水心作髙孝兩朝挽詞皆超軼絶塵誠可對壘後又見韓文公作莊憲太后挽詞甚妙隱居通議卷六
