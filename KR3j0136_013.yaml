body:
  text: 隱居通議卷十三元劉塤撰文章一古今類編古今類編詩文如梁之文選唐之文粹宋之文鑑雖萹帙浩博可以考見纍朝文字之盛然俱無統紀至近世真文忠公編類文章正宗分為四門曰辭命曰議論曰叙事曰歌詩去取有法始為全書足以垂訓不朽如宋初編文苑英華之類尤不足採或謂當時削平諸僭其降臣聚朝多懷舊者慮其或有異志故皆位之館閣厚其爵祿使編纂羣書如太平御覽廣記英華諸書遲以嵗月困其心志於是諸國之臣俱老死文字閒世以為深得老英雄法推為長䇿以豫觀之是惟無英雄爾果有英雄此何足以束縳之彼以翻閲故紙尋行數墨者謂之英雄寧不足笑耶當時如江南徐鉉號為辨士之雄然猶不能使其國之不亡孰謂既亡之後猶能逞異志而使亡者復存邪此好議者之過也又如文選諸詩乃昭明太子一時偶取入集初非立體而後世作詩者乃創立一名曰此為選體尤非確論政事堂記唐李華作政事堂記曰政事堂者君不可以枉道於天反道於地覆道於社稷無道於黎元此堂得以議之臣不可以悖道於君逆道於人黷道於貨亂道於刑克一方之命變王者之制此堂得以易之兵不可以擅興權不可以擅與貨不可以擅蓄王澤不可以擅奪君恩不可以擅閒私仇不可以擅報公爵不可以擅私此堂得以誅之事不可以輕入重罪不可以生入死法不可以剝害於人財不可以擅加於賦情不可以委之於幸亂不可以啓之於前伐紊不賞削紊不封聞荒不救見饉不矜逆諫自賢違道傷古此堂得以殺之故曰廟堂之上樽俎之前有兵有刑有挺有刃有鈇鉞有鴆毒有夷族有破家登此堂者得以行之故伊尹放太甲之不嗣周公誅管蔡之不義霍光廢昌邑之亂梁公正廬陵之位自君弱臣強之後宰相主生殺之柄天子掩九重之耳燮理化為權衡論道變為機紐傾身禍敗者不可勝數列國有𫝊青史有名可為終身之戒母罪斯記云此記峻潔嚴健足稱名筆非後世時文語可及也華之名迹不甚大顯然此篇與弔古戰場文俱可𫝊誦涪縣學記自孔子沒到今千六百有餘嵗然而道不離乎五常文不違乎六經夫子當衰周之際羣三千之徒異能之士踰七十人焉子路最長少孔子九嵗耳顔子生後孔子三十年而父子嘗各異時事孔子楚人公孫龍者最少少孔子五十有三嵗不知當時凡事孔子者長少並列所見何學所慕何事陳蔡之圍至七日不火食而弦歌不衰孔子沒子貢廬于塜者六年然後去弟子及魯人從而家者百有餘室𫝊數世而諸儒講禮鄉飲大射必於其家廟習焉逮楚兵爭魯微甚矣終為守節禮義之國漢王欲引天下兵加之卒不敢而反禮之然則孔氏之教狂簡之遺風也而可以僞為哉夫知道者於文必知文固學之餘事也而今方以為病何也以上乃蜀中涪縣學記論孔門大學一節頗有淵源忘其誰作謾録偹覽歐公文體歐公文體溫潤和平雖無豪健徑峭之氣而於人情物理深婉至到其味悠然以長則非他人所及也嘗見其天聖明道間有一書與富文忠公責其久不寄書曰彥國自西歸於今已踰月無由一致書蓋相别後患一大疽為苦久之不暇求西人行者然亦時時有客自西來獨怪彥國了無一書又疑其人不的於假氏僕夫來致幾道書此人最的宜有書又無然後果可怪也始與足下别時屢邀聖俞語雖書者於朋友間不以疏數為厚薄然既不得羣居相笑語盡心有此猶足以通相思知動靜是不可忽茍不能具寸紙數行亦可易致則可頻致猶勝都不致也當時相顧切切要約如此謂今别後宜馬朝西而書夕東也不意足下自執牛耳登壇先㰱降壇而吐之何邪平生與足下語思欲力行者事何限此尺寸紙為俗纍牽之尚不能勉強向所云云使僕何望哉洛陽去京為僻逺孰與絳之去京師也今尚爾至絳又可知矣自相别後非見聖俞無可語者思得足下一書不翅饑渴故不得不忉忉也此書非特曲盡事情而當時朋友真切之意尚可想見跋華嶽題名公又有跋華嶽題名碑寓意感慨讀之令人凄然其文曰右華嶽題名自唐開元二十三年訖後唐清泰二年實二百一年題名者五百一人再題者又三十一人往往當時知名士也或兄弟同遊或子姪並侍或寮屬將佐之咸在或山人處士之相攜或奉使奔命有行役之勞或窮髙望逺極登臨之適其富貴貧賤歡樂憂悲非惟人事百端而亦世變多故開元二十三年丙子是嵗天子耕籍田肆大赦羣臣方頌太平請封禪蓋有唐極盛之時也清泰一年乙未廢帝篡立之明年也是嵗石敬瑭以太原反召契丹入自雁門廢帝自焚于洛陽而晉髙祖入立蓋五代極亂之時也始終二百年間或治或亂或盛或衰而往者來者先者後者雖窮達夀夭參差不齊而斯五百人者卒歸於共盡也其姓名嵗月風霜剝裂亦或在或亡其存者獨五千仞之山石爾故特録其題刻每撫卷慨然何異臨長川而歎逝者也治平元年清明後一日書跋華陽頌公跋唐華陽頌攻破佛老之語尤為有理其詞曰右華陽頌唐𤣥宗詔附元宗尊號曰聖文神武皇帝可謂盛矣而其自稱曰上清弟子者何其陋哉方其肆情奢淫以極富貴之樂蓋窮天下之力不足以贍其欲使神仙道家之事為不無亦非其所可冀矧其實無可得哉甚矣佛老之為世惑也佛之徒曰無生者是畏死之論也老之徒曰不死者是貪生之說也彼其所以貪畏之意篤則其棄萬事絶人理而為之然而終于無所得者何哉死生天地之常理畏者不可以茍免貪者不可以茍得也惟積習之久者成其邪妄之心佛之徒有臨死而不懼者妄意乎無生之可樂而以其所樂勝其所可畏也老之徒有死者則相與諱之曰彼超去矣彼解化矣厚自誣而託之不可詰或曰彼術未工故死爾前者茍以遂其非後者從而惑之以為誠然也佛老二者同出於貪而所習則異然必由棄萬事絶人理而為之其貪於彼者厚而捨於此者果若元宗者既溺於此又慕於彼不勝其勞真可笑也跋等慈寺碑跋顔師古等慈寺碑亦論佛老之惑曰右等慈寺碑顔師古撰其寺在鄭州汜水唐太宗破王世充竇建德乃於其戰處建寺云為陳亡士薦福唐初用兵破賊處多大抵皆造寺自古創業之君其英豪智略有非常人可及者矣至其卓然信道而知義則非積學誠明之士不能到也太宗英雄智識不世之主而牽惑習俗崇信浮圖豈以其言浩博無窮而好盡物理為可喜邪蓋自古文姦言以惑聽者雖聰明之主或不能免惟其可喜乃能惑人故豫於本紀譏其牽於多愛者謂此也跋昭仁寺碑跋幽州昭仁寺碑曰右昭仁寺碑在幽州唐太宗與薛舉戰處也唐自起義與羣雄戰處後皆建佛寺云為陳亡士薦福湯武之敗桀紂殺人固亦多矣而商周享國各數百年其荷天之祜者以其心存大公為民除害也唐之建寺外雖託為戰亡之士其實自贖殺人之咎耳其撥亂開基有足壯者反區區於此不亦陋哉碑文朱子奢撰而不著書人名氏字畫甚工此豫所録也治平甲辰秋分後一日書跋晉帖跋晉帖議論亦佳其說曰右王獻之法帖豫嘗喜覽魏晉以來筆墨遺蹟而想前人之髙致也所謂法帖者其事率皆弔哀候病叙暌離通訊問施于家人朋友之間不過數行而已蓋其初非用意而逸筆餘興淋漓揮灑或妍或醜百態橫生披卷發函爛然在目使人驟見驚絶徐而視之其意態愈無窮盡故使後世得之以為竒玩而想見其人至于髙文大冊何嘗用此而今人不然至或棄百事弊精疲力以學書為事業用此終老而窮年者是真可笑也此論亦犂然當于人心半山總評我宋盛時首以文章著者楊億劉筠學者宗之號楊劉體然其承襲晚唐五代之染習以雕鐫偶儷為工又號曰西崑體歐陽公惡之嘉祐中知貢舉思革宿弊故文涉浮靡者一皆黜落獨取深醇渾厚之作一時士論雖譁而文體自是一變漸復古雅南豐曽文定公臨川王荆公皆歐公門下士也繼出而羽翼之天下更號曰江西體論遂以定一時宋文遂與三代同風同時劉原父亦善為古文其作禮記補亡儼然迫真也他作比曽王二公則不及因讀荆公集愛其數篇抑揚有味簡古而蔚慮或亡失因録之杜詩後集序豫考古之詩尤愛杜甫氏作者其詞所從出一莫知窮極而病未能學也世所𫝊已多計尚有遺落思得其完而觀之然每一篇出自然人知非人之所能為而為之者惟甫也輒能辨之豫之令鄞客有授豫古之詩世所不𫝊者二百餘篇觀之豫知非人之所能為而為之實甫者其文與意之著也然甫之詩其完見於今者自豫得之世之學者至于甫而後為詩不能至要之不知詩焉爾嗚呼詩其難惟有甫哉自洗兵馬下序而次之以示知甫者且用自發焉靈谷詩序靈谷詩序曰吾州之東南有靈谷者江南之名山也龍蛇之神虎豹翬翟之文章楩楠豫章竹箭之材皆自山出而神林鬼塜螭魅之穴與夫仙人釋子恢譎之觀咸附託馬至其淑靈和清之氣盤薄鬱積于天地之間萬物之所不能得者乃屬之於人而處士君實生其址君姓吳氏家于山址豪傑之望臨吾一州者蓋五六世而後處士君出焉其行孝弟忠信其能以文學知名於時惜乎其老矣不得與夫虎豹翬翟之文章楩楠豫章竹箭之材俱出而為用于天下顧藏其神竒而與龍蛇雜此土以處也然君浩然有以自養遨遊于山川之間嘯歌謳吟以寓其所好終身樂之不厭而有詩數百篇𫝊誦於閭里他日出其靈谷三十二篇以屬其甥王安石曰為我讀而序之惟君之所得蓋有伏而不見者豈特盡於此詩而已雖然觀其鑱刻萬物而接之以藻繢非夫詩人之巧者亦孰能至於此此篇蓋放韓文送廖道士序張刑部詩序刑部張君詩數十篇明而不華喜諷道而不刻切其唐人善詩者之徒歟君並楊劉生楊劉以其文辭染當世學者迷其端原靡靡然窮曰力以摹之粉墨青朱顛錯叢厖無文章黼黻之序其屬情藉事不可考據也方此時自守不汚者少矣君詩獨不然其自守不汚者邪子夏曰詩者志之所之也觀君之志然則其行亦自守不汚者邪豈惟其言而已畀豫詩而請序者君之子彥博也彥博字文叔為撫州司法還自揚州識之日與之接云慶厯三年八月日序此序深言崑體之弊祭曽博士文嗚呼公以罪廢實亦不幸卒困以夭亦惟其命命與才違人實知之名之不幸知者為誰公之閭至宗親黨友雖知公名於實無有嗚呼公初公志如何孰云不諧而厄孔多地大天穹有時而毁星日脫敗山傾谷圯人居其間萬物一偏固有窮通世數使然至其夀夭尚何憂喜要之百年一蛻以死方其生時窘若囚拘其死以歸混合空虛以生易死死者不祈惟其不見生者之悲公今有子能隆公後惟彼生者可無甚悼嗟理則然其情難忘哭泣馳辭往侑奠觴此文言死生之理辭意殊妙千古不易也曽博士當是南豐先生之父名易占官至太常博士隱居通議卷十三
