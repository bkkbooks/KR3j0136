body:
  text: 隱居通議卷二十四元劉塤撰經史一姚崇言十事唐𤣥宗初即位召申州刺史姚崇欲以為相崇至帝方獵渭濱即召見帝曰公知獵乎對曰少所習也帝說與俱馳逐緩速如㫖既罷乃咨天下事曰卿宜遂相朕崇知帝大度鋭於治乃先設事以堅帝意即佯不對帝怪之崇因跪奏臣願以十事聞陛下度不可行臣敢辭此一節先儒議之謂姚崇先設十事要君失人臣體愚以為崇所陳十事皆關係國家大政初無私意君臣交際之初以誠要約他日各踐其言克全始終豈非美事又何失體之有今觀崇所奏十事曰垂拱以來以峻法繩下臣願政先仁恕可乎朝廷覆師青海未有牽復之悔臣願不幸邊功可乎比來壬佞冒觸憲網皆得寵自解臣願法行自近可乎后氏臨朝喉舌之任出閹人之口臣願宦豎不敢任政可乎戚里貢獻自媚於上公卿方鎮寖亦為之臣願租賦外一絶之可乎外戚貴主更相用事班序荒雜臣請戚屬不任臺省可乎先朝䙝狎大臣虧君臣之嚴臣願陛下接之以禮可乎燕欽融韋月將以忠被罪自是諍臣沮折臣願羣臣皆得批逆鱗犯忌諱可乎武后造福光寺上皇造金􅋖玉真二觀費百巨萬臣請絶道佛營造可乎漢以祿莽閻梁亂天下國家為甚臣願推此鑒戒為萬世法可乎帝曰朕能行之崇乃謝翌日拜相封梁國公遷紫微令如上十事皆關係國體君德之大者真宰相之言使𤣥宗始終信用何至啓播遷之禍耶非特當時行之有益雖後世明主謹此十事亦足致治而以要君議崇迂矣張良言八事史載漢三年項羽急圍漢王滎陽漢王恐憂與酈食其謀撓楚權食其曰昔湯伐桀封其後於杞武王伐紂封其後於宋今秦失德棄義侵伐諸侯社稷滅六國後使無立錐之地陛下誠能復立六國後世畢已受印此其君臣百姓必皆戴陛下之德莫不嚮風慕義願為臣妾德義已行陛下南嚮稱霸楚必斂袵而朝漢王曰善趣刻印先生因行佩之食其未行張良從外來謁王方食曰子房前客有為我計撓楚權者具以酈生語告子房曰何如良曰誰為陛下畫此計者陛下事去矣漢王曰何哉張良對曰臣請借前箸為大王籌之曰昔湯伐桀而封其後於杞者度能制桀之死命也今陛下能制項籍之死命乎曰未能也其不可一也武王伐紂封其後於宋者度能得紂之頭也今陛下能項籍之頭乎曰未能也其不可二也武王入殷表商容之閭釋箕子之囚封比干之墓今陛下能封聖人之墓表賢者之閭式智者之門乎曰未能也其不可三也發巨橋之粟散鹿臺之錢以賜貧困今陛下能散府庫以賜貧窮乎曰未能也其不可四矣殷事已畢偃革為軒倒置干戈覆以虎皮以示天下不復用今陛下能偃武修文不復用兵乎曰未能也其不可五矣休馬華山之陽示以無所為今陛下能休馬無所用乎曰未能也其不可六矣放牛桃林之隂以示不復輸積今陛下能放牛不復輸積乎曰未能也其不可七矣且天下游士離親戚棄墳墓去故舊從陛下游者徒欲日夜望咫尺之地今復六國立韓魏燕趙齊楚之後天下游士各歸事其主從其親戚反其故舊墳墓陛下孰與取天下乎其不可八矣且夫楚唯無疆六國立者復撓而從之陛下焉得而臣之誠用客之謀陛下事去矣漢王輟食吐哺罵曰豎儒幾敗而公事令趣銷印此一事世論皆推良善籌䇿以愚參詳其事有難盡信者且八事之中多漢王所能行如表閭封墓發粟散財寬仁大度之主所優為而謂之不能何也偃革倒戈歸馬放牛乃滅殷以後事今楚漢相持正是兵鋒之交而言及此曽不顧其為迂何也其必不可能者惟有制籍之命得籍之頭而其必不可易之論則六國立游士各歸事其主此合於理無可疑者餘未敢盡信也聽言之道當以事觀史亦豈盡實録乎史載髙帝崩陳平自樊噲軍馳至宫哭甚哀因奏事喪前吕太后哀之曰君勞出休矣平畏讒之就因固請得宿衛中太后乃以為郎中令曰傅教孝惠按是時惠帝甫即位安得有諡今吕后稱孝惠即見史之謬誤也左傳云陳桓公有寵於王正類此魯仲連傳載魏新垣衍說趙王曰秦欲求為帝趙誠發使尊秦昭王為帝秦必喜且是時昭王在位正謀稱帝豈得有諡乎吾故曰史非盡實録也古書患不考究爾若著意采索折之以理其間可議者何限宇宙快事周瑜蹙曹操謝𤣥走苻堅唐莊宗破夾寨周世宗捷髙平皆能以亡為存以危為安以敗為勝竒偉英特照耀千古讀史至此令人意氣飛動宇宙問一大快事也嘗欲合此數事類編名之曰古今快意集時一覽觀足激懦志其次如韓信破齊趙光武破尋邑劉裕北伐郭子儀見虜王晏球敗契丹凡以弱勝强出人意表者皆可附見事㑹無終極曹氏父子方謀篡漢不知司馬懿父子已在其側蓋事會之無終極如此昭烈霸業漢昭烈能不忘劉表而不能不背劉璋此一事未免為盛德之纍故坡翁詩曰先主反劉璋兵意頗不義孔明古豪傑何乃為此事璋無得罪於蜀民其亡有足哀者故昭烈之取之也亦遲回不忍及迫於羣言然後圖之亦可見天理之在人心矣璋之失在知人不明聽言不審法正張松能謀而不用黃泉王纍劉巴善諫而不聽嚴顔盡忠而不使其亡宜矣孔明王佐之才至此乃狥詐力者亦以昭烈奔走狼狽無地駐足急欲求止泊處故為此舉爾蓋昭烈霸業至此而後定漢唐弱主伸法漢唐末造多弱主不足稱然如和帝之誅竇憲代宗之誅元載德宗之貶常衮一時快事殊起人意有英主所不能為者未易以弱主少之也憲之誅於當時尤難生人婦髙宗皇帝嘗閲奏案有生人婦三字顧問輔臣時湯思退以博學宏詞科進為宰相因對曰生人婦出三國志杜畿𫝊上歎其博記今觀陳壽魏志杜畿𫝊不載正𫝊乃裴注中所載魏略曰初畿在郡魏武帝擢畿為河東太守被書録寡婦是時他郡或有己自相配嫁依書皆録奪啼哭道路畿但取寡者故所送少及趙儼代畿而所送多文帝問畿前君所送少今何多也畿對曰臣前所録皆亡者妻今儼送生人婦也帝及左右顧而失色先主德量陳壽評蜀先主曰先主𢎞毅寬厚知人待士蓋有髙祖之風英雄之器焉及其舉國託孤於諸葛亮而心神無二誠君臣之至公古今之盛軌也機權幹略不逮魏武是以基宇亦狹然折而不撓終不為下者抑揆彼之量必不容己非惟競利且以避害云此評殊公足以盡昭烈之平生武侯惜赦華陽國志曰諸葛亮為丞相時有言公惜赦者亮答曰治世以大德不以小惠故匡衡吳漢不願為赦先帝亦言吾周旋陳元方鄭康成間每見啓告治亂之道悉矣曽不語赦也若劉景升李玉父子嵗嵗赦宥何益於治此數語甚偉非惟可見先主君臣論治之懿亦因是知先主與元方康成周旋固有得於儒者之論豈止專於武略而已哉北地王守節譙周勸後主降鄧艾北地王諶怒曰若理窮力屈禍敗必及便當父子君臣背城一戰同死社稷以見先帝可也後主不納遂送璽綬是日諶哭於昭烈之廟先殺妻子而後自殺左右無不為涕泣者禪既降魏司馬師與之宴為作故蜀技旁人皆感愴而禪喜笑自若師謂賈充曰人之無情乃可至於是乎雖使諸葛在不能輔之久全而况姜維耶充曰不如是殿下何由并之他日師問禪曰頗思蜀否禪曰此間樂不思蜀也郤正聞之求見禪曰若王後問宜泣而答曰先人墳墓逺在隴蜀乃心西悲無日不思因閉其目㑹王復問對如前王曰何乃似郤正語邪禪驚視曰誠如尊命左右大笑以上出漢晉春秋嗚呼若諶者可謂忠臣孝子死社稷者矣禪之庸如此何足負荷人言劉景升兒子豚犬以禪方琮抑又甚焉誰謂𤣥德英雄而生子乃若是哉譙周逆賊千古共憤之武侯子孫忠節諸葛亮嘗自表後主曰成都有桑八百株田十五頃子弟衣食自有餘饒至於臣在外任無别調度隨身衣食悉仰於官不别治生以長尺寸若臣死之日不使內有餘帛外有贏財以負陛下及卒如其言嗚呼讀孔明此表可謂不負人主矣彼胡椒八百斛者宜其遺臭萬世也亮子瞻字思逺景耀六年鄧艾伐蜀瞻督諸軍至涪拒艾前鋒破退駐綿竹艾遺書誘瞻曰若降者必表為琅邪王瞻大怒斬艾使遂戰大敗臨陳死時年三十七瞻子尚歎曰父子荷國重恩不早斬黃皓以致傾敗用生何為乃馳赴魏軍而死武侯有子有孫如此此所以為武侯歟通鑑帝魏綱目黜魏司馬文正公作通鑑於三國帝魏而以吳蜀附之世病其非然其說非始於司馬公也朱文公作綱目則黜魏而直以昭烈上繼獻帝世許其正然其說非始於文公也按陳壽在蜀仕屢見黜父又為諸葛武侯所髠實於劉氏有私憾其著三國志故以魏為帝而指漢曰蜀遂與孫氏俱謂之主通鑑帝魏因壽史爾然夀死未幾習鑿齒作漢晉春秋起漢光武終晉愍帝以蜀為正以魏為篡謂漢亡僅一二年則已為晉炎興之名天實命之晉武帝名炎而後主年號也其書五十四卷徒見於唐藝文志及宋朝太平御覽之目逮仁宗時修崇文總目其書已逸惟晉史載所著論千三百餘言大㫖昭然唐劉知幾史通云備王道則曹逆而劉順宋朝歐陽公論正統主於帝魏其賔客章望之著明統論非之見於國史南渡後張寧公栻作經世紀季直以先主上繼獻帝為漢而附魏吳於下方綱目黜魏因此諸說爾壽曲筆以報父仇卑蜀特甚凡當時祫祭髙帝以下昭穆制度皆略弗書慶元間有廬陵士人蕭常潛心史學謂古以班固史為漢書范曄史為後漢書乃起昭烈帝章武元年辛丑盡少帝炎興元年癸未為續後漢書帝紀年表各二卷列𫝊十八卷吳載記十一卷魏載記九卷既正其名復擇著文之善者并書之别為音義四卷論者謂常著此書殊善惜乎夀疏略於前使常不得追記當時英賢憲章以備見一代之制云周恭帝禪位詔五代開皇紀載恭帝禪位詔與宋朝太祖實録所載無一字同殆史官改易元本乃知盡信書不如無書南唐諸臣死節南唐三主烈祖元宗後主本紀三卷列傳自宋齊丘至髙麗十五卷通十有八卷不著作者氏名然考叙論有曰政和中先君會稽公為淮西常平使者又曰乾道淳熙間豫游蜀在成都則疑出於放翁陸氏筆也蓋陸農師佃曽宦淮西而乾淳間放翁以石湖范公辟為成都府通判是以疑之南唐偏方狹境政體柔弱故其書亦淺蹙無以激發人英特壯偉之氣獨其四十年間忠臣節士相望死國如我祖忠肅公以守壽春死孟堅以力戰福州死張彥卿以力守楚州死張雄父子八人以力戰溧水死孫忌以奉使不屈死潘佑以直諌不阿死廖居素以直諌不聽朝服赴井死李延鄒以不草降表死陳裔以不肻降附死胡則以力守江州死俱表表汗青照耀千古而其可恨者則以小國短世不得如張睢陽顔平原大顯於世爾書有徐鍇傳而無徐鉉傳不可曉其間有缺釐正修潤處暇日尚盡心焉黃石公素書前漢書載張良嘗間從容步游下邳圯上遇一老父後五日夜半出一編書曰讀是則為王者師後十年興十三年孺子見濟北穀城山下黃石即我也後十三嵗良從漢髙帝過濟北果得穀城山下黃石取而寶祠之用是書佐髙帝取天下此說近於怪誕知道君子所不信然良之事業卓冠一代非凡人所能及或者其有所受之也世多指兵書三略為黃石公所𫝊之書宋張商英曰非也晉亂有盜發子房塜於玉枕中獲此書六篇凡一千三百三十六言上有祕戒不許妄傳世所謂素書是也或又謂素書之㫖即老子道德仁義禮之說實與道德經相表裏近得其書讀之其意雖祖老子其文殊不古雅故不復録而姑載其六篇之名云原始章第一正道章第二本德忠道章第三求人之志章第四遵義章第五安履章第六六篇之中多言修身治國用人之道而不及於兵似與兵法之說不合忠肅劉公死節南唐書載我祖忠肅公仁贍死節甚著與五代史合而叙論乃曰乾道淳熙之間豫遊蜀在成都見梓橦令金君所藏周世宗除仁贍天平軍節度使告身白紙書墨色印文皆如新金君言仁贍獨一裔孫賣藥新安市客死無後故得之又曰以仁贍之忠天報之宜何如而其後於今遂絶天理之難知如此可悲也夫豫閲南唐書至此喟然嘆曰誤矣按忠肅公既死節諸子中有一子諱讚者周世宗録以為懷州刺史刺史生工曹諱希逖始來南豐葬九陂耆牛頭坑工曹生升州通判二府君諱昭葬望市嶺側冷水坑尾墳墓至今存也通判生江樓居士八府君諱元載至豫為七世孫譜系俱存然則謂之無後可乎孟子曰盡信書不如無書蓋紀載之難如此抑忠臣義士捐軀死國自以己分當然豈計後福者當是時周世宗親征臨城為公所扼多致喪失公寧保後日之不屠城舉室必盡戮寧復有後之可覬其幸而不絶者偶然耳臣子固自盡其心而天亦何心臯陶庭堅之不祀鄧伯道之無兒報應之理安有定論陸放翁老學菴筆記言親見節使告身在金宰處則叙論者即放翁也稷契世以稷契並稱按后稷乃舜時官名棄為之契則臣名也為司徒之官並稱不類揚雄傳班孟堅作揚雄𫝊傳末數語抑揚有味而讀者每忽焉王莽時劉歆甄豐皆為上公莽既以符命自立即位之後欲絶其原以神前事而豐子尋歆子棻復獻之莽誅豐父子投棻四裔辭所連及便收不請時雄校書天祿閣上天祿辟邪二石獸也治獄使者來欲收雄雄恐不能自免乃從閣上自投下幾死莽聞之曰雄素不與事何故在此間請問其故乃劉棻嘗從雄學作竒字雄不知情有詔勿問以病免復召為大夫家素貧嗜酒人希至其門時有好事者載酒肴從游學而巨鹿侯芭嘗從雄居受其太𤣥法言焉劉歆亦嘗觀之謂雄曰空自苦今學者有祿利尚不明易又如𤣥何吾恐後人用覆醬瓿也雄笑而不應年七十一卒侯芭為起墳喪之三年嚴久聞雄死謂桓談曰子嘗稱揚雄書豈能傳於後世乎談曰必傳顧君與談不及見也凡人賤近而貴逺親見揚子雲祿位容貌不能動人故輕其書今揚子之書文義至深而論不詭於聖人若使遭遇時君更閲賢智為所稱善則必度越諸子矣諸儒或譏雄非聖人而作經猶春秋吳楚之君僭號稱王蓋誅絶之罪也自雄之沒至今四十餘年其法言大行而𤣥終不顯然篇籍俱存以上皆班語詳傳首言雄少好學不為章句訓詁通而已博覽無所不見默而好深沉之思非聖哲之書不好也又曰用心於內不求於外觀此則揚之學豈尋常文墨士哉至傳末之辭乃如此則其學亦未足取重當時矣豫昔嘗觀太𤣥經雖曰準易何敢望易象山先生謂其乖錯隂陽必有所見而云子雲之揚從手不從木今漢書或作木易非是近世建昌守有揚其姓瑱其名者居婺州其姓從手易豈蜀揚後裔歟又文章家多用載酒問竒字不知載酒自一事問字自一事也合而用之誤矣按僧一行讀太𤣥經撰大衍𤣥圖及義决一卷則太𤣥未可輕議也三尺法西漢杜周傳客有謂周曰君為天下决平不循三尺法專以人主意㫖為獄獄者固如是乎周曰三尺安在哉前王所是著為律後王所是疏為令當時為是何古之法乎注曰以三尺竹簡書法律也今人常稱三尺法蓋本於此司馬遷傳司馬遷據左氏國語采世本戰國策述楚漢春秋接其後事訖於大漢其言秦漢詳矣至於采經托傳分散數家之事甚多疏略或有抵牾牾讀曰杵相觸逆也又曰抵觸也抵牾枝拄不安也牾音吾亦其涉獵者廣博貫穿經傳馳騁古今上下數千年間斯其勤矣又其是非頗繆於聖人論大道則先黃老而後六經序遊俠則退處士而進姦雄述貨殖則崇勢利而羞貧賤此其所蔽也然自劉向揚雄博極羣書皆稱遷有良史之才服其善序事理辨而不華質而不俚其文直其事核不虛美不隱惡故謂之實録以上乃漢書司馬遷傳贊語也其間指摘子長所短極是特未知孟堅所著書果無可指摘者否豫聞司馬公之序遊俠述貨殖皆有所激而抑揚之尚俟深考武五子贊班固贊武五子有曰建元六年蚩尤之旗見其長竟天後遂命將出征略取河南建置朔方其春戾太子生自是之後師行三十年兵所誅屠夷滅死者不可勝數及巫蠱事起京師流血僵尸數萬太子子父皆敗故太子生長於兵與之終始云云前輩甚取此論兩姑兩姑之間難為婦此後周楊忠語忠即堅之父也封隋公忠死堅襲爵是為隋文帝隋之亡國有二致堂胡氏寅曰隋得天下無功無德特以姿相竒偉蓋與蕭道成同而其亡國則有二焉一曰隋文以胥吏治國二曰獨孤后以妬忌治家如是而已矣然則以胥吏治國者尚其鍳於茲隱居通議卷二十四
