body:
  text: 隱居通議卷十四元劉塤撰文章二南豐先生學問濓洛諸儒未出之先楊劉崑體固不足道歐蘇一變文始趨古其論君道國政民情兵略無不造妙然以理學或未之及也當是時獨南豐先生曽文定公議論文章根據性理論治道則必本於正心誠意論禮樂則必本於性情論學必主於務內論制度必本之先王之法其初見歐陽公之書有曰明聖人之心於百世之上明聖人之心於百世之下又曰趨理不避榮辱利害其卓然絶識超軼時賢先儒言歐公之文紆餘曲折說盡事情南豐繼之加以謹嚴字字有法度此朱文公評文専以南豐為法者蓋以于其周程之先首明理學也然世俗知之者蓋寡亡他公之文自經出深醇雅淡故非靜心探玩不得其味而豫特嗜之其元豐類稿則覽之熟矣近得續稿四十卷細觀其間或多少作不能如類稿之粹豈公所自擇或學者詮次如莊子內外篇山谷內外集之分歟其間如過客論則放兩都賦如詔弟誥則放客難僮約進學解如襄陽救災記則放段太尉逸事文公謂其多摹擬古作蓋此之類又有釋疑一篇亦放西漢文字前輩謂此乃公少年慕學借此以衍習其文耳觀後聽琴序題趙充國𫝊題魏鄭公𫝊諸篇皆其妙者蓋不可及也其上李連州書十五嵗所作前集秃秃記二十五嵗所作公生於真宗天禧己未嵗至仁宗嘉祐二年丁酉及第時年三十九矣神宗元豐五年壬戌四月試中書舍人賜紫金魚袋九月二十八日母仁夀太君朱氏卒公丁憂明年癸亥四月丙辰公卒于江寧府年六十五歸葬南豐朱文公作年譜具載其本末如此秃秃記公之文源流經術議論正大然秃秃記則實自史漢中來也此記筆力髙妙文有法度而世之知者蓋鮮豫獨喜之不厭昔嘗交蜀中士大夫其論與豫合一日與范忠文家子弟評文誦此記甚習且云蜀文士多誦之余因嘆西州之士猶能知曽文之所以妙而生南豐之鄉者口耳乃未嘗及可不愧邪讀書無眼目何名為士秃秃記曰秃秃髙密孫齊兒也齊明法得嘉州司法先娶杜氏留髙密更紿娶周氏與抵蜀罷歸周氏恚齊紿告縣齊資謝得釋授歙州休寧縣尉與杜氏俱迎之官再期得告歸周氏復恚求絶齊急曰為若出杜氏祝髮以誓周氏可之齊獨之休寧得娼陳氏又納之代受撫州司法歸閒周氏不復見使人竊取其所産子合杜氏陳氏載之撫州明道二年正月至是月周氏與其弟來欲入據其署吏遮以告齊齊在寶應佛寺受租米趨歸捽挽置廡下出僞劵曰若傭也何敢爾辨于州不直周氏訴於江西轉運使不聼久之以布衣書里姓行道上乞食蕭貫守饒州馳告貫饒州江東也不當受訴貫受不拒轉運使始遣吏祝應言為覆周氏引産子為據齊懼子見事得即送匿旁方政舍又懼則收以歸扼其咽不死陳氏從旁引兒足倒持之抑其首罋水中乃死秃秃也召役者鄧旺穿寢後垣下為坎深四尺瘞其中生五嵗云獄上更赦猶停齊官徙濠州八月也慶厯三年十月二十二日司法張彥博改作寢廬治地得坎中死兒驗問知狀者小吏熊簡對如此又召鄧旺詰之合獄辭留州者皆是惟殺秃秃狀蓋不見與豫言而悲之遂以棺服斂之設酒脯奠焉以錢與浮圖人升倫買磚為壙城南五里張氏林下瘞之治地後十日也嗚呼人固擇於禽獸牝牡也禽獸牝牡於其配合孕養知不相禍也相禍則其類絶也久矣如齊何議焉買石刻其事納之壙中以慰秃秃且有警也事始末惟杜氏一無忌言二十九日南豐曽鞏作南豐縣學記慶厯四年南豐初建學曽魯公易占作學記略曰古鄉黨學校少長為位以萃居教用六德行藝節用五禮六樂糾用八刑論用其鄉之老蓋本之道民成化故其士之入朝在鄉居家皆就法度而莫為非此古之所以為治𫝊子孫不殆也自鄉黨之制廢學校雖存者亦戾古其居無少長教無六德行藝節無禮樂糾非八刑論非其鄉之老不本之道民成化而主於辭故其士之入朝在鄉居家皆無法度而為亦無所不至此後之所以不為古也云云前輩相𫝊謂此記乃其子南豐先生十八嵗少筆代公作也所謂不本之道民成化而主於辭一語甚味蓋指科目辭章之弊而言夫武之弊削方鎮也文之弊徒尚辭也二柄既失矣欲強且久可得乎曽文宗西漢南豐先生曽文定公為文章實宗西漢故王舍人震序其文曰自負要似劉向不知韓愈為何如然豫以劉向所作戰國策序與先生之序並觀則勝於向蓋向之序文冗贅而先生之文謹嚴如曰論詐之使而諱其敗言戰之善而蔽其患其相率而為之者莫不有利焉而不勝其害也有得焉而不勝其失也卒至蘇秦商鞅孫臏吳起李斯之徒以亡其身而諸侯及秦用之亦滅其國此等筆力劉不及也喜似南豐續稿有喜似一篇為介甫作尊敬甚至及其得志則與之異故過王介甫歸偶成云直道詎非難盡言竟多忤知者尚復然悠悠誰可語雜識南豐續稿有雜識二三兵事多放史漢文可觀宋史備要多采用之年譜序晦菴先生雅重南豐之文為之作年譜考訂精實又為作譜序其文殊類南豐豈韓文公效樊孟意耶今録於左南豐先生者名鞏字子固姓曽氏南豐人丹陽朱熹曰豫讀曽氏書未嘗不掩卷廢書而歎何世之知公淺也蓋公之文髙矣自孟韓以來作者之盛未有至於斯夫其所以重於世者豈茍而云哉然世或徒以是知之故知之淺也知之淺則於公之事論之猶不能無所抵牾而况公之所以為書者宜其未有以知之也然則世之自以知公者非淺而妄與其可歎也已公書或頗有嵗月參以史氏記及他書舊聞次之著于篇年譜後序丹陽朱熹曰世有著書稱公文章者豫謂庶幾知公求而讀之湫然卑鄙知公者不為是言也然則世之自以知公者何如哉豈非徒以其名歟豫之說於是信矣其說又以謂公為史官薦邢恕陳無巳以為英録檢討而二子者受學焉綜其實不然蓋熙寧初詔開實録院論次英宗皇帝時事以公與檢討一月免豈公於是時而能有以薦士哉其不然一也恕治平四年始登進士第元豐中用公薦為史館檢討與修五朝國史其事見於實録矣為實録院檢討而與修英録於熙寧之初則未有考焉其不然二也師道見公江淮之間而受教焉然竟公時為布衣元祐中乃用薦起家為郡文學是公於史館猶不得以薦之况熙寧時豈有檢討事哉其不然三也一事而不然者三則公所以教恕者其在元豐史館之時乎未可知也此豫所謂抵牾者斯人為世所重自以知公故豫不得不考其實而辨其不然者其書世或頗有以故不論著著其非是者焉豫考所謂斯人為世所重者不知為誰想在當時有權位故不敢斥言之也晦翁文字多稱紫陽今日稱丹陽未詳前序甚肖曽文後序差逺綜其實不然一語甚雅豫極愛之後乃知出史記周紀贊中信知太史公語自是不同常人讀書皆泛泛耳似此一語誰復經心而老先生竟用之可見其心非泛泛者比隱居通議卷十四
