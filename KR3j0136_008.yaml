body:
  text: 隠居通議卷八元劉壎撰詩歌三律選律詩始於唐盛於唐然合一代數十家而選其精純髙𣺌首尾無瑕者殆不滿百首何其難也劉長卿杜牧許渾劉滄實為巨擘極工而全美者亦自有數入宋則古文古詩皆足方駕漢唐惟律詩視唐益寡焉蓋必雄麗婉活黙合宫徵始可言律而又必以格律為主乃善儻止以七字成句兩句作對便謂之詩而重滯擁腫不協格調恐於律法未合也近嵗鄉先生諶公祜妙選唐律數十首詳加評注以誨學者大為有益桂舟七言律擷諶公祜字自求號桂舟世居南豐之西曰瞿邨㓜厭舉子業不求仕専志古學參詩於贛詩人蒼山曽公原一益之以學遂青於藍喜著書有三𫝊朝宗史漢韻紀古書合轍所作有桂舟歌咏桂舟雜著集中記序最佳其論詩處皆入妙品筆力髙峻有史漢文氣古體樂府俱善而以律體尤精唐律絶響三百年公自出機軸掃空凡馬蒼山翁號當時大詩人猶推讓出一頭地識者謂律詩至公中興略摘其佳句為世所稱者列于左兩表蜀天開日月三軍漢地出旌旗諸葛武侯王侯螘宂青青草鼓吹鼃廬焱焱燈自嘆動地百年無桀跖後天一夀有顔曽同上百年忩下棊千著萬事燈前酒一斟詠古白髪古今天北極黃華宇宙客西風淵明封濬九州堯舜禹典刑萬世契䕫龍評詩後作陶寫有時欣律熟去來無著證鑪芬覽鏡西風木葉吹秦晉春雨桃華送古今避秦兩水夾城飄近逺萬山擁翠緑參差鬱孤臺不知元祐今何日慨想儋翁過此時同上為惜舊時慈母線寧甘今夜隔簾霜寒夜思親夢猶平昔醒來别憶到兒童事轉長同上江山落日前朝夢風雨黃華太古心對菊觀空觀化此凭欄㑹合人間景一團棊罷客隨流水散酒闌花帶夕陽看看花飛雨隔愁横笛後殘燈照夢落花前雨夜詩到二南風化在句流三謝語言工評詩中原一髪天涯夢元祐孤臣海外歸東坡造物未嘗私化外英雄何事老隆中問天看翻後夜月回照夢憶前生地不同同上天地浮萍雲聚散江山罨畫月西東皆寓堂地上斷無秦世草山中猶讀漢時書懐古夢臨水月心先覺看到霜空幻亦稀晩眺天開瞑色雲千里雨洗秋空月十分覽鏡止水不留前世景夕陽空照古人心春晩花間笑語從雲散天下英雄豈陸沈同上隔雲烽火山河舊列土旌旗雨露深邊事層城樓櫓看如畫三鎮軍民夢解圍宋史樹帶夕陽雅半集藋寒秋浦雁初來感懐交逰雨過三生夢今古風前酒一桮同上千颿過眼人何在一笛穿雲水自橫快閣和山谷宫燭驪山酒未醒妖星􅀈􅀈弄青熒三朝伐叛知謀略萬國歸心服典刑郭汾陽夢㳺碧落風偏急望斷金精月正中寄林芝山萬壑松風天鼓吹四圍花月錦簾櫳評詩風雨晝酣秦地濶闗河春夢楚雲低春日次韻蕃漢盛衰霜葉夢陳隋興廢露華秋讀史聚火有蓮知佛性衡門無雁見交情春郊一颿秋水漁歌逺半塔斜陽雁影髙古䖍晩眺邑自亂來新鼓角屋從兵後尚蓬蒿同上落雁景畨秋宇迥亂雅嗁帶夕陽飛謁李中山蜀天過雨浮嵐翠漢地連雲小麥黃􅒾捷城上鳥烏知息戰陳前笳鼔緩歸裝將軍斗大黄金印猶待先登縳鬼章同上鳳城色瑛紅雲見龍衮香飄紫氣浮行都迎駕地勢尊嚴今上國天王明聖此中興呉山弦管入春波面醉雲天開鏡畫中行西湖潮回海北風偏壯秋滿江南客未歸京華感寓宫大阿房行日月闗通函谷混車書讀秦史雁寒景落三山月騎俊神通萬里城送閩使帝城烟冷江沱在郿隖金多社稷危賈似道吳天北斗行宫在漢節西風間道歸文相歸雅翻漢月催黄髪雁斷胡天想翠華自和燕雲海濶歸鴻杳蜀漢城荒戍馬閒黃葉漢殿落花龍衮棄周原荒棘虎營新感事短褐尚時吟杜曲采芝何處問秦峰暗投晉壄風流棊局散江東桂石酒壺傾次韻雁過大江風帖帖雅嗁荒樹日悠悠紀事赤幟露光王漢地錦颿波蕩帝隋舟即事楚草澤深陳勝在秦𤓰地曠邵平間次韻天開漢統王巴蜀雲從秦繇起沛豐感事向日不知今解老他時應臆此何年三月晦萬國夢回秦月在千年事過蜀雲飛聞鵑六鼇傾側動乾坤國母巡荒䕶帝孫北極星辰臨草地西風觀闕卧花門聞慈亢歸信南極大明秋氣逈西風吹夢泰階平夀潭翁西風客老雄心在太古人稀俠骨香次韻梁有字題何嵗月藏無經在亦香燈定林寺千山落木秋來客兩袖西風旦過僧同上昨日共吟今是夢少時輕别老翻愁别友天教向老逄春在詩且忘憂此命通聽天何事重來㸔明月不堪垂老向西風寄友風雨黃花秋興熟江湖歸路客愁輕寄何清白昨朝骨肉關情大今日平安過望多亂後歸來今夕嵗云徂且共平安酒一壺浩刼定中逃得過舊愁空外看來無歸來五更厯轉花紅在萬里晴光草緑敷同上一日又從頭上過百年多在夢中行正月二日月明老樹吟風鶴露濕荒郊徧土梟今日事去尚時尋敗局老來猶日讀何書秋氣術豈有靈能起死夢從何處忍忘歸悼亡燕尚有情迎社到蜨空無夢過時休同上壯日尚曽雲出岫暮年偏怪海揚塵丙戌立春紫㣲星奠三階正黃道天開萬象新同上梁燕未歸花尚在杜鵑有恨月常孤夢起此情消遣終難去無路追尋豈是愚同上半空日照隂霾伏八表天開泰象同自寛禹甸草荒昏霧徧漢宫花夢晝雲酣次水邨花栁晴光新態度江湖春夢老英雄自寛日月任從愁裡過客塵常向静中參次韻歸櫂舞風鷗不下愁笳吹月雁斜行自感集中詩如此者尚多今姑采其膾炙人口者録之觀其妙趣天得自成一家不肯拾陳蹈故而以清麗婉活中有蒼勁沈鬱意有似二劉者有似杜黃者律詩中興非此翁而誰五言律擷風雨低黄鵠江湖老白鷗聞笛歌舞從兒女艱難臆父兄月夕塞雲横蜀棧胡馬出巴陵白髪風前酒黃花雨後燈聞邊報月滿商山夜風髙漢殿秋讀史世情江水淡心事海鷗知寄友色雲秋景薄漢月夜光寒克復歸神主多才自不難輿地志玉花嘶徼外翠輦過雲中丙子社稷新亭涕山河禹貢書同上星辰天北户漢沔國西門同上馬悲仙仗過雁入海門斜戊寅國被儒冠誤如今尚忍言雪霜昏日月盜賊滿乾坤有感以上皆集中五言律句公以五律不多作予少時從諸老閒競誇風雨低黃鵠與白髪風前酒二聨以為可配少陵今末俗淺識殊無知者五言古擷昔誰醒中夢今獨夢中醒萬縁水上漚百嵗花前景中年嘆憂患不及兒童嵗今兒機械多反不如人意月行虚空間月影印在水月落影還無一笑人間世地上有流冥間無半字自作槀木看静閱滄江流江頭春水多湯湯今復古不載落花回只載斜陽去胡笳明月夜漢節秋風前此士巳骨朽此名至今傳舊者今不見今者舊不知萬古明月在千山黃雲飛以上皆桂舟集中五言古體佳句也七言古擷公嘗登庾嶺觀梅賦古體有曰東郊獨行氷玉峙江左諸賢王謝起若以此花花或宜自不矜持花亦恥又曰屈原離騷芳草徧召南治世梅先見皎如佩玉上清來不敢班渠國風變又曰花今國在橫浦南看誰氷雪來同參入南出南此時節元祐名卿花底雪骨香直到桑海翻花尚永存香未滅若此者皆發前人之所未言可謂獨步一世矣茂陵錢歌曰茂陵秋草不如錢老盡日光行宇宙昭君曲有曰世言如花人薄命誰識如花入衛霍只今保塞願稱臣鬢蟬奪却貂蟬勲羯鼓催花曲曰一聲金殿玉䦨干一曲馬嵬坡下土夕陽空照古今愁年年醉醒桃花雨勸農日曰山花笑人人似醉勸農文似天花墜農今一桮回勸官吏膌民肥官有利官休休民休休勸農文在牆壁頭官此日民此日官酒三行官事畢癸未元日曰黄葉枝頭又早春紅花景裏多明日任翻河漢風北來終是乾坤日東出以上七言古體中摘出樂府皐蘭行有曰笳鼓宫商塞外歸似此殊勲古難匹後來渭上朝正月尚臆祁連塜中骨玊門闗曰後無闗險無中土大夜宜春狐晝舞萬户千門草緑深蘆葉捲吹紅日莫貳師城曰莫将黷武議前朝今日人思此竒絶虞美人草曰失道原不在隂陵放逐義帝知亡形西風所過皆殘滅不據闗險都彭城楊妃出洛圖曰霓裳風秋舞天半舞到玉花飛石棧三台四輔繞星垣只一曲中知後患風流天子悟轉圜不見蜀山横翠面又曰梨園曲譜韶音秘響入馬嵬花委地開兀不再宫不花天街草緑西風起以上皆有議論有氣骨張籍王建不専美於唐也九皐吟槀擷句近世吟人工律如九皐陳公寧之宗道亦自絶少略摘於後七言中有似唐者然不及桂舟風格也落日含兵氣空山更晩風有家音問絶無處道途窮落日草樹深城郭塵埃犯縉紳古來皆有死吾獨此時人半嵗故里人何處空山日又斜干戈今爾輩天地此誰家故里未死終相見無生底再逄征衫今日淚慈母舊時縫歸來多少艱難事言言卒不窮同上相思不相見身在曷如無望家信江濶乾坤壯山長吳楚遥錢塘漢軍鼙鼓動蜀道雪山消觀潮風景夢中天地老江山晝外古今情八月十五夜一年好處在今夕毎度圓時無此清同上日月更無山障礙乾坤惟有水周回金山家在鄜州身隴右弟居河濟妹鍾離讀杜詩中興社稷兩天子老死乾坤一拾遺同上荒草連雲人拾燼空山遺塔鬼吹鐙常山亂後舟無可渡人難到兵不能災地轉靈青陽洞天深洞有龍雲氣黒空山鳴鶴夜鐙青同上江山那解將愁去草木親曽見亂來經蒼山千林雲氣龍猶在午夜松聲鶴自寒仙子偶來成夢事至今游客未嘗閒始山黃中通理似無物天下橫行寧不烹蠏九皐古體亦多佳者旅懐曰清波眇前灘白鳥下寒渚樵斧空山鳴歸舟夕陽莫去來風中人明滅雲外樹雙輪何時休愁心此羈旅此篇甚似蘇州也送别一章曰江邊出相送君去我當反裵回未忍還孤颿夕陽逺語短而意甚長洗馬行曰玉谿谿頭波緑玉玉谿谿上沙金粟曉營出馬五花雲鳴榜齊首橋南浴馬髙如屋長如龍四蹄如鐵聲如鐘青芻㡬束粟㡬斗豢汝愛女争竒功編騣抹刷解色罷黒面雄兒齊上馬就中一馬不敢騎云是將軍臨陣者又曰要知馬最於人厚鼙鼓旌旗應如手燕山雪重黃河深功屬將軍馬何有又有送戴石屏歸天台詩曰天台四萬八千丈一根直下寒銀浪青蓮老子夜不眠往往飛魂到其上詩情不减流白雲千載重見戴叔倫蓮花峰下赤城洞芒鞵翻笑山中人秋風孤篁八九尺老面百摺赬銅色田文席上摩吟頾鶻立蒼苔烟雨黑我家竹屋棲龍岡夜擣孤月餐寒霜醉騎白鹿軍峰下一見贈我青瑶璫南山臺前春正好萬壑千崕清夢曉蒼苔石磴撫䦨干往事飛鴻天亦笑君今東首回牙檣我亦西去凌蒼蒼截江橋南春水急酒酣不記攀垂楊軍峰江南最髙處我上峰頭望君去歸時定入天台山舉首雲間一相顧此篇雖語意㣲弱而言語清峭不染俗塵可愛也結意亦好其題謝氏西谷曰江東風流㑹稽伯玉壺貯香傾琥珀春風十里東山雲一曲寒楸晚空碧盤盤石磴紅泉仙春草夢斷瑶池箋䝉茸曲笠雨花濕老屐踏損蒼苔錢雙鸞翩翩跨元島月白香魂翠山杳玉蘭千載流芳馨清風凌厲連紅曉其送寧都陳令曰梅花樓頭立晴雪松葉亭根聽夜雨鼪鼯息響月千山桃李無言春萬樹凡此皆刻削清麗香人齒頰可以為詩家之俊矣秋麓山雞愛景集余初著通議時嘗載吾叔父秋麓先生鏜髙年著作不倦而余自覺江淹才盡不能逮以為媿今先生謝世倐閱八期追懐悽愴學者曽元伯褒金刻其遺吟而以絶句為之首蓋其古律體多而絶句獨少自成一家不専宗唐也摘其尤者如左公有觀儺古詩一萹絶佳其辭曰寒雲岑岑天四隂畫堂燭影紅簾深鼓聲淵淵管聲脆鬼神變化供劇戲金窪玉注始淙潺眼前倐已非人間夜乂蓬頭鐵骨朶赭衣藍面眼迸火魆蜮罔象初偋伶跪羊立豕相嚘嚶紅裳奼女掩蕉扇緑綬髥翁握蒲劍翻筋踢斗臂膞寛張頥吐舌唇吻乾揺頭四顧百距躍斂身千態萬斝索青衫舞蹈忽屏營彩雲掲帳森摩旌紫衣金章獨據案馬䰎牛權兩披判能言禍福不由天躬履率越分愚賢蒺藜奮威小甶服䰐縿揚聲大髽哭白面使者竹筱鎗自誇􅊧捕無遺藏牛冠箝卷試閱檢虎冐肩㦸光睒閃五方㸃隊亂紛紜何物老嫗繃􅚽熏終南進士破鞮絝嗜酒不悟鬼看覻奮髹矘目起媻娑衆邪一正將那何披髪將畢飛一吷風捲雲收鼓簫歇夜䦨四坐慘不怡主人送客客盡悲歸來桃茢坐深蕳翠鴞黃狐猶在眼自歌楚些大小招坐乆魂魄㳺消遥㑹稽山中禹非死鑄鼎息壤乃若此又聞鬼姦多馮人人姦馮鬼姦入神明日冠裳好妝束白晝通都人面目此萹筆力竒甚可以補缺古人也七言律不多摘其佳句于後孔曽有道官天下韓栁無文世子孫甲申遷居邨橋日落市聲散山路月明人語歸邨中宿月下有聞思望帝山中無曲舞胎仙和韻版橋雨過秋苔滑邨碓寒吹暴稻香懐友尊前能是㡬時客山下已成千古墳出郊感懐栁條風慢天初煗花景晴光地亦香桃原故人皆死誰為佛老我猶生即是仙夜坐草隥水流檐佩響松梢月冷露珠圓同上㡬翻雨過山仍在獨望人間鶴未歸菊潭故居公忍貧著書垂死不廢所著有聖門言行録考覈浩博總㑹精實諸公協力以刋而不及竟六經之餘釋老書無不通貫所作科教之文尤為入妙琳宫梵宇得其一篇者俱謂足以名世具在别録山谷諸作山谷翁書摩厓碑後題老杜浣花醉圖皆精深有議論嚴整有格律二篇正堪作對嘗欲令善畫者圖作兩屏録二詩其上毎當讀書餘閒酒酣興發朗誦數過以舒吟懐亦一快也山谷題榮州祖元大師此君軒云程嬰杵臼立孤難伯夷叔齊采薇􅍸形容絶妙後有作者何以加之此堂先生瑞南豐先逹名儒也嘗謂余曰山谷作詩有押韻險處妙不可言如東坡效庭堅體詩云我詩如曹鄶淺陋不成邦公如大國楚吞五湖三江赤壁風月笛玉堂雲霧忩句法提一律堅城受我降只此一降字他人如何押到此竒健之氣拂拂意表古今咏淵明者多矣獨山谷翁深入閫奥其懐陶令之詩曰潛魚願深𣺌淵明無所逃彭澤當此時沈㝠一世豪司馬寒如灰禮樂卯金刀嵗晩以字行更始號元亮淒其望諸葛抗戅猶漢臣時無益州牧指揮用諸將平生本朝心嵗月閱江浪空餘詩語工落筆九天上向來非無人此友獨可尚屬余剛制酒無用酌桮盎欲招千載魂斯文或宜當此詩允為得淵明之心者世以陶公為幽人隠士非也身逢禪代悲憤不自勝欲如孔明紹休漢室思致中興而世無英雄如昭烈者可與興復既不可為則姑自放于詩酒而已晩年以字為名而更别其字曰元亮景慕孔明意可㮣見或者但見其棄官彭澤歸逸柴桑遂以幽隠待之誤矣桃李春風一桮酒江湖夜雨十年鐙寄黄㡬復萬里書來兒女􅍸十月山行氷雪深寄上叔父夷仲弓刀陌上望行色兒女鐙前語夜深同上其三風光錯綜天經緯草木文章帝杼機次韻雨絲雲鶴兩宫無事安磐石萬國歸心有老臣同子瞻韻和趙伯充團練落木千山天逺大澂江一道月分明家移四壁書侵坐馬痩三山葉擁門次韻宋楙宗僦居甘泉坊雪後書懐笙歌忽把二天酒風雨猶驚三峽濤次韻荅清江主簿趙彦成萬竿苦竹旌旗卷一部鳴蛙鼓吹休次韻黃份老晩㳺池亭其二千林風雨鶯求友萬里雲天雁斷行宜陽别元明争名朝市魚千里蓋世功名黍一炊王穉川既待官都下有所盼未歸五更歸夢三千里一日思親十二時蓋世功名棊一局藏山文字紙千張語言少味無阿堵氷雪相看有此君心逰萬里不知逺身與一枰相對間世態已更千變盡心原不受一塵侵寒蛩催織月籠秋獨雁呌羣天拍水聽宋儒摘阮歌以上並山谷先生句法也山谷所長在古體固不以律名然時作律詩亦自有一種句法后山陳后山師道徐州人也曽南豐先生見其文而竒之后山翁之詩世或病其艱歰然揫斂鍜鍊之工自不可及如云人情校往復屢勉終相逺一詩已經年知子不我怨又如去逺即相思歸近不可忍兒女已在眼眉目略不省喜極不得語淚盡方一哂又如生世何用早我已後此翁頗識門下士略已聞其風又如俗子推不去可人費招呼世事毎如此我生亦何娛又如此生恩未報他日目不瞑又如有女初束髪已知生離悲枕我不肯起畏我從此辭大兒學語言拜揖未勝衣喚耶我欲去此語那可思凡此皆語短而意長若他人必費盡多少言語摹冩此獨簡潔峻峭而悠然深味不見其際正得費長房縮地之法雖尋丈之間固自有萬里山河之勢也凡人才思泛濫者宜熟讀后山詩文以藥之他如妾薄命贈二蘇公諸篇深婉竒健妙合䋲尺又古今之絶唱荆公二古王荆公集中有古詩一篇名曰君難託詳其詞㫖似怨望裕陵者豈非罷政居鍾山時為吕恵卿讒毁不能堪而賦邪其詩云槿花朝開暮還墜我身與華寧獨異憶昔相逢俱少年兩情未許誰最先感君綢繆逐君去成君家計良辛苦人事反覆那能知讒言入耳須臾離嫁時羅衣羞更著如今始悟君難託君難託妾亦不忘舊時約裕陵荆公君臣之交古今所少一旦施設既謬卒負聖心至於怨望如此可發千古之一慨荆公又有飛鴻詩云雁飛㝠㝠時下泊稻粱雖少江湖樂人生何必慕輕肥辛苦將身到沙漠漢時蘇武與張騫萬里生還值偶然丈夫許國當如此男子辭家亦可憐鬱孤臺刻石曼卿詩石曼卿嘗作大字書古體云平陽奉寄師魯十年一夢花空委依舊河山損桃李雁聲北去燕西飛髙樓日日春風裏眉背石州山對起嬌波泪落妝如洗汾河不斷天南流天色無情淡於水此詩不知曼卿自作邪或書古人詩也其意亦莫可曉後題云康定元年八月十四日書按尹洙字師魯此必寄尹洙之詩則非古人矣又一絶云楚鄉寒食摘花時野渡臨風駐采旗草色連雲人去住水文如縠燕參差末題云江上偶見繼又書題木蘭廟一絶又入商山一絶末又一絶云前山極逺碧雲合清夜一聲白雪㣲欲寄相思千里月谿邊殘照雨霏霏後題云寄逺此四絶必唐詩特前此未見耳或謂千里月疑是目字誤作月因下句是殘照無縁用月字也但千里目於義未順千里相隔唯月共照今殘照之時值霏霏之雨欲寄相思於月不可得矣月字為是所書字如掌大亦甚端重然帶俗態欠清媚遒勁之氣旴江聶善之侍郎守贛州日摹其真蹟刻石鬱孤臺未知今尚存否偶觀墨本恐失去謹録於此所翁詩句長樂陳公儲容自號所翁登科入仕善畫龍筆勢入妙而賦詩作字俱竒勁可愛予去年春逰麻原第三谷見其舊題靈豐廟壁翰墨飛動一詩為靈運賦句意甚佳曰紫馬仙人跨白犀繙經臺暎釣魚磯千年老樹風靁坼獨有紅泉洗斷碑皆記當時事也近又得其為人賦橫舟二篇尤竒前篇曰古悲歌淚如血渡河無船氣欲絶古悲歌淚如泉河激湯湯聲徹天峨舸大艑載琛貝錦纜迷樓催管弦人生苦樂不相等風波血刃蛟流涎神虺九首能三足巨鼇觸怒羣帝遷縱有扁舟竟何往乗桴意在滄洲上祇縁轍朽無人知入海居夷毎惆悵三間破屋名橫舟三呼不荅江水流一颿徑渡溯天去不繫斜陽古渡頭後篇曰黃頭子捩柁聽吾語三老駕三翼疊鼓峭颿看風色一千水歸黃河世無客星泛靈槎恒河水波斯匿王母將去六十年間成壊故性無生滅河水似黃面瞿曇以筏諭長淮水一箭許邊城白骨多於土年年調舟已成泥夀蔡孤城付朝暮岷江漢源天上來一夕不保如風埃重慶今為天下首漢中不復言規恢朽木為舟土為楫白波如山水皆立當時商家畚築子夢裏撑船濟川去只今無夢豈無舟水淺都非泊舟處二篇俱非塵土胸次語隠居通議卷八
