body:
  text: 隱居通議卷十八元劉塤撰文章六作文法度春秋以後文章之妙者世推左傳史記而其文法乃有相似者蓋古人作文俱有間架有樞紐有脈絡有眼目前卷屢嘗言矣今重宣其説以訓諸孫如左傳載宰孔賜齊侯胙一段有曰將下拜無下拜敢不下拜下拜登受連用四下拜不覺重復晉公子對楚子有曰其波及晉國其何以報君其避君三舍其左執鞭弭凡四用其字蹇叔哭師蹇叔哭之哭而送之凡兩用楚子問鼎用德字作樞紐脈絡凡六用楚子縣陳猶可辭乎王曰可哉因縣陳乃復封陳前後照應楚復與鄭平敢不唯命是聽亦唯命亦唯命賓媚人對晉退師而曰云云而曰云云敢不唯命是聽敢不唯命是聽皆再用晉三帥遜功某何力之有焉凡五用楚復晉知罃用報字關鎖其誰敢德其誰敢怨死且不朽亦死且不朽皆再用晉卻至聘楚吾子其入也凡再用首尾照應吕相絶秦我是以凡五用我字多用幾四十鄭子駟改載書終獲鄭豈惟鄭何恃於鄭疊三鄭字成句晉士丐平王室蓽門閨竇凡三用關鎖駒支答范宣子連用六我字臧武仲辨詰盜紇又不能若之何不能將何以能疊三能字鄭子産對晉徴朝凡五節貫串子産請晉輕幣連疊四賄字四令名字貫串子産獻捷於晉我字凡十五用子産知然明子産問政於然明子太叔問政於子産子産論人心不同用學字關鎖首尾子産誅公孫黑大刑將至司冦將至照應晏嬰論季世此季世也亦季世也照應史記文法亦多如此略舉其概毛遂曰吾君在前叱者何也云云吾君在前叱者何也平原君曰勝不敢復相士云云勝不敢復相士公孫龍曰云云此甚不可云云此甚不可僂緩曰虞卿得其一不得其二云云故曰虞卿得其一不得其二范雎曰臣又何患云云臣又何憂云云臣又何恥韓安得無聽乎云云韓安得不聽乎侯嬴曰人固未易知知人亦未易也云云人固未易知知人亦未易也平原君曰勝也何敢言事云云勝也何敢言事韓安國傳曰何梁王為人子之孝為人臣之忠而太后弗省也云云再言之亦是此例樂毅答燕惠王書兩用受命而不辭兩用先王以為然相照應李斯逐客書五用今字貫串七用不字左氏文法變化頗多史記只是此一樣擊首則尾應所謂常山蛇勢也昌黎文法韓文世謂其本於經或謂出於孟子然其碑銘妙處實本太史公也第此老稍能自祕示人以髙故未嘗尊稱遷固至其平生受用則實得於此此亦文章士之私意小智也公嘗自泄其機矣曰非三代兩漢之書不觀所謂兩漢非班馬耶史記云勝不敢復相士云云勝不敢復相士韓碑云汝何敢反云云汝何敢反史記荆軻傳云軻真傾危之士哉韓毛頴傳云秦真少恩哉班孟堅東方朔傳云奈何乎陛下韓銘云奈何乎公若此者殆不勝紀然則世之工作文者固不得舍史漢而他求也流俗無特見隨聲附和以韓文為一出於經誤矣豫嘗舉此質之雲畬趙公公擊節歎服以為確論李旴江文旴江李先生長江賦袁州學記髙出歐蘇百世不朽當與平淮西碑並傳詩文工拙世言杜子美長於詩其無韻者輒不可讀曾子固長於文其有韻者輒不工東坡詞如詩少遊詩如詞此數公者皆名儒大才俱不免有偏處豫謂山谷亦然山谷詩律精深是其所長故凡近於詩者無不工如古賦與夫贊銘有韻者率入妙品他如記序散文則殊不及也韓文公廟碑嘗觀東坡作韓文公廟碑有曰公之精誠能開衡山之雲而不能回憲宗之惑能馴鱷魚之暴而不能弭皇甫鎛李逢吉之謗能使南海之民廟食百世而不能使其身一日自安於朝廷之上此正用史記龜策傳中語云神至能見夢於元王而不能自出漁者之籠身能十言盡當不能通使於河還報於江賢能令人戰勝攻取不能自解於刀鋒免剝刺之患聖能先知亟見而不能令衛平無言觀其文法正似相同文法漢武帝時齊人少翁以方術得幸封文成將軍後以事敗誅而隱之又有欒大亦以方士進自言臣之師曰黃金可成而河決可塞不死之藥可得仙人可致也然臣恐效文成則方士皆掩口惡敢言方哉上曰文成食馬肝死耳子誠能修其方我何愛乎遂拜五利將軍四可字乃文法也取豫異見西山先生編文章正宗取周襄王拒晉文謂隧一事為辭命之冠又取祭公謀父諫征犬戎為議論之冠其後東澗湯公漢編古文則取子産請晉輕幣為第一又取子産壞館垣為第二蓋取豫之不同如此近世編詩者亦然人各有見也昨見浙東有唐詩選數十篇率多平常而佳者反棄去殆不可曉平心而論則惟天地長留集所取為當經文妙出自然經文所以不可及者以其妙出自然不由作為也左氏已有作為處太史公文字多自然班氏多作為韓有自然處而作為處亦多栁則純乎作為歐曾俱出自然東坡亦出自然老蘇則皆作為也荆公有自然處頗似曾文惟詩也亦然故雖古作者俱不免作為淵明所以獨步千古者以其渾然天成無斧鑿痕也韋栁法陶純是作為故評者曰陶彭澤如慶雲在霄舒卷自如詩文取新語意不塵詩文之一妙也韓文公云惟陳言之務去戛戛乎其難哉或曰是不難熟復莊騷即不塵矣夫南華經與楚辭二書經千有餘年然一展讀則煥爛如新學文者能取莊騷玩味之又取世説新語佐之則塵腐之疾去矣平園文體後村跋周益公親書艾軒林公光朝神道碑後曰平園晚作益自摩厲然散語終是洗滌詞科氣習不盡惟艾軒志銘極簡嚴有古意然豫反覆熟玩其文平順典雅則有之謂之簡古則未也因記壯歲與西園傅公共觀某人文字其人亦試詞科傅公曰此文未脫詞科體也豫曰然蓋詞科之文自有一種體致既用功之深則他日雖欲變化氣質而自不覺其暗合猶如工舉業者力學古文未嘗不欲脫去舉文畦徑也若且陶汰未淨自然一言半語不免暗犯故作古文而有舉子語在其中者謂之金盤盛狗矢曹子建論文世人著述不能無病僕常好人譏彈其文有不善應時改定昔丁敬禮常作小文使僕潤飾之僕自以才不逮若人辭不為也敬禮謂僕卿何所疑難文之佳惡吾自得之後世誰相知定吾文者耶吾嘗歎此達言以為美談此魏陳思王曹子建與楊德祖書中語久為名言世之露才楊已強辨護短者宜味之夫文章是非無有定極人言果當何吝更改正不失為巳益也子建深明此理甚善惜不用之務學進道而止用之於作文其文又不能追於三代兩漢而止於組織浮麗為三國六朝之體此為可歎耳序書歐陽公作五代史或作序記其前王荆公見之曰佛頭上豈可著糞山谷先生歎息以為名言且曰見作序引後記為其無足信於世待我而後取重耳此説有理然有遺論如何平叔序論語趙臺卿序孟子杜元凱序左傳豈謂經傳不足取信於世必待此數人而後取重耶李序韓劉序栁蘇序歐王舍人序曾亦豈謂韓栁歐曾有待於此數公哉蓋序所以述作者之意非謂作者待序而傳使作者果不足傳序顧足以為重乎涪翁之言未為確論第恐當時序五代史者人不足重文不足采故云爾再考序五代史序乃陳師錫也神宗甚喜師錫之文每於衆作中見之便自認得常以錦囊盛之陳後為御史有大名象山小簡風露凄清星河錯落月在林杪泉鳴石間薰罏前引茶鼎後殿方塘為鑑回溪為佩冰玉明瑩霜雪騰耀則噴玉新亭真蓬壺瀛州也此象山先生所與張伯信小簡也餘事文章信意翰墨而造語清俊如此真可為法但他人當此境界惟供風雲月露之姿先生則內外齊觀即鳶飛魚躍之妙矣記體昔人謂韓文公作記止記其事而後人作記乃是作論此語切當隱居通議卷十八
