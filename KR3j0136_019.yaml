body:
  text: 隱居通議卷十九元劉塤撰文章七左氏莊周左氏莊周接踵特起著書名世冠絶古今雖旨趣故自不同然皆如華嶽三峯卓立參昴春秋戰國乃有如許文雄殆亦間氣耶莊子注郭象注莊子議論髙簡殊有義味凡莊生千百言不能了者象以一語了之余嘗愛其注混沌鑿七竅一段惟以一語斷之曰為者敗之止用四字辭簡意足一段章旨無復遺論蓋其妙若此世謂莊子注郭象亦是一説朱陸敗揚雄揚雄作太玄經以準易作法言以擬論語前代名賢皆謂其學貫天人諸子莫及至其美新投閣之羞則略而不責焉逮象山先生陸文安公始確然為之言曰子雲之太玄錯亂蓍卦乖逆隂陽所謂君不君臣不臣父不父子不子由漢以來楊墨強盛以至於今尚未反正而世之儒者猶依玄以言易重可歎也朱文公作通鑑綱目又特書曰莽大夫揚雄死自二先生決此論而後雄之所以為雄者始昭白於天下後世然南豐先生之嚴司馬溫公之正皆於雄有取其見不同如此而南豐先生以揚雄處王莽之際合於箕子之明夷詳哉其言之也朱子極推南豐之文原本六經未嘗訾議其論則朱子亦存其説矣列子精語劉向校列子書録有云列子者鄭人也與鄭穆公同時蓋有道者也其學本於黃帝老子號曰道家道家者秉要執本清虛無為及其治身接物務崇不競合於六經而穆王湯問二篇迂誕恢詭非君子之言也至於力命篇一推分命楊朱之篇惟貴放逸二義乖背不似一家之書然各有所明亦有可觀者向此數語頗能盡禦冦之旨按列子書凡八篇其粹者莫出於天瑞一篇傳者云禦冦先莊子故莊子稱之然後世多宗南華而談沖虛至德者反寡蓋莊子得其説而善用之所謂青出於藍而青於藍者究其旨歸則漆園之言皆鄭圃之餘也人自生至終大化有四嬰孩也少壯也老耄也死亡也其在嬰孩氣専志一和之至也物不傷焉德莫加焉其在少壯則血氣飄溢欲慮充起物所攻焉德故衰焉其在老耄則欲慮柔焉體將休焉物莫先焉雖未及嬰孩之全方於少壯間矣其在死亡也則之於息焉反其極矣抑又安知吾今之死不逾昔之生乎子貢願有所息仲尼曰望其壙睪皋如也宰如也墳如也鬲歷如也則知所息矣人胥知生之樂未知生之苦知老之憊未知老之佚知死之惡未知死之息也聖人藏於天故物莫之能傷也一體之盈虛消息皆通於天地貴之或不生賤之或不死愛之或不厚輕之或不薄此似反也非反也此自生自死自厚自薄或貴之而生或賤之而死或愛之而厚或輕之而薄此似順也非順也此亦自生自死自厚自薄百年壽之大齊得百年者千無一焉設有一者孩抱以逮昏老幾居其半矣夜眠之所弭晝覺之所遺又幾居其半矣痛疾哀苦亡失憂懼又幾居其半矣量數十年之中逌然而自得無介焉之慮者亦亡一時之中爾則人之生也奚樂哉為美厚爾為聲色爾而美厚復不可常厭足聲色不可常玩聞乃復為刑賞之所禁勸名法之所進退皇皇爾競一時之虛譽規死後之餘榮偊偊爾重囚纍梏何以異哉萬物齊生齊死齊賢齊愚齊貴齊賤十年亦死百年亦死仁聖亦死凶愚亦死生則堯舜死則腐骨生則桀紂死則腐骨腐骨一矣孰知其異生相憐死相捐既死豈在我哉焚之亦可沈之亦可瘞之亦可露之亦可衣薪而棄諸溝壑亦可衮衣繡裳而納諸石椁亦可伏羲以來三十餘萬歲賢愚好醜成敗是非無不消滅但遲速之間爾矜一時之毁譽以焦苦其神形要死後數百年中餘名豈足潤枯骨何生之樂哉生民之不得休息為四事故一為壽二為名三為位四為貨有此四者畏鬼畏人畏威畏刑天下無對制命在內人不婚宦情欲失半大道以多岐亡羊學者以多方喪生以上皆列子中精語列子楊朱篇多至言但時有重復如論堯舜桀紂同為腐骨而論舜禹湯武又曰與株塊無異如言刑賞之所禁勸名法之所進退而又曰畏鬼畏人畏威畏刑皆一意而重出者也然大旨不害其為達張處度湛注列子亦多有佳處足以補旨趣之所未及治身事天老子曰治身事天莫如嗇吕滎陽希哲常書此語為座右銘修行家以此為養生之要要之此即莊子所謂衽席之上飲食之間而不知戒者孔子曰以約失之者鮮矣又如禮與其奢也寧儉言禮之本皆是此意豬苓為帝嘗記水心先生文中有曰豬苓桔梗時而為帝無不按節赴之或者疑其自作議論不知出南華經徐無鬼篇其言曰藥也其實堇也即烏頭桔梗也雞雍也即芡豕零也即豬苓是時為帝者也何可勝言郭象曰當其所須則無賤非其時則無貴貴賤有時誰能常也此論大槩喻人無貴賤觀所遇之時何如故用則為虎不用則為鼠又俗謂可貴可賤皆此意也夫堇為烏頭乃至毒之藥然用以治濕則為帝五苓散用藥五味而獨尊豬苓以名其藥蓋雖賤而可以為帝則貴賤亦何常之有哉唐宋重科目則儒貴秦尚功利則儒賤矣按此以秦况元也故先言唐宋而後言秦莊子精語世間常用好語多出於莊謾記一二於此偶因常用者及之千歲厭世去而上仙乘彼白雲至於帝鄉厲之人癘音癩夜半生子遽取火而視之汲汲然惟恐其似已也帝王之德配天地三軍五兵之運日月照而四時行子呼我牛也而謂之牛呼我馬也而謂之馬古之人與其不可傳也死矣孰主張是孰綱維是孰居無事推而行是雲者為雨乎雨者為雲乎道可載而與之俱也是非其夢耶仁義先王之蘧廬猶傳舍也止可以一宿倒置之民營外虧內以為不若巳者我之謂也騏驥驊騮一日而馳千里捕鼠不如貍狌孔子曰我諱窮久矣而不免命也求通久矣而不得時也吾命有所制矣水行不避蛟龍陸行不避虎兕觸髏曰吾安能棄南面王樂而復為人間之勞乎二子者皆不鞭其後者也衽席之上飲食之間而不知為之戒者過也畏途昭昭乎若揭日月而行豐狐文豹何罪之有其皮為之災也犂然有當於人之心彼以利合此以天屬溪工田子方之里人吾所學者直土梗耳使人之意也消仲尼曰夫哀莫大於心死而人死亦次之吾終日與汝交一臂而失之揮斥八極神氣不變今視子之鼻間栩栩然凡亡司馬云凡國名郭注言有三亡徴也欲俎豆豫於賢人之間為不善乎顯明之中者人得而誅之為不善乎幽間之中者鬼得而誅之無所逃於天地之間石師謂匠石柴立丘願有喙三尺郭云有喙三尺未足稱長凡人閉口未是不言司馬云喙思也宜南美丸而弭難叔敖除備以折衝丘亦有願有歎息其三尺三尺七首劍司馬之説似鑿隱居通議卷十九
