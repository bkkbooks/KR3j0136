body:
  text: 隠居通議卷十一元劉壎撰詩歌六興亡歌詠漢髙帝大風之歌曰大風起兮雲飛揚威加海内兮歸故鄉安得壯士兮守四方宋太祖咏日出之詩曰欲出未出紅刺刺千山萬山如火發須臾擁出大金盆趕退殘星逐退月陳後主之詩曰午醉醒來晩無人夢自驚夕陽如有意偏傍小忩明南唐李後主之詞曰櫻桃落盡春歸去蜨翻輕粉雙飛又曰門巷寂寥人去後望殘烟草萋迷合四君之所作而論之則開基英雄之主與亡國衰弱之君氣象不同居然可見詩句冩太平李文定公昉禁林春日詩有曰一院有花春晝永萬方無事詔書稀歐陽文忠公送田秦州詩有曰萬馬不嘶聽號令諸蕃無事樂耕耘蘇文忠公和熈河帥蔣穎叔上元詩有曰永夜出逰從萬騎諸羌入看擁千層凡此皆可想見昔日太平氣象毎讀此詩令人慨然吟咏誅姦一代之亡必有一誤國者為人所指目見於吟咏自唐以來賦者多矣雖機軸不免相同然誅姦諛於既死誠千古之一快不可議其蹈襲也如唐彦謙詠文恵宫人云認得前家令宫人淚滿裾不知梁佐命全是沈尚書李泰伯覯詠漢宫云哀平外立國權分只為當時乏嗣君試問莽新誰佐命祇應飛燕是元勲鄭毅夫獬詠范蠡云十重越甲夜成圍宴罷君王醉不知若論破吳功第一黃金只合鑄西施趙漢宗詠張麗華云陳事分明屬綺羅香塵吹盡井無波行軍長史何勞怒次苐論功妾更多予叔長秋麓翁咏陳後主亦云晉王前殿賀平陳從此江南雨露匀四百年間重混一誰知江令是忠臣宋之失國賈似道為之也余竊嘗為之詩云三百年餘歴數更東南萬里看昇平黃金臺上麒麟閣混一元勲是賈生半山詠揚雄王荆公論揚雄云九流沈溺道真渾獨㴑穨波討得原又云千古雄文造聖真𦕈然幽思入無倫雄仕漢朝非止州縣㣲官而已也美新投閣臣節不終律以名義蓋有疵焉而前輩諸賢亟稱之昌黎公以雄為聖人之徒南豐曽文定公以雄為合於箕子之明夷司馬文正公親注法言尊雄甚至水心葉公著習學記言譏評古今無全人矣獨於雄傾心焉今荆公之詠又以聖真許之諸老豈許其學問略其名節耶夫學者固將學為忠與孝也雄大節若是雖學洞天人文貫經史抑末矣湘東金管不為子雲屈也近世惟馬子才著論以聲雄之罪又有陳黯者亦有是言予不幸生非盛世逢此更遷目擊叛降滔滔皆是故于雄之事蹟蓋三歎焉近觀後邨劉潛夫詩話有一論攻雄之短劉蓋出于賈似道之門者其人固非名節士也乃識大義如此或者曰南豐先生合於箕子明夷之言不為無見學者必知人論世而後可也當詳參之半山讀蜀志荆公讀蜀志詩云千載紛争共一毛可憐身世兩徒勞無人語向劉𤣥德問舍求田意最髙夫曹瞞父子挾姦雄之資蓄簒逆之計弑帝后竊神器漢室之賊也稍負志節者皆欲奮臂誅之昭烈帝室之胄武侯為輔首扶名義必報國仇雖大勲不成而魏之君臣畏蜀如虎終其身不得奠枕萬世之下忠臣義士猶得藉此以維持世教則昭烈懿識孔明盛心固與日月争光矣荆公乃咎其為紛争而俾為求田問舍之舉何其闇於名義如此朱文公嘗議司馬温公作通鑒不應尊魏為正統而書諸葛亮為入寇且曰使温公在當時必去仕魏吾亦曰使荆公在當時亦必從魏矣眉山李氏云公此詩於理未安蓋興復之義天人所同不可以紛争議之允為名言然反覆此詩其意蓋深痛劉禪之不克嗣業故嘆息於紛争之徒勞也是又不得以辭害意矣半山讀後漢書荆公讀後漢書云黨錮紛紛果是非當時髙士見㡬㣲可憐竇武陳蕃輩欲與天争漢鼎歸公之意蓋有取於申屠蟠之知㡬而深致嘆于蕃武之蹈禍未為非也然蕃武忠君愛國辭嚴誼正不暇自䘏故蹈危機其失在於疏爾忠憤凛凛霜日争嚴此豈可厚誣者人人如蟠信明哲矣一諉諸天如王室何荆公持論多不猶人如哀昭烈之興復謂其不為許汜田舍之計惜蕃武之忠義謂其與天争漢室之亡皆有感乎其言之也唐宋詩意同唐人詩云昨日春風欺不在就牀吹落讀殘書劉貢父云惟有南風舊相識徑開門户又翻書荆公云閒眠盡日無人到自有春風為掃門賀方回云蠟屐舊痕尋不見東風先為我開門四詩意雖相近然論其自然則荆公貢父所作為勝又唐戎昱詩云寒江近户慢流聲竹影臨忩亂月明歸夢不知湖水濶夜來還到洛陽城荆公云三年衣上禁城塵撫事茫然愧古人明月滄波秋萬頃扁舟長載夢中身又云鍾山咫尺被雲埋何况南隣與北齋昨夜月明江上夢逆隨潮水到秦淮又有陳洙題御史臺壁云清朝無事諫章疏竊禄經年卧直廬惆悵平生不如夢春來三度到谿居後有崔球妻一詩云數日相望極須知意思迷夢魂不怕險飛過大江西此數詩皆同一意若其品格必有能辨之者二詩懐舊荆公題永慶寺雱遺墨後云遺骸豈乆人間世故有情鍾未可忘陸放翁題沈園云此身行作稽山土猶弔遺蹤一泫然二詩皆懐舊感愴之意而陸失之露半山絶句悟機天街小雨潤如酥草色遥看近却無最是一年春好處絶勝烟栁滿皇都此韓詩也荆公早年悟其機軸平生絶句實得於此雖殊欠骨力而流麗閒婉自成一家宜乎足以名世其後學荆公而不至者為四靈又其後卑淺者落江湖風斯下矣荆公之子元澤嘗有詩曰一雙燕子語檐前病客無憀盡日眠開徧杏花人不見滿庭輕雨緑如烟殊有乃翁詩格然其人極不足道黃陵廟詩東風吹草緑離離路入黃陵古廟西帝子不知春又去亂山無主鷓鴣啼此陸士規題黄陵廟詩也興致深長殊有唐人標格然其人客秦檜之門有不足道者故其名不𫝊三賢堂題咏嘉定間袁韶以户部尚書知臨安府大𣙜酒利雖湖上三賢堂亦令賣酒有題詩于壁者曰和靖東坡白樂天㡬年冷落在湖邊如今往事都休問且為袁韶辦酒錢韶聞而愧之㡬住賣韶史彌逺之黨聚斂臣也小人無忌憚烏知三賢謝君澤詩杜鵑呼我我歸休陸有輕車水有舟笑殺西湖湖上客醉生夢死戀杭州此謝君澤題于湖上之詩也時賈師憲居西湖疑此詩譏已隂使人害之君澤覺急投身吕師䕫獲免君澤名雨信州貴谿人有文名兄君直名枋得文筆尤竒健雖擢科第亦以素譏議賈中遭貶責仕宦蹉跎而勁直不懾亦竒人也師憲以父忠肅公故且縁賈妃得早貴盛年敡歴臺閫以至宰相穆陵晏駕受遺定䇿拜太傅平章軍國重事倦趨常朝自請於都城外葛嶺剏私第占湖山天下之景積富纍貴窮奢極侈心猶以為未足乃即湖上創道堂殊壯麗日廪雲水道人數百輩于中頻設齋襯覬得神仙焉嗚呼無厭甚矣既為相又求仙倘遂所圖是神仙可以富貴得而蓬瀛亦為逋逃藪矣誠齋詠徐孺子誠齋先生楊文節公咏徐孺子云南州一髙士東漢獨清風此兩句辭峭而意足無能及者繼云故國巳禾女荒阡猶石翁則㡬於刻畫不及前聨矣謝法曹詩句多情未老已白髪野思到春如亂雲此兩句見歐詩中注云謝法曹所作惜不知其何名蓋佳句也奪胎換骨唐劉禹錫作栁州文集序云韓退之曰雄深雅健似司馬子長崔蔡不足多也崔謂崔瑗蔡謂蔡邕山谷咏張文潛詩亦用此意有曰鼂張班馬乎崔蔡不足云其善於奪胎換骨如此而世或未之知也詠梅詩詞病骨棱棱痩欲飛業根猶墮愛梅非夢魂夜夜尋花去時帶寒香踏月歸此陳伯西詠梅絶筆也伯西吉之泰和人學楊補之作梅其酷嗜如師而得筆外意作推篷圖或半樹或一樹橫斜曲直莫不天成而詩尤清苦世言補之未嘗作半樹梅惟伯西喜作半樹余藏補之醉筆扇面後有玉燭新梅詞一闋補之自書筆法槎牙可愛獨恨未見伯西梅耳其詞曰荒山藏古寺見傍水雲開一枝三四蘭枯蕙死登臨處慰我魂銷惟此可堪紅紫管不解和羮結子髙壓盡百卉千葩因君今修花史朝華且莫吹殘待淺檻枯牀寫交形似此時胸次疑氷雪洗盡從前塵滓吟安箇字判不寐勾牽幽思誰伴我香宿蠭媒光浮月姊右玉燭新紹興乙亥嵗子楊子所作後三年當予亡命蕭永言同醉見予舉似急索紙而恨無敲氷玉屑以備惡語予乗狂興信筆不覺盈軸他日非巨眼好事者勿輕予之永言頗領略是語然永言子孫衆多又以藥石積隂德必有髙其門者應能為我入石以廣之冬十一月望鐙下補之書忩閒句嘗記何處忩閒有人書云近來黒白無分曉墨作梅花賣得行句雖淺近亦有味也後始知蕭氷厓詩唐宋及第詩予舊嘗見壁間一聨云利市䦨衫抛白苧風流名字寫紅箋甚愛之不知誰作今乃知為王黃州禹偁賀人及第詩也唐進士科甚貴初登第即以紅箋書名見人又唐薛能詩莫欺缺落殘牙齒曽喫紅綾餅餤來紅綾餅餤亦是唐新進士時事觀邸報題詩丹瑕先生張誠子自明嘗有一絶句云西風颯颯雨蕭蕭小小人家短短橋獨倚䦨干數鵝匹一聲孤雁在雲霄前題曰觀邸報見者輙不解曰觀邸報而其詩若此何也有一士獨太息曰此詩興致髙逺真得作詩之法何也彼以觀邸報為題而其㫖如此甚不難見風雨蕭颯興國事風塵也小小人家興建都錢塘僅得一隅也短短橋興朝廷無長䇿濟時也獨數鵝匹興所屬意者卑汚之人也雁在雲霄興賢者髙舉逺引也當時必有君子去國故為是語試以此意吟咏則得矣不然則詩與題奚闗哉此蓋善于評詩者大抵詩以興意為主是誠可為作詩法坡仙詩句東坡詩句云近來天氣應難料向煗猶湏御裌衣玉泉黃伯厚亦有絶句云社寒比臘更清嚴花蘂蕭疏半欲緘過手重裘猶得力莫將晴煗信春衫二詩意雖同然論其醖籍則黃句為勝辨秋胡婦秋胡婦一事顔延年首詠之有曰峻節貫秋霜近世豐城陳夀父傑賦曰長旦走縣薄盛年羞乞墦託身未分明一隔五暑寒中堂幸有姑力養可忘年春月蠶事起采桑道旁阡懐金者誰來解槖陳甘言此物奚至哉妾心炳如丹反舍尚三唾欣聞藁砧還胡然道旁金乃在阿母間嘗經挑桑婦還以奉慈萱歠飲豈不歡伉儷難為顔反覆重子汚濯之清冷淵誠雖匹婦諒微義不猶完又有寧都蕭立之等賦序曰秋胡婦事見𫝊記顔延年作詩髙之夫卻行道者之金信其潔矣然憤其夫之說桑婦而卒以是死焉推此意也無亦類世所謂妬婦者耶因歌之曰君家作婦五日強錦衾未煗鴛鴦牀阿郎遽作逺㳺别五載菽水空襦裳采桑忽忽春風陌郎歸相逢不相識探囊贈妾雙黃金妾心如水介如石阿郎歸來坐堂前低頭相視黙不言郎心如此不易保醜君一死滄波寒棱棱峻骨秋霜句斷簡風流暎千古後來一種可憐人却遣江津名妬婦陳號自堂蕭號氷厓皆江西名詩人一取其義一疑其妬吟筆洒然皆足以發所欲言之意然以予考之古或無此事特著書者之寓言耳若以理推則新婚離别若少陵所詠近于征役峻切勢不得已容有之也今秋胡子不過為仕宦而往陳非有迫促於其後者何五日而遽别耶王者之制新婚者期不使雖官府猶諒其燕好方新而寛之况逰宦之權遲速由已乎自魯至陳道路不至懸逺何至五年而不歸獨不可謁告省其親乎既婚五日矣猶不認其妻之容貌非癡人乎夫既曰癡矣路途桑女又何為近之是不癡也則未必不認其妻也既别五年想其侍養其紡績其理家叢脞不止蠶桑而已也當其采桑勞苦備至顔貌必非若初嫁時矣以顦顇時猶出金桑下以相挑引則新婚少艾又何遽舍而逺逰乎考古如訊獄必深求其情而後可意者古人創此一叚竒事以警後世而詩家取以作題目發吟思耳武成周書也去春秋戰國同代而未逺又經聖筆親定孟子猶曰盡信書不如無書詠史旴江李先生覯咏漢史有云試問莽新誰佐命祇應飛燕是元勲此意甚新後白雲趙宗丞崇嶓詠張麗華亦云行軍長史何勞怨次第論功妾更多詩意相同按隋書晉王廣為淮南行省尚書令行軍元帥率師伐陳以髙熲為元帥長史師渡江髙熲先入建康晉王廣使人馳告之令留張麗華熲曰昔太公蒙面以斬妲己此豈可留也斬之廣聞之變色曰昔人云無德不報我必有以報髙公矣由是恨熲然隋之得以滅陳則麗華力也又漢成帝以淖方成為披香殿博士時趙飛燕之妹趙昭儀方幸方成見之曰此禍水也滅火必矣故白雲翁之詩曰甲帳初停燕子飛小雛相趁共差池春風吹水粼粼長又有披香博士知五言絶句難工五言絶句最難工蓋字逾少而意逾長乃為有味近世所刋有一二絶佳者如裼韶父古意曰江南望江北人去竟難招春水無期約年年到小橋李商卿晚春曲曰春欲歸何處流鶯也不知只應江上水暗與落花期姚令威僧房晝寢曰薄薄簾櫳日隂隂殿閣風無人驚午夢雙蜨下花叢趙漢宗折栁詞曰行人須折栁折取最長條明日天涯路無人看舞腰此數詩皆妥貼閒適有天然自在之趣可以吟諷詠墨梅近世有詠墨梅者一詩云髙結長眉滿漢宫君王圖玉按春風龍沙萬里王家女不著黃金買畫工又一云五換隣鐘三唱雞雲昏月淡正低迷金簾不著闌干角瞥見傷春背面啼評詩者謂去題太逺不知其咏何物簡齋陳去非詠墨梅云粲粲江南萬玉妃别來㡬度見春歸相逢京洛渾依舊惟恨緇塵染素衣曹元象云憶昔神逰姑射山夢中栩栩片時還氷膚不許尋常見故隠輕雲薄霧間評詩者亦謂其格調雖髙去題終逺予謂後二詩尚見髣髴前二詩委是懸逺然却是好詩只欠換題目耳坡翁云作詩必此詩定知非詩人亦可執此語以自解疊山自况宋末賈似道柄國弄權已甚叠山先生謝枋得賦一詩自况曰手撚琪花吹玉簫至人長與道逍遥黃雲白鶴無拘束閒看吳兒弄晚潮其婉娩沈著有唐人風致蓋其自處亦甚髙矣其傷時亦甚隠而切矣隠居通議卷十一
