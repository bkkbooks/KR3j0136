body:
  text: 隱居通議卷二十八元劉塤撰造化兩儀易有太極是生兩儀儀匹也不曰二儀者二有先後兩無彼此有相匹之意焉天一地二者乃先後之言爾地亦惟一而云地二者蓋言下已落第二也李明之衡山記云朱符謂火箸如兩儀不可缺一故不曰二而曰兩者隂陽互為用也羅氏路史發明其義乃知兩與二相似而實有辨亭毒人常用亭毒二字而不明其義按路史注云亭蓄其形毒散其氣此謂天地之初也曰亭毒萬有風行焱逝考亭之毒之原出列子俗見習熟以毒義為不美然易曰以此毒天下而民從之正猶岐雷俞扁不惟參苓之養性其劫痼攻積雖鳥喙亦所當用何也以毒攻毒有至仁焉善去兵者不廢師故曰毒天下而民從之吉天地開闢數皇極經世書言天地開闢之數實前古聖賢所未及今書其略于後天地一開一闢謂之一元總計十二萬九千六百年開自寅己至戌戊而後閉開之時凡二百四十星計八萬六千四百年閉自戌戊至寅己而始開閉之時凡一百二十星計四萬三千二百年自夏禹八年過午至今猶屬午之中上必待滿足一萬八百年然後過未自開闢至今約三萬八千年自今以往猶須過四萬八千四百年天地有初祗禱新襲蟣蝨生之洲沼創出蟲魚産焉一氣之初萬物相見故雖天地必有初也按談藪云道言天地初闢一日為雞二日為狗三日為猪四日為羊五日為牛六日為馬七日為人蓋賤者易生貴者難育故今人以建寅之月一日起至七為人日謂天地有初其理則然而雞狗羊馬之說蓋先生物以供人之用耳夫婦所始元氣所孕始於子立於已子者字之始已者包之始也自子而推男左行三十而立於已女右去積二十而合之亦在巳也隂實從焉是故聖人因此制為男三十有室女二十有家之禮參天兩地自然之數配也自己而妊之男十月育於寅女十月育於申申為三隂寅為三陽故年運起焉日生於甲月生於庚日月西東夫婦之象申統於寅庚統於甲左右巳之合以子將以順性命之理爾又曰男子由戊子推之左行三十丁巳十月至丙寅以土生木也女子由庚子推之右行二十辛巳十月至壬申是金生水也此男女隂陽出於自然豫不習數學未究其理姑記于此以待識者古今一理古之水火今之水火也今之聲色後之聲色也鳥獸竹木人民好惡以今而見古由此而知來千世之前萬嵗之後無以異也此言出于王充充謂有理昧者謂古今殊觀非是天地毁敗有數天地及日月時至皆歸盡此語出於無常經物莫不有數雖天地莫能逃也山亡川雍郡陷谷遷沙漠遺舊海之蹤崖險著蚌螺之甲晉殿破榏昆明劫灰有以見地嘗敗矣土石自天星隕如雨或夜明如晝或越裂崩地有以見天嘗毁矣宛首道君曰天地運度亦有否終日月五星亦有虧盈况於人乎此皆路史所載且注云今西北荒外沙漠間皆是海滄遺跡而大行麻姑朱崖等山險崖石罅皆有螺蚌之殼顔魯公以為桑田之變也天地崩裂事史載甚多其最著者闕元年十二月從天西北角至東南或拆裂二百丈或數十丈有聲如雷山雞皆呌或見天中宫室之類豈果毁敗有數天地莫能逃也建昌城西有石崇觀其石間有螺蚌殼合之顔魯公所載信然魁星移次淳熙中殿試進士有鄧太史者告周益公魁星臨蜀臚傳先一日又告夕有震雷魁星自蜀移照吳分及期上忽以第一卷與第二卷互易之吳人果第一蜀人第二當時咸竒驗其言此事甚神前輩謂古天官書無魁星之名今所繪像又與斗魁不同使此星即斗魁安得移照分野且移照又先以雷尤為甚異據鄧之說魁先臨蜀而是年蜀人當第一然則與吳分何與若此星亦如日月五星躔次周轉必漸次移照按吳分當南斗相去一百八十度何以遽能移照如是之速皆理之所不可解者也科目在宇宙間特小小事耳事有類於此者尚多狀元雖貴然亦人間一時之榮千載事業于此何與而便足以動天象如此豈文章科名亦天所貴耶天既貴之而今又絶之何也近年有言狀元若在南中則國家運數將盡者已而咸淳辛未嵗狀元張鎮孫乃廣州人也未幾而國遂亡然則科名氣數果有所關則昔人所謂自有文章司造化莫將科目待時賢者信矣夫氣數災異氣數災異之說揆理不通然亦有適應者豫嘗聞州里長老言嘉定壬午嵗南豐大水甲申嵗又大水紹定己丑廖寇破邑辛卯大饑荒後六十年至近嵗壬午衆謂邑當大水竊意太虛浩蕩所識者廣豈屑屑獨計吾豐邪至期邑果大水甲申嵗謂復水矣然卒不應逮乙酉又大水不減壬午焉丁亥大饑質鬻妻子至己丑衆又謂當有寇警殊又不然已而臘月慮逺耆與汀畬相挺而起至庚寅春某月日寇乘橋攻南門州兵禦之幸不破城而辛卯又饑特不如丁亥之甚雖不盡應顧亦不免然則災異氣數豈有期焉先定之乎三元嘗見厯家有三元甲子之說而不曉上元從何而起近見史書云厯自漢降沿革不同然大祗皆布算積分上求數千嵗之前必得十一月朔旦夜半冬至而日月五星皆㑹于子謂之上元以為厯始五行卜算家以四方分金木水火而土居中位於四方無所附麗於是寄之於水曰水土長生申水土旺在子水土庫在辰水土敗在酉愚嘗思之土不當寄於水克水者土安可相寄火實生土則火為土母以子寄母似為有理此說雖往來胸中未之能决因觀月令注黎兼為土官止謂祭五官之神於四郊句芒在東祝融后土在南蓐收在西元冥在北是也實五官而為四神者火土俱位南方其神皆祀黎又周禮大宗伯注顓頊之子曰黎為祝融后土食於火土是黎兼二祀也由此觀之則愚欲以土寄於火似合乎古人之說矣五色五色者青赤黃白黑也是為五方之正色若夫以木克土則青黃合而成緑以金克木則白青合而成碧以火克金則赤白合而成紅以水克火則黑赤合而成紫以土克水則黃黑合而成絳此五方之間色也五星聚處厯家謂宋季甲申嵗十有二月五星聚斗是為丑寅之間按五星緯天躔次不同其聚而同度實難考之前代漢髙帝時聚東井宋乾德五年聚奎宋季甲申聚斗其聚于井實開文景之治其聚于奎實開咸平慶厯之治今聚于斗其應雖未可知然以古今之難逢者一旦㑹逢其為正祥必也自當有驗特未知孰當其應爾史載漢元年冬十月聚井以躔次推之當在六七月之間宋初翰林學士竇儀與盧多遜楊徽之同朝嘗謂多遜等曰丁卯嵗五星聚奎自此天下太平二拾遺見之儀不及也已而果如其言今聚斗在十二月而厯家又謂來年十二月木星前行斗度數日恐于躔次不合然亦未知孰是余於厯學不習無以訂其是非然考五星所聚之方多在乾坤艮巽之位井在未申之間坤位也奎在戌亥之間乾位也斗在丑寅之間艮位也然則他時復聚當在辰巳之間巽位邪巽位之宿為角則四聚其在角乎謾記其說如此以待來者後考淳熙十三年丙午嵗八月乙亥日月五星聚于軫惟以乾德丁卯五星聚奎為瑞至淳熙丙午之聚軫則未有以瑞言者或謂聚主文故為瑞應而軫無可取故不言也然朱張吕陸星聚此時豈曰非瑞乎妖孽之名草木之變曰妖蟲蟻之變曰孽六畜變異謂之禍異物忽生謂之怪氣相傷相逆曰盩已上出玉厯及漢五行志今世俗常談惟曰妖孽曰妖怪然未知其所以命名之義隱居通議卷二十八
