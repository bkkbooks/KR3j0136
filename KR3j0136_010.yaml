body:
  text: 隱居通議卷十元劉塤撰詩歌五鴻泥人生到處知何似應似飛鴻踏雪泥泥上偶然留指爪鴻飛那復計東西老僧已死成新塔壞壁無由見舊題往日﨑嶇還記否路長人困蹇驢嘶此東坡集律詩第一首蓋和子由澠沱懷舊也注云往嵗馬死於二陵騎驢至澠沱此詩若繩以唐人律體大槩疏直欠工然鴻泥之諭真是造理前人所未到也且悠然感慨令人動情世不可率爾讀之要須具眼潄玉亭東坡先生蘇文忠公題廬山潄玉亭詩云髙巖下赤日深谷束悲風劈開青玉峽飛出兩白龍此等句語雄竒峭健宜必有超軼絶塵之句以終之而其末乃不過曰願從琴髙生腳踏赤鯶公手扶白芙渠跳下清冷中且意度卑甚殊無歸宿與起句如出兩手豈非坡公天才橫縱肆筆成書非若拘譾者以排布煆鍊為工故若是邪是以朱文公嘗論坡公作歐陽公文集序首云言有大而非誇達者信之衆人疑焉此數句可謂偉甚而末乃云詩賦似李白敘事似司馬遷則首尾輕重殊不相稱然則此獨非老先生文章之微瑕歟老杜則不然林艾軒評百家詩艾軒云百家詩抹一過只有孟浩然踏著實地謝元暉陶元亮輩人名不虛得也毋怪乎杜子美每每起敬子美豈下人者如孟東野劉賔客韓栁數家又如韋蘇州劉長卿等輩皆不在百家數中却别有説後村論詩有理後村序竹溪林公希逸詩有曰唐文人皆能詩栁尤髙韓尚非本色入宋則文人多詩人少三百年間雖人各有集集各有詩詩各自為體或尚理致或負材力或逞辨博少者千篇多至萬首要皆經義䇿論之有韻者爾非詩也自二三巨儒十數大作家俱未免此病乾淳間艾軒先生始好深沈加煆鍊有經嵗纍月繕一章未就者平生所作不數卷然以約敵繁密勝疏精掩粗同時惟吕太史賞重不知者以為遲晦竹溪詩比其師稿乾中含華滋蕭散中藏嚴密窘狹中見紆餘天下誦之曰詩也非經義䇿論之有韻者也後村經義策論之有韻者一句最道著宋詩之病然其自作則亦有時而不免豈知而故犯者邪遲晦二字亦道著艾軒之病劉玉淵評論太白以天分驅學力少陵以學力融天分淵明俯太白而差婉山谷跂子美而加嚴晚唐學杜不至則曰詠情性寫生態足矣戀事適自縛説理適自障江西學山谷不至則曰理路何可差學力何可諉寧拙毋弱寧核毋疏兹非一偏之論歟刪後詩四家淵明詩之佛太白詩之仙少陵仙佛傋山谷可仙可佛而儼然以六經禮樂臨之雖有作者莫可及矣詩家門户李黃微若可尋陶杜未易湊泊而陶為尤甚故李杜視陶又有分數融騷選唐者半山駕騷選以軋唐者黃陳混騷選以汩唐者梅歐蘇宋詩視唐為雜南渡後為尤雜唐自少陵外大抵風興工江西作者大抵雅頌長古詩一變騷再變選三變為唐人之詩至宋則騷選唐錯出山谷負修能倡古律事寧核毋疏意寧苦毋俗句寧拙毋弱一時號江西宗派此猶佛氏之禪醫家之單方劑也近年永嘉復祖唐律貴精不求多得意不戀事可豔可淡可巧可拙衆復趨之由是唐與江西相抵軋楚騷詩變也而六義備樂府騷變也而興頌兼後世為騷者比而已他義無也為樂府者風而已興頌無也古詩已不能禁風雅之不變刪後有作可求備乎此選與唐百家不害至今傳也山谷工用事雄説理江右由是成派其究雅多而風少少陵讀五車倒三峽吐驚人泣鬼之句岱嶽嶽陽真能籠乾坤萬里於一詠之內千古吟人望洋興歎及坡谷以道眼評之見趣又别坡稱子美凌跨百代古今詩人盡廢然陶謝髙風亦少衰矣山谷贊杜曰煎膠續弦千古無至落筆九天上一句則屬之陶何哉山谷既以落筆九天贊淵明其自述則曰蒲團日永鳥吟時罏薰一炷細參之猶欲傳蘇州心印至坡老直謂李杜雖跨百代古今詩人盡廢然陶謝髙風亦少衰矣惟韋應物發纎濃于簡古寄至味於淡泊非餘子所及悲夫二公豈非才雄學贍追方李杜有餘而退羡陶韋不足方將造忘言之妙而悲粗滓之不盡化歟竒韻近見有以闕字為韻者古今詩未有押此一字者蓋甚新也狨字韻亦罕見有用者豫近有詩曰羽纛金章映坐狨或亦謂其稍新趙信國桃符句趙信公葵鎮淮揚日有桃符句云日耀旌旗開大閫風傳鼓角到中原後句甚佳是時余制帥玠鎮蜀亦有桃符句云威行玉斧山河外春在金符掌握中可以相埒唐裴晉公度守東都劉賔客禹錫賀詩有曰萬乘旌旗分一半八方風雨會中州閎偉尊壯可備桃符也按玉斧事乃宋太祖開基時閲地輿圖偶持玉斧因以柄畫其分界今省記不全玉斧非刀斧也乃金杖子約長四五尺以片玉冠其首人主間步則持之猶今之柱杖等類神祠中素繪儀從猶或存此杜牧之湖州詩嘗讀太平廣記載杜牧之湖州詩曰自是尋春去較遲不須惆悵怨芳時狂風落盡深紅色茂緑成隂子滿枝今觀麗情集則曰自恨尋春到已遲往年曽見未開時如今風捭花狼藉緑葉成隂子滿枝大意雖同而前詩似勝若論紀實則後者為是尚當求杜集正之栁香近見臨川葉宋英有贈行詩曰栁香何處春風店酒醒月明聞杜鵑絶愛其興致清婉後見太白詩有云風吹柳花滿店香乃知有所自來特未知栁果有香否蠶蛾詩記兒時嘗聞人誦蠶蛾詩頗有思致今猶能記間為諸孫誦之曰自家纒裹一堆堆鼎沸方知身是災僥幸成蛾還棄擲更教明嵗早歸來蓋江南土俗每遇蛾􅔁卵後即送之長流祝曰蠶蛾兒蠶蛾兒明嵗早歸來義試詩往昔江南承平時鄉里諸齋間出題示學者賦絶句考殿最有極精巧者是時俱名曰義試詩嘗鈔録成帙亂離失之今猶記其一二有湯清伯賦夾竹桃曰芳姿徑節本來同緑蔭紅妝一樣濃我若化龍君作浪信知何處不相逢又某人賦蒲萄月曰春藤上架翠成窠顆顆光凝晚景多疑是蘂宫開夕宴結成珠帳待嫦娥賦孔明草廬圖有曰南陽髙卧屈將軍往事留傳水墨昏莫訝軸間茅屋小箇中藏得漢乾坤雖只體貼描畫然妙處自不可泯革命後曽唯仲賦草意有曰輦路淒淒隔嵗華王孫望斷怨天涯空庭煙雨無人管那有間情襯落花傷時懷舊令人悽然又贛曽蒼山嘗賦楊妃襪曰萬騎西行過馬嵬凌波曽此墮塵埃莫言一曲香彎小踏轉開元宇宙來韓陵陽論晚唐詩唐末人詩雖格到卑淺然謂其非詩不可今人作詩雖句語軒昻止可逺聽而其理則不可究此陵陽韓子蒼室中語也允謂深中宋詩之病近世劉後村亦謂宋三百年人各有集詩各有體要皆經義策論之有韻者爾非詩也二三巨儒十數大作家俱未免此病皆至論也其後劉須溪則又云後村所短適在於此可發一笑琵琶亭詩諸吕家于江州仕宋纍朝窮富極貴中外鼎盛及北兵至自文煥而下相率納欵無一人抗節報國其後有題詩於琵琶亭者一日吕老見之揮淚其詩曰老大蛾眉負所天尚留餘韻入哀弦江心正好看明月却抱琵琶過别船語意深婉信佳句也且有關於世道或云燕五峰右丞偕龍麟洲謁吕文煥酒酣命麟洲賦詩以琵琶亭為題麟洲賦此譏之吕老納賄請改賦既而好事者流傳義燕詩金會昌五年田器之帥師沙漠有燕子巢其土屋秋社前戲以帛題詩云幾年塞上負艱危何事烏衣亦此飛朝向沙場如有故暮投茅屋似相依君憐我處來迎語我憶君時不掩扉明日西風悲鼓角君應先去我何歸用蠟封裹繫於其足至泰和四年移上黨幕府時已十年忽於合翠堂見雙燕一飛户牖一棲硯屏器之見其足有所繫解之得舊詩遂繪為圖當時吟咏甚富今師孟郎中乃器之賢嗣也復求諸公賦之豫欲效顰而未能也姑記其事弔李肯齋詩相士葉秋月誦北人崔參政弔潭帥李肯齋詩曰一夕司空撫御牀祖龍未死國先亡只緣西楚無堅壁致使南州總戰場湘水一川骸骨滿肯齋萬古姓名香我來不見先生面獨對西風酹一觴無名好詩嘗記人誦一二詩皆好而不知其姓名上元詩云天碧銀河欲下來月華如水浸樓臺誰將萬斛金蓮子􅔁向層城午夜開茶詩云山谷雲濃春雨多曉來四野布干戈鎗旗不染胸奴血留與人間戰睡魔又感時一首云莫厭追歡買笑頻沈思離亂可傷神間時屈指從頭數得到清平能幾人此唐末五代時人所作讀之殊愴然也釘詩宋開慶己未丁大全緣宦者董宋臣得相不愜人望江西路分繆萬年賦釘詩以刺之大全大怒繩以法配化州其詩云頑磺非銅剛樣堅寒坑才離亟趨炎十來槌打隨成器一得人拈却逞攕不怕斧敲惟要入全憑鑽引任教嫌休言深處難抽拔自有羊蹄與鐵鉗豆腐詩宋咸淳間吉州龍泉縣有賣豆腐王老者年八十有六平生朴素不識字忽呼其子告以欲歸令代書豆腐詩曰朝朝只與磨為親推轉無邊大法輪碾出一團真白玉將歸回向未來人言訖坐化詩意亦有味也夢中得詩叔長秋麓先生無子以外族仲辨汝素為後既即世仲辨本生家曰兄曰弟盤踞于其室晨夕香鐙弗顧也一夕秋麓見夢仲辨有怒色索紙筆遂書一詩示之曰花邊臺榭栁邊城此日相逢各自親曽憶當年鐙下語如今辜負隴頭春詰朝仲辨焚香謝過遷其若兄若弟别室仲辨涕泣與豫言之豫謂世人云夢生于想子平日不學非能吟者心想之所不至今詳格調句法甚類生前之作而幽冥之怒深矣孰謂有死生之分哉揚州上元鐙詩賈似道鎮維揚日上元張鐙客有摘古句作鐙門詩者曰天下三分明月夜揚州十里小紅樓衆稱其切吾嘗以為此必藥州廖瑩中所為也唐人詩曰天下三分明月夜二分無賴是揚州又唐人登第詞曰揚州十里小紅樓盡捲上珠簾一半皆本郡事也山谷達論山谷有短句云三公未白首十輩擁朱輪只有人看好何益百年身但願身無事清尊對故人此達者之論足以警世賦詩誤用事南唐李後主煜崇信浮屠法刑政多弛有司奏死刑若遇其齋日則於宫中佛前然燈以達旦為驗謂之命燈未旦而滅則論如律不然率貸死富人賂宦官竊續膏油往往獲免近世臨川曽景建極賦金陵百詠有曰五詳三覆始施刑明滅蘭膏豈足馮可惜當年殺嚴續無人為益決囚鐙按續字興宗馮翊人徙家廣陵因父蔭仕南唐為禮部尚書中書待郎以不附宋齊邱為元宗景所知兩登相位盡忠不二後以言不見用求罷拜鎮海軍節度使屬疾還都後主以其國戚遣內夫人問之歷陳羣臣邪正辭氣抗慨不及其私翼日卒諡曰懿續始終全美未嘗被殺也曽公大詩人亦不免誤用事隱居通議卷十
