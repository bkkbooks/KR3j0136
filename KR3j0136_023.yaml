body:
  text: 隠居通議卷二十三元劉壎撰駢儷三聶侍郎上梁文聶善之侍郎子述建昌人也少與曾文莊公漸同讀書於麻姑山刻苦肄習俱成大名文莊公赴紹熙廷對光宗擢為苐二人仕至工部侍郎卒於位年纔四十二聶公亦擢世科踐敭中外歴都司至法從為四川制帥因張福之亂罷歸里晚年以宣奉大夫守贛川列爵至衛郡公富貴壽康當時同郡無匹之者嘗自作上梁文數篇文采可觀偶得故本謾録於此寶慶三年公在贛重建鬱孤臺上梁文云千騎居上頭節鎮素雄於昭信八境見圖畫臺觀尤盛於鬱孤踞龜首之穹嶐映虎城之突兀崆峒對聳章貢交流自宇宙便有此山至東坡而增重與風月之無盡藏壓西江而獨尊騷人墨客相繼吟哦車轍馬跡争先登覽然而年侵屋老基圮棟欹雖天造之絶竒奈人事之弗稱儻匪具胸中之丘壑安能領物外之雲烟使君於此不凡老子之興不淺故須出手以遂改圖從太守而游行繼醉翁亭之集後天下而樂竊愧岳陽樓之碑兹舉脩梁盍陳韻語伏願上梁之後一城和氣千里樂郊細民歌舞於春臺寒士歡欣於夏屋四并紀盛頻繁北海之開尊衆樂與同雜沓西園之飛葢文風丕變戎索允安嘉定間公創新居上梁文云陳元龍卧百尺樓夙負功名之志揚子雲有一區宅晚安寂寞之圖盡收湖海之豪歸逐桑榆之煗定齋主人遭逢過分出處隨縁五更三㸃而入朝久厭承明之直八千餘里而溯峽敢辭蜀道之難初心欲濟於艱虞何意適丁於變故頭頭顯著步步危機病身空想於狐丘全家幾陷於虎口造物獨憐其忠赤上恩乃許以生還安行大地之風波只伏通天之肺腑陳力就列不能者止投閒置散乃分之宜歸去來兮只欲安身於容膝聊復爾耳可能無地以曬褌旋作鷦鷯巢林之謀庶同燕雀賀厦之喜棲圖書以娛老景藝花木以印歳寒滅匃奴何以家為須還好手營莵裘吾將請老寧復遐心聊題六偉之詞以資一笑之噱伏願身心安泰骨肉康寧肻堂收教子之功含飴遂弄孫之樂良辰美景邂逅四并樂歳豐年均沾一飽游山之脚力常健對客之酒量日増鬼神訶禁不祥門戸興起未艾又作東宅上梁文云結廬南向甘歸隠於莵裘規地東榮更詒謀於燕翼為乃翁行樂之所作諸兒棲息之區若箇圓成吾事滿足定齋主人不才宜棄未老得閒萬兵立帳而里吏繞前曽作元龍之夢一水䕶田而兩山排闥每羡野人之居天施斥去之恩神相歸來之福一枝定卜百指具宜尚恨無燕坐以接親朋無隲地以種花木規模㤲㤲祇可為奉禮太祝之㕔童穉駸駸便當得㕘軍新婦之配載謀新築庶可奠居聚國族於斯何須輪奐定男位乎外靡限籓籬往來可當行窩褊迫難論别墅展名畫於四壁列怪石於兩廂暴法帖則多漫字之碑蓄古琴則學無絃之譜有客吃常堂之飯無事讀來世之書只爾便了吾生捨此寧復多事婆娑正坐君輩敢懷責子之心辛勤有此屋廬肻㤀束書之力聊題韻語以相工歌伏願心地清寧脚跟强健飽飯安眠而日日村歌社鼔以年年老景團欒曰富貴而與飲食阿奴蹌踉無灾難而至公卿子舍發祥孫枝衍慶下澤車欵段馬到處閒嬉赤脚婢長鬚奴勿來相惱鬼無闞室人盡遜耕又作歳寒堂上梁文云結廬在人境幸逃火刼之災藝木印歳寒添剏草菴之景聊取後凋之意以為晚對之宜定齋主人勇退急流願為老圃飽嘗世味掩鼻腐䑕之場識破幻塵留眼歸鴻之外頃回禄之為變幸靈光之偶存東里西鄰無復棟甍之接南貧北富率為瓦礫之場擴地得十畝之餘誅茅開三徑之所夭桃曼李祇得意於春風蒼檜緑筠願定交於晚節荼梅擢秀於雪裏橘柚垂實於霜前凡此同盟之人允謂㤀年之友十年之計種以木培植成隂一日不可無此君彈壓俗氣修梁載舉韻語前陳伏願飽飯長閒挂冠得請胸中丘壑具山髙水長之風筆下波瀾得霜降水涸之妙因孤竹君而識玉版老約赤松子而交黄石公徧㕘柏樹之禪頻醉梅花之夢淡交莫逆俗客不來共園公而睹玉塵相將橘隠㑹麻姑而劈麐脯重説桑田又創一樓其上榜以水月觀其下榜以逍遥游混融二教㑹作一家其上梁文云神仙好樓居聊欲逍遥於物外水月通禪觀又將證悟於胸中合心迹於雙清融道釋於一致定齋主人在家羽士有髪衲僧跳出呶籃始覺昨非而今是愛穿翻韤肻教人重而已輕手持種樹之書身抱灌園之甕無復萬間廣厦庇寒士之歡顔且圖百尺髙樓斂少年之豪氣不為行藏而獨倚將隨深淺以見機玉京十二闌干分明可到金地三千世界倏忽見前箇中落成吾生願足暫停工斲齊聽相歌伏願境静長春人閒不老凥輪神馬徧從塵外遨遊心印法燈盡向眼前了徹知有之非無無之非有悟空即是色色即是空挽浮丘袂拍洪厓肩相與共游方之内遭臨濟喝吃徳山棓孰如㕘不語之禪縱未能白日升仙也終解立地成佛嘉熙庚子歳公於旴城景徳寺門創一傑閣傃五百羅漢像於其中作上梁文云五百尊石橋大士化身久駐於浄方三千年刼火彌天餘燼未還於舊觀花甲已經於十稔檀那莫辨於衆縁水到渠成山鳴谷應定齋老人來佛果位見宰官身久厭塵縁求出世法無我相無人相天開方便之門學小乘學大乘願求解脱之路不憚有為之功徳要成無上之因縁阿堵物聚少成多運斤手將勤補拙采山而木客泣伐石而土丁愁伻圖告成卜筮協吉開法筵看第一義從浄土入不二門輪奐九霄龍象為之歡喜翬飛萬瓦燕雀賀其崇成於以祝當今皇帝之壽齡於以鎮南贍部州之世界聊題六律以相百工伏願佛日光明僧寶堅固為一大事續如來無盡之燈於萬斯年增主上在躬之厯病居士消身口意之業善知識結去來今之因阿闍黎朝朝去應縁道場小沙彌箇箇作承家法嗣風調雨順從今都是大有年貫朽粟陳到處盡成極樂國䕶持刼運鎮壓衺魔公有文十卷號定齋集其孫淮西運使世堅刋本濡須此其集中之一也他作多可觀然其仕宦所至頗乏廉稱其帥蜀也歸裝滿載由是田宅浸廣寶玩充牣屢為臺簡所攻故公論以此少之馮初心諸作馮景説夢得南劍人自號初心由進士入官歴知連山縣通判建昌軍開慶乙未賈師憲以樞密便宣撫京湖辟為幹辨公事以箋表受知師憲入相力㧞擢登朝歴清顯掌内外制與後村劉潛夫相繼代言景説晚進名望在劉公下然劉公文章宿老為工部尚書僅得兼直學士院而師憲擢景説乃至真拜翰林學士知制誥時論以為不公葢景定間也景説有初心玉堂集十六卷掖垣集三十卷板行於時嘗見西園傅公謂余曰頃於矩齋曽公館中見几間有初心二集謾啟卷觀其一二全不成文章因擿去不復觀余竊駭傅公之言以為師憲固不學無術之相然朝廷擢一詞臣發帝之制海内具瞻縱非竒材亦何至如傅公所言哉即欲求其藁證驗不可得也歳在甲申乃始從曾九華假馮集熟觀見其所作嚴重縝宻事辭飽滿亦可謂平正之文所病者層砌堆疊而乏疏暢活動之工比之後村天材宏縱雄渾超卓則誠有不及而謂其全不成文擿置弗視則傅公之言眇之過甚葢傅公老儒交游後村梅亭諸公景説晩進固宜其俛視之然文章繩尺自有定論未容以輩行先後望風輕訾此吾所以欲為平心之論也余編中華黼藻集已悉取初心集之佳者具在而猶有警聨可稱者輙列於此賈師憲進書加恩制詞有云恭惟茂陵越我穆考前聖後聖一也㑹之有元大事小事書之俟而不惑坦然示以軌範煥乎其有文章商頌十二篇兹葢得於考父武成二三策實見取於孟軻今余宣乃重光成於五載日月所照罔不尊親天地之間而大豐美壹是謨烈之佑後亦惟朝夕以輔台予所謂嚴宻飽滿而欠疏暢活動者於此可見矣葉鎮之夢鼎免右丞相依前少保授觀文殿大學士判福州福建安撫大使制詞有曰東海記夜衣之往同州副渭獵之求曰俞汝諧爰置諸右未殫逺業遽動遐心惟三少一請得謝故事以為非大夫七十致事有徳則勿聽引年何謂抗疏不移胡寧忍予是自棄朕顧上下之交其志同也而君臣之義如何廢之既難反於留行是用華其去位賈師憲明堂加恩制有曰右我穆考格于皇天謨興唐虞以俟聖人不惑功見河洛號為天運重開今也犧尊在西匏竹在下侑於宗祖交於神祇維朕屬屬如弗勝勿勿乎欲饗粢盛秬鬯爾乃將至治之馨衡紞紘綖爾乃著孔容之側來馬游乎閶闔畢寮從乎崑崙肸蠁豐融帝五位之時序洗濯鏟鋏民四方之太和以予敬休得師殖禮率有功而不伐將無官之可酬安南國王該郊祀加恩制有曰服領自治之雖殊周疆之索土宇爾厚矣俾服漢官之儀又曰維天於穆賜朕宏休孝通神明薄四海而皆準南暨聲教綏萬福以攸同陳昉除史官誥詞有曰君子多識前言往行具有典刑聖人所修舊史遺文尚求㫖趣包恢除端明殿學士簽書樞密院事誥詞曰春秋王者無外首明一統之經天下大老來歸實重五經之本渙敭明命孚驗羣工具官包某學積於原而心彌充智酬於變而力彌裕教於齊國本伏生口授之書儀我漢庭皆申生力行之對永肩一節逮事兩朝外而雲雷之經綸内而日月之獻納所至可紀非道不陳頃往聘者久之乃覽輝而至止爾惟訓克邁乃訓緝熙典學之功朕儀刑有徳惟刑敷繹咸中之慶斯今圖小毖之助屬采薇之勤於稽仁皇有若臣拯曾以方嚴之操而陪宥宻之聨尚有典刑矧乃書考四十必攀軌轍寘諸執政二三書殿穹班武經大筆以増西府之重以成南方之强噫敷前人命不忘大功葢欲圖敉寧之事今冲子嗣無遺壽耉尚思稽勤恤之謀克贊廟謨丕昭成效馬光祖自建康除㕘政有曰黄旗紫葢千載南方之强大纛髙牙三命北門之管又曰賢者時人耳目尚見老成執政猶吾股肱式和鬷假姚希得除資政學士有曰大學東㕔典故西㕔曾柬知於先帝華至蔑席文貝底席實協贊於冲人江萬里知太平州有曰朕綜核名實統輯黎元數下恩澤詔書誰與領此親見郡國守相問所以然又曰不逺帝城尚冀京師之福雖在外服毋忘王室之心嘉與含生之民共由太平坦蕩之路吳堅兵部尚書誥有曰王覲為可思見春宫之端寮氏功曰庸峻陟夏官之常伯洪天錫顯文閣待制帥潭州有曰承明勞侍從勇辭加璧之招岳牧用詞人特重分符之寄莫如南紀用張中軍又曰翽翽亦集爰止已半老儒咄咄不相助耶獨一選士黄萬石殿中侍御史誥有曰遹駿殿中無雙之稱勿替法筵第一之義萬古在前億世在後惟名節之不磨羣枉俱閉衆正俱開尚邦家之有賴章鑑遺表贈官有曰某蚤服官常晚登禁從清要之路老成尚想於典刑黄散之班俛仰已成為陳迹反吾初服懷吾里居何蒹葭之凄凄曰龍蛇之起起惟是窀穸能不䀌傷鄧坰贈光禄大夫誥曰窮化盡數忽擥於遺占隠卒崇終宜優於愍典某履行謙毖涖政廉平有此典刑曾不當於吾世居然夢幻遽已隔於重泉能不䀌傷可無寵異昔貢禹守經據古山濤舍政自髙皆以老成而拜光禄大夫年彌髙而徳彌邵通國賢之生也榮而死也哀闔棺定矣其追美躅以賁寵章文及翁除尚書郎官行詞有曰圓精垂象大微著乎積宿天臺帥屬武銓劇於列部非夫標清海岱津平水鏡則孰能舉用資其甄明薄最倚之詳緻者矣此葢用六朝之體亦一格也南郊鹵簿使包恢加恩誥有曰詔招揺鉤陳使當兵流星旄而燭電令望舒飛㢘使奔屬雜瑶象以駕龍紛其葳㽔靡不胖飾參旗來清晝之捷斗衡揭中宵之符琄玉和鳴芸珠絢耀賈似道曾祖母贈魏國夫人誥有曰肇稱殷禮咸秩無文時維曾孫之助為歌魏風曰大而婉世比小君之封賈涉封魏王有曰朕肇稱殷薦穆卜夏正天子相維辟公假哉皇考乃父厥有成績紀於太常賈似道生母胡氏加封有曰母以子貴書特書而屢書君為臣綱老吾老而及老知寶慶府麋􅠐被監司按發降官誥詞曰邵陽我先皇帝潛龍之邦嘗選用能太守以爾父闕為嘉定直臣爾弟弇亦近世辨吏咨爾往牧亢其家聲乃使部使者得以數其過於朕前朕固憮然於此矣削官二列遲爾惟艾以上皆馮集中語禀經酌雅極有本原初不為謬其短處在砌疊全句以求典實之工不知全句太多反傷重滯而無神化之妙作四六自有法度不用全句固不可純用全句亦不可馮其未知之歟若意脈沈厚風骨蒼勁雖不用古人語而自作議論辭意俱到尤為超絶近世惟陸放翁深得此體故其表啟獨步一時惜乎其不大用也使之當制必能黼黻皇猷以名百世其後惟後村劉潛夫力學陸體故代言之作應用之文皆非時輩能及楊誠齋表箋亦自超出翰墨畦徑可諷而誦然病於大竒遂至刻露曽不如陸之深沈渾厚也嘗紀戊午己未間景説倅貳旴江時通𢎞齋包公啟有曰其在暗室屋漏洞洞屬屬如交神明凡為天下國家磊磊落落若行日月又曰九分君實兒童皆誦其名一箇包家鬼神亦落其膽又通陳右司啟結句有曰春風坐了三箇月願自進於明道之門黄昏一洗十年腸殆庶幾乎後山之學自初學觀之亦可謂工矣其如累句之太多何鄧季顒所作臨川鄧季顒林號謙谷冨有文采嘗以翰墨見賞於諸公間開慶己未陳華父元桂出守臨江以鄉里故約季顒與俱凡文墨皆屬焉㑹鄂渚逗渡江右俱警江西制置副使徐有功敏子駐臨江華父大合樂以饗之季顒為作樂語甚佳有曰持節督官軍次碧嶂清江之列負弩迎使者瞻碧油紅斾之輝云云某官通身是膽滿腹皆神三十年前為周造士進士一萬里外識漢䕶軍將軍云云結語云幸有陳平六出計可與相謀吾知徐公百不憂何妨徑醉試築急摻以動殺聲此數語竒氣拂拂真俊才也口號有曰平生朋友叔知我天下英雄操與君亦自佳句惜省記不全耳其後臨江破有功遁華父堅守死節理皇哀其忠贈官立廟澤及二子貶有功於封州季顒逃免後擢進士第客淮帥李祥甫庭之舘中仕至京官後為江西提刑黄東鄉震所劾仕不大顯識者惜之隠居通議卷二十三
