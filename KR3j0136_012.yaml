  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0136_WYG_012-1a, image: WYG0866/WYG0866-0117a.png}
body:
  text: 隱居通議卷十二元劉塤撰詩歌七文丞相采薇歌文丞相天祥至公血誠捐軀死國忠義之節照映古今固不以文章為存亡也然近日書市刋其采薇歌成帙易其名曰吟嘯稿皆丞相戰敗後被執過北時詩實多佳句謾摘於此亦可因其詩以知其心矣出嶺同誰出歸鄉如此歸被執出南安軍作如此歸三字最有深味今繆者誤刋作如不歸則意味索然矣雲靜龍歸海風清馬渡江萬安晚渡長有歸來夢衣冠滿故園寄里中友風雨宣城路重來白髮新長江還有險中國詎無人安慶府方誇金塢築豈料玉牀搖國體真三代江流舊六朝鞭投能幾日瓦解不崇朝千古吳山恨西風捲怒潮魯港乃賈似道潰師處此結句絶妙健兒徙幽土新鬼哭臺城一片清溪月偏於客有情建康蒲萄肥汗馬荆棘冷銅駝巫峽朝雲濕洞庭秋水波江行有感英雄遺算晚天地暗愁新真州庾子江南夢蘇郎海上貧呈中齊禾黍西風夢川原落日悲斯文今已矣來世以為期同上一彎流水小數畝故城荒回首江南路青山斷夕陽過召伯芳草中原路斜陽故國情小情口漠漠地千里垂垂天四圍桃原道中野濶人聲小日斜駒影長崔鎮驛家國哀千古男兒慨四方汶陽館欲鞭劉豫骨烟草暗荒邱東平土花開國舊風絮渡江前過梁門更和天塹失回首慘啼鵑同上芳草江頭路斜陽郭外村池州七言春事暗隨流水去潮聲空逐莫天回越王臺巡逺初無兒女態夷齊肯作稻粱謀黃金市丹心不改君臣義清淚難禁父母邦泰和半生幾度此登臨流落而今雪滿簮南浦不知春已晚西山但覺日初隂隆興滿地蘆花和我老舊家燕子傍誰飛從今别却江南路化作啼鵑帶血歸金陵眼裏遊從驚死别夢中兒女慰生離早秋江海無情逰子倦嵗年如夢美人遲晚起客情恰與秋俱半人影何如月倍圓中秋青牛過去關山動白鶴歸來城郭荒蒼然亭古體北征垂半年依依只南土今晨渡淮河始覺非故宇云云我為綱常謀妻子不得顧過淮河衣暖露自乾鬚寒水欲凝將軍戴鐵笠壯士敲金鐙發宿遷自别張公子嬋媛不下樓遂令樓上燕百世稱風流我遊彭祖門來弔楚王闕問樓在何處城東草如雪蛾眉代不乏埋沒安足論因何張家妾名與山川存自古皆有死忠孝長不沒但傳美人心不說美人色徐州燕子樓長陵有神氣萬嵗光如虹有時風雲變魂魄來沛宫沛縣歌風臺軒冕委泥塗衮繡易氈毳百年雜醜好始酹四方志發潭口唐家再造李郭力若論牽制公威靈平原當年幸脫安祿山白首竟陷李希烈希烈安能遽殺公宰相盧杞欺日月亂臣賊子歸何處茫茫烟草中原土公死于今六百年精忠赫赫雷行天同前我過梁門城樓桑在其北元德已千年青烟繞故宅道傍為揮泪裴回秋風客天下卧龍人多少空抱膝樓桑世以成敗論操懿真英雄孔明平生祖豫州白首起大事東門長嘯兒為避一頭地何哉戴若思中道奮螳臂豪傑事垂成今古長短氣祖逖人世誰不死公死千萬年顔果卿睢陽水東流雙廟垂百世當時令孤潮乃為賊游說張巡豫每讀文丞相詩味其情思想其風景令人悲不自勝為之悵然廢卷竟日道體堂刋文山集文丞相人品科名官爵俱為宋朝第一不必論其詩文自有與天同夀者然觀道體堂所刋文山集諸詩中惟棊詩四絶頗佳其一為周子善言蕭耕山象奕能勝二劉不覺敗于子善子善又敗于我詩曰螳臂初來攫晚蟬那知黃雀沫饞涎王孫挾彈無人處一笑雕盤屬玳筵其二為耕山言老夫又敗與子善詩曰射虎將軍髮欲枯茫茫沙草正迷途小兒謾取封侯去還是平陽公主奴其三為劉淵伯言所畏惟吾與子善耳詩曰坐踞河南百戰雄少年飛槊健如龍世間只畏兩人在上有髙公下慕容其四為劉定伯言與淵伯上下也詩曰擊柱論功不忍看築壇刑馬誓河山當年灌絳知何似只在春秋魯衛間此四絶雖是比體亦自兼興可以諷詠餘不及也又慶羅母百嵗有一律曰麗日萱花照五雲升堂風采見乾淳蓬萊㑹上逢王母婺女光中見老人雨露一門華髮潤江山滿坐綵衣新只將千嵗苓為夀更住人間九百春詞雖直致意頗滿足猶記丁丑戊寅年間𫝊到一絶云丞相揚州城下所賦其詞慷慨激壯非也詩人所能言也黯雲霏霧暗扶桑半壁東南盡雪霜壯氣不隨天地變笑騎飛鶴入維揚讀文山詩作李明通謙思信州人也少以書義補入太學而論工䇿尤工每試多占魁列當時策體為之一變後纍試積分至優等上舍為釋褐狀元授泉州推官歸時事改更隱居鉛山近有録至所賦一章筆力甚健名曰讀文山詩作南人不識兩膝貴曲摺百態卑且勞斯人護膝不護頭甘以頸血黏弓刀蟠胸孤憤劈不碎殺氣千丈纒旌旄援枹親鼓盡南八背水更用蛋下䥝俘來祝墨吐神語咄咄尚與天爭豪須㬰亦日减顔色元雲莽晄風􅊧搔或言巨靈收拾付真宰讀罷拊臆生長號又言豐隆列缺對愁絶疾指玉鞭鞭六鼇兩瓢倒翻水怪舞斗極橫軋天籟號憐伊肝膽苦復苦誓見曩日真離騷劫灰滿地莫挂眼蓬萊雖逺容輕長驅厲鬼尚堪戰儘閒未許飛仙敖乃言廢興在爾不吾與吾死吾主吾焉逃魯叟聞言拍掌笑斯人六經為骨為皮毛斯人卷取六經去只將贋本𫝊兒曹艾軒吟咏艾軒林公光朝詩不多别為體壓卷如東宫生日詩頗富麗其詩曰北闕雲為堞東明玊作宫猗蘭迎曉日仙掌倚晴空笙律隨鳴鳳朝儀趁采紅黃麾初入杖青桂自成叢冠屨分前後圖書考異同商盤如目擊羲畫自心通慈燕來三殿歡謡在九功長秋𫝊夜飲京兆報年豐奕奕還嘉祐綿綿想建隆庶僚何所祝再拜續維熊又有癡頑不識字歌一首答許叔節曰平生讀書如風過耳嵗月共流轉如磨復如蟻一如人嚼蠟而不見其味又如弄孤杵連夜不成米又如過羊腸十步復一止見君詩舌如綺怪怪竒竒如懸崖萬仞盤龍古樹枝又如生馬不施控而馳又如錦菭封幔硯山墮泪碑又如玉關客血生老稚衣盧全孟郊骨已朽眼精頭顱孰𫝊授與君往還嵗月久比來春風入我牖便覺庭前草木有生意跨蹇驢出古寺欲訪子雲問竒字想許公之詩必竒怪如盧同輩故云爾生女一首曰貧家生一女蟋蟀催寒杵富家生一女暖風來玉樹富家生女才及笄阿官門前新築堤貧家不生女飯牛小兒安得妻荆叉玉璫各隨分醉中之天無髙低乞貓有曰寧可時時被鼠煎狂貓一夜不成眠廣南六月官軍到見說人家斷火烟送陳應求侍郎俊卿赴泉州序云昔侍郎蔡公嘗大書於洛陽橋上今侍郎過洛陽當摩挲此石也某送别到惠安賦詩云百片牙旗水面長蔡雍題在刺桐鄉十年杯酒開雲樹一樣官銜過洛陽我亦攜家緣送客誰能掃地自焚香野橋衝臘寒梅白莫要登臨憶侍郎梅邊集頃壬辰癸巳嵗有臨川朱兄浚過訪出其詩曰梅邊集以惠教豫愛其流麗穩熟不作寒乞語為跋其後己而與之賡酬則與集中作大異豈謀野則獲與蒙被作文性情各有所宜耶然極愛之為摘其句七言律有云寺鐘城鼓兩相和共醉烟關感慨多堤栁垂金春幾許檐花鳴玉夜如何春夜西湖西風落葉長安夢晚節寒華老圃心京師九日玉帳分兵賦采薇梅花吹雪上戎衣將軍意氣中江楫丞相功名采石磯送人巡江紅雲近處催班急只待春前奏凱歸同工蓬萊春思重雲上江漢秋情十載前謝方碧虛金寒霜氣山無虎劍動星光水有龍平江虎邱山皇帝當天第九春宫符仍詔刻麒麟軍咨祭酒金臺客國子先生鐵壁人送吳制參赴麟捆明明采石兵前樣參贊歸來即近臣同上落花水暖千船聚芳草春深一鶴歸南浦夜泊米車已過塵迷路漁網才收月滿船琵琶亭五言不多皆穩熟可觀如海燕故人意杜鵑逰子心次韻故里千山隔終年一字無訪舊溪月知相憶江雲約共吟夜船書一紙飛過赤楓林寄友幾州陵變谷經月雨為霖世事今如此西風動客心秋日西湖絶句有贈賣墨吕雲叔訪陳烟山詩曰仙宗傳訣自分明未數當年老樹精一片紫雲光滴滴丹墀成就幾公卿又曰蓬萊仙子世偏珍琮璧多携問楚津若向積烟峰下過殷勤𫝊語卧樓人都城初秋和趙京倅詩曰從來美玉價連城結佩乘風十二京攜上崢嶸今有約好留彩筆調清平暑夢蟲蟲似醉中片雲挾雨過長空不知秋色來多少分數暖凉卜晚風宇宙清愁望眼中誰將凉雨借龍公秋風夜入關河迥破賊紅旗兟曉空凡此皆流麗不塵更增骨力便可名家矣隱居通議卷十二
