body:
  text: 隱居通議卷七元劉壎撰詩歌二杜少陵前缺脫數張缺冬狩行云春蒐冬狩矦得同使君五馬一馬驄况今攝行大將權號令頗有前賢風飄然時危一老翁十年厭見旌旗紅喜君士卒甚整肅為我回轡擒西戎草中狐兎盡何益天子不在咸陽宫朝廷雖無幽王禍得不哀痛塵再䝉哀江頭云清渭東流劔閣深去住彼此無消息人生有情淚沾臆江水江花豈終極黄昏胡騎塵滿城欲往城南忘南北此見少陵忠君憂國身居渭水而憶劔閣非謂靈武也舞劔行云先帝侍女八千人公孫劔器初第一五十年間似反掌風塵澒洞昏王室棃園子弟散如烟女樂餘姿映寒日金粟堆南木已拱瞿塘石城草蕭瑟玳筵急管曲復終樂極哀來月東出遣興云下馬古戰場四顧但茫然風悲浮雲去黄葉墜我前朽骨穴蝼螘又為蔓草纒故老行歎息今人尚開邊漢慮互勝負封疆不常全安得亷頗將三軍同晏眠以上諸篇或豪宕悲壯或深沈感慨有無窮義味盖杜作為古今之冠而此等又為杜集之冠更千百世無能及者故摘出以備吟誦石龕云熊羆咆我東虎豹號我西我後鬼長嘯我前狨又嗁天寒昏無日山逺道路迷此體竒甚而有楚騷風味懷台州鄭十八司户云天台隔三江風浪無晨暮鄭公縱得歸老病不識路昔如水上鷗今如罝中兎性命由他人悲辛但狂顧山鬼獨一腳蝮蛇長如樹呼號旁孤城歲月誰與度從來禦魑魅多為才名誤夫子嵇阮流更被時俗惡海隅微小吏眼暗髪垂素黄㡌映青袍非供折腰具平生一桮酒見我故人遇相望無所成乾坤莾囘互此詩竒俊悲吒為夢李白之亞石壕吏云夜乆語聲絶如聞泣幽咽天明登前途獨與老翁别言有盡而意無窮新婚别云君今往死地沈痛迫中腸誓欲隨君往形勢反蒼黄勿為新婚念努力事戎行婦人在軍中兵氣恐不揚沈鬱頓挫哀而不傷發乎情止乎禮義之言也大麥行云大麥乾枯小麥黄婦女行泣夫走藏東至集壁西梁洋問誰腰䥥胡與羌豈無蜀兵三千人部領辛苦江山長安得如鳥有羽翅託身白雲歸故鄉苦戰行云去年江南討狂賊臨江把臂難再得别時孤雲今不飛時獨㸔雲泪横臆宛轉悲愴讀之悽愁光禄阪行云馬驚不憂深谷墜草動只怕長弓射昔人但以此等作言語㸔予身經亂離奔竄林薮每咏此句然後知少陵狀景之妙用如快鶻風火生此句壯健飛動可以想見花卿之雄至於羌村三首宛然陶體同谷諸篇宏縱竒峭中涵深悲詩之至也天属尊堯典神功協禹謨聖圖天廣大宗祀日光輝國有乾坤大王今叔父尊風塵三尺劔社稷一戎衣山河扶繡户日月近雕梁五聖連龍衮千官列雁行帝力收三統天威總四溟社稷經綸地風雲際㑹期大角纒兵氣鈎陳出帝畿洛下舟車入中天貢賦均僊仗離丹極妖星下玉除日月低秦樹乾坤繞漢宫地平江動蜀天闊樹浮秦吳楚東南坼乾坤日夜浮地利西通蜀天文北照秦天地軍麾滿闗河戰角悲四瀆楼船泛中原鼓角悲書信中原闊干戈北斗深國破山河在城春草木深社稷纒妖氣干戈送老儒社稷堪流涕安危在運籌草木歳月晩闗河霜雪清北闕妖氛滿西郊白露初朝野歡娛後乾坤震蕩中帳殿羅𤣥冕轅門照白袍孤雲隨殺氣飛鳥過轅門兵氣囘飛鳥威聲没巨鰲魚龍囘夜水星月動秋山江闊浮髙棟雲長出斷山落日心猶壯秋風病欲疏白摧朽骨龍虎死黒入太隂雷雨垂那知根無鬼神㑹已覺氣與嵩華敵天兵斬斷青海戎殺氣南行動坤軸反思前夜風雨急乃是蒲城鬼神入元氣淋漓障猶濕真宰上訴天應泣指麾能事囘天地訓練强兵動鬼神花蕚夾城通御氣芙蓉小苑入邊愁秦城樓閣烟花裏漢主山河錦繡中玉几由來天北極朱衣只在殿中間北極朝廷終不改西山冦盜莫相侵五更鼔角聲悲壯三峽星河影動揺三年笛裏闗山月萬國兵前草木風錦江春色來天地玉壘浮雲變古今思家步月清宵立憶弟㸔雲白晝眠永夜角聲悲自語中宵月色好誰㸔時危兵甲黄塵裏日短江湖白髪前反照入江翻石壁歸雲擁樹失山村絶壁過雲開錦繡疎松隔水奏笙簧負鹽出井此谿女打鼔發船何處郎擊柝可憐子無衣何處邨以上皆少陵句法或以豪壯或以鉅麗或以雅健或以活動或以重大或以涵蓄或以富豔皆可為萬世格範者今人讀杜詩見汪洋浩博茫無津涯隨羣尊慕而已莫知其所從也因摘數十聨表而出之其佗殆不勝書姑舉其概善學者固可觸類舉隅矣至若圓荷浮小葉細麥落輕花岸花飛送客檣燕語留人草敵虚嵐翠花禁冷葉紅野船明細火宿雁起圓沙暗飛螢自照水宿鳥相呼如此者人能知之今不復録杜句皆有出處家藏小册一本字畫甚古題曰東坡老杜詩史事實略舉杜句有曰賤子請具陳引毛遂云公子試聽吳越之事容賤子一一具陳公子可行即行可止則止杜句曰下筆如有神引仲舒答策下筆疑有神助杜句曰青㝠却垂翅引李斯曰丈夫如提筆鼔吻取富貴易若舉桮何青㝠之翮與鴳共垂翅乎杜句崆峒小麥熟且願休王師引武帝欲討西羌耿遜諌曰今崆峒小麥方熟陛下宜休王師如此者凡十卷乃知杜句皆有根本非自作語言也山谷云杜詩韓文無一字無來處今人讀書少故謂韓杜自作此語予初未以此說為然今觀此集則此言信矣後世作詩者無根之言耳歐陽公歐陽文忠公脩鴻文碩學宗工大儒所謂文起八代之衰道濟天下之溺者固不以詩名人亦不敢以詩人目之而公亦不以詩自名也學者每恨公詩平易淺近少鍜錬之工不得與少陵山谷爭䧺予獨以為不然公之所作實備衆體有甚似韋蘇州者有甚似杜少陵者有甚似選體者有甚似王建李賀者有富麗者有竒縱者有清俊者有雄健蒼勁者有平淡純雅者試摘其古體數篇與韋酷似而世或未之知也如伊川獨遊曰東郊漸微緑驅馬忻獨往梅繁野渡晴泉落春山響身閒愛物外趣逺諧心賞歸路逐樵歌落日寒山上如寄軍巡劉判官曰遥聽洛城鐘獨渡伊川水緑樹鬱参差行人去無已因髙望京邑驅馬沿山阯落日亂峰多龍門何處是如游龍門上方闗曰聞鐘渡寒水共歩尋雲幛還隨孤鳥下却望層林上清梵逺猶聞日暮空山響行次華縣曰朝渡汝河流莫宿楚山曲城隂日下寒野氣春深緑征車倦長道故國有喬木行行漸樂郊春風滿平陸晩歩緑隂園有曰餘春去已逺緑水涵新塘漸愛樹隂宻初迎薰風涼雪晴有曰悠悠野水來豔豔西谿闊曉日披宿雲荒臺照殘雪凡此數章不似蘇州乎或又謂此特音節似之而趣味殊懸絶若然則予所不解也其酬學詩僧有曰維詩於文章泰山一浮塵又如古衣裳組織爛成文拾其裁翦餘未識衮服尊送張如京知安肅軍有曰界上山河壯軍中鼔角雄送王尚哲三原尉有曰山河識天府風雨度函闗下直呈同行三公有曰萬國舟車㑹中犬象魏雄鞏縣陪祭有曰落日漢陵道初寒惨暮飈送謝希深北使有曰鼔角雲中壘牛羊雪外山如此等語殊似少陵舉此以例其餘概可知矣而謂公不工於詩可乎所可恨者格卑耳要亦崑體之餘習也廬山髙明妃曲鬼車水谷夜行諸篇古今學者誦之習矣而予尤喜其贈沈遵一篇清婉流麗自成宫商盖學者未之知也其詩曰羣動夜息浮雲隂沈夫子彈醉翁吟醉翁吟以我名我初聞之喜且驚宫聲三疊何泠泠酒行暫止四座傾有如風輕日暖好鳥語夜静山響春泉鳴坐思千巖萬壑醉眠處寫君三尺膝上横沈夫子恨君不為醉翁客不見翁醉山間亭翁歡不待絲與竹把酒終日聽泉聲有時醉倒枕谿石青山白雲為幔屏花間百鳥喚不覺日落山風吹自醒沈夫子君過滁陽今幾時滁人皆喜醉翁醉至今人人能道之長記山間逢太守籃輿酩酊挿花歸我時四十猶强力自號醉翁聊戯客邇來憂患十年間鬢髪未老嗟先白滁人思我雖未忘見我今應不相識沈夫子愛君一罇復一琴萬事不可干其心自非曽是醉翁客莫向俗耳求知音此篇筆力超然髙風逺韻尚可想見豈尋常詩人繩墨所能束縛送張屯田歸洛歌末句云感時惜别情無已無酒勸君空有淚西歸必有問君人為道别來今若此又述懷送張總之有云鬱鬱河堤緑樹平送君因得到東城落花已盡鶯猶囀垂栁初長蟬欲鳴去年送客亦曽到正值楊華亂芳草人心不復故時歡景物自隨時節好感今懐昔復傷離一别相逢知幾時莫辭今日一罇酒明日思君難重持此皆流麗有情致可吟諷也前四句律詩格重字當作平聲讀人生一世中長短無百年無窮在其後萬世在其先得長多幾何得短未足憐惟彼不可朽名聲文行然䜛誣不須辨亦止百年間百年後來者憎愛不相縁公議然後出自然見媸妍孔孟困一生毁逐遭百端後世茍不公至今無聖賢所以忠義士恃此死不難重讀徂徠集天形積輕清水徳本虚靜雲外風波止始見天水性澂光與粹容上下相涵映乃於其兩間皎皎挂寒鏡飛盖橋翫月大數四百炎靈銷誰其代者當塗髙窮姦極酷不易取始知文景基扃牢銅雀硯歌子丕當初不自恥敢謂舜禹傳之堯得之以此失亦此誰知三馬食一槽同上英雄置酒奉髙㑹巍然銅雀髙岧岧一朝西陵有拱木􅀈嗼繐帳空蕭蕭當時凄涼已可嘆而况後世悲前朝髙臺已傾漸平地此瓦一墜埋蓬蒿同上以上數語有斷制有議論非徒工言語者文忠公得時行道在慶厯嘉祐治平間正宋朝文明極盛時故發為詩章皆中和碩大之聲無窮愁鬱抑之思所謂治世之音安以樂以其時考之則可矣然亦有竒壯悲吒如寒風八九月北渡大河津玉塞積隋甲金戈耀秋雲送孔生游河北馬饑齧雪渇飲氷北風捲地來崢嶸馬悲蹢躅人不行日暮途逺千山横馬齧雪古栢嶺口踏新雪馬孟山西㸔落霞風雲莫惨失道路澗谷夜靜聞麕麚行迷方向但㸔日度盡山險方逾沙同上如此等作可與古人出塞曲相伯仲信乎能備衆體者矣范蜀公嘗謂仁宗四十二年太平都被栁詞寫盡以愚觀之栁詞何足當此歐詩數聨或者足以想見當時太平氣象今録如左萬馬不嘶聽號令諸蕃無事樂耕耘緑槐夾道飛黄盖翠輦鳴鞘向紫宸雲深曉日開宫殿水闊春風颺管絃玉勒爭門隨仗入牙牌當殿報班齊鳯城斜日留殘照玉闕浮雲結夜霜金闕雲開滄海日天街雨後緑槐風瓊花落處縈僊仗玉殿光中認赭袍五色詔成人不到萬年風動閣生涼組甲光寒圍夜帳彩旗風煖㸔春耕威行四境風烟斷響入千山號令傳年豐千里無夜警吏退一室焚清香九門寒食多遊騎三月春隂正養花晴明風日家家栁髙下樓臺處處山以上數聨誦其詩想其景則昇平氣象瞭然在目豈季世所得見引筆至此流涕太息曽南豐自曽子固不能作詩之論出而無識者遂以為口實乃不知此先生非不能詩者也盖其平生深於經術得其理趣而流連光景吟風弄月非其好也往往宋人詩體多尚賦而此與興寡先生之詩亦然故惟當以賦體觀之即無憾矣唐詩之清麗空圓者比與興為之也宋詩之典實閎重者賦為之也然先生之詩亦有不皆出於賦者如古體有麻姑山一首送南城羅尉者甚似太白蜀道難其中未嘗無比興也謹録於後麻姑之路摩青天蒼苔白石松風寒峭壁直上無攀援懸磴十歩九屈盤上有錦繡百頃之平田山中道人耕紫烟又有白玉萬仭之飛泉噴崕直㵼蛟龍淵豐堂廣殿何言言階腳挿入斗牛間樛枝古木不記年空槎􅑎然臥道邊幽花自嬋媛林深為誰妍但塵消境靜翔白鶴吟清猨雛禽乳鹿往往嗥荒巔卻視來境如縁絙千重萬疊窮巖巒下有荆吳粒粟之羣山又有甌閩一髪之平川奕棊縱横逺近布城郭魚鱗参差髙下分岡原千竒萬異可意得筆墨秃盡誰能傳丈夫舒卷要宏逹世路俛仰多拘牽偶來到此醒心目便欲洗耳辭囂喧羅夫子一日逺補東南官愛此層崕峻壑之秀發開軒把酒可縱觀喜此披霄挿漢之夐起出門舉足得往還羅夫子一尉龍蛇方屈蟠此邦人人衣食足闔境年年枹鼔閒几案剸裁得休暇山水登躡遺紛煩我行送之思故園引領南望心長懸英宗皇帝輓詞有曰已應南陽氣猶遲代邸來句遒壯而事切實不減少陵秋日寄介甫有曰烟雲斷谿樹風雨入山城題曰感事似有所指即是興丁先珍輓詞曰從軍王粲筆記禮后蒼篇謾有殘書在能令好事傳鵩來悲四月鶴去遂千年試想長橋路昏昏隴隧烟盖元珍殁於四月故用鵩事以對令威殊切實錢塘元夕宴祥符寺有曰金地夜寒消美酒玉人春困倚東風又曰紅雲燈火浮滄海碧水樓臺浸逺空流麗可愛齊州冬夜有曰香清一蹋氍毹煖月淡千門霧淞寒齊寒甚夜氣如霧凝於木上旦起視之如雪日出飄滿階庭尤為可愛齊人謂之霧淞諺曰霧淞重霧淞窮漢置飯罋以為豐年之兆早起赴行省曰枕前聽盡小梅花起見中庭月未斜微破宿雲猶度雁欲深烟栁已藏鴉井轤聲急推寒玉籠燭光繁秉絳紗行到市橋人語宻馬頭依約對朝霞凝香齋有曰一尊風月身無事千里耕桑歳有秋北渚亭曰午夜坐臨滄海日半天吟㸔泰山雲青徐氣接川原秀常碣風連草木薰次道子有曰兩印每閒軍市靜雙旌多偃送迎稀北城閒歩曰土膏初動麥苖青飽食城頭信意行便起髙亭臨北渚欲乗長日勸春耕華不注山有曰髙標特起青雲近壯士三周戰氣酣金山寺有曰夜靜神龍聽呪食秋深蒼鶻起摶風彭城道中有曰一時屠釣英雄盡千里河山戰伐餘韓魏公輓詩曰堂堂風骨氣如春衮服貂冠社稷臣天上立談迎白日掌中隨物轉洪鈞忽騎箕尾英靈逺長誓山河寵數新萬里耕桑無一事三朝功徳在斯民宏偉尊壯非曽公之筆力不足以寫韓公之氣魄也城南絶句曰雨過横塘水滿隄亂山髙下路東西一番桃李花開盡惟有青青栁色齊夜過利涉門曰紅紗籠燭照斜橋複觀翬飛入斗杓人在畫船猶未睡滿堤明月一谿潮此二詩則又清麗婉熟矣北歸曰終日思歸今日歸著鞭鞭馬尚嫌遲曲臺殿裏官雖冷須勝天涯海角時此詩雖若直致然情思深婉怨而不露迎駕有曰錦袍周衛一番新警蹕朝嚴下紫宸俗眼望來猶眩日天顔四處自生春和御製觀燈有曰翠幰霓旌夾露臺夜深宫扇月中開龍衘燭抱金門出鰲負山趨玉坐來又曰天香暗度金貂煖宫扇雙開采鳯飛集英殿春宴有曰冠劔九重霄漢路鶯花三月帝王州觀今所選傑句如此謂之不能作詩可乎續稿中更有堪取者偶無其集佗日别鈔曽氏兄弟交鎮宋元豐中南豐先生曾文定公鞏為中書舍人掌外制時其弟文昭公肇以摩勘轉吏部郎中文定公為行制後文昭公為翰林學士掌内制時其兄文肅公布拜相文昭公為草麻當時朝班榮之曰兄行弟制弟草兄麻近見曲阜前集又載文肅公鎮瀛州曰文昭公鎮金陵一日詔曾布知江寧府曾肇知瀛州遂成兩易自為交代尤人間兄弟盛事也文肅公將離瀛有詩寄文昭文昭和之各夸其所鎮之郡今録於此想見先朝文明之盛為之慨然文肅過闕入覲就晉秉政竟不及至金陵云布作髙陽臺衆樂園被命與金陵易地兄弟待罪侍從對更方面實為私門之慶走筆寄子開弟樓臺丹碧照天涯塞北江南未足誇十里烟波新種栁萬株桃李未開花一麾同下西清路兩鎮交迎上將牙囘首林塘莫留戀風光還屬阿連家肇謹次原韻文物河間信可嘉風流江左亦堪誇水南水北千竿竹山後山前二月花久愧迂儒懐郡紱聊須雋老駐軍牙兩州耆舊毋多怪魯衛從來是一家隱居通議卷七
