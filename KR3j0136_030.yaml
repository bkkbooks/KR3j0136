body:
  text: 隱居通議卷三十元劉塤撰鬼神目擊三怪神怪之事吾素不信但即今數事乃吾目擊而身親者殊未有以自解南豐石仙觀之前有巨樟一株世傳宋延平辛丑嵗有方士冷道者在彼修煉一日叱木使開則木腹中虛因入其中坐化而逝未久生合里人相傳以為神後治平丙午令公胡若者不信斧而驗之則見道者兀然而坐儼然如生欲後來取信傳以塑繪焉自是歷二百年木不復合豫親見所斧木竅長盈尺闊數寸中虛而枝葉茂冷道者兀坐猶故也心竊怪之越寶祐癸丑寒食後一日大風拔木木雖仆而冷道者猶兀坐木根之上屹無所傷屋而覆之至今猶存此不可解者一也豐之軍山險峻倚天號江南絶頂上有石室祠浮丘王郭三真君曰三仙禱祀者歸焉時見雲霧滃欎中有光如日暈大如車輪鄉人稱曰圓光光中見三仙冠服貌像隱隱可辨其飛行翕忽或升或沈頃刻不見此不可解者二也咸淳癸酉嵗余家旴城中聞南豐母舅家為鬼所侮每當昏時有聲歘然于屋前後或忩櫺或庖湢環繞而鳴老幼皆縮頸滅燭噤不敢聲達旦乃已明日復然如是者踰半年已而妗氏病且死豫聞訃往弔將就寢忽聞鬼聲去卧榻三五尺去地僅二尺且行且鳴豫叱之不止已而其聲或逺或近豫亦困且睡矣禮畢余遄反旴城後乃聞其聲漸息而舅家亦遷别居越三載北兵薄旴城下豫奉親還南豐無所於居因假舅氏舊館寓焉則昔之鬼聲無聞矣每獨坐至夜分亦汔寂然未幾此屋遭兵燬蕩盡然當時何其怪也此不可解者三也神鬼有無當必有知者今紀目擊身親者如此雷神顯應趙倅良驂言宋時仕潭州一日迅雷擊壽星觀碎鴟吻道士見雷神青靣緋衣裴回簷間久之始去後乃知鴟吻中有真誥神取出之置于道寮忩內桌子上其裴回者疑一時未定置頓之所也鄰寺林長老自衛言至元十九年隨其師曰湖山僧録者寓吉州一日雷震報恩寺寺有八難觀音堂堂皆涌壁雷繞其間久不止有僧判甘藏卜者胡人用本俗法披紅禪衣誦一畨呪語以五斗米撤之雷乃去擊其寺門而散雷神悉取涌壁上觀音像及從神等移置案上而於涌壁之後摉擊柱木皆碎凡佛像無一損者吾州梓源李規可圓孫有子因事微忤規可明日規可出州訴之行至廣沙坪衆勸以反乃拜天訴子扺家以原詞置竈中焚之未幾其子入州行至父所拜處迅雷一聲殛死衣裳破裂如絲是日也余在郡庠􅊰堂竊怪霹靂非常已乃聞霹死其子身有至元鈔兩張雷火不焚朱墨焕然秋麓叔父鏜嘗言京源曽氏有婢常棄擲米穀于糞壤往往不加愛惜或勸止不從一日婢正撤米穀忽雷火焚婢自頂至踵炮其半體餘半體無所傷幸不死蓋亦憐其愚而警之羅濟翁公讓言其鄉中有職役人二其一純實其一凶狡純實者因某事聚少米其凶狡者緣怒悉以米棄溝瀆中狼籍滿地純實者勸之不從一日二人同行暴風急雨忽至雷電隨之漸覺晦冥二人者將避之而無其所遙望前途有社林焉擬造樹下避雨既至則見社林中有數人若吏卒或衣緋青或黃帕首急禽凶狡者捽之俄有一人若功曹然張幃幕及榜挂之命左右扶純實者去且令勿損其身俄迅霆一聲俱無所見惟見凶狡者橫尸在地此人惟頭髮被焚病啞三日而後能言所遇如此吾里之東某里有耕夫某一日出外惟母在家舂米耕夫有子尚幼偶戲臼中不覺碓墜竟舂死其子素狠母懼其歸見孫兒已舂死必怒也走某家避之其子歸見其然不言而淬礪一斧藏腰間密往求其母得之某家邀母歸將甘心焉行至中途風雨陡暗迅霆一聲殛其子死而母汔全雷霆於他事或恕惟不孝於親及不惜米穀二事考罰甚嚴蓋報應屢顯豈非天條所禁二事尤重邪丁丑年州前米户某因忿詬棄米殛死今年甲辰嵗重五節日北郭黃某之婦忤舅姑忽雷大震繞其家煙火滿室其婦焚髮而竄屋亦旋燬幸免殛死耳父母生我者也五穀養我者也造物蓋於二事獨重重生飬也大乾夢録豫幼獲觀大乾夢録一册載隋溫陵太守歐陽公祐洛陽人仕閩授代歸自經邵武光澤之大乾愛其山水清秀盤桓久之已而舟溺夫婦俱死焉後人葬於其地久之發靈廟食纍受封爵為王宋時士人應舉者求夢多應好事者輯之曰夢録世變以來文籍散失豫不見此録數十年皇慶癸丑官於劍津鄰人詹翠屏出示新刋實録視舊增倍因借觀之而摘其可存者漫記于後王居西京洛陽河南府洛陽縣水南東地名福善坡東有會仙樓南對瓦子門西抵鐵器市北有會景樓王以某月五日生娶崔氏隋恭帝義寧二年始立歐陽太守之廟唐僖宗文德二年始受龍湖禪師戒斷血食宋仁宗闕元年始封通應侯元豐五年進封祐民公崇寧闕額曰惠應廟政和六年封廣祐王紹興闕廣祐王紹興十三年封明應威信廣佑王闕明應威信廣祐福善王嘉熙中換封闕福善王寶祐中又換明應威聖英惠福善王闕明烈威聖文惠福善王唐僖宗少子得道於石霜和尚自湖南來邵武入龍湖建道場號圓覺大師名普聞實有戒行見廟下烹殺甚衆師憫焉為偈曰悟道不同死死中生不忘虎無心伏人來與惠降殺生及死祀輪回萬劫殃為報人天界無遮福最強欲種多生果修齋勸大王昔年地獄裏今日作天堂是夕里老夢神云我已受圓覺禪師戒後祀我當如比丘飯足矣自立廟厯二百七十一年而後改至今遵之古碑載王守泉州滿歸假道邵武維舟大乾溪渚偕夫人崔氏縱觀山川秀麗誓曰此福地可廟食復次舟行數里風浪掀作覆舟舉家陷溺公與夫人尸存涯涘遂沿流至于生前所誓廟食處鄉人驚異送其尸東下津流二千里明晨逆流又至所止處鄉人復津送加以里數翊旦又至所止處或謂斯乃賢哲人率衆備儀葬于山間越十年凶荒疫癘民始崇禱建廟塑像劉侍郎岑作郡城熙春臺别廟祀有惠應神徐端修自吳中來過建昌訪道士王文卿文卿授五雷法能致雷雨道行甚著因語徐曰邵武頃大旱豫拜表至帝所見所謂惠應神叩王陛為民請甚力帝諭若不許然神具言其州窮且瘠民不可一日無穀詞甚懇切乃得請而嵗有秋岑聞是語心敬焉文卿即王侍宸實録載邵武自宋代紹定庚寅之變比嵗不靖端平甲午嵗金華王子文野為守與寓公率士民迎福善王就郡治建黃籙醮邀龍虎山張天師至時寓公杜子昕杲與祠家居與王守同主醮事命道士林逍遙拜章初拜未得達逍遙行持再往遂伏地不起自已至申州前忽雨天花一城競觀空中繽紛墜地即不見盛以衣裾亦無有踰時乃止久之林方起喜色滿靣謂衆人曰適到天門遇福善王云已得請于帝子可回矣具言上帝以邵武醮事精虔特賜邵武太平四十年兩齋官皆得厚賞自是郡果寧息生齒日繁後王公仕至端明殿學士簽書樞密院事杜公仕至吏部尚書贈少師逮咸淳某嵗黃廖二洞盜起寓公相與議曰四十年之期已過盍再建黃籙懇之于神衆推國子監闕吳某與闕大夫杜伯堂蕪主之蓋伯堂乃子昕尚書之闕觀命道士謝某拜章既起徑入治靖色密語謂杜吳二公曰適得報邵武當有大厄上帝已命福善王往芙蓉城去矣二十年方反殊可憂也中夜禁詞羣鴉喧噪衆失色明年兵禍果作丙子後盜屢犯城無寧嵗大乾祠祀亦弛至元辛卯汀寇鍾明亮平後民始漸安香火繼盛而邵武亦粗復承平之舊焉天花事乃黃某説方雨時親見之芙蓉城當時杜吳二公祕不言獨私告在軒黃公紹未幾二公捐館後在軒始與先人言蓋乙酉正月也頃甲戌乙亥間旴友易雪崖仲信往大乾叩國祚夢王者冕服相迎止云不忍言未幾革命神怪窈冥神怪窈冥之事知道者不言且不信謂其害道也然亦有不可以理曉者如洪都之鐵柱上清之仙巖軍峰之圓光西湖之飛來峰與夫廬阜天池則見普賢天燈西蜀峨嵋則見文殊天燈皆彰彰在人目烏得以為誣邪豈古亦有之特智者不言歟怪力亂神夫子不語耳而不曰無也然佛法自漢方入中國則廬山峨嵋之天燈其亦古有之歟抑山嶽鍾靈光景異常而後之佞佛者遷就以神其教歟豫又聞長老言州西門石背有王姓家建大醮醮之夜有神空中語云醮事甚虔但作羊屎臭爾或以告之王王甚不滿窮詰其故乃是日炊齋而薪不足急毁羊圍木足之王由是震懼欲重建醮纍嵗齋潔疲精竭誠雖麵麥亦别畦以種不加糞穢復建醮事至中夜忽見馬靈官自虛空降入醮筵巡行一遍謂玉曰上帝念汝至誠遣吾一視俄去不見又聞鄉里前街汪姓者因田地事建大醮其館客撰青詞有曰芒芒九土盡入吾疆醮之夜館客坐於門仿佛見大街一將吏乘馬自東來至前曰芒芒九土是何等語手摑其面俄不見客自是頭不正由是觀之則此事真不無邪傳曰明則有禮樂幽則有鬼神以鬼神對禮樂而言其真有邪要之識者不必語有無唯當修身謹行孝弟忠信以無愧對越而已象山先生陸文安公守荆門日罷設上元醮有榜文曰此心若正無不是福此心若邪無不是禍嗚呼盡之矣土神誥詞庚子五月因觀江漲至五通廟忽憶兒時見將軍誥詞一軸乃宋封周將軍為宣闕侯者也今其軸雖不存中間一聯最佳云漢將軍有功得封闕記其時某人當制也又記里中軍山神加封仁顯二字誥詞有曰能博其施斯之謂仁有赫厥靈於乎不顯語意俱到今刻石西門廟中德祐拜章不達沈德載言德祐危急時慈元命上清宫鄧道士拜章祈天永命道士伏地凡四日始寤曰章不得達也亦不得近天門止於剛風浩氣間端跪以俟久之遙望祖師舉手麾之曰不可於是乃還已而果然天師退潮宋理宗時浙江潮溢犯杭都久不退朝野危之有旨召天師郤潮時三十五代天師則觀妙真人可大也既至而潮退理宗大喜加封錫賚甚侈聞之是年實以四月十三日策功今大德二年戊戌嵗春潮犯鹽官州漫溢百餘里所損不可勝記漸逼城市久之不退父老援宋事請於江浙行省宜迎天師退潮今三十八代天師則凝神廣教真人與材也省命父老來迎且奏聞於朝使者至真人以其禮聘不莊汔不為動卒辭行而遣宫中道士持鐡符往治之既至鹽官州行李叢雜姑以鐡符插水濵忽波濤洶涌若有神護之者道士喜乃易法服持符登舟衆人羣擁聚觀簇立堤岸遙見仿佛有金甲神者立于空中道士行法擲鐵符符躍波靣者數回而後沉沒頃之天色晦冥霹靂一聲越數日乃見于别處擁起沙堆十數里於其上得一物似黿大如車輪介而三足蓋所謂能也取而剖其半入朝以其半入上清宫表顯其事方道士行後朝命奉御偕某官來真人以君命乃行亦四月十三日人皆異之真人至行省而妖已除乃作醮事又築堤建祖師正一真君殿以鎮之朱張福業浙西朱張二豪本樵夫乘乙亥丙子革命時南北雲擾入海嘯聚剽劫所殺略皆富商巨舶由是大獲致資産珍貨無與比官皆宣慰參政而朱尤豪既豐溢即思善果往往捐金佞佛創寺建像極侈一日在金陵適張天師應詔經從朱建大醮祈張行持且請召神降筆以卜休咎張令設黃幃帳縣鸞筆俾朱默禱久之筆墜啓視書云積福如山造業如坑推倒福山填不得業坑朱大駭懼人以為名言不數年果敗死家屬物産俱沒入官世言湯武逆取而順守傳曰若晉取虞而明德以薦馨香神其吐之乎是以順守之意然而非也既以逆取違天多矣其能守乎殺人取財寃氣貫日乃欲以不義之資媚佛求救吾不知數椽之寺舍數堆之泥像而可贖彌天滔海之罪邪佛固仁慈然視衆生平等亦豈肯為逋逃主而使寃死者不少吐氣哉朱張伏誅豈神不救夫子曰仁者能好人能惡人噫神真能仁矣隱居通議卷三十
