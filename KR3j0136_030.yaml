body:
  text: 隱居通議卷三十元劉壎撰鬼神目擊三怪神怪之事吾素不信但即今數事乃吾目擊而身親者殊未有以自解南豐石僊觀之前有巨樟一株世傳宋延平辛丑嵗有方士冷道者在彼修煉一日叱木使開則木腹中虚因入其中坐化而逝未乆生合里人相傳以為神後治平丙午令公胡若者不信斧而騐之則見道者兀然而坐儼然如生欲後來取信傳以塑繪焉自是歴二百年木不復合予親見所斧木竅長盈尺闊數寸中虚而枝葉茂冷道者兀坐猶故也心竊怪之越寳祐癸丑寒食後一日大風拔木木雖仆而冷道者猶兀坐木根之上屹無所傷屋而覆之至今猶存此不可解者一也豐之軍山險峻倚天號江南絶頂上有石室祠浮丘王郭三真君曰三僊禱祀者歸焉時見雲霧滃欎中有光如日暈大如車輪鄉人稱曰圓光光中見三僊冠服貌像隱隱可辨其飛行翕忽或升或沈頃刻不見此不可解者二也咸淳癸酉嵗余家旴城中聞南豐母舅家為鬼所侮毎當昏時有聲歘然于屋前後或忩櫺或庖湢環繞而鳴老幼皆縮頸滅燭噤不敢聲達旦乃已明日復然如是者踰半年已而妗氏病且死予聞訃往弔將就寢忽聞鬼聲去卧榻三五尺去地僅二尺且行且鳴予叱之不止已而其聲或逺或近予亦困且睡矣禮畢余遄反旴城後乃聞其聲漸息而舅家亦遷别居越三載北兵薄旴城下予奉親還南豐無所於居因假舅氏舊舘寓焉則昔之鬼聲無聞矣毎獨坐至夜分亦汔寂然未㡬此屋遭兵燬蕩盡然當時何其怪也此不可解者三也神鬼有無當必有知者今紀目擊身親者如此雷神顯應趙倅良驂言宋時仕潭州一日迅雷擊壽星觀碎鴟吻道士見雷神青靣緋衣裵回檐間乆之始去後乃知鴟吻中有真誥神取出之置于道寮忩内桌子上其裵回者疑一時未定置頓之所也鄰寺林長老自衛言至元十九年隨其師曰湖山僧録者寓吉州一日雷震報恩寺寺有八難觀音堂堂皆涌壁雷繞其間乆不止有僧判甘藏卜者胡人用本俗法披紅禪衣誦一畨呪語以五斗米撤之雷乃去擊其寺門而散雷神悉取涌壁上觀音像及從神等移置案上而於涌壁之後摉擊柱木皆碎凡佛像無一損者吾州梓源李規可圓孫有子因事微忤規可明日規可出州訴之行至廣沙坪衆勸以反乃拜天訴子扺家以原詞置竈中㷊之未㡬其子入州行至父所拜處迅雷一聲殛死衣裳破裂如絲是日也余在郡庠􅊰堂竊怪霹靂非常已乃聞霹死其子身有至元鈔两張雷火不㷊朱墨焕然秋麓叔父鏜嘗言京源曽氏有婢常棄擿米穀于糞壤往往不加愛惜或勸止不從一日婢正撤米穀忽雷火焚婢自頂至踵炮其半體餘半體無所傷幸不死葢亦憐其愚而警之羅濟翁公讓言其鄉中有職役人二其一純實其一兇狡純實者因某事聚少米其兇狡者縁怒悉以米棄溝瀆中狼籍滿地純實者勸之不從一日二人同行暴風急雨忽至雷電隨之漸覺晦㝠二人者將避之而無其所遙望前途有社林焉擬造樹下避雨既至則見社林中有數人若吏卒或衣緋青或黄帕首急禽兇狡者捽之俄有一人若功曹然張幃幙及榜挂之命左右扶純實者去且令勿損其身俄迅霆一聲俱無所見惟見兇狡者横屍在地此人惟頭髪被焚病啞三日而後能言所遇如此吾里之東某里有耕夫某一日出外惟母在家舂米耕夫有子尚㓜偶戱臼中不覺碓墜竟舂死其子素狠母懼其歸見孫兒已舂死必怒也走某家避之其子歸見其然不言而淬礪一斧藏腰間宻往求其母得之某家邀母歸將甘心焉行至中途風雨陡暗迅霆一聲殛其子死而母汔全雷霆於他事或恕惟不孝於親及不惜米穀二事考罰甚嚴葢報應屢顯豈非天條所禁二事尤重邪丁丑年州前米户某因忿詬棄米殛死今年甲辰嵗重五節日北郭黄某之婦忤舅姑忽雷大震繞其家烟火滿室其婦焚髪而竄屋亦旋燬幸免殛死耳父母生我者也五穀養我者也造物葢於二事獨重重生飬也大乾夢録予㓜獲觀大乾夢録一册載隋温陵太守歐陽公祐洛陽人仕閩授代歸自經邵武光澤之大乾愛其山水清秀盤桓乆之已而舟溺夫婦俱死焉後人葬於其地乆之發靈廟食纍受封爵為王宋時士人應舉者求夢多應好事者輯之曰夢録世變以來文籍散失予不見此録數十年皇慶癸丑官於劍津鄰人詹翠屏出示新刋實録視舊増倍因借觀之而摘其可存者漫記于後王居西京洛陽河南府洛陽縣水南東地名福善坡東有㑹仙樓南對瓦子門西抵鉄器市北有㑹景樓王以某月五日生娶崔氏隋恭帝義寧二年始立歐陽太守之廟唐僖宗文德二年始受龍湖禪師戒㫁血食宋仁宗闕元年始封通應侯元豐五年進封祐民公崇寧闕額曰惠應廟政和六年封廣祐王紹興闕廣祐王紹興十三年封明應威信廣佑王闕明應威信廣祐福善王嘉熈中換封闕福善王寳祐中又換明應威聖英惠福善王闕明烈威聖文惠福善王唐僖宗少子得道於石霜和尚自湖南來邵武入龍湖建道塲號圓覺大師名普聞實有戒行見廟下烹殺甚衆師憫焉為偈曰悟道不同死死中生不忘虎無心伏人來與惠降殺生及死祀輪回萬刼殃為報人天界無遮福最强欲種多生果修齋勸大王昔年地獄裏今日作天堂是夕里老夢神云我已受圓覺禪師戒後祀我當如比丘飯足矣自立廟厯二百七十一年而後改至今遵之古碑載王守泉州滿歸假道邵武維舟大乾谿渚偕夫人崔氏縱觀山川秀麗誓曰此福地可廟食復次舟行數里風浪掀作覆舟舉家陷溺公與夫人屍存涯涘遂沿流至于生前所誓廟食處鄉人驚異送其屍東下津流二千里明晨逆流又至所止處鄉人復津送加以里數翊旦又至所止處或謂斯乃賢哲人率衆備儀葬于山間越十年㐫荒疫癘民始崇禱建廟塑像劉侍郎岑作郡城熈春臺别廟祀有惠應神徐端修自呉中來過建昌訪道士王文卿文卿授五雷法能致雷雨道行甚著因語徐曰邵武頃大旱予拜表至帝所見所謂惠應神叩王陛為民請甚力帝諭若不許然神具言其州窮且瘠民不可一日無穀詞甚懇切乃得請而嵗有秋岑聞是語心敬焉文卿即王侍宸實録載邵武自宋代紹定庚寅之變比嵗不靖端平甲午嵗金華王子文埜為守與寓公率士民迎福善王就郡治建黄籙醮邀龍虎山張天師至時寓公杜子昕杲與祠家居與王守同主醮事命道士林逍遙拜章初拜未得達逍遙行持再往遂伏地不起自已至申州前忽雨天花一城競觀空中繽紛墜地即不見盛以衣裾亦無有踰時乃止乆之林方起喜色滿靣謂衆人曰適到天門遇福善王云已得請于帝子可回矣具言上帝以邵武醮事精䖍特賜邵武太平四十年兩齋官皆得厚賞自是郡果寧息生齒日繁後王公仕至端明殿學士簽書樞宻院事杜公仕至吏部尚書贈少師逮咸淳某嵗黄廖二峒盜起寓公相與議曰四十年之期已過盍再建黄籙懇之于神衆推國子監闕呉某與闕大夫杜伯堂蕪主之葢伯堂乃子昕尚書之闕觀命道士謝某拜章既起徑入治靖色宻語謂杜呉二公曰適得報邵武當有大厄上帝已命福善王往芙蓉城去矣二十年方反殊可憂也中夜禁詞羣鴉喧噪衆失色明年兵禍果作丙子後盜屢犯城無寧嵗大乾祠祀亦弛至元辛夘汀寇鍾明亮平後民始漸安香火繼盛而邵武亦粗復承平之舊焉天花事乃黄某説方雨時親見之芙蓉城當時杜呉二公秘不言獨私告在軒黄公紹未㡬二公捐舘後在軒始與先人言葢乙酉正月也頃甲戌乙亥間旴友易雪厓仲信往大乾叩國祚夢王者冕服相迎止云不忍言未幾革命神怪窈㝠神怪窈𠖇之事知道者不言且不信謂其害道也然亦有不可以理曉者如洪都之鉄柱上清之仙巖軍峰之圓光西湖之飛來峰與夫廬阜天池則見普賢天燈西蜀峨嵋則見文殊天燈皆彰彰在人目烏得以為誣邪豈古亦有之特智者不言歟怪力亂神夫子不語耳而不曰無也然佛法自漢方入中國則廬山峨嵋之天燈其亦古有之歟抑山嶽鍾靈光景異常而後之佞佛者遷就以神其教歟予又聞長老言州西門石背有王姓家建大醮醮之夜有神空中語云醮事甚䖍但作羊屎臭爾或以告之王王甚不滿窮詰其故乃是日炊齋而薪不足急毁羊圍木足之王由是震懼欲重建醮累嵗齋潔疲精竭誠雖麵麥亦别畦以種不加糞穢復建醮事至中夜忽見馬靈官自虚空降入醮筵巡行一徧謂玉曰上帝念汝至誠遣吾一視俄去不見又聞鄉里前街汪姓者因田地事建大醮其館客譔青詞有曰芒芒九土盡入吾疆醮之夜館客坐於門仿彿見大街一將吏乗馬自東來至前曰芒芒九土是何等語手摑其面俄不見客自是頭不正由是觀之則此事真不無邪傳曰明則有禮樂幽則有鬼神以鬼神對禮樂而言其真有邪要之識者不必語有無唯當修身謹行孝弟忠信以無媿對越而已象山先生陸文安公守荆門日罷設上元醮有榜文曰此心若正無不是福此心若邪無不是禍嗚呼盡之矣土神誥詞庚子五月因觀江漲至五通廟忽憶兒時見將軍誥詞一軸乃宋封周將軍為宣闕侯者也今其軸雖不存中間一聯最佳云漢將軍有功得封闕記其時某人當制也又記里中軍山神加封仁顯二字誥詞有曰能博其施斯之謂仁有赫厥靈於乎不顯語意俱到今刻石西門廟中徳祐拜章不達沈徳載言徳祐危急時慈元命上清宫鄧道士拜章祈天永命道士伏地凡四日始寤曰章不得達也亦不得近天門止於剛風浩氣間端跪以俟乆之遙望祖師舉手麾之曰不可於是乃還已而果然天師退潮宋理宗時浙江潮溢犯杭都乆不退朝野危之有㫖召天師郤潮時三十五代天師則觀妙真人可大也既至而潮退理宗大喜加封錫賚甚侈聞之是年實以四月十三日策功今大徳二年戊戌嵗春潮犯鹽官州漫溢百餘里所損不可勝記漸逼城市久之不退父老援宋事請於江浙行省宜迎天師退潮今三十八代天師則凝神廣教真人與材也省命父老來迎且奏聞於朝使者至真人以其禮聘不莊汔不為動卒辭行而遣宫中道士持鐡符往治之既至鹽官州行李叢襍姑以鐡符挿水濵忽波濤洶涌若有神䕶之者道士喜乃易法服持符登舟衆人羣擁聚觀簇立堤岸遙見仿彿有金甲神者立于空中道士行法擿鉄符符躍波靣者數回而後沉没頃之天色晦㝠霹靂一聲越數日乃見于别處擁起沙堆十數里於其上得一物似黿大如車輪介而三足葢所謂能也取而剖其半入朝以其半入上清宫表顯其事方道士行後朝命奉御偕某官來真人以君命乃行亦四月十三日人皆異之真人至行省而妖已除乃作醮事又築堤建祖師正一真君殿以鎮之朱張福業浙西朱張二豪本樵夫乘乙亥丙子革命時南北雲擾入海嘯聚剽刼所殺畧皆富商巨舶由是大獲致貲産珍貨無與比官皆宣慰參政而朱尤豪既豐溢即思善果往往捐金佞佛剏寺建像極侈一日在金陵適張天師應詔經從朱建大醮祈張行持且請召神降筆以卜休咎張令設黄幃帳縣鸞筆俾朱黙禱乆之筆墜啟視書云積福如山造業如坑推倒福山填不得業坑朱大駭懼人以為名言不數年果敗死家屬物産俱沒入官世言湯武逆取而順守傳曰若晉取虞而明徳以薦馨香神其吐之乎是以順守之意然而非也既以逆取違天多矣其能守乎殺人取財寃氣貫日乃欲以不義之貲媚佛求救吾不知數椽之寺舍數堆之泥像而可贖彌天滔海之罪邪佛固仁慈然視衆生平等亦豈肯為逋逃主而使寃死者不少吐氣哉朱張伏誅豈神不救夫子曰仁者能好人能惡人噫神真能仁矣隱居通議巻三十
