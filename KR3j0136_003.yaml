body:
  text: 隱居通議卷三元劉壎撰理學三莆陽老艾予少時熟視劉後邨集見其推重艾軒林公甚至且併及其𫝊者網山樂軒之屬其稱林公或曰老艾予極慨慕其人恨不見其著述也皇慶壬子冬由劍庠捧臺檄行縣至順昌有教諭林兄玉孫莆人也疑是艾族出示艾軒文集八帙予因借觀而摘取焉公諱光朝字謙之莆田人年五十始登第仕至中書舍人坐􅌳奏謝霩然賜出身除御史忤㫖失眷改工部侍郎匄外以朝散郎集英殿修撰知婺州尋與祠明年卒年六十五丞相周益公銘其墓公學造深醇所為文奥雅篤厚刋落華腴而宿於理後邨謂其髙處逼檀弓榖梁平處猶與韓並驅此則惟知尊敬鄉賢而不自覺其諛之過也檀弓固三代文章未易輕言而韓亦豈易及誠與韓並驅則何為不與韓並行於世耶大概真是一博洽之儒醇正之作尤深於經者其蒼勁處非淺學能及公與龜山之孫楊次山書有云某幼聞李太白石曼卿之為人即踴躍道其事又讀晉書見一様人物如寒蟬孤潔不入俗調心甚樂之一日對方次雲及六兄談古人如此終是不俗六兄云此數人來孔子之門恐一日著脚不定某乃悟夫子之門為人物凖的千歳人物要得入此窠巢乃無媿千歳而上有多少豪傑可以共學入道恨不令聞此語陳實管寜元徳秀姿禀如許數百年中乃一見又却不聞道此大可惜又曰不亦說乎說不餒也時習如車輪運轉時此尚未見得如何纔頃刻推不去便覺得前者為説之義起居語黙運轉不停此為時習纔一失節則餒矣乃知不餒即為説又曰忠恕者謂夫子之道乃如是忠恕有足者皆可至也非是以忠恕說一貫忠恕違道不逺要當如是發語耳又曰有才藻之人纔有一分簡忽氣象要做甚吾夫子謂雖有周公之才之美使驕且吝即不足觀此語久之乃如一泓秋水鬚眉自見答人問忠恕而已矣曰南人偏識荔支竒滋味難言只自知剛被北人來借問香甜兩字且酬伊答仁者安仁曰千年古道萬年堤老牯循循不觧迷牧子不知何處在亂山荒草鷓鴣嗁自喻有曰修水佳人白玉闌花前何似妾容顔從來未省傷春意猶自樓頭畫逺山又曰莫怪騷人太頡頏曽聞阿母語劉郎神僊本自無言説尸觧由來最下方又云世間惟有榮辱毁譽所不到者為建徳之國艾軒網山樂軒三賢序派艾軒殁網山嗣業網山卒樂軒嗣焉竹谿又學於樂軒者也後邨作三先生祠堂記有曰里中前一輩及老艾之門者衆矣然數十年間更相推譲卒以傍邑二士接艾單𫝊所謂公論在人心者耶網山者月魚林氏名亦之字學可樂軒者横唐陳氏名藻字元潔俱福清人竹谿姓林氏名希逸字肅翁亦福清人艾軒仕至法從網山樂軒俱死布衣竹谿仕至左史直舍人院出知饒州竹谿論師𫝊竹谿公之師曰樂軒先生陳元潔藻所著有詩筌公為序之而首及於當時師𫝊次第曰在昔隆乾間士之師道立浙有東萊吕氏建有晦菴朱氏湘有南軒張氏江西有象山陸氏莆有艾軒林氏皆以道師授並世而立名者也艾軒於時猶為前輩號南夫子獨不喜著書門人又益微黄懐安芻最髙弟最先夭二劉著作正字雖暫顯亦早卒世其學者網山一人再𫝊樂軒又皆以布衣死艾軒在網山以艾軒名網山在樂軒以網山名近二十年鄉井聞見日陋張吕諸儒以其書在可磔裂欺世故人能言之言象山者疑信已半至若艾軒姓氏則問之晩少年漫不省樂軒雖得夀後網山死四十年衰白窮槀人以為常人矣且面背譏笑不小其文既不適時間出語又驚世駭俗至於今譏笑未已也樂軒卒十年予請於宗伯而祠之或詈或排幾不就役昨之日猶有難予者曰子之師何如人也笑而應之曰人矣乎烏乎長曰奚短哉烏乎學曰奚遺哉以文名乎曰玉質金相春明秋潔絶出羣言探入微賾先生之文若是已名則吾不知以詩名乎曰洗削穠華完復素樸羣誚鄙俚自謂竒倔先生之詩若是已名則吾不知然則至道矣乎曰玩神遺形甘約保獨傲睨乎鬼神兄已而弟佛撓挑浮㳺至死不厭道邪非邪予亦不知也客艴然而去予方追歎未已躔甫適以詩筌來覽之泣下遂志諸卷首而系之曰師學之𫝊豈直以詩詩又不𫝊學則誰知後千年無人已而已而後千年有人留以俟之奈何乎噫門人竹谿林希逸序竹谿此作序次有統紀有樞紐布置有間架清潤潔整自是作手其述諸儒師授尤有眼目閩中一種議論各尊所聞罕及吕陸而竹谿於此包羅不遺已是特見過於俗學又曰言象山者疑信已半則其見逾卓得非師友平日講貫及是歟惜予生晩不及一見此先生求是正又恨未及其佗文南軒契合南軒先生張宣公栻初問學於五峯先生胡明仲宏一見即契合宣公欣然歸語人曰如㧞出九泉之下而升之九霄之上其所得如此想當時必有超世絶俗之論惜不𫝊也近道障道世言王荆公嘗延館一修行僧於家當胸次膠擾時即就僧語語輒釋然一日僧謂公曰相公有近道者一有障道者二公問何也僧曰相公不愛官爵聲色此一事近道者也相公性太躁急又好觀書作文字此二事障道者也公問何時見道僧曰此去更三世不昧正性即成道矣公為竦然自此後頓寛和亦不復耽書作文臨終灑然而逝人謂其得此僧力未知然否朱文公平生竭盡精力觧注諸書實為後學之益晩與白玉蟾㳺始悟其徒勞遂賦詩曰書册薶頭無了日不如抛却去尋春蓋自悔也其於象山心服以此然則吾徒老不自覺猶薶沒障礙中而不見道是亦知而故犯者矣論缺玉淵劉清叔澂缺行也世儒疲精竭力於缺曾潭傅先生講易曾潭先生傅子淵南城人也出入朱陸間深明理學為衡州教授過白鹿書院時丞相周益公帥長沙小隊奄至乗先生不備請先生升髙坐講易先生顧左右得周易正文徑攝衣升坐讀乾讀坤又讀屯與䝉聴者已倦忽藏之䄂間正色大言曰此紙上易不足講講三聖人易可乎於是倦者悚容益公離坐躡先生後而言曰今日見子淵矣周易遺論近世學者常患無師友以講易然聖如孔子賢如孟揚或師弟子問答或著書立言𫝊道觧惑無餘藴矣使吾徒生於其時親炙有數根器有限未必得如今日讀其全書之為深切著明也亦在乎潛心而已昔黄魯直嘗問文章之法於蘇以後缺隱居通議卷三
