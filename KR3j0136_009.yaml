body:
  text: 隠居通議卷九元劉壎撰詩歌四黃希聲古體君不見㳺塵著空生九州人其中間懸兩眸楊花化萍無根蔕風消水長東西流江南下溼人易老過盡嵗華還草草長留白日照人間楊栁浮生轉枯槀毬文帶繞千花黄青蛾攅眉眉細長莫言一尊千萬夀乃翁身命屬渠手長安城中鬼笑人水底紙錢能不朽今人不見古人心古人不見今人事天上若無長生人即是古人都盡死金鳬銀雁滿江湖神光夜夜開黃壚年經月緯三百卷平生欲作何人書古人去去留不得我些古人三太息今人莫叱山石牢更後千年人不識此吾旴黃希聲所賦長歌行也粹美精練意髙味長近世江西詩人鮮有能及此作者又有題二喬圖詩曰龍翔下卷江東土孫郎初得喬家女喬家本自重曹瞞隻雞斗酒空酸楚襟情正用留阿瑜尚得人前稱肺腑百年王氣竟銷沈妙寫丹青嬌欲語香閨搦管記何書並蒂芙蓉按花譜那知不是未嫁時本末無從勘彤史詞人多事管閒愁銅雀紛紛底歌舞儘強被髪向黃壚只與東阿𫝊洛浦此篇流麗藴藉可為前篇之亞希聲名文靁自號看雲早以春秋學魁鄉舉下第則㳺縉紳間以箋啟四六為吳運使子良趙觀文與􅊸所知當是時荆谿節齋之名滿天下希聲藉以為重淳祐庚戌乃以詩經擢進士科趙公知臨安辟以為酒官既而舟歸次嚴陵灘覆溺失屍聞者悲之有看雲集數十卷尤長于詩詩尤妙于長歌行同時鄉里以詩名者碧澗利履道登白雲趙漢宗崇嶓俱為社友然品格俱不及公贛之寧都有蒼山曽子實原一撫之臨川有東林趙成叔崇嶧亦同時詩盟者也利碧澗詩詞利履道登嘗於臨川道上得詩云晩覺儒冠誤力耕已不任風雲入書史日月送烟林古來一日養人子百年心清風滿天下欲棲無寸隂太息復太息孤雲生暮岑興致髙潔非江湖可跂及也履道嘗有所屬意者中更暌阻賦玉臺體數十篇以寄興其好句如羸馬前山東復東沈沈忩户鎖愁紅春風一把相思骨又落江南烟雨中濃緑千竿湑欲流春風疑只在池頭相思一夕天相似望斷西南四百州尤工長短句嘗有水調曰相聚不知好相别始知愁筍輿伊軋穿盡斜照古平洲今夜荒風脫木明夜山長水逺後夜已佗州轉覺家山逺何計去來休酒堪沽花可買月能留相思酒醒花落五更頭長記疏梅景底一笛紫雲飛動相對大江流此别無一月一月一千秋此詞極涵婉沈細其自况詞有云花外潮回劍邊虹去撫寒江千里意氣又􅣲然矣賦虞美人草云當時養士知何許總把降幡去漢家王氣塞乾坤一樹盈盈不為漢家春意度彌佳佗詞盈帙麗語層出但兒女情多終傷正氣耳履道家旴城之西門以禮記擢第仕止寧都尉趙白雲詩趙宗丞崇嶓字漢宗自號白雲山人居南豐為人清俊灑落富有文采超然為宗籍冠嘗賦詩云壯老互淪謝百年如奔霆競將無窮憂勞此有盡形生時一幻化死即歸杳㝠亦有賢達人視死如未生亦有醉夢人既死心未平逆旅朝暮間八風無時停擾擾安足計熈然慰吾情賦古意云阿母帶兒出兒行自回皇兒不倦行路遣兒心内傷問兒何所傷兒語不敢詳將兒顧織作不忍織鴛鴦賦松柏有云松柏生髙岡不依貴者門松柏長青青却䕃貴者墳生非門牆交而與邱隴親此等皆思致不羣超出世俗文德殿早朝云苑牆當北斗宫樹近朝陽龍翔宫云地闢金光界龍飛析木津指麾開輦路祠祀拜元辰天近雲光暖花濃雨脈春君王自仁夀閒殺華封人皆妙句也他如漢月通江白秦雲入塞黃鷺依江渚冷雁入楚雲深湖海三生夢乾坤一寸心天形低赴海潮勢直通吳月入星辰大山明天地秋詠梅云大雅終不羣古心應自許對之鄙吝消疑是黃叔度凡此皆一時傳誦者嘗監豐儲倉直冬至災異與陳文定公宗禮相繼拜疏言鄭丞相清之輔政非材又攻巨閹盧董乃當時竊弄威福者既入留中尋以言去國自是直聲聞天下乆之起監都進奏院累遷至大宗正丞卒于官平生工字學尤善作數尺字筆法遒勁江浙名扁多出公手子撫州史君名必岊亦世其傳真名父子云陳文定公詩句謹爾内毋飾乎外衆慧爾愚難乎羣隊且埽地焚香觀自在此千峰先生陳文定公自賛也殊有意味蓋公平生務内之學於此可以槩見公名宗禮字立之髙簡清嚴不混流俗其在韋布時極貧苦然能抗節自守授徒之外絶不輕以一武詣人人亦嚴憚之年四十有二始為淳祐甲辰廷對第三人風裁峻整聲動海内其為廣東提刑也駐司韶州州之皇岡有虞帝廟嘗題詩云南國熏風入帝歌至今遺廟只嵯峨一天曉色懐明哲四野春光想太和存古尚瞻虞衮冕撫時㡬換禹山河海濵樂可忘天下解冩靈明是老軻蓋景定初也時鄂圍初解江淮甫定賈師憲挾勲入相有虞虙者為監察御史摘㡬換山河之語箋注㡬字作平聲上疏劾公謗訕又吳丞相潜為師憲所嫉貶之循州公行部過循與吳賡和有曰山川半為蠻烟纍人物多因謫籍香虙并訐其詩師憲怒為取㫖鐫其官責居永州踰年而後放便雖以詩得禍而其名逾髙自永再召寖顯貴歴言路瑣闥禁班經帷出師廣東入拜簽書樞宻院兼参知政事甫兩月薨於位贈官加賻哀榮始終大常議諡文定云公世居南豐千綏故自號千峰素慕韋蘇州仕宦所至掃地焚香而坐為詩多放韋體其山行詩曰川原緑已張春去今何在深樹涵幽姿㣲雲弄晴態禽聲互酬應林霏閒明晦漸逺人蹟稀清音自虚籟晩出詩曰落日山氣清歸禽噪林杪意行忘逺近吟過深烟表㶁㶁水縈田幽幽雲反嶠忽聞隣寺鐘沿途發長嘯曉行有曰披衣起遐征㣲茫認前路哀鴻天際雲殘月水邊樹此等皆俊楚殊迫真也文章亦多佳議論蓋以歐曽為宗者持節廣東日於憲司作一亭名之曰東風自銘之有曰我亭斯兊厥位面震爰挹天和庶濯吏忍匪曰殘之于以閑之匪曰賊之于以格之又曰毋曰天逺毋曰習頑越嶺入海皆人其間既曰人矣吾兄吾弟汝罪汝刑予德弗貳施諸彼罔憾揆諸我無恫則雖刑官也何害其為東風語意俱到絶可愛也愚昔喜而誦之甚習亂離憂患省記不全矣憶嘗侍公席間論文公曰近世文章如王臞軒所作行雲流水亦自可采然公此語愚不解也王實之特狂士其文呌呼促廹無温潤深沈之氣非中和碩大之聲公當俛視斯焉取斯初南豐先生曽公以碩學鴻文師表一世歿且一百年易名禮缺公寳祐立朝因轉對為穆陵言之得諡文定其後公薨亦諡文定異哉雲舍趙公詩窮居無與娛弱子戲我右寧知千載前不是桑榆友今為骨肉親結愛豈不厚不知後千載當復如此否且盡人間事幽逺非所叩此趙次山必岊所作飲酒詩也次山為白雲翁名子年甫十七登進士第需次杜門二十年不仕博極羣書為詩文敏瞻而有風骨嘗讀虚齋易通以為其㫖未究遂盡取諸儒易說參㑹考訂削其不合於道者而一以三聖為㫖歸别作易𫝊多出新意以發先儒之所未及宏齋先生包公恢見而大異其說歎曰是有功于吾易也年近四十始為江西運使矩齋曽公穎茂辟置薦歴幕府以至班政作邑登朝出守撫州㑹長江失守時事已變制置使黃萬石寓治于撫閫郡不咸竟為黃所擠奪其郡符以與參謀官任君弼翊龍次山遂歸里俄而盱撫以城迎降次山避地于贛未㡬鄉寓公吳允文浚奉宻詔以江西招討使舉義反正結約次山協謀興復戰不利允文奔漳州為都督文丞相天祥所殺次山解兵隠汀州之畬中踰年以疾終其諸子死於兵疫無存者僅存一女可哀也夫次山幼強記該洽善辨論毎講說經史及古今詩文輒纍千百言成誦無凝滯中年以後工唐律鍜鍊精深絶出風雲月露之外平生著作極多兵禍無一字存矣其在贛也猶閒道予一曲感慨國事其詞曰倚西風招鴻送燕年華今已如客青奴一餉貪凉夢昨夜酒紅無力愁似織聽鳴葉寒蟬話到情無極舞衣春入歎帶眼偷移琴心不斷襟袖舊時窄殘紅塵陌誰寄佳人消息任他珠網瑶琴金釵兩鬢霓裳曲總是浪歌閒拍長夜笛且慢析輕匀留醉酒壚側烟青霧白望殘照闗河晴雲樓閣何處是秋色味其語意悲憤深矣他文多不記憶尚竢博采當續書之蜡社歌餘蜡社歌餘者吾鄉詩人黃伯厚載詩集也伯厚自號玉泉為京西提刑寳章朱公夢吉之壻以詩得名於嘉熈淳祐間受知于丞相鄭忠獻公清之仕至廣東兵鈐以卒其集中有鍾馗觀鬼鬭蟆圖𫝊誦一時然由今觀之未足為妙其妙者惟陪侍丞相安晩先生宿覺際寺夜遇大風可畏遂賦大篇曰船頭落日如血紅客言今夕當有風空山夢回刺骨冷纊被無力身如弓但聞紙忩響僁窣初意空厨饑䑕出忽然扉户競開闔猶謂偷兒入吾室須臾歘作號怒聲鼙鼓百萬漁陽鳴室廬動揺地欲轉林木震吼山如崩噫嘻異哉那有此欹枕恍惚疑夢寐應是錢塘醉未醒翻海胥濤騁㳺戲或者客寓紫塞旁鐵騎赴敵古戰場不然此處安樂國何遽隉阢猶乗航起來穴牖目如割平湖已捲十堆雪乃知跋扈是飛亷似妒晩來客饒舌因思前年到黃岡朔風揺江驚斷腸驍將忍凍骨比鐵壯士力鬭身如湯此身仿彿臨皐上一感還生百惆悵長安貴人正酣眠日髙尚戀銷金帳東忩未白雞未啼相公自起燒松枝此篇紆徐蒼勁讀之殊有深味其絶句則過長安渡有曰重來已過十畨秋更十畨秋欲白頭無限舊時心裏事青山殘照水東流贛州道上見上墳者曰翠樹青烟笑語稠家家領客醉松楸老翁哭子氣欲絶行到前邨更轉頭又曰攫祭烏雅噪晩田草芽新染緑如烟墓頭寂寂蟲鳴急惟有春風舞紙錢此數詩予自十二三嵗時已識其妙常常口之不置也又有讀舊稿蛙吹集一絶曰蛙吹兒童事重開已汗顔更須留近作待過十年看亦自有味其律詩如題大洪山曰地當平曠易為山故得崔嵬漢沔間雲霧涌來無下界樓臺浮起在中天開忩時見雷霆出隠几閒看日月還更有鐘聲最堪恨南風時到八陵邊隨州沙溪詩曰石路﨑嶇石瀨鳴峰巒回合小原平桑麻積雨肥春壠雞犬一村喧晝晴田婦共携中飯去樵童相喚上山聲邊頭今有江南景十數年來不用兵題峴山曰向來陵谷尚休然放眼髙臺萬象還南國一池襄漢水中原千古鄧唐山斜陽淡淡飛鴻沒芳草萋萋戎馬閒前代英雄亦何許棹歌日日過滄灣此數詩亦可味也鬭蟆圖詩雖不為粹亦謾録於此以見存古之意誰推酆都扄逸此魔十二相羣鬭蟆供戲劇綃墨何從拂其迹兩雄鬭於前四鬼相視欣欣然小蟆對睨攤雙䣛筠籠一蟆跳欲出前者差壯一力肩後者引索㯳於拳髯翁磬折目勝負突眼老嫗探頭覷就中黃叟如蹲鴟破帽長袍吾老馗隻眼直下看不帀諸鬼樂與吾翁狎四丁更與蟆之魁疾馳不能壓欲穨蟆肥于豚怒於虎張頥縮項誇相顧昔時唐宋失天經妖蟆曽搳天眼精今魔視蟆細於螘魔若跳梁那可指羣隂膠凝互掀翻六鼇頂戴愁顛連但能伐魔既厥類芟夷妖蟆談笑耳僇妖之事馗所司何獨反與為兒戲不惟失職縱姦宄鬼禍如蟆將及爾參軍參軍其然乎或者好事丹青圖諒應馗笑玉川子誅蟆未誅骨先苦風悲雨凄天地愁蟆鬼正是相雄秋僅餘一目不可搳我曷不可相娛說㑹聞隔簾歌鬭鼃山鬼性命摧紅牙此篇規模布置意度抑揚亦非庸材所能及第時失之粗且結句苦不𦂳峭故不得卓然名世鄧月巢遺稿吾鄉前輩鄧子大有功心事粹夷詩材清婉嘗有玉山道上一絶曰玉谿谿上雨聲乾日暮東風客衲寒數樹梅花吹作雪行人猶自倚闌干其情致殊蕭灑又嘗客信豐寄余詩曰怪得寒燈昨夜花五更歸夢倐還家多情兒女傷離别争挽征衫問鬢華又曰魚苗客子去成羣野笑狂歌慢慢行三十里頭齊頓住聞官早過吉州城又曰錦衣戍卒豎霜矛彈壓鹽丁過嶺頭三月聞韶堪歎息南中還是一年憂又曰嶺南咫尺莫如䖍和煗嚴寒别有天一夜詩魂清到骨曉霜封却釣魚船凡此皆冩當時之景而不待雕鐫自然成韻平生所作甚多家學斷絶無能存其稿者今所録徒得之疇昔所記誦而又缺落不完如此重可歎也公喜作詞賦㸃絳唇曰捲上珠簾晩來一陣東風惡客懐蕭索看盡殘花落自把銀缾買酒成孤酌傷漂泊知音難託悶倚䦨干角又嘗賦過秦樓一曲曰燕蹴飛紅鶯遷新緑㡬陣晩來風急謝家池館金谷園林還又把春虚擲年時恨雨愁雲物換星移有誰曽憶把一尊試酹落花芳草總成塵蹟蹙頻自笑流浪孤萍沾泥弱絮有底困春無力銀屏香煗寳簟波寒又負月明今夕往事夢裏沈思惟有羅襟淚㾗猶溼奈垂楊萬縷不繫西風白日詞㫖流麗富於情者也少舉進士纍試禮部不中以恩補迪功郎為撫州金谿尉得年七十以卒後學尊稱之曰月巢先生予近得月巢遺稿謾摘一二録於此予後公三十年而生公不以輩行前予雅相愛重時與倡酬予見公氣象和平所謂德人之容使人意消故嘗喜親公噫死生之隔乆矣擥卷懐舊為之愴然予兄太史公掞屢試禮部不中晩以恩補廸功郎監建康府糧料院寳祐丙辰以薦者特召為史館校勘時年七十有六矣子大以詩賀之曰秋堂風露聲唔吚青燈一㸃昏兩眵蟫魚蠧紙老白日未識心宇包黃羲麟膠飲盡霜免泣儷花鬭葉紛竒姿少年輕裘舌秦衍睥睨六印京塵緇平生眼底厭糠秕自對春風樂沂水􅊧竒抉怪問子雲載酒歸來成獨醉金刀喜有南隣翁曽吹藜燄丹霞峰白雲滿榻呼不起斜日倚仗酣秋空紫皇一夕下綸㫖􅀈袚丹鉛勘文字㑹將一語贊陽秋髙入九天卑九地聖明勛業琬琰儲不獨焜燿氷銜書兩朝蒐輯摩日月往往呼喝羞庭衢廬陵健筆人莫贖南豐瓣香竟誰續西江浩浩流古今莫遣白頭愧青竹又送曽子華㳺贛曰丈夫達有遇出令走千里焚香玩太空宴坐塵不起云胡子曽子不自樂沂水風烟挾兩䄂足跟尚芒履持被直承明三省良未已觀君氣如虹接淅亦可美昔年子長㳺落筆妙信史三蘇出岷峨文章仰歐子此行崆峒嶺萬事寧足侈鬱孤有竒觀佳句公摩洗予生事斗室出若畏瀾蠡長安歌狹邪神鼎鑄螭鬽窮通匪同途動静實一理時止復時行願與參此義隠居通議卷九
