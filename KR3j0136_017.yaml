body:
  text: 隱居通議卷十七元劉塤撰文章五省事老人贊銘朱新仲舍人翌自號省事老人初仕汴京南渡乂仕於杭都文采聲華傾動一時嘗得其别集觀之有所作范文正公畫像贊甚佳今録於此序云文正范公名在天壤功在社稷國史書之鐘鼎勒之四夷百蠻𫝊之如神明天下後世仰之如日月山澤之儒嗟嘆不足仰瞻遺像再拜而為之贊曰乾綱回薄妙燮四時有大坤輿載厚不移其中哲人千載一至其至維何天地則理巍巍文正國之蓍龜民之父師以天下之重自任故舉萬鈞而若無以四海赤子為心故甘百謫而不悔垂紳正笏聳泰華衡嵩之表活涸濡枯傾江河淮濟之利日月有時而食而公之名不泯鐘鼎有時而盡而公之功不䃺唐郭令公之武漢周絳侯之氣吾儕小人手舌俱廢拜顙有泚求之夢寐杜子美畫像贊曰凌萬乘以峥嶸之氣貯千古以磊落之胸筆下有神洗宇宙而一空者大哉詩人之宗乎束帶峩冠凛然似謁肅宗而論房琯神閒意定超然若溯瞿唐而上泛沅湘而東也蓮葉硯銘雖不及前二贊之妙然亦竒健其詞曰玉井之泉泰華之峯有十丈蓮脫葉馳風化而為石淪於深淵大澤之中琢以為硯置之墨客子卿之宫涓涓之澤沒世不竭是為元頴湯沐之封而日游戲於其間蓋相與託令聞於無窮琴譜序近見北人有琴譜一集集有序序頗可觀云龍波子作不知何氏名也今録於左擬清廟之古賡南風之詩聖人之制作也續杏壇之音鼓宣尼之操吾徒之修養也瓏玲其聲龍吟鳯鳴妙契大造發越七情猗歟琴哉非金槽鐵撥比也非鴻鵠其心者可學也非鄭衛其耳者可聽也前輩或曰𫝊授無間然可𫝊者譜不可𫝊者心也心而可𫝊則何以千載而下獨伯竒師曠諸子之専其美蓋得於心者自應於手其不得於心者徒求其聲求其聲者特造作之巧應於手者乃自然之清噫嘻志在髙山流水知之者惟一子期至於馬之仰鶴之舞則又物之靈也吾之於琴固不敢以子期望今人每獨惜今人之不馬鶴若也凡我同志以其自得於心者而撫之而自聽之亦不必冀人之知不知也龍波子序東牟攬秀亭記近見東牟攬秀亭記金人文字失其姓名記文亦簡潔可觀但詩末句俚拙耳雖緇流有此風調然終非大雅也天下以形勢之要雄東牟東牟以海山之秀甲天下山視逺人人視逺山見之易友之難隴首牧兒林間樵叟雖能視之而不能友惟太守完顔公竒人也前之刺州政者多矣官於斯牧於斯不能亭於斯豈力不足抑覽不至也公於是鏟城為基斷木為亭人不聞役樂成厥功同僚佐登覽其上見夫烟棲雨宿雲出月來歸鴻野鶩如飛几席之上終日望軒冕焉昔莘野以阿衡而𫝊襄陽峴首以羊叔子而𫝊赤壁以東坡而𫝊今則崑崙竒秀得我公發越之他日與山增重未必不由伯樂之一顧也嘉嘆不足故詩之詞曰霜天曉兮白雲飛洞天暮兮白鳥歸江月照兮松風吹好箇家風人不知象山先生言吏奸二書象山先生作王荆公祠堂記筆力宏妙自謂斷百餘年末了底公案聖人復起不易吾言此一大題目非先生不敢言非先生不能言也當來更加揫斂使歸簡嚴則前無古人矣先生精於說理長於論事惟其天材宏縱橫說𥪡說逗盡底裏沛然不窮讀之使人氣涌神􅋏聞風興起而况於親炙之者乎嘗有與楊守一書言吏奸者其說甚妙其書曰吏胥居府廷司文案宿留於邦君之側以閒劇勞逸嘗吾之喜愠以日月淹速嘗吾之忘憶為之先後緩急開閣損益以蔽吾聰明亂吾是非而行其計豪家擁髙資厚黨與附㑹左右之人創端緒於事外以亂本㫖結左證於黨中以實僞事工為節目以與吏符合而成其說太守以異鄉之人一旦而聽之非素諳其俗而府中深崇閭里之事不接於吾之目途巷之口不聞於吾之耳被害者又淳願柔弱類不能自明自達聽斷之際欲必得其情而不為所欺此甚明者之所難也吾雖得其情彼尚或能為之牽制以格吾之施行吾斷之速則文疏事漏而無以絶其辭吾求之詳則日引月長適以生其奸况其是非曲直之未分而實有以二吾之心疑吾之見變亂其事實而其情亦未易得也又有與徐子宜侍郎一書言某人護吏疾民陽若不任吏而隂實為所賣奸猾之謀無不得逞賄賂所在無不如志間有一二行遣形若治吏而僞文詭辭諂順乞憐者皆可回其意下人轉移其事如轉户樞胥輩窺之審玩之熟久矣所欲為者如取如擕不見有毫髮畏憚之心惟其正論誠意則扞格不入乃以此自謂其明且公也良民善士疾首蹙額飲恨吞聲無所控訴公人世界其來久矣尤熾於今日公人所從得志本緣官人不才然向者衰說不甚盛風俗不甚壞公人未盡得顯然肆志官人未盡與公人一律官人之才者固有實益亦難得盛譽官人之不才者亦尚藉常理常心默有維持未至泯然大亂十數年來公人之化大行官人皆受其陶冶沈迷浸漬靡然一律而書生腐儒又以經術為之羽翼為之干城沮救正之勢塞懲治之路潛禦其侮隂助其瀾故官人之才者雖易以自見易得盛譽而無補風俗無救大勢至其不才必至大亂中人無以自立皆從風而靡隨波而流守正而才術不足以自見者其心僅不泯滅而不復可伸此今時之大勢今之為善者猶持杯水救車薪之火也天生民而立官使司牧之張官置吏所以為民也縣家而害氏州家得以治之州家而害民使家得以治之今州家使家壅之以胥吏塞之以僚屬所賴以通閭里田畝之情者有被害者赴訴也今乃以告訐把持之名而抑絶之近來胥吏之妙用専在抑絶赴訴者之路懲一二以威衆使之吞聲飲恨重足脅息而吾得以肆行而無忌監司太守有服其役任其怨而不得享其利者有相為相役而共享其利者此二書明暢痛快說盡吏奸乾淳紹熙盛時且不免此况今世乎使先生睹今日之公人世界恐又非二書足以盡其情狀也民生斯時可憐哉夫御之如束濕視之如仇敵待之如盜賊尚不免奸惡溢出毒我生靈况乃以士大夫禮之以僚屬待之以心腹耳目寄之何異於教猱升木授賊以兵則善良之破骨出髓吞聲就死蓋無怪矣程伯剛墓銘劉左史光祖德修簡州人自號後溪名節士也嘗為程伯剛墓志銘備述伯剛未生時其父夢一青襟童子挽衣自言來為公嗣且曰我青城先生兒也明年而伯剛生生三十七年而病病且革父母問所欲言無他語第云仙階淺未足以成功名遂死開禧三年三月也此說荒忽怪誕正人端士所不道獨其一銘絶佳謾載於此銘曰祠之西峯有翩其童暫下人世兮還山無蹤曷不少候以遊夫蓬萊道山之宫曰吾未足以成功也獨留遺冢與遺書使思子兮無窮我為勒銘識其幽封月明山空魂其歸來蕭蕭松風已矣乎聊託吾文慰而翁母索之杳冥之中范去非墓志樞密𢎞齊先生包公道夫恢以學問為時師表固不以文字名也平生為人作豐碑巨刻每下筆輒汪洋放肆根據義理娓娓不窮蓋其學力深厚不可涯涘獨於豫故人范君去非一墓志簡潔清靜足以寫去非之平生無泛語無諛詞豈韓退之志樊宗師即學樊體意邪去非為人清俊灑落其文章亦然而包公此志極稱之去非得此足以自慰於九泉矣文曰君范姓禮名去非字後易名㢲字行可其先世國博柔中與元祐黨籍行可其六世孫也為人機警其氣貌精神如鸞鶴其文詞詩句如冰雪其自號曰月崖或謂其飄飄有飛仙風韻治家整整條理景物器用文籍圖畫莫不曄然鮮明快人耳目意欲自立不混流俗言欲簡潔不為塵冗大槩與時落落若寡合而與人極有情有義人亦多相樂而少相忤也資其為文者多延館之其才美宜逺大而或又疑其過清慮福壽之不及者年才四十有三一疾果不可為病中亦自笑曰只如此死矣無戚容悲辭也嗚呼千里之行未半途而車遽折馬驟蹶可哀也夫時咸淳初元乙丑十一月一日也三年豫方歸自京未及家而其子輝逺來哀請謂以今年三月某日葬於西城縣太平鄉十五都大義祖隴之旁求記於豫豫以誼不容辭乃志曰曾祖如川朝請郎通判瓊州妣鄧氏祖鍔妣官氏父汜里名士也有聲場屋嘗三以賢能興妣張氏娶張氏毅然能守夫志一子輝也三女良勝阿益細妹在室銘曰秀而不實者有矣夫聖人不能必也何行可之有餘於秀而不足於實也邪抑如圭如璧世所共寶之今擇斯藏斯尚其永保之端明殿學士通奉大夫提舉臨安府洞霄宫南城郡開國侯食邑一千一百戶食實封二百戶包恢撰通奉大夫寶章閣待制提舉隆興府玉隆萬壽宫武城郡開國侯食邑一千戶曽頴茂篆蓋去非以文章受知於包公其登崇班牧吳門必屈去非偕行凡朝廷之表奏官府之書啓皆屬焉去非亦能介潔自勵不以私干公逾愛敬之公之除樞密也約豫同造朝時豫母病乃入城詣公辭行酒間從容談及去非平生公凄然悵歎為之投箸足以見其敬愛矣故於此志用意極深大覺寺長明燈記旴江出郭西門良疇衍沃清流湍激夾道巨石峙立若怪獸竒鬼狀是為麻源第三谷踰華岡躡石磴深入數十里有精藍曰大覺昉建於唐光化開山師懷震有道術其始至也伾而前溪隨止卓錫搜巖剔藪以立寺宇初名靈隱皇朝治平中始錫今額既數百年矣今寺僧妙圭節衣并食銖積寸纍又干長者布地之金以益之市田為長明燈費歲入米以斗計者凡二千且用佛屬付國王大臣故事請文據於有司勒堅珉以詔後庶幾永終不墜間請記於豫客有謂圭曰而法中有掌中之光照十方者有絮孔之光照一室者有變見光景輝耀崖谷使人目眩神迷若峩眉五臺天台廬阜者今而辛勤昏旭增膏續焰不亦勞且小乎圭曰若子所言或者方以病吾徒之善幻我法之正不如是也今吾以真實心作無盡供使幽明同一昭徹聖凡同一歸向日月經天容光必照吾燈不鑠靁電晦明風雨總至吾燈不暗寒暑往來星移物換吾燈不斷塵揚東海灰出昆明吾燈不滅鑿大昏之墉闢靈照之戶揭孤光以長存破羣迷而咸曉使內外精粗融㑹一法顧不韙歟豫以其言近道遂書以為記此西園先生傅公幼安自得所作也簡嚴溫潤自成一家蓋其學本於左氏故無冗長之病然諸記多弱獨此為勝非若古賦則篇篇皆佳蓋人之能各擅一長云陳仲石志後村集中有云豫少時讀龍泉所作陳仲石志髙雅如檀弓榖梁條暢如荀卿豫至今猶不忘憶昔嘗與雲畬趙史君論水心文字止取其銘文佳而未及其志也後村翁推尊極至念不可泯因録於此識者更共評如何然不讀志亦不知銘之妙平陽陳巖字仲石自其成童智之所開師友問學而已年進志上習通性明服所知於家而宗族慕焉信所行於里而鄉黨賓馬意逾髙力逾下督責其身不使一日縱於慢游也奉持其心不使一思慮雜於邪妄也訓於經講於禮者必欲周於事達於物不計事之異同時之先後也其可見者若此嗚呼仲石父之巨子弟之任兄師之𫝊人出而從官國之修士也夫如木升而為材可掄如玉琢而為器可繅藉也夫不幸年三十有五淳熙十五年十二月四日卒明年三月葬於安仁其弟崇致其父及師之請曰願有銘夫悲哀其志立之不及於成就此師友之所以為君痛也道喪久矣士不修其實職而皆以必用為貴偶不獲用為憾志立之卓祗重為纍焉三代之時道嘗行矣彼家淑其道人有其善孰從而盡用之然則壽夭一也用舍一也君之自得以正其命蓋有人之所不及知者銘曰恤汝婦撫汝子父母之力止矣止而弗止斯石紀之魏鶴山文集序劉清叔澄舊居廬陵徙匡廬自號玉淵登科入仕至監簿中更臺劾謫瑞州道判又謫封州嘗以文墨事信菴趙丞相藉甚文名有玉淵集刋行其筆端透徹處痛醒人意第腴贍之過反傷泛濫若加揫斂之工以造簡古之味足可名世矣魏鶴山集序曰藝祖救百王之弊以道理最大一語開國以用讀書人一念厚蒼生文治彬彬三百年海內興起未艾也而文章亦無慮三變始也厭五季之萎苶而崑體出漸歸雅馴猶事組織則楊晏為之伯已而回瀾障川斫雕反朴崇議論尚風節要以關世教達國體為急則蘇歐擅其宗已而濓溪周子出焉其言曰道德之不務惟文之能藝焉爾作通書著太極圖大本立矣餘力所及雖不多見味其言藹如也由是先哲輩出易𫝊探天根西銘達仁體通鑑精纂述擊壤豪詩歌論奏王朱而講說吕范可謂和順積中英華發外矣後生接響謂性外無學其弊至於忘道忘藝知有語録而無古今始欲由精達粗終焉本末俱舛然則言之無文行而不逺亦豈濂溪所尚哉乂道州九嶷山虞帝廟碑銘有曰厯數有終精一不死藏其衮龍橋山故事皥顓曰帝軒轅曰皇帝賓其間匪璣即衡又曰帝車下來天風其飄長松鼓之五弦九簫此等皆意到語妙默菴銘忍默平直養生四印山谷翁詩中語也其詩曰百戰百勝不如一忍萬言萬當不如一默無可簡擇眼界平不藏秋毫心地直以此謂之四印而提之以為養生之用千峯陳文定公嘗為人作四印堂記發揮頗盡其理其後有熊生者善篆刻圖書而自號默菴子友吳允文侍郎為作默菴銘直以山谷之說櫽括為文雖一時戲筆而鎔意鑄詞頗有巧致且於印事甚切云涪翁四印忍默平直子遺其三獨守其默豈三不足惟一是克抑守其一以用三德熊曰不然彼道吾器直以為絲平以為地刃於心上有刻之義吾守吾默於是為四豫曰大好雖器亦道以印印心生也可保一菴聊寄非瓦非草子印我歌佩以為寶山西吳浚贈熊默菴吳浚南城人字允文自號山西允文死漳州且十年丙戌六月熊默菴過我誦舊詩愴然為録於此因想疇昔允文與豫談文評詩慷慨激發玉立頎然今遂無復斯人可為永慨艾軒先生跋韓桞蘇黃集蘇黃之别猶丈夫女子之應接丈夫見賓客信步出將去如女子則非塗澤不可韓桞之别則猶作室子厚先量自家四至所到不敢略侵他人田地退之則惟意所指橫斜曲直只要自家屋子飽滿初不問田地四至或在我與别人也此譬亦可人意水心遺文昔開慶已未歲嘗選取水心文之絶出者手抄成帙以備觀覽時年甫二十耳智識未到而輕於去取嘗疑必謬今者仕閩五載不讀此文久矣歸來暇日重閲全集欲採所遺而亦無踰於前所選豈七十八翁知識不加於二十時耶因記雲畬趙史君曾與余論筆法引水心公所序徐致中語極有味余乃遺之今日因見即八法結構之論也謾録於後蓋雲畬翁亦喜讀水心文者俊頴超卓廣記博辨當劇談快意時輒索豫同聲背誦晉元帝廟記司馬溫公祠堂記陳同甫王道甫周子及徐靈淵等諸志銘抱膝齊詩朱娘曲諸篇以為樂噫久無是契今之友朋㑹是意者寡矣舊集蓄藏歲久濕漏腐壞懼成灰塵故亟抄而存之延祐丁巳四月三日送徐致中序曰徐致中在零陵得單秉文筆法以自書論語大學諸篇遺豫豫得之驚喜為作詩云歐虞兼禇薛字逺筆為塵今日睹來翰如親見古人盡歸嚴號令富有活精神碑版荒唐久遄看走四鄰然致中書暴進而余素不知書恐見者嗤侮遂不敢出此因其赴龍溪丞謾書以别致中云今人字不用法隨帖摹寫止取形似雖有巧拙豈足評論豫問當用何法致中言王逸少則不可知凡書皆一法如匠造屋主人位置裝作不同木之分寸必應繩墨故分為㸃畫合而為字無妄施者致中所造如此當遂名家更須歸日驗之劉㑹孟題本朝列聖遺像平園周丞相家藏列聖遺像求劉太博㑹孟題跋劉嘗仕福州州有開元寺寺有神御殿以奉祖宗遺像蓋宋都汴京時太廟奉塑像龍圖閣奉畫像景靈宫奉棬檆像像甚輕故靖康之亂建炎之遷藏於福州自太祖至哲宗七帝而已㑹孟在福親見之與今世間所繪不同故題曰昔從三山開元冠帶上謁神御殿殿之室晝黑火令嚴甚寺僧藏燭袖間至殿上乃出之然後見咫尺太祖太宗姿貌如龍然熙陵視兄微晳二帝皆粲然啓其齒初見若驚故相𫝊不敢正視視輒目疾非髙廟神靈至此殆魄動神奪故也真宗仁宗皆蕭散如天人惟英廟乃似今所𫝊藝祖像赫然而髯張瞪視者熙豐之聖人也至元祐帝則盛年鶴聳而長於是七廟盡矣時環視俯仰流涕念人間所𫝊理不得似此卷出平園公家云配祀本至近年穆陵老少態異不論眉平而重顧瞻更長今猶凛凛如清光在望恭惟過江靈御橋山弓劍豈復忍紙上見形似哉燕人弱喪過晉而悲雖非真實其傷心一也隱居通議卷十七
