body:
  text: 隱居通議卷十五元劉塤撰文章三樊宗師文唐樊宗師作絳守居園池記好怪者多喜其竒古以豫觀之亦何竒古之有磽戞磊塊類不可讀如第一句曰絳即東雍為守理所猶為可曉第二句曰稟參實沈分第三句曰氣蓄雨河潤便已作怪第四句曰有陶唐冀遺風餘思才覺平順第五句則又曰晉韓魏之相剝剖云云自此而下皆層疊怪語矣其末曰考其臺亭沼池之增蓋豪王才侯襲以竒意相勝至今過客尚往往有指可創起處豫退常吁後其能無果有不補建者池由於煬反者雅文安發土築臺為拒誅幾附於汚宫水本於正平軌病井鹵生物瘠引古沃浣人便幾附於河渠嗚呼為附於河渠則可為附於汚宫其可書以薦後君子以上皆結語而不知意落何處凡文章必有樞紐有脈絡開闔起伏抑揚布置自有一定之法今徒以詭異險澀難談為工其於六經簡嚴易直之旨合乎否也按宗師字紹述仕唐與韓文公同時歷金部郎中綿州刺史徵拜左司郎中又為綿州刺史徙絳州遷諫議大夫卒韓文公銘其墓謂紹述文必已出不蹈襲前人一言一句放恣橫從無所統紀然不煩繩削而自合其意已寓抑揚矣夫作文而無所統紀則亦何等文章邪至於銘則曰惟古於詞必已出降而不能乃剽賊後皆指前公相襲從漢迄今用一律公之譏訾世俗是矣又曰文從字順各識職則似以樊為不然者夫六經之文無不可讀而不害其為古繫辭春秋俱出聖筆其文從字順蓋如此也商盤周誥信屈聱牙則以秦火之餘出以伏生口授而然齊語固異而况九十之老齒豁而音微又雜以方言安得不佶屈聱牙要亦出於自然非作為也今樊文作意求新殆近於怪惟求其不可讀而不望其必可傳其去經也逺矣律以從順未知其何如而世或稱其竒古至篤嗜而不置何也廬山公九錫文宋袁淑俳諧文廬山公九錫云若乃三軍陸邁糧餫艱難謀臣停算武夫吟歎爾乃長鳴上黨慷慨應𨝍隨驅千里荷囊致餐用捷大勳歷世不刋斯實爾之功也音隨時興晨夜不默仰契玄象俯協漏刻應更長鳴毫分不忒雖挈壺者未足比德斯又爾之智也若乃六合昏晦三辰幽冥猶憶天時用不廢聲斯又爾之明也青脊絳身長頰廣額修尾後垂玉耳雙磔斯又爾之形也嘉麥既熟食須精麵負磨回衝迅若轉電惠我衆庶神祇獲薦斯又爾之能也爾有濟師旅之勳而加之以衆能是用遣中大夫閭邱騾加爾使銜勒大鴻臚班腳大將軍宫亭侯以揚州之廬江江州之廬陵吳國之桐廬合浦之朱廬封爾為廬山公以上皆淑之文韓文公效此體作毛穎傳而洪慶善乃云毛穎傳栁子厚以為怪洪以為子虛烏有之比其流出于莊周寓言則是不知韓之所始矣但袁韓俱以文為戲者而淑之文則六朝體耳韓祖太史公故髙近世劉會孟稱江丞相為廬山公無乃不雅豈不念及此耶張才叔義朱文公曰胡致堂議論俊發人物偉然向嘗侍之坐見其數杯後歌孔明出師表誦張才叔自靖人自獻于先王義陳子翁奏狀等可謂豪傑之士豫嘗欲得張才叔之義觀之而不可得近乃從旴城朋友處借鈔一本甲戌正月用行在所刋者校定今録于左按鄱陽銀峰諸先生傳云公諱庭堅字才叔元祐人才榜眼及第初住太學作自靖人自獻于先王義其夜夢三仁來謝舊曽刻石於東京今讀其文令人感慨興起真識仁人義士之心於千載之上以上傳中語南渡前經義簡實典古有補世教豈若近世浮虛磔裂者所為宜為先儒之所深取也其義曰君子之於去就死生其志在於天下而不在於一身故其死者非虛名生者非懼禍而引身以求去者非要利以忘君也仁之所存義之所在鬼神知之矣昔商之三仁或生或死或為之奴而皆無愧於宗廟社稷豈非其謀之出於此歟故相戒之言曰自靖人自獻於先王蓋於是時紂欲亡而未悟也其臣若飛亷惡來者皆導王為不善而不與圖存若伯夷太公天下所謂至賢者則潔身退避而義不與俱亡矣為商之大臣而且於王為親者惟王子比干箕子也三人者欲退而視其敗則不忍欲進而與王圖存則不可與言雖有忠孝誠慤之心其孰達之哉顧思先王創業垂統以遺其子孫設為職業祿位以待天下之賢俊使相與左右而扶持之期不至於危亡而後已子孫弗率其亡形已見而忠臣義士之徒猶不忘先王所以為天下後世之意以為志不上達道與時戾亂者弗可治也傾者弗可支也而君子所以報我先王者惟各以其能自獻而已雖然君子之志不同而欲死生去就各當於義而不獲罪於先王非人所能為之謀其在於自靖乎蓋若商祀之顛隮則微子以為深憂而辱於臣僕不與其君俱亡者箕子比干之所羞為也微子抱祭器適周則奉先之孝得矣比干諫不從而繼以死則事君之節盡矣箕子以父師為囚奴猶眷眷不去則愛君之仁至矣然其死者若愚其囚者若汚而其輒去者若背叛非忠也然三子皆安然行之不以所不能為者自愧而亦不以所能為者愧夫人更相勸勉以求合於義而不期於必同夫謂先王所以望於後世臣子者惟忠與孝也故微子之去自獻其孝比干以諫死箕子以甘囚奴自獻其忠是三子非茍為也處垂亡之地尤拳拳於天下國家而不在於一身故其志之所謀各出於志之所欲而以期先王之知耳古之所謂皎然不欺其心者非斯人之謂乎雖然書載微子與箕子相告之辭而比干不與焉何者人臣之義莫易明于死節莫難明于去國而屈辱用晦亦所難辨也比干以死自誓無足疑者故不必告人而微子不免於去箕子寧忍辱以待亡者重去就之義而原之故也不然何以並稱三仁哉無垢先生張文忠公九成曰比干不答二孔謂心同張庭堅本鄭氏謂死節易明豫謂儻如二孔所言不當言自靖人自獻於先王蓋三人之志各有所在吉州所刋跋語云此中興前近二百年書義也至今尚可咀嚼如此曷可訝其為古哉蓋吾儕所作時文本自無用然能以義理為主發揮聖賢心事於千百載之上亦自打顛不碎如此篇文雖簡格雖與今不同然議論正當辭不迫而意已獨至所以屢經前輩品題潭州攸縣張次雍所著筆録亦載此篇云得於東萊文鑑中又云才叔眉山人國家承平時四川未有類省皆試於京師才叔試此文畢忽睹三人皆古衣冠長揖曰公可謂能言我三人心事矣祭蘇文忠公文李方叔豸受知坡翁甚深坡翁卒於常州方叔以文酹之有曰道大不容才髙見忌皇天后土明一生忠義之心名山大川還千載英雄之氣文氣甚壯三蘇三蘇皆得諡文老泉文安東坡文忠潁濵文定森然鼎峙為一代文宗老泉之文豪健東坡之文竒縱而潁濵之文深沈差不逮其父兄故世之讀之者鮮焉惟進卷中歷代論如夏商三國東晉數篇却自精妙有味他作如御風詞超然特出者甚少然其所作古史則議論髙絶又非坡所及又作管幼安畫贊甚佳蓋有為而發今録于此管幼安畫贊豫自龍川歸居潁川十有二年杜門幽居無以自適乃取舊書閲之將求古人而與之友蓋于三國得一也曰管幼安寧幼安少而遭亂渡海居遼東三十七年而歸歸於田廬不應朝命年八十四而沒功業不加於人而豫獨何取焉取其明於知時審於處已云爾蓋東漢之衰士大夫以風節相尚其立志行義賢於西漢然時方大亂其出而應世鮮有能自全者潁川荀文若以智䇿輔曹公方其擒吕布斃袁紹皆談笑而辦其才與張子房比然至九錫之議卒不能免其身彭城張子布忠亮剛簡事孫氏兄弟成江東之業然終以直不見容力爭公孫淵事君臣之義幾絶平原華子魚以德量重於曹氏父子致位三公然曹公之殺伏后子魚將命至破壁出后而害之汝南許文休以人物臧否聞於世晚入蜀依劉璋先主將克成都文休踰城出降雖卒以為司徒而蜀人鄙之此四人者皆一時之賢也然直已者終害其身枉已者終喪其德處亂而能全非幼安誰與哉舊史言幼安雖老不病著白帽布襦褲布裙宅後數十步有流水夏暑能策杖臨水盥手足行園囿嵗時祀其先人絮帽布單衣薦饌饋跪拜成禮豫欲使畫工以意仿佛畫之昔李公麟善畫有顧陸遺思今公麟死久矣恨莫能成吾意者始為之贊曰幼安之賢無以過人豫獨何以謂賢賢其明於知時審於處已以能自全幼安之老歸自海東一畝之宫閉不求通白帽布裙舞雩而風四時蒸嘗饋奠必躬八十有四蟬脫而終少非漢人老非魏人何以命之天之逸民諫用兵書東坡長於論事口端有舌真是入妙其代張方平諫用兵書有曰且夫戰勝之後陛下可得而知者凱旋捷奏拜表稱賀赫然耳目之觀耳至於逺方之民肝腦塗于白刃筋骨絶於餽餉流離破産鬻賣男女薰眼折臂自經之狀陛下必不得而見也慈父孝子孤臣寡婦之哭陛下必不得而聞也譬猶屠殺牛羊刳臠魚鱉以為膳羞食者甚美見食者甚苦使陛下見其號呼於挺刃之下宛轉於刀几之間雖八珍之美必將投箸而不忍食而况用人之命以為耳目之觀乎此疏甚佳逰桓山記坡翁作逰桓山記感慨深長超然物化其辭曰元豐二年正月己亥晦春服既成從二三子遊於泗之上登桓山入石室使道士戴日祥鼓雷氏之琴操履霜之遺音曰噫嘻悲夫此宋司馬桓魋之墓也或曰鼓琴於墓禮歟曰禮也季武之喪曽點倚其門而歌仲尼日月也而魋以為可得而害也且夫為石椁三年不成古之愚人也豫將弔其藏而其骨毛爪齒既已化為飛塵蕩為冷風矣而况於椁乎况於從死之臣妾飯含之貝玉乎使魋而無知也豫雖鼓琴而歌可也使魋而有知也聞豫鼓琴而歌知哀樂之不可常物化之無日也其愚豈不少瘳乎二三子喟然而歎乃歌曰桓山之上雜石嵯峨兮司馬之惡與石不磨兮桓山之下維水濔濔兮司馬之藏與水偕逝兮歌闋而去序鼂君成詩東坡先生序鼂君成詩集有曰達賢者有後張湯是也張湯宜無後者也無其實而竊其名者無後揚雄是也揚雄宜有後者也賢者民之所以生也而蔽之是絶民也名者古今之達尊也重於富貴而竊之是欺天也絶民欺天其無後不亦宜乎故曰達賢者與有其實而辭其名者皆有後此論甚新可以為世戒答謝民師書又答謝民師書有曰揚雄好為艱深之辭以文淺易之説若正言之則人人知之矣此正所謂雕蟲篆刻者其太玄法言皆是物也而獨悔于賦何哉終身雕蟲獨變其音節便謂之經可乎屈原作離騷經蓋風雅之再變者雖與日月爭光可也可以其似賦而謂之雕蟲乎使賈誼見孔子升堂有餘矣而乃以賦鄙之至與相如同科雄之陋如此先生此論深中子雲之病序樂全文孔北海志大而論髙功烈不見於世然英偉豪傑之氣自為一時所宗其論盛孝章郗鴻豫書慨然有烈丈夫之風諸葛孔明不以文章自名而開物成務之姿綜練名實之意自見於語言至出師表簡而盡直而不肆大哉言乎與伊訓説命相表裏非秦漢以來以事君為説者所能至也此論自坡翁發之而後世宗其説滕元發墓銘東坡翁銘滕元發墓言其姿度雄爽英偉大度以為天下異人因其文想其人真卓犖不羣者也坡翁此志筆力跌蕩振發風起水涌真足以發揚之儻筆弱則失之矣元發舊名甫字元發後避父諱以字為名而字達道舉進士第三仕至光祿大夫龍圖閣學士本東陽人也葬蘇州長洲縣評栁子厚坡翁曰栁子厚南遷始究佛法作曹溪南嶽諸碑妙絶古今不知以栁之文言耶抑以其學言耶無姓和尚碑尤妙龍川宗歐文龍川先生陳公亮喜歐陽文其所作有絶似處嘗選歐文一百三十篇命曰歐陽文粹其序有曰初天聖明道之間太祖太宗真宗以深仁厚澤涵養天下蓋七十年百姓能自衣食以樂生送死而戴白之老安坐以嬉童兒幼稚什百為羣相與鼓舞於里巷之間仁宗恭已無為於其上太母制政房闥而執政大臣實得以參可否晏然無以異於漢文景之時民生及識五代之亂離者蓋於是與世相忘久矣而學士大夫其文猶襲五代之卑陋中經一二大儒起而摩之而學者未知所向是以斯文獨有愧於古天子慨然下詔書以古道飭天下之學者而公之文遂為一代之師法未幾而科舉利祿之文非兩漢不道於是本朝之盛極矣又曰公之文雍容典雅紆餘寬平反覆以達其意無復毫髮之遺而其味常深長於言意之外使人讀之藹然足以得祖宗致治之盛其關世教豈不大哉以上皆龍川所作而亦紆餘寬平甚似歐文豈非誦習之熟自然迫真歟歐曽王蘇四家為宋文宗然皆未嘗用怪文竒字刻琢取新而趣味深沈自不可及若歐則尤純粹宜其為一代之宗工羣公之師範也所著豐樂記實為妙筆龍川文粹不首取之而乃附見於拾遺殆不可曉曽平山序水雲村詩金溪曽子良自號平山南豐族裔也以能賦擢咸淳戊辰第纍任至建德府淳安令甫三月國事變歸隱山中鬻文以自給辛卯秋豫訪之年六十有八矣蓋别二十年而復會欣然道舊明年以豫所作水雲村吟稿往請教焉辱為序曰宋初南豐儒家望族二曰江樓劉氏曰密國曽氏我密公逮江樓公相好于時我逺祖十五公猶在豐也其後十五公既來宅于金溪自是與江樓公家子孫逺矣至于子良之身而江樓公之諸孫水雲村起潛君塤實來顧豫于常安莊之寓舍豫不勝枌榆松楸之涕且歸一日以其詩若文示豫也曰子為我言焉子言之先正文定公言之也其自我江樓公以下實寵嘉之豫謝不敏一日以其詩示豫也而文未之見詩豫視之古視選近古視黃律五視杜七視杜若黃絶五視選七視晚唐而軼焉皆合大家數蓋其材全其力巨其氣雄故能持衆媺而不自以為名刻衆形而不自以為功知名早所知皆名公也若豫所敬千峰陳公年魁如心陳公莫逆次山趙公皆深知君豫恨納君交晚豫何言晚不恨恨世易三公者或以其老且智不見兵革或以其強而勇著名節廟食他邦獨豫與君自靖獻僥幸不死今者乃得與相見敘世契如未經亂離時雖可恨亦可幸而甚可恨者以君之才之學不一試用僅客諸侯竟卷懷於此吾儒事業當不止是然後知千峰公之期君也深而君之自得也亦深矣嗟夫日月之經於天也而行江河之經於地也而流彼豈有所為而為之哉豫與陳公講之於鳳皇山之下熟矣尚其相與勉之以母負陳公之意以母忝我兩家所生云元黓執徐後六月辛卯朔里契家生曽子良序論語四贊平山公嘗作論語四贊甚佳志道贊曰道既是我志又是誰千五百年惟孔仲尼據德贊曰得寸則寸得尺則尺實有諸已而非以力依仁贊曰仁者人也造次弗違體貼出來如人著衣遊藝贊曰習無不利不習而利精義入神事理不二隱居通議卷十五
