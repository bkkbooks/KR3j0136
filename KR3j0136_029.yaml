body:
  text: 隱居通議巻二十九元劉壎撰地理四方之限溟渤漲洋天地所以限東徼也惡谿沸海天地所以限南徼也陷河懸渡之設乎西瀚海沙子之設乎北天地所以遮西而制北也激瘴霧於東維界黒水於南極泄流沙於西陲决弱水於北漢天地所以界四維也八荒之内奚有奚無八荒之外何止何極以上見羅泌路史中説惡谿沸海惡谿在閩多厲毒中者温屯嘔泄逾者腳足腐弱其魚多鰐沸海常沸尤多惡魚炎州貢者經之路史之所載如此然予嘗仕閩數年不聞有此也惟聞延平一宣差言常汎南海海水中有火出郭學録又言嘗見海嘯其海水拔起如山髙西土頭痛山沙子黒水自罽賓國西行歴大小頭痛山及赤土身熱之阪山在渠搜之東疏勒之西冬月過者有頭痛身熱吐逆之病驢畜皆然夏月即死又經烏柁四百里石懸度山咫尺之路下臨不測在盤陀西南今葱嶺冬夏有雪即佛書所言雪山者路史説本漢西域𫝊沙子在契丹後彌數千里往者女真既滅契丹其臣大石林牙攜其子三晝夜踰沙子立之數十年粘罕不能近黒水在梁雍間涉者脛黝黒柳中路伊吾路陷河弱水裴矩西域記自髙昌東南去𤓰州三百里並沙磧乏水草四靣芒芒葢西州之栁中路又有一路自栁中縣南東行經大海東又東南渡磧入伊州即裴所謂伊吾路今奉使者至髙昌從武城西北有捷徑度沙磧千餘里四靣芒然不可凖記行者唯視人死骸骨及驢駝糞以為記大雪即不得行或見宫宇忽聞歌笑從之者多不反葢魑魅所為也當旦未西北沙中夏熱風為患惟老駝能知之風將作則駝聚鳴而擁其鼻口否則死今髙昌客旅皆由伊吾道出陽闗至于闐國路經陷河伐檀置中乃得渡也弱水亦陷河之類羽毛皆沈今川廣之界亦有一小河淖湴而深今古不得渡葢亦弱也海外多國昇明二年倭王奉表條其祖之勲謂東北服者二百九十有六國是固海東之國倭王所服者然其未服之國又㡬十百矣支顯西游道其所記數百國此于闐以西之國支顯所知者然其所不知者又㡬十百矣智猛法盛之録曇勇道安之傳蕃王之國不下四五百大廷四域之使魏氏四道之賓所奏國數亦不下四五百此世所未嘗聞者是數千國俱樂土也則海外之國不勝其多矣凝按東北二字今路史本作東西總前路史五段而論則知世間疆土如此其濶逺也今人惟指中國所統以為大直井蛙之見耳人豈可以不博覽哉南陽形勢往在閩閲艾軒先生林中書光朝文集内有一論謂南陽可都其説甚備失於鈔纂今閱歐陽文載慶厯間論西事書亦有一論曰臣聞漢髙祖入秦不由東闗而由南陽過酈析而入武闗曹操等起兵誅董卓亦欲自南陽道丹析而入長安是時張濟又自長安出武闗奔南陽則自古用兵往來之境也臣嘗至南陽問其遺老云自鄧西北至長安六七百里今小商賈往往行之初漢髙入闗其兵十萬夫能容十萬兵之路宜不甚狹而險也然自洛陽建都後行者皆趨東闗其路乆而遂廢若能按而通之則武昌漢陽郢復襄陽梁洋金商均房光化沿漢之地十一二州之物皆可漕而頓之南陽沿漢之地山多美木近漢之民仰足有餘以造舟車甚不難也歐公建明南陽地利之美如此其説與艾軒合然艾軒則以孝皇有志恢復故欲於此建都以北窺中原而歐公則以元昊犯邉欲於此聚餫以應接西事其勢不同其論則一自古雖未嘗建都於此然合二論參攷則其地形勢有足取者陳龍川上孝皇書亦言荆襄南陽形勢可都謂東通呉㑹西連巴蜀南極湖湘北控闗洛大意皆相近也三輔黃圖三輔黄圖上下二巻不著作書者氏名具載秦漢宫室苑囿甚備顔師古漢書新注多取焉唐書藝文志有三輔黄圖一卷列於地理類之首亦不言何人作其間多用應劭漢書集解劭後漢建安時人也至魏人注漢書復引此圖為據以此考之得非漢魏間人所作邪巻首一序頗雅潔漫載于左易曰上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨葢取諸大壯三代盛時未聞宫室過制秦穆公居西秦以境地多良材始大宫觀戎使由余適秦穆公示以宫觀由余曰使鬼為之則勞神矣使人為之則苦人矣是則穆公時宫室已壯大矣惠文王初都咸陽取岐雍鉅材新作宫室南臨渭北踰涇至於離宫三百復起阿房未成而亡始皇并滅六國馮藉富强益為驕侈殫天下財力以事營繕項羽入闗燒秦宫闕三月火不滅漢髙祖有天下始都長安實曰西京欲其子孫長安都此也長安夲秦之鄉名髙祖作都至武帝承文景菲薄之餘恃邦國阜繁之資土木之役倍秦越舊斤斧之聲畚鍤之勞嵗月不息葢騁其邪心以誇天下也昔孔子作春秋築一臺新一門必書于經謹其廢農時奪民力也今裒采秦漢以來宫殿門闕樓觀池苑在闗輔者著于篇曰三輔黄圖云東都不與焉予觀此序簡而當質而不俚非近世所能及也三輔本是三秦禹貢九州内則雍州也古豐鎬之地平王東遷以岐豐賜秦襄公至孝公始都咸陽咸陽在九峻山渭水北以其山水俱在南故名咸陽秦并天下置内史以領闗中項藉滅秦分其地為三以章邯司馬欣董翳為王謂之三秦故漢髙帝入闗定三秦也五年髙帝在洛陽婁敬説帝都長安留侯從而贊之有居髙屋建瓶水之説自是漢始都之初置左右内史武帝太初元年改内史為京兆尹與左馮翊右扶風謂之三輔俱治長安古城中公羊傳曰京大也師衆也天子所居馮翊注曰馮慿也翊輔也翼輔京師也其地今同州扶持也助也言助風化在今岐州始皇三十五年作朝宫於渭南上林苑庭中可受十萬人車行酒騎行炙千人唱萬人和收天下兵聚咸陽銷為鐘鐻古以銅為兵故可鑄鐘髙三丈銷鋒鏑為金人十二立於宫門舊注云鑄金狄人立阿房宫前坐髙三丈董卓悉椎破銅人銅臺以為小錢魏明帝欲徙二金人於洛陽載至霸城重不可致留之阿房宫一曰阿城規恢三百餘里離宫别館彌山跨谷輦道相属前殿東西五十步南北五十丈木蘭為梁磁石為門門在阿房前悉以磁石為之令四夷朝者或有隱甲懐刃即吸止以示神亦曰郤胡門阿房宫未成欲更擇令名名之未果以其宫在阿基旁故天下因謂之阿房宫望夷宫在涇陽縣界北臨涇水以望北夷故名未央宫漢初蕭何造髙祖見而怒其壯麗者也周回二十八里前殿東西五十丈深五十丈髙三十五丈武帝以木蘭為棼橑橑椽也文杏為梁柱金牖玉户華榱璧璫雕楹玉磶重軒鏤檻青瑣窓也丹墀左墄右平墄階級也右則桀車上故使之平左則人上故為之階級黄金為璧帶間以和氏珍玉風至其聲玲瓏然也宫内又有金華承明昭陽等殿及麒麟閣天禄閣金馬門金馬門宦者署武帝得大宛馬以銅鑄像立於署門因名建章宫在未央宫西長安城外漢武帝造度為千門萬户自宫西跨城沱作飛閣通之正門曰閶闔閶闔本天門而宫門名之以像天門髙二十五丈左鳯闕闕上有金鳯髙丈餘即銅鑄鳯也髙二十五丈右神明臺門内起别風闕以其出於宫垣識風從何來也髙五十丈對峙井幹樓髙五十丈輦道相屬前殿下視未央宫西漢宫中有百子池戚夫人侍兒賈佩蘭者後出宫為扶風段儒妻能言在宫中時見戚夫人侍髙祖常以趙王如意為言髙帝思之㡬半日不能言嘆息悽愴未得其術使夫人擊筑帝歌大風以和之予嘗見旴江李先生賦戚夫人有曰百子池頭一曲春不知其㫖今閲黄圖乃見原委如此漢有飛廉屬玉觀飛廉觀在上林武帝元封二年造飛廉者神禽也能致風氣身似鹿頭如雀有角而蛇尾文如豹武帝命以銅鑄置觀上因以為名屬玉者水鳥似鵁鶄以名觀也又曰屬玉似鴨而大長頸赤目紫紺色石渠閣蕭何造其下礱石為渠以𨗳水若今御溝因以名閣所藏入闗時所得秦圖籍成帝又於此藏祕書天禄閣亦藏書籍所漢宫殿疏云天禄麒麟二閣蕭何造以藏祕書以處賢材也靈金内府藏太上皇微時一佩刀長三尺上有銘字難識傳云殷髙宗伐鬼方時所作上皇游豐沛山中寓居窮谷有人冶鑄上皇息其旁問鑄何器工者笑曰為天子鑄劒慎勿言曰得公佩劔雜而治之即成神器可克定天下昴星精為輔佐木衰火盛此為異兆上皇解七首投爐中鑄成劍殺三牲以釁祭之工問何時得此上皇曰秦昭襄王時予行陌上一野人授予云是殷時靈物工即持劔授上皇上皇以賜髙祖髙祖佩之斬白蛇者也及定天下藏於寳庫守藏者見白氣如雲出户狀如龍蛇吕后改庫名曰靈金藏惠帝以此庫貯禁兵器名曰靈金内府世人常言髙祖起布衣提三尺劔以取天下不知劔之所始乃如此霸橋在長安東跨水作橋漢人送客至此橋折栁贈别世人常用折栁送别事不知出此唐王維詩葢本此也遂為故事宫殿觀闕之盛肇於秦而繼以漢舉其最則秦有朝宫阿房漢有未央建章以髙言輒曰五十丈三十五丈或二十五丈以深廣言輒曰東西五十步南北五十丈或東西五十丈深五十丈以規恢延袤言輒曰三百餘里少亦二十八里或曰可坐萬人或曰庭中可受十萬人或跨渭而造石橋或跨城池作飛閣輦道大槩極土木之工始之於秦穆公惠文王大之於始皇尤而效之者蕭何又甚焉者漢武也計其壯鉅雄峙摩雲霄而傍日月雖傷財害民不免怨讟然遐想氣象其能致此亦真丈夫之雄也惜夫興替不常古今同盡乃罔有巍巍千載者不旋踵而化為游塵蕩為冷風潘安仁西征賦有曰所謂尚冠修成北煥南平皆里名皆夷漫蕩滌無其處而有其名爾乃階長樂登未央汎大液凌建章又曰鷩雉雊於臺陂狐兎窟於殿傍又曰洪鐘頓於毁廟桀風廢而不懸禁省鞠為茂草金狄遷於霸川悲夫英雄之建立乃如斯而已乎予嘗欲一游終南之山渡灞滻之水弔秦漢之故都而物色其遺跡今南北混一踰四十年兆足以行而予又老矣鄉里非無客京兆者京兆之人非無與余交者及詢訪往古俱不能知葢其愚俗懵學故不能通知古今也姑述此以志予懐古之恨若夫陳之臨春結綺隋之西苑唐之華清宋之艮嶽是又不過供游宴之娯非若秦以壯大夸西戎漢以市麗重威武者也無足道矣新豐建立史載漢髙祖沛豐邑中陽里人也既定天下西都長安而太上皇不樂闗中思慕鄉里髙祖為徙豐沛屠兒酣酒煮餅商人立為新豐并徙舊社放犬羊雞鴨於通衢亦競識其家似此即是仍效故豐街巷市井民居也一遷徙間多少事節雖足以悦其父而不免於勞其民矣然此様子則古所無之後世不再有之亦竒事也袁廣漢園池茂陵富民袁廣漢藏鏹鉅萬家僮八九百人於北山下築園東西四里南北五里激流水注其中纍石為山髙十餘丈連延數里養白鸚䳇紫鴛鴦犂牛青兕竒獸珍禽充積其間積沙為洲嶼激水為波致江濤海鶴孕雛産鷇延漫林池屋皆裵回連屬重閣修廊行不能徧也廣漢後有罪誅沒入為官園鳥獸花木皆移入上林苑中悲夫廣漢真愚人也已夫以漢武之為人百世之下閲史册猶知其非能容物者彼方修建宫苑夸示四夷一富民乃欲與之敵帝豈能平邪其取誅滅宜也近代韓侂胄修圃甚麗後亦沒官然事體郤不同川江圖予六十年前見蜀人李宰所藏長江萬里圖起岷州訖浙江海門山川城郭歴歴可翫惜不復覩今黄徳英示以蜀江圖一巻廣踰半尺長四丈餘其間惟畫蜀江起威州訖公安而止不得如舊圖之抵海門也謾記大畧以見泝蜀之艱險云自公安縣沙市而西即江陵府治江北而荆門軍治江南有黄牛峽有鹿角灘歴巴東峽口即峽州治江北有人鮓甕有江心烏龍石進即石首縣治江南又進即歸州治江南有巫峽有楚王樓有巫山十二峰有宋玉亭皆南岸也又進即巫山縣治江南有杜甫草堂進為䕫州有白帝城有八陣圖有瞿唐峽灎澦堆雲安縣治江北而萬州忠州皆治江南歴清江縣至遂寧府重慶府及酆都縣亦治江南有酆都寺有酆都觀又歴涪州恭州而上則瀘州亦俱治江南前進叙州乃治江北有馬湖江有大小烏龍山又進則嘉定府治江南有九樓佛閣則在江北遂為眉州亦治江北有蛾眉山有秦楚樓有芳草渡有萬里橋則俱在江南由眉而進則成都府治江南而永康軍則在江北有三十六峯在江南南為青城縣有青城山有玉女闗有玉壘闗有七盤山至威州治江南止矣一卷之圖首尾如此予跋其後曰右潁川徳英父所藏蜀江圖也廣僅半尺修踰四丈西起威州東訖江陵凡跨十有八郡其間山川城壘人物聚落仙宫梵宇風颿浪舶歴歴在眼往年徳英曽示此圖一軸予固賞愛為賦詩今閲此卷更自精工彌使人賞愛不已真竒筆也憶少日閱輿地志極愛西蜀風景形勢鋭欲溯巫峽闞劒門周視古英雄爭戰處稍慰胸中之竒顧蹉跎寖老付來生矣展翫傷懐因寄一嘆并載前詩曰誰貌坤維入畫圖東西川合滙荆湖金湯夾岸提封接玉帛連檣貢賦輸劔閣㡬煩豪傑夢錦城曽是帝王都如今混一兵爭息見説烟荂漸似呉十二峯石巫山十二峯口習耳聞熟矣終未悉其何名今因蜀江圖所載始得其詳曰獨秀曰筆峰曰集仙曰起雲曰登龍曰望霞曰聚鶴曰棲鳯曰翠屏曰盤龍曰松蠻曰仙人予因櫽括成句曰筆峰獨秀集仙起雲登龍望霞盤龍翠屏聚鶴棲鳯松蠻仙人總為六句聊便記覽耳山在歸州乃川江之南岸見者謂十二峯元不聯屬往往懸隔相望若欲觀玩惟泝流入蜀者甚便儻順流而東則三峽水急如箭不容寓目所謂歸州淘米峽州喫飯可見其峻疾矣閩地險惡予幼讀南豐先生所作道山亭記摹寫閩地山川險惡之狀筆力精妙宛如圖畫殆似西漢文章歐蘇不能及也然平時只作文字看實未信其險惡果如此至大辛亥赴官劒津初入杉闗已見山嶺崇峻囘首江西如在平地猶未覺其險也自邵武城下發官船歴挐口驛富屯長驛順昌縣玉臺驛順流赴劔然後見谿灘湍激石筍峭峻舟行其間時遭驚駭予舟中因語孫兒以道山亭記昔聞而今見之其所歴與記中所載無不合者兹録于後其略曰閩故𨽻周者七至秦開其地列於中國始併為閩中郡自粤之太末與呉之豫章為其通路其路在閩者陸出則阨於兩山之間山相屬無間㫁纍數驛乃一得平地小為縣大為州然其四顧亦山也其涂或逆坂如縁絙或垂厓如一髪或側徑鉤出於不測之谿上皆石芒峭發擇然後可投步負戴者雖其土人猶側足然後能進非其土人罕不躓也其谿行則水皆自髙瀉下石錯出其間如林立如士騎滿野千里下上不見首尾水行其隙間或衡縮蟉揉或逆走旁射其狀若蚓結若蟲鏤其旋若輪其激若矢舟泝沿者役便利失毫分輒破溺雖其土長川居之人非生而習水事者不敢以舟楫自任也其水陸之險如此漢嘗處其衆江淮之間而虚其地葢以其陿多阻豈虚也哉云云朱文公嘗愛曽文以為嚴健有法此語信然近學録鄭見獨為予言道山亭記豐碑鉅刻巍然猶存鄭三山人也故知之他日有便至其地當命匠致墨本歸鄉里示親朋庶猶可鄉先達之萬一云前代軍壘秦墮封建易為郡郡置守漢因之國皆為郡更曰太守至隋廢郡置州唐世天下俱為州改太守曰刺史宋又改曰知某軍州事此其大略俱可曉也獨有數小壘名之曰軍者未悟其義而其治所又多在各道接境去處如建昌軍邵武軍則江西福建界上也如南安軍則江西廣東界上也如江隂軍則浙西之盡頭如廣徳軍則江東之盡頭如桂陽軍武岡軍則湖南之沿界豈非當時諸州地理闊逺綏御不及故於接境聚軍以控扼之其初不過營壘乆則因以軍為名且從而例視若州府之類矣夫軍之字義與州府郡邑不同流俗承譌併失字義遂真以軍為郡不亦謬乎以軍為郡不記始於何朝而建昌志曰南唐元名建武軍入宋始改建昌則軍之剏也豈五代時耶其間有臨江軍則居江西之腹興化軍則處閩海之濱茶陵軍亦在湖南内地今考之亦接吉安界又不盡居接境處又是一例宋時仕宦應得郡而資淺者未授以州府首命為知軍而軍之地望亦自不等如南安軍在江西窮處國小地狹而地望乃特重為守臣者率年嵗陞遷為部使者如提刑提舉之類其平遷亦得佳郡葢以郡當東廣之衝地有蠻峒之擾苟撫治有功則因優之也景定庚申梅知軍鼎徑除江西提刑後趙知軍孟適段知軍浚皆擢守建昌其餘諸軍則未之聞也而宋時雄藩大鎮又自别有軍號如杭州曰寧海軍紹興曰鎮東軍温州曰應道軍婺州曰寧逺軍嚴州曰遂安軍平江曰平江軍建康曰建康軍揚州曰淮南軍龍興曰鎮南軍贑曰昭信軍建寧府曰建寧軍泉州曰平海軍如此者不盡記毎軍皆設節度使官一品其地則謂之節鎮節度使止遙授請厚俸而不親臨其郡非若唐代淄青盧龍宣武等處節度則真有其地統其軍跋扈難制至於簒逆也宋制節度使官儀甚盛其家建巍樓植纛其中有黄幡豹尾之屬名之曰節樓义祀神名之曰節神其節度使毎出則千兵擁衛捧節前驅見者避路有令曰衝節者斬然所統軍卒則咸無焉天齊封禪書載秦始皇祀八神一曰天主祠天齊天齊淵水也居臨菑南郊山下注引解道彪齊記云臨菑城南有天齊五泉並出有異於常言如天之腹臍也又曰齊所以名為齊以天齊也注曰當天中中齊愚嘗於前卷略議之今詳具其説如此乃知衡華嵩恒俱稱某天某天而東嶽獨稱天齊有以也當天之中故祀天主與地王不同不夜城不夜乃古縣名齊記云古有日夜出見於齊東境故萊子之城以不夜為名市井予嘗疑世稱市井二字無義按史記正義曰古人未有市若朝聚井汲水便將貨物於井邉買賣故言市井乃知舊所疑不差九河之名徒駭太史馬頰覆釜胡蘇簡潔鉤盤鬲津陽闗唐王維送元二使安西詩曰渭城朝雨裛輕塵客舎青青栁色新勸君更盡一杯酒西出陽闗無故人後知音者以此詩作三叠聲歌之予初不考陽闗在何許意疑玉闗左右及見五代晉髙居誨奉使于闐記所載乃知陽闗去玉闗尚逺其略曰自靈州過黄河行三十里始涉沙入党項界行四百餘里至黒􅀢沙沙尤廣遂登沙嶺即党項牙也渡曰亭河至凉州又西行五百里至甘州即回鶻牙也自甘州西始涉磧磧無水載水以行甘人教晉使者作馬蹄木澀木澀四竅馬蹄亦鑿四竅綴之乃可行西北五百里至肅州渡金河西百里出天門闗又西百里出玉門闗經吐蕃界西至𤓰州沙州二州多中國人𤓰州南十里有鳴沙山云冬夏殷殷有聲如雷云禹貢流沙也又東南十里三危山云三苗所竄也其西渡都鄉河曰陽闗云由是觀之則玉門闗距雲州近二千里又歴𤓰州沙州而後至陽闗渡又逺數百里矣江南人望張掖酒泉已覺縣逺而班超云臣不敢復望至酒泉郡止願生入玉門闗則其逺於酒泉可知已陽闗又逺於玉門宜其謂西出陽闗無故人也安西在陽闗之外知又㡬里今日甘肅置行省可見提封之廣識者謂天下地理惟西最廣恐或如此音律中有甘州凉州伊州曲尾閭𢎞齋先生包樞相嘗言昔為台州通判日州連東海遙望海洋中有漩渦至數十疑即所謂尾閭也予毎欲質其事而無由至大庚戌辛亥間石塘胡汲仲長孺為台州寧海主簿縣正與海接予與石塘公厚因以𢎞齋舊説叩之今得其回書云寧海在台東境距平陽嶺海七百里距鄞為近其又東境即大海人舟所不敢渉惟冬則釣船行二程輒止相傳其東則鬼國水勢流下雖潮生時亦不可上恐是尾閭處也𢎞齋謂見有十數渦則某所未見也汲仲之所報如此予以嗜古好竒之故博徴異聞於所親歴者然猶不能究尾閭之實則據紙上而妄談者何足道哉洗馬池江西龍興市心有一方池臨街緑水泓澂名曰洗馬池不悟其義近聞一人云古有姓李者仕為太子洗馬居此地故得名然洗馬之洗本音鮮非音徙也豈俗不識字故傳譌邪予去年到龍興乃見已為民居障蔽不復得見矣去年乃至大辛亥隱居通議巻二十九
