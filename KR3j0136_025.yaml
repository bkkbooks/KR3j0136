body:
  text: 隱居通議卷二十五元劉塤撰經史二世情孟嘗君太息謂馮歡曰文常好客遇客無所敢失食客三千有餘人先生所知也客見文一日廢皆背文而去莫顧文者今賴先生得復其位客有何靣目復見文乎如復見文者必唾其靣而大辱之歡曰生者必有死物之必至也富貴多士貧賤寡友事之固然也君獨不見夫朝趨市者乎明旦側肩爭門而入日暮之後過市朝者掉臂而不顧非好朝而惡暮所期之物亡其中今君失位賔客皆去不足以怨士而徒絶賔客之路願君遇客如故孟嘗君曰敬從命矣廉頗之免長平而歸也失勢之時故客盡去及復用為將客復至廉頗曰客退矣客曰吁君何見之晚也夫天下以市道交君有勢我則從君君無勢則去此固其理也有何怨乎漢衛青為大將軍貴顯而霍去病以功為驃騎將軍大將軍權日退驃騎日益貴舉凝按後卷於舉字句絶今皆貴字句絶大將軍故人門下多去事驃騎輒得官爵惟任安不肻以上三事一律蓋趨時附勢人情則然古今所同也何責於薄俗哉諺曰世情看冷暖人靣逐髙低若任安者垂名萬世宜矣太史公與任少卿書即安也軍聲秦伐韓趙救之令趙奢將兵秦軍軍武安西秦軍鼓噪勒兵武安屋瓦盡振武安屬魏郡在邯鄲之西田單以火牛奔燕軍五千人因銜枚擊之而城中鼓噪從之老弱皆擊銅器為聲聲動天地此二事略同然秦以敗歸而單乃取勝勝負又有不盡繫乎軍聲顧其勢何如乎戰國四君戰國四君者齊有孟嘗趙有平原魏有信陵楚有春申孟嘗君田文則齊之公子宣王之姪也平原君趙勝則趙之公子也信陵君則魏昭王少子無忌也春申君則非楚族姓黃名歇楚國人世指此四人俱為公子非也太史公以孟嘗為諡索隱辨其不然謂孟字也嘗邑名也嘗邑在薛之傍孟嘗生前封於薛時稱曰薛公則孟嘗乃死後之稱耳平原不知何時所封而信陵則魏安釐王即位後封公子為信陵君也春申乃楚考烈王元年為楚相封為春申君今浙郡有申港即其地也珠履客三千珠履事或指以為孟嘗門下之客非也乃春申君客也史載甚明胡曽詩曰何事三千珠履客不能西禦武安君未知其何所指武安君李牧在趙封武安君白起在秦亦封武安君鄒陽書鄒陽繫獄上梁孝王書徒富贍而無義穰苴孫武穰苴誅莊賈孫武戮宫嬪同是一法紹介今人未相識而求以引導之者率曰介紹非也按平原君謂魯仲連曰勝請為紹介注引郭璞曰紹介蓋相佑助者又引索隱曰紹介猶媒介也古禮賓至必因介以傳辭紹者繼也介非一人故禮云介繼而傳命又鄉飲酒必立介萬嵗萬嵗之呼世以為起於漢武帝登嵩山從官奏人有呼萬嵗者三自此遂以為祝君之禮然齊田單守即墨遣使詐約降於燕燕軍皆呼萬嵗則此禮非起於漢矣又相如奉璧入秦秦人皆呼萬嵗紀信詐降楚皆呼萬嵗之城東觀說難韓非作說難浩博可愛而本傳結之以一語曰余獨悲韓子為說難而不能自脫耳只此一語則其言之浩博俱不足采矣此太史公筆力之妙隱然之貶也其書有曰夫事以密成語以泄敗未必其身泄之也而語及其所匿之事如是者身危注曰事多相類語言或說其相類之事前人覺悟便成漏泄故身危也此即易曰君不密則失臣臣不密則失身幾事不密則害成而推廣之老韓老韓同傳論者多矣太史公以為老子所貴道虛無因應變化於無為故著書辭稱微妙難識韓子引繩墨切事情明是非其極慘核少恩皆原於道德之意而老子深逺矣夫道德之於刑名相去逺矣流弊乃爾何哉枹鼓漢宣帝五鳯四年京兆尹張敞以擅殺掾絮舜免為庶人數月吏民解弛枹鼓數起注云枹擊鼓杖音庖今人多作孚字讀絮女居反今人多作孺字讀當考按十虞韻注枹擊鼓杖張敞枹鼓稀鳴顔師古並音桴又左傳成公二年援枹而鼓鼓槌音浮本作桴浮內不忮合依漢書押又五爻韻曰枹木叢生也義不同十虞桴字注編竹木大者曰筏小者曰桴禮運及明堂位土鼓簣桴並音浮十八尤注云屋棟齊人屋棟曰桴曽南豐詩曰桴鼓不驚民氣樂未知正作何音讀如十虞韻注謂浮內不收合依漢書則孚音為穩杜微出處山谷詩云杜微見諸葛輿致但求去微豈真瞶者蓋以嘗臣劉璋璋為昭烈帝所襲以致敗亡實孔明畫策故微終身恨之不肻為孔明屈雖其幹略未之見要是義士微之崛强豈曰無見我思若人敢不重拜裴松之注三國志裴松之注三國志謂陳壽銓叙失在於略時有脫漏於是上搜舊聞旁托遺逸以為注殊不知松之所注乃壽所棄餘者也小兒聽古話東坡别集志林載王彭嘗云途巷中小兒子薄劣其家厭苦輒與錢令聚坐聽說古話至三國事聞劉𤣥德敗則顰蹙有出涕者聞曹操敗即喜躍暢快以是知君子小人之澤百世不斬也三國名臣贊東坡先生題三國名臣贊曰西漢之士多智謀薄於名義東漢之士尚風節短於權略兼之者三國名臣惟蜀孔明巍然三代王者之佐未易以世論坡翁此論甚偉看來武侯相業大綱常嚴蓋其學出於申韓故其政深刻識者每謂孔明以一隅之蜀抗天下若更不以法治使宫府一體豪貴斂手則國內先亂何以自立哉自古雖衰弱之國皆可為惟無法之國不可為孔明蓋有特見若其將略則是以攻為守者春秋不絶國祀韓原之戰秦獲晉惠公宜為戮矣已而復歸晉侯又輸之粟陳夏氏之亂楚子入既縣陳矣已而申叔一言乃復封陳楚子圍鄭鄭伯肉袒牽羊以迎既得國矣已而鄭伯祈哀乃退三十里而與之平此三者或已俘其君或已得其國是宜丘墟其宗社草莽其臣民使悉為己有可也而秦楚之君乃不然雖聲罪致討而不絶其國祀獨非聖王忠厚之意歟夕陽亭西晉賈充字公閭為尚書令不能正身率下專以諂媚取容侍中任愷中書令庾純等剛直守正共嫉之㑹氐羌叛因進說請以充鎮關中乃詔充持節都督秦涼二州諸軍事充既失職深銜愷而無計將之鎮百僚謁於夕陽亭荀朂私焉充以憂告朂曰公國之宰輔而為一人所制不亦鄙乎然是行也辭之實難獨有結婚太子不煩駕而自留矣充曰然孰可寄懷對曰朂請言之俄侍武帝宴論太子婚姻事朂因言充女宜配帝納其言成婚充遂不行既為太子妃酷虐好殺或以㦸擲孕妾子隨刃墮地武帝欲廢之朂等救解及惠帝即位立為皇后荒淫放恣亂彰內外趙王倫作亂使齊王冏入殿廢后后驚曰卿何為來冏曰有詔收后后曰詔當從我出何詔也后至上閣遙呼帝曰陛下有婦使人廢之亦行自廢倫乃矯詔齎金屑酒賜后死自是而後晉室遂衰惠崩懷繼而劉曜王彌石勒猖獗中原遂陷洛陽執帝北去晉遂亡矣故丹山翁公合嘗有言曰劉石亂晉不兆於上東門之長嘯而兆於夕陽亭之一語安史亂唐不决於漁陽之鼙鼓而决於曲江直諫之不留信哉充仕魏日髙貴鄉公之攻晉王相府也司昭馬太子舍人成濟以兵出問充曰今日之事如何充曰公等養汝正擬今日復何疑濟於是抽戈犯蹕刺帝刃出於背帝崩於車中晉王於是歸罪成濟夷其三族然則濟之弒逆乃决於充之一語也帝受弒濟受誅充實為之宜其死而絶嗣乃以外甥韓壽之子謐為嗣而謐亦為趙王倫所戮天道信昭昭云史記擷語元貞丙申嵗八月閲史記末帙因録所見與識者共評之循吏傳公儀休為魯相奉法循理食茹而美拔其園葵而棄之見其家織布好而疾出其家婦燔其機云欲令農士工女安所讎其貨乎劉子曰種葵而食織布而衣未為悖理也拔棄之猶可何至於出婦此舉近矯亦且難信汲黯傳文佳可讀鄭當時字莊孝文時聲聞梁楚之間年少官薄然其遊知交皆其大父行天下有名之士也其推轂士及官屬丞史誠有味其言之也常引以為賢於已此兩人中廢家貧賔客亦落劉子曰汲鄭俱列九卿又俱廉內行修潔故同傳此傳太史公贊甚佳儒林傳齊人轅固生孝景時為博士與黃生爭論湯武受命放弒事景帝曰食肉不食馬肝不為不知味言學者無言湯武受命不為愚劉子曰景帝此語殊可味文章爾雅訓辭深厚儒林傳序中語董仲舒廣川人治春秋學士皆師尊之仲舒一傳甚簡略酷吏傳序文極平順可讀有曰昔天下之網常密矣然姦僞萌起其極也上下相遁至於不振當是時吏治若救火揚沸非武健嚴酷惡能勝其任而愈快乎言道德者溺其職矣又曰漢興破觚而為圜斫雕而為朴網漏於吞舟之魚而吏治蒸蒸不至於姦黎民乂安由是觀之在彼不在此此等議論皆正當郅都為人勇有氣力公廉不發私書問遺無所受請寄無所聽常曰已倍親而仕身固當奉職死節官下終不顧妻子矣劉子曰都此數語甚正後世鮮有及之者聶政云政有母在政身未敢以許人也即此意寧成好氣為人小吏必陵其長吏為人上操下如束濕薪劉子曰此非長厚者所為張湯傳趙禹為人廉倨公卿相造請禹禹終不報謝務在絶知友賓客之請孤立行一意而已張湯收接天下名士大夫已心內雖不合然陽浮慕之造請諸公不避寒暑武帝問張湯曰吾所為賈人輒先知之益居其物是類有以吾謀告之者禹讓湯曰君何不知分也君所治夷滅者幾何人矣非此母不生此子東坡謂張湯宜無後者也而有後以其不蔽賢也義縱為定襄太守始至報殺四百餘人郡中不寒而栗縱以鷹擊毛摯為治鷙鳥將擊必張羽毛也王溫舒自有傳而楊僕傳又專記溫舒事殆不可曉合同作一傳看杜周重遲外寬內深次骨大宛傳叙事縱橫可觀或曰此蓋並司馬公之殘缺禇先生補之然以豫觀其筆力竒妙處非禇所及校之龜策傳逺矣月氐二字俱無音鑿空二字出大宛傳謂張騫首通西域為鑿空者蓋甚言破荒也今世用鑿空者失本意漢使窮河源河源出于置國其山多玉石采來天子按古圗書名河所出山曰崑崙云宛貴人相與謀曰漢所為攻宛以王母寡匿善馬而殺漢使今殺王毋寡而出善馬漢兵宜解即不解乃力戰而死未晚也宛貴人皆以為然共殺其王毋寡持其頭遣貴人使二師約曰漢毋攻我我盡出善馬恣所取而給漢軍食即不聽我盡殺善馬而康居之救且至至我居內康居居外與漢軍戰漢軍熟計之何從劉子曰文勢如此似非出褚先生也太史公曰禹本紀言河出崑崙崑崙其髙二千五百餘里日月所相隱避為光明也其上有醴泉瑤池今自張騫使大夏窮河源惡睹本紀所謂崑崙者乎故言九州山川尚書近之矣至禹本紀山海經所有怪物余不敢言之也劉子曰司馬公去古未逺所疑猶爾况後世乎則所謂西王母之說愈謬矣史記抑道德而進逰俠輕仁義而重貨殖不知此老何意雖似有激而言然害義理遊俠傳郭解短小精悍解傳叙事甚整佞幸傳力田不如逢年善仕不如遇合籍孺閎孺公卿皆因關說有所言說皆關由之鄧通蜀郡南安人以櫂船為黃頭郎著黃帽也櫂音掉周仁最寵過庸不乃甚篤言仁最被恩寵過于常人乃不甚篤如韓嫣也滑稽傳一說滑亂也稽同也辨捷之人反易是非滑亂同異也一說滑音骨酒器也轉注吐酒終日不已猶言辭出口成章終日不竭若骨稽之吐酒見揚雄酒賦一說滑讀如字稽音計以言語滑利其如計疾出淳于髠曰臣從東方來見道傍有穰田者為田求豐穰操一豚蹄酒一盂而祝曰甌窶滿篝汚邪滿車五穀蕃熟穰穰滿家臣見其所持者狹而所欲者奢篝籠也甌窶猶抔摟也窶音如婁言豐年收掇易滿篝籠也汚邪下地田也即下田之中有薪可滿車豫聞前輩讀汚作蛙今史記乃無音不知何如執法在傍御史在後帣韝鞠􅎽帣音捲收衣袖也韝音溝鞠曲也􅎽與跽同謂小跪也奉觴上壽朋友交遊久不相見卒然相覩歡然道故前有墮珥後有遺簮履舄交錯杯盤狼籍羅襦襟解微閒薌澤六博投壺相引為曹似近世好語優孟傳以壠竈為槨銅㽁釜鬲也為棺齎以薑棗薦以木蘭祭以粳稻衣以火光葬之于人腹腸東方朔附傳陸沈于俗避世金馬門東郭先生久待詔公車貧困饑寒衣敝履不完行雪中履有上無下足盡踐地道中人笑之及其拜為二千石佩青緺出宫門故同官待詔祖道都門外榮華道路當其貧困時人莫省視至其貴也乃爭附之諺曰相馬失之痠相士失之貧其此之謂邪此數語古今不易王先生教北海太守對武帝語與東郭先生教衛將軍以金與王夫人之親同一機也北海太守至殿下有詔問曰何以治北海令盜賊不起叩頭對言非臣之力盡陛下神靈威武所變化也王先生所教止此一語而人主便洞見之亦大異事索隱曰漢書宣帝徴渤海太守龔遂非武帝時此褚先生記謬耳粉飾二字出西門豹投巫事中日者傳龜䇿傳遷沒之後亡去至元成之間褚少孫補之故言辭鄙陋非遷本意索隱曰日者不能記諸國之同異而論司馬季主龜策直大卜所得占龜兆雜說而無筆削功何蕪鄙也此論甚當以豫觀當刪去日者傳褚先生曰臣為郎時逰觀長安中見卜筮之賢大夫見姓好解婦來卜對之顔色嚴振未嘗見齒而笑也富為上貴次之既貴宜各學一伎能立其身非其地樹之不生非其意教之不成夫家之教子孫當視其所以好因而成之子有處所可謂賢人此數語有理貨殖傳筋角銅鐵往往山出棊置人物歸之襁至而輻輳故齊冠帶衣履天下天下熙熙皆為利來天下攘攘皆為利往千乘之主萬家之侯百室之君尚猶患貧况匹夫編户之民乎嵗在金穰水毁木饑火旱夫糶二十病農九十病未烏氏倮巴蜀寡婦清此二人皆秦時能以其富抗萬乘用貪求富農不如工工不如商千金之家比一都之君巨萬者與王者同樂豫觀貨殖𫝊筆力髙古出司馬公手者自與褚不同自序著十二本紀作十表八書三十世家七十列𫝊凡百三十篇五十二萬六千五百字序百三十篇以一語結之細玩有味隱居通議卷二十五
