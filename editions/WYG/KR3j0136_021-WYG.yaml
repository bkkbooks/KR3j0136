body:
  text: 隠居通議卷二十一元劉壎撰駢儷一總論宋初承唐習文多儷偶謂之崑體至歐陽公出以韓為宗力振古學曾南豐王荆公從而和之三蘓父子又以古文振於西州舊格遂變風動景隨海内皆歸焉然朝廷制誥縉紳表啟猶不免作對雖歐曾王蘓數大儒皆奮然為之終宋之世不廢謂之四六又謂之敏博之學又謂之應用士大夫方游場屋即工時文既擢科第舍時文即工四六不者弗得稱文士大則培植聲望為他年翰苑詞掖之儲小則可以結知當路受薦舉雖宰執亦或以是取人葢當時以為一重事焉今究觀所作雖無補國家實政然否泰盛衰升降之運亦可因是觀之何者世道休明則辭氣盛壯固非濁世昏俗所能及也當時士君子率皆殫精覃思鑄出偉詞誠多精妙不可冺者要亦文明盛時習尚然也南渡以來名公著作多見梓刻海宇誦習近世尤多奇人俊士妙語風猗惜經世變編簡淪漫無可採覽而又懼其久而逾㤀也追記零落不忍遺輒附載之身歴亂離神志凋耗葢記者不一二而遺者已什百矣姑列於後陸放翁諸作陸放翁名游字務觀文士也髙宗紹興末已為樞密院編修官孝宗初立召對與尹穡同時賜進士出身恩遇甚渥俄以不謹交游罷通判鎮江府上不樂由是屢薦不官久之乃從范至能成大入蜀既而補郡稍遷部使者又以言廢淳熙末起守嚴陵入見上勞勉之既到官以表謝曰明主恩深書生命薄唐帝之知李白一官不及於生前漢皇之慕相如遺藁徒求於身後上頗憐之内禪前十日命以軍器少監權禮部郎中孝皇愛惜人才不終棄如此晩年髙卧笠澤學士大夫争慕之㑹韓􅇑胄顓政方修南園欲得務觀為之記峻擢史職趣召赴闕務觀恥於附韓初不欲出一日有妾抱其子來前曰獨不為此小官人地耶務觀為之動竟為􅇑胄作記由是失節清議非之有四六前後續三集其文初不纍疊全句専尚風骨雄渾沈著自成一家真駢儷之標準也因摘其妙語以訓諸幼賀荼山曾秘監有云聞諸耆舊昔在祖宗朝有道徳魁偉之臣士鄙刑名功利之學政術既斥夫卑陋國勢自極於尊安豈惟右文飾治之方是亦折衝消萌之要至於主盟儒道典領書林必求名勝之宗尤極清華之選又曰舊聞入洛之盛事疑於古人追數過江之諸賢屹然獨在除刪定官謝丞相自叙有曰獨學寡聞倦游不遂瀾繙記誦媿口耳之徒勞跌宕文辭顧雕蟲而自笑低佪久矣感歎淒然使有一人之見知亦勝終身之不遇然而禀資至薄與世寡諧在鄉閭則里胥亭長之所叱訶在州縣則書佐鈴下之所蹈藉聲名湮晦衣食空無賀張都督有曰仰惟列聖之恩實被中原之俗耕田鑿井舉皆涵養之餘寸地尺天莫非照臨之舊豈無必取之長算要在熟講而後行顧非明公誰任斯事賀曾台州有曰上待老成惟恐弗當其意士聞静退自消競進之心又曰歴考平生追配古人而奚愧中更俗吏益知儒者之有功賀禮部侍郎有曰惟宗伯之清華極近臣之遴選誠使此地常得其人則朝廷日尊自弭未形之患論議守正亦折羣衺之萌差夔州通判謝啟有曰少也畸人長而獨學好莊周齊物之説樂以忘憂讀稽康養生之篇慨然有志秉心不固涉世寖深兒女忽其滿前藜藿至於并日屢求吏隠冀代躬耕亦嘗辱記其姓名固欲稍畀之衣食費元化密移之力不知幾何悼孤生一飽之艱乃至如此除監司謝啟有曰衣食不繼自竄夔楚之邦齒髪寖衰倦游隴蜀之境惟習氣未忘於筆硯每苦心自力於文辭藏之名山本欲粗𫝊於後世待以國士豈期親遇於鉅公又曰士於知已寧無管鮑之情人之多言誣為李牛之黨又曰哀窮悼屈如伐木故舊之不遺懷昔感今異積薪後來之居上通王宣撫自叙有曰禀資凡陋承學空疏雖肝膽輪囷嘗慕昔賢之大節乃齒牙零落猶為天下之窮人撫劍悲歌臨書浩歎每感歳時之易失不知涕泗之横流知嚴州謝到任有曰淺智褊能薄才綿力棲遲屏迹但欲射石虎以終殘年辛苦著書不足藏名山而俟後世偶為貧而求仕旋觸罪而免歸鴈食無儲鶉衣不補凡百君子悠悠非特達之知平生故人往往處嫌疑之地欲言誰聽投老何歸又謝啟有曰下愚難移大惑莫解不能髙飛逺舉求避横目之民乃復直情徑行自掇噬臍之悔永言窮薄數蹈邅回毁來靡待於道髙災生豈由於福過斷雲零落敢懷出岫之心病鶴縭纚忽忝乘軒之寵又曰哀細徳之儉微開洪鈞之坱軋念兹積譴雖擢髪而有餘察彼衆讒亦吹毛之已甚未加顯棄聊復少收又曰無復入闗西日舉釣竿之手惟希度世東封謁玉輅之塵賀丞相有曰永惟夷夏戴宋之舊思見太平時則祖宗在天之靈為生賢佐上㕘政有曰為治不難其道顧何如耳用人若此吾國其庶幾乎傳聞四方歡喜一意某聞公論未嘗盡廢常苦不在於朝廷小人豈必無材惟患與聞於國事又曰仁人先天下而憂重矣自任賢者備春秋之責艱哉克終賀李運使有曰槃薄游戲之翰墨嬉笑怒罵之文章過黄初而有餘嗟正始之弗見飛騰㨗路恥煩狗監之吹嘘散落遐荒寧付鷄林之裁鑑賀御史中丞有曰人情不逺立朝誰樂於抨彈仕者自謀干世本求於遇合又曰國有紀綱治自形於四海九州之逺士篤名義效或見於數世百年之餘賀丞相有曰時玩久安輒生天下之患國無逺畧必有意外之虞賀運使有曰寛猛異施古今莫一子産號衆人之母用於鄭而莫救陵夷申商為法家者流弊至秦而卒以顛覆歴考簡編之迹莫先儒術之功又曰敢圖莫境獲備屬城閭里無聊擥涕下催科之筆事功靡著忍慙修候問之書自叙有曰笠澤漁家紹興朝士捫參歴井久困客游煮海摘山屢乘使𫝊既罪愆之未洗復衰疾之相侵骨相宜窮頭顱可揣穿延和之細仗怳若隔生分新定之左符更叨起廢又賀丞相啟有曰廟堂之謨代天而理物帷幄之算經逺而折衝平居用小大之材欲其披肝膽以自盡一旦付疆場之事欲其捐性命而不辭自非有以素服衆心則將誰與共濟大業晉文側席於子玉回紇下拜於汾陽王商以忠蹇立朝則單于不敢仰視平津以媕婀充位則淮南謂若發䝉自昔論世之盛衰莫如置相之當否以上皆放翁集中語凡此皆以議論為文章以學識發議論非胸中有千百卷書筆下能挽萬鈞重者不能及後來惟劉潛夫尚書極力追攀得其㫖趣壯年所作絶似之晚年稍變槎牙蒼鬰之態覺枯藁矣劉後村諸制景定壬戌山東李壇以青齊來歸授壇保信寧武軍節度使督視京東河北等路軍馬齊郡王制曰臣子之情尊君而愛父春秋之法斥伯而尊王載嘉葢世之豪首決歸朝之策懔義槩英風之鮮儷超勲階爵級之常􅃔誕播絲綸肆頒印節李壇闗河間氣淮海俊人市駿骨而捐金招來遺軼聞雞鳴而起舞寤寐功名感辛有伊川之言抱魯連蹈海之志慨思爾考被遇先皇屬邊吏之疎庸致勲臣之䟦疐朕迹前事諒丹赤之初心爾効膚公欲雪清於前垢既舉渤海歸職方氏復奉淄青入王㑹圖無疆界彼此之分有卓書混同之漸王猛發正朔相承之論勿晉為謀馬援知帝王有真而來於漢専意英雄所見今古畧同是用加兩鎮元戎之榮峻二府督師之拜殄草地之逋敵分茅土而胙齊少慰立身揚名之心併下改史復官之詔於戲吳起守西河而事魏國未聞竝擁於齊旄太公表東海而封營丘孰若徑疏於王爵永肩忠藎式對寵褎可云云口宣云卿擇主之義髙歸疆之功大擁將旄於淮蜀胙王社於青齊以厲英豪以奬忠孝兹為異渥益懋壯圖其父李全特追復彰化保康軍節度使開府儀同三司京東鎮撫使依舊京東忠義諸軍都統制制曰君記人之功不瑕疵於往事子揚父之美葢倫紀之至情家庭有特起之豪泉壤凛如生之氣差辰出綍疏渥還氈李全海岱奇才風雲壯槩帥齊地陷蕃之衆歸於本朝立堂門勦敵之勛書之盟府加卿子冠軍之號極使相元戎之榮雄心方驚於白檀異夢奄罹於黒幰豹留皮之志非不踐言狼䟦胡而然豈其獲已是生英嗣雅慕華風自㧞坎窞之中來獻版圖之舊昔周封蔡仲志郭鄰之愆漢爵弓髙原馬邑之責既奬肻堂而裂土乃令告第而復官仍改汗青用昭忠赤以慰霜露焄蒿之感以堅闗河嚮附之心於戲剖符分功臣之封不及觀於子貴結草頏輔氏之役必能報於國恩可云云奬諭制詔二閫詔有曰㤙交義結不煩辯士之下齊檄走書飛已報王師之入蔡赦詞有曰土風先職英雄恥南冠之囚簞食壺漿父老迎王師之入以上皆劉潛夫克莊筆也時以工部尚書兼直學士院一宗制詔盡出其手筆力髙妙不假琱鐫而用事尤精切如白檀黒幰弓髙馬邑用之李全無以加之白檀出漢書李廣𫝊黒幰晉陸機夜夢黒幰繞車手決不開天明遂遇害漢韓王信以馬邑降匃奴後其子穨當復歸漢詔封為弓髙矦正與李全事體同其妙如此時又有奬諭詔乃平舟楊元極棟當制有曰齊地開十二奉圖籍以歸本朝禹服廣數千知衣冠之為正統覺文氣不及後村活動矣時又有安南國王陳日煚説文無煚即熲字表稱年老乞傳位其子威晄朝廷以前無此例議所以處者久之詔從其請封威晄為國王而日煚加封為大國王以尊榮之二制皆佳大國王制曰春秋大一統進爵所以勸來中庸有九經嘉善所以柔逺矧功成而身退宜恩厚而禮隆乃眷南交夙勤内向堂搆屬聞於承襲梯航恪奉於貢輸爰錫殊稱誕敭顯冊具官安南國王陳日煚沈雄而和衆忠順而達權始謹終欽居海瀕而霑聖化仰觀俯察知中國之有至仁久殿是邦欲授之子目昇平之舊觀表懇惻之沈辭維商是常亟修來享之禮謂午也可竊希告老之風有嘉乃心奚靳所予尊無二上固難攀大漢之儀官必大先式克用成周之典授師垣之極品冠藩服之真封邑采加豐身章增賁疊此璽褒之寵昭其鼎養之榮於戲安且吉者詩必稱義不忘於請命老而𫝊者禮所尚壽宜介於耆頤啟爾後人祗余明訓可特授檢校太師特封安南大國王依前云云功臣仍賜襲衣金帶主者施行威晄制曰周建諸侯之國錫以山川漢封異姓之王及其苗裔美矣家𫝊於恭順俾之世襲於蕃宣奄賜履之舊章疏出綸之新渥安南國陳威晄挺資英毅秉性忠純在邦在家終始安民而和衆是父是子後先作室而肻堂過庭雖命以繼承馳驛尚勤於奉禀際天所覆鄉風慕文軌之同重譯而來效貢忘梯航之逺載嘉謹恪爰示寵褒爵超五等之崇秩視三公之貴旌節長安之本色錫盾琱戈名號凌烟之元功髙冠長劍分茅如故食采有加益堅屛翰之心庸報君親之徳於戲衆星北拱仰瞻象緯之垂百川東之孰謂鯨波之隔欽承恩遇永底榮懷可特授静海軍節度處置等使特進封安南國王食邑三千户食實封一百户特賜效忠順化功臣主者施行是時亾友范去非從包宏翁尚書在朝嘗録此二制並山東李壇封齊王制詔一宗從行都郵遞緘以示予謂皆出後村劉公視草予讀山東制詔見其雄竒超卓信非後衬公莫能也此前一制鎔意鑄詞亦似出劉之筆其後趙次山仕閩歸惠余後村文集閲視之但有山東制詔而安南前制乃不載未幾後村卒其家盡㑹萃其平生所著别刋少本為大全集曾履祥仕閩歸又惠余一部復閲視亦無前一制如此則或出佗學士視草未可知也嘗記故友車震卿云景定間留行都待班引時後村當制一日下直震卿謁之於寓舍公方苦痰眩不能迎客延入卧内則見其伏枕而又若有所搆思者已而且嘔且視草震卿問之則方譔賈忠肅渉封魏王制也謂震卿曰適苦思得一聨云忠臣義士知祖逖誓江之心故老遺黎悲宗澤過河之志震卿極稱其佳且以祖對宗以誓江對過河又精切公謂自當制每得大詞頭多是無案底者意葢謂山東歸朝出於創見無舊様子也然安南遜位亦可謂無案底矣吾因震卿之説遂信前一制決出於公然集中不載豈出於他人之筆乎翁丹山濟王制寧宗在位久前星未耀乃取沂靖惠王之子為子賜名竑封濟國公嘉定十四年六月也十七年將立為太子而寧宗不豫時史丞相彌逺顓國柄皇子惡之將俟晏駕有所處置史覺其意矯詔以皇姪邵州防禦使貴誠為皇子賜名昫而以竑為三府儀同三司判寧國府封濟陽郡王寧宗崩理宗遂於柩前即位濟王既出有潘壬潘丙者不能平奉王起兵於霅川朝廷遣兵討之王自經死理宗由是享天位四十有一年深徳史公公嘗力諫理宗以勿復濟邸官爵勿為立後理宗入其言自臨御至升遐凡廷臣言倫紀乞繼絶者幾千百疏名臣鉅儒唇敝舌腐言之皆不報暨度宗繼統乃始行之制曰朕紹膺丕圖蒐舉缺典率時昭考友不得以因心遺我後人孝莫先於繼志乃若秦邸之事當其涪陵之時太宗悼之已首叙舊恩章聖承之遂盡復元爵矧親聆於詔命而可緩於愍章故皇叔巴陵郡公竑胄出帝家胙分王社子而能孝宜懷不憾之心臣若克忠肻犯無將之戒恭惟聖父篤叙天倫尺布斗粟之謡自詒伊阻大衾長枕之樂豈不爾思故毎於家庭之間而念及泉壤之下謂事闗社稷雖天不能違時使澤漏墳塋他日毋㤀追叙且寶慶所顯膺之異數在端平亦稍慰其沈魂何為屯膏正待渙汗對越菆塗之新屋悉還茅土之故封是用秩冠孤卿節仍兩鎮守冡置二千石合修上雍之儀乘車共七十人尚廣封蔡之意儻猶存歸地之魄其往謝在天之靈可追復少師保静鎮潼闗軍節度使濟陽郡王仍令所司備禮改葬主者施行此制語意妙絶朝野誇誦葢中書直院翁與可合筆也賈相制景定庚申賈師憲自軍中拜右丞相依舊京湖四川宣撫大使制曰涕泣而表出師不遑將母旬宣而歌維翰盡以付卿㤀其誰筆也紹陵登極赦度宗登極赦文有曰洪維先皇丕承大統𫝊家嗣十三聖光紹寧宗享國踰四十年逺幾仁祖馬翔父廷鸞當制也馮景説賀賈相啟山東來歸時賈師憲初入相馮景説夢得以啟賀有曰周公大誥淮夷卒寧王之圖事孔子既相魯國歸齊人之侵疆雖曰切當然周孔事業賢相亦難以語此况僉壬之賈似道乎賈師憲既辭相印居西湖自為平章軍國重事五日一入朝赴都堂治事賀啟有曰日開門館對南北兩峰之髙時逰廟堂總東西二府之問亦甚切督府檄文徳祐乙亥長江失守賈公開都督府移檄諸路罪狀諸吕有曰元温羣從並受卵翼之恩李陵一門初無毫髪之損用事極切不知誰筆或云㕘贊李尚書珏所草也陳丞相啟陳丞相文龍咸淳初為太學生是年學中引放公試之旦適奔馳弗及既至公闈則試者畢入已扃鑰絶闗矣公既弗得入亟陳於當國者賈師憲特筆送入試已而同舍生忌公才名幸其不試又以為此賈相送至有司必觀望私取則有妨同進競白於監試者卒不啟闗公以此終不得試惟以一啟謝廟堂當時𫝊誦未幾公擢戊辰進士第一􅏡歴清要景炎死節卒為名臣云啟曰公闈鎻棘自外門牆相度包荒許歸甄冶甫倉皇而得請殆粉碎以難酬欲剖懦衷先横感涕竊以得失有命行止非人王勃有作記縁風借送舟之便李廣無封矦相天教失路之迷葢其逢不繫賢愚雖所投亦有奇耦乃若旴遲有悔之咎不勝進退維谷之難茍非有物敗之夫何使我至此伏念某虀鹽味苦葵荏品凡勇私怯公為獱笑者八年矣䟦前疐後譬蠅飛不數武焉徒以先緒灰寒親頭雪白慨青氊之未復誓鐵硯以相從凄其萍梗於四方意者株守於一試居然不武何以為文雞既鳴矣㑹且歸則可以速馬不進也非敢後何來之遲閽者辭焉君且休矣竊念廟堂之容物豈忍場屋之遺材聊仰首以鳴其窮果聞聲而見其事鄭重千鈞之判料理一介之寒尺度不拘章縫交誦人棄我取受相國之賜多誰復汝憐奈書生之命薄正舉頭而聽鑰竟揺手以絶闗如之何其拒人歟其不哀之亦命也垣圍繞繞真如失木之猿門外棲棲自笑立袍之鵠固知投璧是致􅇜疑初未入宫夫誰見妬吾過矣吾過矣何所怨尤天厭之天厭之為此顛沛是區區而不余畀將皇皇乎欲何之同輩深嗟不暇責我而悲我達人相語安知禍翁非福翁姑少逃紅勒帛之羞終未了白紵衫之債以俟知者知爾寧有利不利耶兩生不果來業已輸武成宫之試三年將拜賜或可躋光範門之班兹葢某官以不世之元勲為斯文之盟主謂隔截進士忠厚樂易者不為而收拾人才細大短長之並蓄故當三吐哺三握髪之際不㤀一舉手一投足之勞遂令金躍之頑均囿玉成之造某惟有益鞭其後再鼔而前失東隅收桑榆詎敢㤀於憤悱在公門盡桃李竊豫冀於栽培少潔心香莫殫舌筆此啟既上賈師憲嘉其材餽以瓊花露百瓶葢揚州名酒也公復小啟以謝上光範書甫介舍人之謁讀醉鄉記特華從事之班何哉韓子之窮虀拜此曺相之醇酎溢榮觀於望外轉生意於愁邊某官酬酢周乎廣輪淺深存乎燮理一罇二簋慶明良之相逢百榼千鍾味聖賢之深趣溥四海皆春之意開萬間庇厦之仁竟憐一夫之向隅俾與衆人而皆醉某醺酣厚徳傾倒感私天下一本瓊花曷當嘉貺門外三千珠履願走後塵况懷大臣當報國士以上二啟余舊録藏亂離失去今從周丈季中假其本復録於此公魁望名流孝於母忠於君可厲百世非特以文章重也因記公鎮臨川時頗知賤姓名期以過從論文一日因餞送曾通守赴袁州便道謁公一見語合蒙公傾倒細論相期千載竟日話心娓娓不能休時新君登極首除朱文昌禩孫為京西湖北四川宣撫使鎮江陵公屬余作賀語余因援筆曰出命九重宣威六路天昌宋祚乾元初御於正朝地重荆州渙號首開於大閫公一見大稱賞未幾公被劾解郡綬南歸道旴江予馳出橋南餞之贈詩曰擬峴臺邊正好春蕭蕭落葉忽愁人胸蟠冰檗天能識紙挾風霜語未真無路叫閽空短氣有氓卧轍欲霑巾南歸僮馬凄其甚添得憂時鬂似銀公覽詩甚喜為駐長亭促膝劇談眷戀若不忍别者且復予詩又致饋焉其詩曰來到旴南賸有春山川秀麗毓竒人文追漢制才無敵詩接唐風味更真君别頻宜緘尺素我歸但欲岸綸巾相思千里惟心在明月行天瑩白銀公歸里甫半載賈似道罷朝廷更化起公為臺官以至執政然戎馬滿郊時事漸變予不復與公相聞矣其後三山建行朝聞公大用又其後閩地失守聞公慷慨死國予深哀其死而嘉其忠為作小𫝊載其平生出處大節具見哀鑑以垂不朽且以見死生交情云云公莆田人淳熙丞相正獻公俊卿孫也隠居通議卷二十一
