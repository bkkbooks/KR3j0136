body:
  text: 隠居通議卷二十元劉壎撰文章八端平策問宋寧宗開禧中韓侂胄當國啟戎時史丞相彌逺為禮部侍郎與中宫楊后密謀命殿帥夏震乘侂胄入朝殛死於玉津園前史登相位改元嘉定寧宗崩拔理宗於側微以登寶位史相秉政凡十八年薨於位鄭忠獻清之以舊學代相改元端平理宗始親政起諸賢更革弊政一時翕然號小元祐引領以望太平而諸賢議論迂疏國計匱乏是時十六界楮幣寖輕咸以為病端平二年己未召江萬里為舘職故事必先試策而後除是年南塘趙公汝談直翰苑命題發策以楮為問問意不滿諸賢之罔功趙公當時儒宗筆力髙簡朝野稱之世變以來失去三紀矣偶從朋友閒見之如遇故人輙録於此江丞相對策尤妙實為近代舘職策之冠予舊誦之甚習然浩浩數千言難以盡録謾誌䇿問於此而已問楮幣至是術窮矣其將何以救之歟非楮之不便民用也其法貴少而今多焉故也物視輕重為相權使黄金滿天下多於土而土之難得甚於金則金土易價矣然則天下非物之貴也楮之多也非楮之多也國之貧也憂國者謂將深惟國之貧宜從其原治之而顧不然上下日夜所講切乃専在稱提何見之陋也夫國貧則取諸民民竭無可取則惟有痛自節爾今議者乃猥謂内有某事某事例當舉外有某事某事勢當備加費且不贍而節何從施若是則束手坐待顛沛乎王制言國無三年蓄者國非其國孟子謂三征盡用則父子離無三年蓄者所餘少也三征盡用者無復餘也今國家罄一歳所入曾不足攴旬月而又日不輟造十數萬楮幣乃僅得濟是不止無餘矣其可為汲汲寒心葢又甚於王制孟子之所云矣而薦紳先生方且雍雍然峩峩然交誦致知格物之微言深贊報仇復土之偉畫此愚心所竊怪而絶不喻者也仲尼言為政在兵食信至不得已而去則兵與食猶在所舍而用顧不可節乎紹興隆興間世未知用楮也其時國計不見匱乏民生亦無所患苦自楮幣行於今未七十年而調度狼狽禁令繁數遂至此極且今天下非小於紹興隆興之天下也賦取則固倍之矣而若是焉者猶可不討求其故哉按支費必有目其創而増於前孰最重蠧壤必有原其積而至於今孰最深廣費因何論而興積壞至何事而見今修復用何策是欲撙約自何道始二君負經濟之學有間矣幸悉心科别其條㑹而折諸理以對覬於世有補焉其勿習為老生迂談而使區區者憮然重歎也楮幣於宋謂之㑹子於今謂之寶鈔雖制用不同而以久而輕則弊一而已矣至於物價踊貴則以近年較宋殆有甚焉江東運司策問景定中江東轉運司行貢舉引試北方士人一科時疊山先生謝公枋得為考試官發策以中原為問問目筆力甚偉當時逺近𫝊誦今將五十年矣故書中得舊本恐失之謾録於此問事有利害不切身而傷懷人有古今不同時而合志吾亦不知其何心也登冶城訪新亭欲問神州在何處自南渡百四十年惟見青山一髪眇眇愁予耆老不足證矣安得不夢寐東晉諸賢乎衰草寒烟猶帶齊梁光景徒以重人黯然耳不知秦淮舊月曾見千載英雄肝膽乎惜其逺而不可詰也北來諸君忠義之澤在心嘅嘆黍苗悲歌蒲桞豈能忌情故都哉本朝道徳仁義之教三代而後未有也士大夫茍且媮惰無能逺猶晉宋人物所不為也自隆興至端平三大敗縉紳不敢問中原矣兵端不可妄開國事不可再誤思目前之危急舍分外之經營兹猶可藉口柏城澗水草木自春不知誰家墳墓乎每歳寒食夏畦馬醫之子無不以麥飯灑其松楸者長陵抔土詎容置而不問哉劉裕入長安道洛謁五陵時晉寄江左百十有三年矣五胡雲擾豈暇念晉陵廟舜野禹穴誰敢以疑心視之此臣子不忍言之至痛也由端平至今又三十年八陵不復動凄愴秦始皇陳隠王之冢猶有人守之三歳禋沛義夫節婦墳墓亦禁樵採况祖宗神靈所眷乎士大夫沈於湖山歌舞之娱何知有天下大義諸君北風素心豈隨末俗間斷哉公卿談學問自許孔孟談功業自許伊周若限田若鄉飲若論秀若舉逸皆欲彷彿三代此一事乃堪在晉人下哉或謂本朝取中原者其失有四不保全名將不信任豪傑不招納降附不先據中原不知諸君所聞何如也後來童穉班荆輟音固晉人所深恨西北流寓抱孫長息於東南同父已知中原決不可復矣一旦聞有北方豪俊試於漕闈有司安得不驚喜也猶記乾道士辰辛幼安告君相敵六十年必亾敵亾而中國之憂方大紹定驗矣惜乎斯人之不用斯世也諸君亦有義氣如幼安者百尺樓上豈可不分半席乎或謂策問當設疑問難今一筆説去似非問目然文氣振發終是一篇好文字其問目即藏於議論之中但恐難為對耳咸淳庚午科旴江擬策問陳文定公宗禮魁望立朝平生以名節自任縉紳髙之咸淳初為尚書嘗舉婺州通判冷應元亷介而兩浙運使潛説友因事誣冷貪酷公即自劾不報徑出國門詔遣中使宣回公謝徑歸里朝廷不得巳除公華文閣直學士知隆興府以華其歸公不拜己巳歳改知廣州兼廣東經畧使衆謂公必終辭而乃徑赴鎮明年除端明殿學士簽書樞宻院事是時賈似道柄國每以官爵籠絡時賢敗其素履衆又謂公必不墮似道計初猶力辭似道以不能致公為慊致書殷勤公遂為動荅書許之似道一日欣然語兩浙運使趙徳茂與值曰始謂千峯堅壁近得報書許為某出矣由是中外失望是年適科舉有清江胡尉以遜來旴江貢闈校文當作次篇策題胡因以大臣出處大節為問既成章以呈監試黎通守靖徳及同院考試官咸謂胡君文筆甚竒而指摘太切懼陳公借此以為辭召之柄則朝廷推求罪必相及遂命他考官改為而胡之策題竟置不用其後既拆院有得其槀者予愛其文今録於後陳公既造闕詔兼㕘知政事甫兩月薨於位君子曰陳公晚節殊可惜使可終於髙卧不出不過兩月不入都堂耳而全名髙節舉世無儔何至貽千古之憾哉其文曰問天髙地下古往今來悠悠風塵俛仰千載賢者流芳簡册不肖者蕪穢垓埏榮華富貴如浮雲過太空起滅瞬息獨士君子立身大節垂之千古與窮壤相為不朽耳當此蕉鹿酣夢之場冝有磊落軒昻睥睨天地之士翛然長往萬牛莫挽之風以警醒之此有司所以喜談而樂道者不知諸君所志何如也古之君子内重而外輕已大而物小其視富貴利達舉世之所攘袂而争者猶如蠛蠓之過吾前舉無足以動其心故於進退行藏無一不合後世名羶利飴沈酣骨髓直欲以有限之光隂争無窮之宇宙不知逆旅之炊粱未熟而人間之大夢已覺矣回視疇昔所營了無所得徒使後人而復哀後人也東山雅志每形言色黄公酒壚邈若山河功名富貴駸駸迫人朝市山林從此永隔矣悲夫一日父子東歸初無竒節初非甚髙難行之事送者車數百兩至泣下咨嗟至寫為圖畫以𫝊豈出其剏見故耶老子婆娑正坐諸君輩雖位極人臣貲埒公上曾不如雲孫聊爾絃歌蕭然環堵歸來三徑出岫無心穉子候門班荆共酌為差樂而無苦耳古今賢相名卿士大夫不少率於兹事不滿人意立初節易保晚節難豈亦有所憾而為是論歟逍遥堂聽雨早歸之約快閣歸船横笛之盟二公心事皎如日月山川鬼神實與聞之異時宦海風濤卒不如志豈士君子之出處亦天耶功成謝事幅巾東歸誰不願此由我者人非我者天晝錦故鄉黄華晚節耆英洛社白髪蒼顔髙名全節照暎古今千載而下想望猶天人也乃有望復位而目穿一斥去而涕泗上待輔臣如此曽無氣節髙邁不貪禄位之人以感動之故年方四十即求致仕而歸者意有在矣好事之徒乃謂急流勇退是葢僊風道骨之人無乃見其面而未識其心歟自古被這般官爵引壞名節以君子觀之此理自不難見言者乃曰此事今人不及須於古人求之而天子亦曰只辭樞宻一節朕自即位以來僅見此人若他人雖推之亦不去矣不知先朝盛時難進易退之風乃爾寂寥耶當時固有不好官爵不好奉養之人辭官之章多至十七八上一語不合即辭疾而求去者或又詆之為不情何耶再召赴闕倍道兼行投老鍾山書空咄咄何以間執議者之口豈矯於始者不能不改於終耶至若不念舊惡稱為長者常候人主之意未厭先求去故能三入殊非執拗不聽人言者比不知當時諸公唯唯書紙尾而不敢輙有所豫者何所疑憚而若是也不寧惟是平生所志不在温飽榮進素定何有不為而晚思再入甘於自媒去就如此果能保其不以待復古者待我否雖然平生名節為後生描畫盡惟有早退以全晩節吾愛之慕之曽何優劣之敢云况四郊多壘人物𣺌然宇宙内事莫非已分内事進居廊廟而無充位行文書之譏退處山林而無晚節浮沈之誚果何道而可諸君里巷間與諸長老游從其於出處大致講之熟矣洗除場屋爛熟之談脱去常人喔促之態而以胸中梗梗者吐之有司於此觀其人敢問旴學策問前載千峯陳公晚節輕出遂為胡尉發䇿獻嘲然策問措辭形容太切是年旴學王教授寅引放堂試亦以此意發問而其辭意慷慨深沈讀者不覺誠竒筆也其問云至人無已神人無功聖人無名邀雲將兮游鴻濛躡天根問倐忽大辯何訥大智何愚大勇何怯大肆何拘許由巢父何孑孑而居龍逢比干何蹇蹇而誅我將釐是非混有無旁薄萬物與天為徒薦紳大夫劃然而笑曰子殆未知天乎古今天之晝夜晝夜天之一息也隂絀而陽施陽蒸而隂摩呼而炎嘘而冷天且為物絯為氣化為形驅子焉能違世而與道俱且夫乾吾父也坤吾母也其出也或為之君其處也或為之友雖尼山之老鄒嶧之叟尚役役焉同世趨子又焉能一爾汝㤀形軀使青州饑民尚數十萬耆英㑹上忍家食以嬉乎使西師怙虐氊膽未寒晝錦堂中忍委身以歸乎按以上俱用韻二龍閒卧洛水無波清則清矣青苗手實滿枰俱敗忍不為斯民借一箸乎晨窓林景雲谷自春髙則髙矣潛邸舊人出幽入明忍不為國家伸一喙乎借曰太平無事我可擊伊川之壤都督有人我可織東湖之屨然名教一家中原萬里彼能忘之乎四道狼烟萬宇俱盡戎馬迹獨不到西山南浦間乎倚梧而瞑隠几而笑當為是深長思而奚以静為髙或曰我且直之何如大夫曰唯夫静専動直乾道也子奚迂而况盲風夜收天宇為霽狂瀾不驚上下一碧非神龍出游瞬息八極時乎天下憂患一疏大鳴於奸宄饞鼎之交而慶厯以後大事若黙僅聞今日争濮議明日争濮議何故河朔三鎮一奏力争於袤鋒奔逆之衝而建炎以來晚節浮沈舍典學數語外寂寂無聞何居或曰自仁祖朝優容言者太過其始也以詆訐而去為賢其終也寖尋而入於諛静與直胥失之此數百年通患而争新法之罪吾黨所以平之也然則容言非朝廷福諱言反為朝廷福乎直言非吾黨幸隠言反為吾黨幸乎語涉太后忤之者固僭也隨之罷誰速之乎籠錦有聞𫝊之者固譌也介之去誰實激之乎批荅弗稱疑之者固輕也鎮之出誰迫之乎天章十條撓之者僥倖乎抑有出於僥倖之外乎伯紀十議忌之者僭叛乎抑有出於僭叛之外乎燈前夜雨掩卷悠思未嘗不為志士一慨而亦未知所適從也顧鳯岡之隆聳想直講之髙風按旴江城北有鳯凰山其麓有李直講墓直講名覯字㤗伯銅陵石磴南城縣志西十五里有銅山按麻源三谷華子岡謝靈運詩銅陵珙碧澗石磴瀉紅泉李善注文選云銅陵即銅山也遁賢棲客亦與倘佯乎其中必有能祛世迷者敢問此題既出時學内外應試者數百人皆莫悟其㫖予退而歎曰是殆為陳千峯發也葢千峯為賈公一出公議既惜之而入朝一疏又乏骨鯁視疇昔四大願之説大異於是逾失衆望今策問中有静直訐諛四字葢問目綱領而所引歐陽文忠趙忠簡直言不終意甚可見是時即以出處語黙為荅斷之曰士大夫未暇問語黙先當問出處若出處之大節既明則語黙之小疵可畧曰静曰真曰訐曰諛明問偉矣顧纎悉於小節而濶略於大閑吾不知風範一潰亷恥道䘮尚𤨏𤨏於言語諛激之分一何末哉其意以為千峯一動已誤矣又何必復校其論諌之是非王公大喜遂於數百卷中擢予為第一逺近𫝊誦翕然許可予往謝王公謂予曰初得此卷以為決非建昌城内諸公所能作若非金谿即臨川人材也縁三年在此考校多矣若目前諸公之文皆能識之此卷文字風骨偉然非尋常所有故疑其為逺方之文耳已而折號見姓名乃知其為南豐作者甚自喜所擬之不謬而又甚恨相識之晚自是與予定交相得懽甚明年三試皆中前列未幾公授代再注南安郡教授别後猶不忘常寄書求予文期予以逺大甫三數載江西陷漫不相聞矣公廬陵人咸淳乙丑由江西運司混試補入成均戊辰即中省試以内舍生得注教官云此策題失去者十有五年常思見其文不可致戊子六月景周偶以此本見示因備録之併記當時事為之慨然隠居通議卷二十
